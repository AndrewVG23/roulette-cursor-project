<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Night Shift Grill</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=zodiak@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #0d1512; --color-surface: #13211b; --color-surface-2: #173027;
      --color-border: #2c473c; --color-text: #f5edd8; --color-text-muted: #bdb39b;
      --color-text-faint: #897f6d; --color-primary: #d0a23a;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 2px 4px rgba(0,0,0,.28); --shadow-md: 0 12px 30px rgba(0,0,0,.34);
      --font-display: 'Zodiak', Georgia, serif;
      --font-body: 'General Sans', 'Inter', sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
      background:
        radial-gradient(ellipse 90% 50% at 50% -10%, rgba(208,162,58,.12), transparent 45%),
        radial-gradient(circle at 20% 80%, rgba(180,80,40,.08), transparent 35%),
        linear-gradient(180deg, #0d1512, #07100d 60%);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    button { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .app {
      max-width: 720px;
      height: 100dvh;
      margin: 0 auto;
      padding: var(--space-2);
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: var(--space-2);
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus {
      left: var(--space-4); top: var(--space-4);
      background: var(--color-surface); padding: var(--space-3);
      z-index: 20; border-radius: var(--radius-md);
    }
    .panel {
      background: linear-gradient(180deg, rgba(23,48,39,.92), rgba(15,27,23,.96));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .panel-inner {
      padding: var(--space-3);
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .brand h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: .02em;
      color: #f7ead0;
      line-height: 1.1;
    }
    .brand p {
      margin: 0;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .stats {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .stat {
      min-width: 64px;
      padding: 6px 10px;
      border-radius: 3px;
      background: linear-gradient(180deg, rgba(20,53,40,.78), rgba(12,26,21,.92));
      border: 1px solid rgba(238,194,97,.18);
      text-align: center;
    }
    .stat .label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--color-text-faint);
    }
    .stat .value {
      display: block;
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.2;
    }
    .canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #1a1612;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 0 3px rgba(70,60,50,.4);
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      image-rendering: auto;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: rgba(7,16,13,.72);
      backdrop-filter: blur(4px);
      z-index: 2;
      transition: opacity var(--transition);
    }
    .overlay[hidden] { display: none; }
    .overlay-card {
      width: min(100%, 340px);
      text-align: center;
      padding: var(--space-6) var(--space-5);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(23,48,39,.96), rgba(12,26,21,.98));
      border: 1px solid rgba(238,194,97,.28);
      box-shadow: var(--shadow-md), 0 0 40px rgba(208,162,58,.08);
    }
    .overlay-card h2 {
      margin: 0 0 var(--space-2);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: #f7ead0;
    }
    .overlay-card p {
      margin: 0 0 var(--space-5);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }
    .controls {
      display: grid;
      gap: var(--space-2);
      flex-shrink: 0;
      padding: var(--space-2);
      background: linear-gradient(180deg, rgba(20,53,40,.78), rgba(12,26,21,.92));
      border: 1px solid rgba(238,194,97,.18);
      border-radius: 4px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 4px 14px rgba(0,0,0,.22);
    }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      justify-content: center;
    }
    .controls .btn {
      min-height: 44px;
      min-width: 64px;
      padding: var(--space-2) var(--space-3);
      border-radius: 3px;
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #f7ead0;
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
      border: 1px solid rgba(255,238,198,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.18), 0 2px 5px rgba(0,0,0,.24);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .controls .btn.primary {
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03)), linear-gradient(180deg, #d44a45, #8f2420);
      color: #fff6e3;
      border-color: rgba(255,210,200,.28);
    }
    .controls .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(239,187,73,.42);
    }
    .controls .btn:active { transform: translateY(0) scale(0.97); }
    .controls .btn:disabled {
      opacity: 0.45;
      pointer-events: none;
    }
    .ing-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-2);
    }
    .controls .btn.ing {
      flex-direction: column;
      min-height: 72px;
      padding: 8px 6px;
      letter-spacing: .04em;
      font-size: 0.72rem;
      gap: 5px;
      background: linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.02)), linear-gradient(180deg, #3a2a18, #24180e);
      border-color: rgba(255,220,160,.22);
    }
    .controls .btn.ing .swatch {
      width: 36px;
      height: 14px;
      border-radius: 3px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 2px 0 rgba(0,0,0,.35);
    }
    .controls .btn.ing .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 18px;
      padding: 0 5px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: .06em;
      color: #1a1307;
      background: linear-gradient(180deg, #f0c869, #c28b2d);
      border: 1px solid rgba(255,225,156,.45);
    }
    .controls .btn.ing.flash-ok {
      border-color: rgba(113,209,137,.75);
      box-shadow: 0 0 14px rgba(113,209,137,.4);
      transform: translateY(2px) scale(0.96);
    }
    .controls .btn.ing.flash-bad {
      border-color: rgba(242,110,137,.75);
      box-shadow: 0 0 14px rgba(242,110,137,.4);
    }
    .hint {
      margin: 0;
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      letter-spacing: .04em;
    }
    .lives-pips {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 2px;
    }
    .lives-pips span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(208,162,58,.25);
      border: 1px solid rgba(208,162,58,.35);
    }
    .lives-pips span.on {
      background: var(--color-primary);
      box-shadow: 0 0 6px rgba(208,162,58,.45);
    }
    @media (max-width: 520px) {
      .app { padding: var(--space-1); gap: var(--space-1); }
      .panel-inner { padding: var(--space-2); }
      .brand h1 { font-size: var(--text-base); }
      .stat { min-width: 56px; padding: 4px 8px; }
      .controls .btn.ing { min-height: 64px; font-size: 0.65rem; }
      .ing-grid { gap: var(--space-1); }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="app">
    <main id="main" class="panel">
      <div class="panel-inner">
        <div class="topbar">
          <div class="brand">
            <h1>Night Shift Grill</h1>
            <p>ASDF · slam the ticket · max 3</p>
          </div>
          <div class="stats" aria-live="polite">
            <div class="stat">
              <span class="label">Score</span>
              <span class="value" id="scoreVal">0</span>
            </div>
            <div class="stat">
              <span class="label">Shift</span>
              <span class="value" id="levelVal">1</span>
            </div>
            <div class="stat">
              <span class="label">Strikes</span>
              <span class="value" id="livesVal">3</span>
              <div class="lives-pips" id="livesPips" aria-hidden="true"></div>
            </div>
          </div>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="game" width="560" height="420" aria-label="Night Shift Grill assembly line"></canvas>
          <div class="overlay" id="overlay">
            <div class="overlay-card">
              <h2 id="overlayTitle">Night Shift Grill</h2>
              <p id="overlayText">Tickets want up to 3 greasy layers. When a burger hits the station, mash A S D F to slam the right food down before it rolls off.</p>
              <div class="control-row">
                <button class="btn primary" id="startBtn" type="button">Clock In</button>
              </div>
            </div>
          </div>
        </div>

        <div class="controls" aria-label="Game controls">
          <div class="control-row">
            <button class="btn subtle" id="pauseBtn" type="button" disabled>Pause</button>
            <button class="btn subtle" id="muteBtn" type="button" aria-pressed="false">Sound</button>
            <a class="btn subtle" href="frogger.html">Car</a>
            <a class="btn subtle" href="index.html">Tables</a>
          </div>
          <div class="ing-grid" id="ingGrid" aria-label="Slam ingredients"></div>
          <p class="hint">A S D F · slam it wet · three layers max</p>
        </div>
      </div>
    </main>
  </div>

  <script>
(() => {
  const W = 560;
  const H = 420;

  // Four slam keys — gross, delicious, loud
  const INGREDIENTS = [
    {
      id: 'patty', name: 'Patty', key: 'a',
      color: '#5a2e18', edge: '#2e160c', juice: '#7a3a18',
      drip: '#3a1c0c'
    },
    {
      id: 'cheese', name: 'Cheese', key: 's',
      color: '#f0c24a', edge: '#c49220', juice: '#ffe08a',
      drip: '#e8a830'
    },
    {
      id: 'tomato', name: 'Tomato', key: 'd',
      color: '#d13a32', edge: '#8e1e18', juice: '#ff6a55',
      drip: '#b02820'
    },
    {
      id: 'bacon', name: 'Bacon', key: 'f',
      color: '#c24a2e', edge: '#7a2414', juice: '#e8a878',
      drip: '#8a3020'
    }
  ];
  const ING_BY_ID = Object.fromEntries(INGREDIENTS.map(i => [i.id, i]));
  const KEY_TO_ING = Object.fromEntries(
    INGREDIENTS.flatMap(i => [[i.key, i.id], [i.key.toUpperCase(), i.id]])
  );

  // Max 3 ingredients — no top bun button; bun auto-seals when done
  const RECIPES = [
    { id: 'smash',   name: 'Smash',      stack: ['patty', 'cheese', 'tomato'] },
    { id: 'grease',  name: 'Grease Cup', stack: ['patty', 'cheese', 'bacon'] },
    { id: 'bleed',   name: 'Bleed Out',  stack: ['patty', 'tomato', 'bacon'] },
    { id: 'melt',    name: 'Melt Job',   stack: ['cheese', 'cheese', 'patty'] },
    { id: 'crisp',   name: 'Crisp',      stack: ['bacon', 'cheese', 'bacon'] },
    { id: 'rare',    name: 'Still Moos', stack: ['patty', 'patty', 'cheese'] },
    { id: 'pulp',    name: 'Pulp Fiction', stack: ['tomato', 'patty', 'tomato'] },
    { id: 'duo',     name: 'Dirty Duo',  stack: ['patty', 'bacon'] },
    { id: 'slick',   name: 'Slick',      stack: ['cheese', 'bacon'] },
    { id: 'solo',    name: 'Lonely Pat', stack: ['patty'] }
  ];

  const TICKET_COLORS = ['#d0a23a', '#71d189', '#f0a46a', '#7eb6e8', '#e07ab5', '#c9a0ff'];

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const scoreVal = document.getElementById('scoreVal');
  const levelVal = document.getElementById('levelVal');
  const livesVal = document.getElementById('livesVal');
  const livesPips = document.getElementById('livesPips');
  const ingGrid = document.getElementById('ingGrid');

  const LINE_Y = 280;
  const STATION_X = 280;
  const STATION_W = 120;
  const BURGER_W = 76;
  const MAX_TICKETS = 3;
  const SLAM_Y0 = 150;

  const state = {
    mode: 'title',
    score: 0,
    high: Number(localStorage.getItem('nightShiftGrillHigh') || 0),
    level: 1,
    lives: 3,
    served: 0,
    tickets: [],
    burgers: [],
    spawnTimer: 1.2,
    beltOffset: 0,
    flash: 0,
    slams: [],      // falling food mid-air
    goo: [],        // juice / grease / pulp
    drips: [],      // lingering mess on belt
    floatText: [],
    armPulse: 0,
    muted: false,
    lastTs: 0,
    combo: 0
  };

  let audioCtx = null;
  function ensureAudio() {
    if (state.muted) return null;
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep(freq, dur, type = 'square', vol = 0.04) {
    const ac = ensureAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g);
    g.connect(ac.destination);
    const t = ac.currentTime;
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur);
  }
  function squelch(kind) {
    const ac = ensureAudio();
    if (!ac) return;
    const t = ac.currentTime;
    const buf = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = 1 - i / data.length;
      data[i] = (Math.random() * 2 - 1) * env * env * 0.55;
    }
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    const ng = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = kind === 'cheese' ? 900 : kind === 'tomato' ? 1400 : kind === 'bacon' ? 1100 : 700;
    ng.gain.value = 0.08;
    noise.connect(filt);
    filt.connect(ng);
    ng.connect(ac.destination);
    noise.start(t);
    // wet thump
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(kind === 'patty' ? 90 : 140, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    o.connect(g);
    g.connect(ac.destination);
    o.start(t);
    o.stop(t + 0.15);
  }

  const ingButtons = {};
  for (const ing of INGREDIENTS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn ing';
    btn.dataset.ing = ing.id;
    btn.setAttribute('aria-label', `Slam ${ing.name}, key ${ing.key.toUpperCase()}`);
    btn.innerHTML =
      `<span class="swatch" style="background:linear-gradient(180deg,${ing.juice},${ing.color});border:1px solid ${ing.edge}" aria-hidden="true"></span>` +
      `<span>${ing.name}</span>` +
      `<span class="key">${ing.key.toUpperCase()}</span>`;
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      requestSlam(ing.id);
    });
    ingGrid.appendChild(btn);
    ingButtons[ing.id] = btn;
  }

  function beltSpeed() {
    return 52 + (state.level - 1) * 11 + Math.min(36, state.served * 1.4);
  }
  function spawnGap() {
    return Math.max(1.5, 3.3 - (state.level - 1) * 0.16 - state.served * 0.018);
  }
  function pickRecipe() {
    const unlock = Math.min(RECIPES.length, 3 + Math.floor((state.level - 1)) + Math.floor(state.served / 5));
    const pool = RECIPES.slice(0, unlock);
    return pool[Math.floor(Math.random() * pool.length)];
  }
  function nextColor() {
    const used = new Set(state.tickets.map(t => t.color));
    const free = TICKET_COLORS.filter(c => !used.has(c));
    return (free.length ? free : TICKET_COLORS)[Math.floor(Math.random() * (free.length || TICKET_COLORS.length))];
  }

  function addTicket() {
    if (state.tickets.length >= MAX_TICKETS) return;
    state.tickets.push({
      id: `t-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
      recipe: pickRecipe(),
      color: nextColor(),
      age: 0,
      assigned: false
    });
  }

  function spawnBurger() {
    let open = state.tickets.filter(t => !t.assigned);
    if (!open.length) {
      addTicket();
      open = state.tickets.filter(t => !t.assigned);
      if (!open.length) return;
    }
    const ticket = open[0];
    ticket.assigned = true;
    state.burgers.push({
      ticketId: ticket.id,
      color: ticket.color,
      recipe: ticket.recipe,
      x: -BURGER_W,
      stack: [],
      nextIdx: 0,
      done: false,
      sealed: false,
      ruined: false,
      squash: 0,
      bounce: 0,
      grease: 0
    });
  }

  function activeBurger() {
    const left = STATION_X - STATION_W / 2;
    const right = STATION_X + STATION_W / 2;
    let best = null;
    let bestDist = Infinity;
    for (const b of state.burgers) {
      if (b.done || b.ruined || b.sealed) continue;
      // Don't accept while a slam is mid-flight for this burger
      if (state.slams.some(s => s.burger === b)) continue;
      const cx = b.x + BURGER_W / 2;
      if (cx < left || cx > right) continue;
      const d = Math.abs(cx - STATION_X);
      if (d < bestDist) {
        bestDist = d;
        best = b;
      }
    }
    return best;
  }

  function flashBtn(id, ok) {
    const btn = ingButtons[id];
    if (!btn) return;
    btn.classList.remove('flash-ok', 'flash-bad');
    btn.classList.add(ok ? 'flash-ok' : 'flash-bad');
    setTimeout(() => btn.classList.remove('flash-ok', 'flash-bad'), 180);
  }

  function spawnGoo(cx, y, ingId, amount = 10) {
    const ing = ING_BY_ID[ingId];
    for (let i = 0; i < amount; i++) {
      const ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.2;
      const spd = 60 + Math.random() * 160;
      state.goo.push({
        x: cx + (Math.random() - 0.5) * 20,
        y: y,
        vx: Math.cos(ang) * spd * (0.6 + Math.random()),
        vy: Math.sin(ang) * spd - 40,
        r: 2 + Math.random() * 5,
        life: 0.35 + Math.random() * 0.45,
        color: Math.random() > 0.45 ? ing.juice : ing.drip,
        wobble: Math.random() * Math.PI
      });
    }
    // Belt stain
    state.drips.push({
      x: cx + (Math.random() - 0.5) * 30,
      y: LINE_Y + 4 + Math.random() * 8,
      w: 10 + Math.random() * 22,
      h: 3 + Math.random() * 4,
      color: ing.drip,
      life: 2.2 + Math.random()
    });
  }

  function requestSlam(ingId) {
    if (state.mode !== 'play') return;
    const burger = activeBurger();
    if (!burger) {
      beep(150, 0.05, 'triangle', 0.03);
      flashBtn(ingId, false);
      // Still show a lonely slam into empty station for juice
      state.slams.push({
        ingId,
        burger: null,
        x: STATION_X,
        y: SLAM_Y0,
        vy: 0,
        rot: (Math.random() - 0.5) * 0.4,
        stretch: 1.2,
        wrong: true,
        life: 0.35,
        phase: 'fall'
      });
      state.armPulse = 0.2;
      return;
    }

    const needed = burger.recipe.stack[burger.nextIdx];
    const wrong = ingId !== needed;
    flashBtn(ingId, !wrong);
    state.armPulse = 0.22;

    const landY = stackTopY(burger);
    state.slams.push({
      ingId,
      burger,
      x: burger.x + BURGER_W / 2,
      y: SLAM_Y0,
      targetY: landY,
      vy: 0,
      rot: (Math.random() - 0.5) * 0.5,
      stretch: 1.35,
      wrong,
      phase: 'fall',
      t: 0
    });
    beep(220, 0.04, 'square', 0.025);
  }

  function stackTopY(b) {
    let y = LINE_Y - 8;
    for (const id of b.stack) {
      y -= layerGap(id);
    }
    return y - 6;
  }

  function layerGap(id) {
    if (id === 'patty') return 11;
    if (id === 'cheese') return 7;
    if (id === 'bacon') return 8;
    if (id === 'tomato') return 8;
    if (id === 'top') return 12;
    return 7;
  }

  function impactSlam(slam) {
    const { ingId, burger, wrong } = slam;
    const cx = slam.x;
    const y = slam.targetY || LINE_Y - 20;

    spawnGoo(cx, y, ingId, wrong ? 14 : 12);
    squelch(ingId);
    state.armPulse = 0.12;

    if (!burger) return;

    burger.squash = 0.35;
    burger.bounce = 0.28;
    burger.grease = Math.min(1, burger.grease + 0.25);

    if (wrong) {
      burger.ruined = true;
      state.combo = 0;
      beep(100, 0.2, 'sawtooth', 0.05);
      state.floatText.push({ x: cx, y: y - 30, text: 'RANCID!', life: 0.75, color: '#f26e89' });
      strike('Wrong ingredient slammed.');
      return;
    }

    burger.stack.push(ingId);
    burger.nextIdx += 1;
    state.floatText.push({
      x: cx + (Math.random() - 0.5) * 10,
      y: y - 24,
      text: ING_BY_ID[ingId].name.toUpperCase(),
      life: 0.45,
      color: ING_BY_ID[ingId].juice
    });

    if (burger.nextIdx >= burger.recipe.stack.length) {
      // Auto-seal with a disgusting top bun slam
      burger.sealed = true;
      state.slams.push({
        ingId: 'top',
        burger,
        x: cx,
        y: SLAM_Y0 - 10,
        targetY: stackTopY(burger) - 4,
        vy: 0,
        rot: 0,
        stretch: 1.4,
        wrong: false,
        phase: 'fall',
        t: 0,
        finish: true
      });
    }
  }

  function finishBurger(burger) {
    burger.done = true;
    burger.stack.push('top');
    burger.squash = 0.4;
    const bonus = 50 + burger.recipe.stack.length * 18 + state.level * 6 + state.combo * 10;
    state.score += bonus;
    state.served += 1;
    state.combo += 1;
    state.floatText.push({ x: burger.x + BURGER_W / 2, y: LINE_Y - 70, text: `+${bonus}`, life: 0.95, color: '#71d189' });
    spawnGoo(burger.x + BURGER_W / 2, LINE_Y - 40, 'cheese', 6);
    spawnGoo(burger.x + BURGER_W / 2, LINE_Y - 40, 'patty', 4);
    squelch('patty');
    beep(520, 0.08);
    beep(740, 0.1);
    removeTicket(burger.ticketId);
    if (state.served % 5 === 0) {
      state.level += 1;
      state.floatText.push({ x: W / 2, y: H / 2, text: `SHIFT ${state.level}`, life: 1.2, color: '#d0a23a' });
      beep(440, 0.08); beep(660, 0.1); beep(880, 0.12);
    }
    updateHUD();
    while (state.tickets.length < Math.min(MAX_TICKETS, 1 + Math.floor(state.level / 2))) addTicket();
  }

  function removeTicket(id) {
    state.tickets = state.tickets.filter(t => t.id !== id);
  }

  function strike(reason) {
    state.lives -= 1;
    state.flash = 0.32;
    updateHUD();
    if (state.lives <= 0) {
      state.mode = 'gameover';
      if (state.score > state.high) {
        state.high = state.score;
        localStorage.setItem('nightShiftGrillHigh', String(state.high));
      }
      showOverlay(
        'Shift Over',
        `${reason} Served ${state.served}. Score ${state.score}. Best ${state.high}.`,
        'Clock In Again'
      );
      pauseBtn.disabled = true;
    }
  }

  function startGame() {
    state.score = 0;
    state.level = 1;
    state.lives = 3;
    state.served = 0;
    state.combo = 0;
    state.tickets = [];
    state.burgers = [];
    state.slams = [];
    state.goo = [];
    state.drips = [];
    state.floatText = [];
    state.spawnTimer = 0.8;
    state.mode = 'play';
    overlay.hidden = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';
    addTicket();
    addTicket();
    updateHUD();
    beep(440, 0.08);
    beep(660, 0.1);
  }

  function updateHUD() {
    scoreVal.textContent = String(state.score);
    levelVal.textContent = String(state.level);
    livesVal.textContent = String(state.lives);
    livesPips.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      if (i < state.lives) s.classList.add('on');
      livesPips.appendChild(s);
    }
  }

  function showOverlay(title, text, btnLabel) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btnLabel;
    overlay.hidden = false;
  }

  function update(dt) {
    if (state.armPulse > 0) state.armPulse -= dt;

    // Always animate goo / drips a bit
    for (const g of state.goo) {
      g.vy += 520 * dt;
      g.x += g.vx * dt;
      g.y += g.vy * dt;
      g.vx *= (1 - 1.8 * dt);
      g.life -= dt;
      g.wobble += dt * 10;
    }
    state.goo = state.goo.filter(g => g.life > 0 && g.y < H + 20);
    for (const d of state.drips) d.life -= dt;
    state.drips = state.drips.filter(d => d.life > 0);

    for (const f of state.floatText) {
      f.life -= dt;
      f.y -= 30 * dt;
    }
    state.floatText = state.floatText.filter(f => f.life > 0);

    // Slams animate even on title for flair? only in play/pause draw
    for (let i = state.slams.length - 1; i >= 0; i--) {
      const s = state.slams[i];
      if (s.burger && !state.burgers.includes(s.burger) && !s.finish) {
        state.slams.splice(i, 1);
        continue;
      }
      // Track burger X while falling
      if (s.burger) {
        s.x = s.burger.x + BURGER_W / 2;
        if (!s.finish) s.targetY = stackTopY(s.burger);
        else s.targetY = stackTopY(s.burger) - 2;
      }
      s.t += dt;
      s.vy += 2400 * dt;
      s.y += s.vy * dt;
      s.rot += dt * (s.wrong ? 6 : 3);
      s.stretch = 1.15 + Math.min(0.5, s.vy / 900);

      const target = s.targetY != null ? s.targetY : LINE_Y - 10;
      if (s.y >= target) {
        s.y = target;
        if (s.finish) {
          spawnGoo(s.x, s.y, 'cheese', 8);
          finishBurger(s.burger);
        } else {
          impactSlam(s);
        }
        // Impact squash ghost
        state.slams.splice(i, 1);
        // Leave a brief squash ring via goo already spawned
      }
    }

    if (state.mode !== 'play') {
      state.beltOffset = (state.beltOffset + 18 * dt) % 40;
      return;
    }

    state.beltOffset = (state.beltOffset + beltSpeed() * dt) % 40;
    if (state.flash > 0) state.flash -= dt;

    for (const t of state.tickets) t.age += dt;
    const want = Math.min(MAX_TICKETS, 2 + (state.level >= 3 ? 1 : 0));
    if (state.tickets.length < want) addTicket();

    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      const open = state.tickets.some(t => !t.assigned);
      const lastX = state.burgers.length ? Math.min(...state.burgers.map(b => b.x)) : 999;
      if (open && lastX > BURGER_W + 48) {
        spawnBurger();
        state.spawnTimer = spawnGap();
      } else {
        state.spawnTimer = 0.3;
      }
    }

    const speed = beltSpeed();
    for (const b of state.burgers) {
      b.x += speed * dt;
      if (b.bounce > 0) b.bounce -= dt;
      if (b.squash > 0) b.squash -= dt;
    }

    for (let i = state.burgers.length - 1; i >= 0; i--) {
      const b = state.burgers[i];
      if (b.x > W + 24) {
        if (!b.done) {
          state.combo = 0;
          if (!b.ruined) {
            state.floatText.push({ x: W - 40, y: LINE_Y - 40, text: 'COLD!', life: 0.8, color: '#f0a46a' });
            beep(140, 0.15, 'sawtooth', 0.045);
            strike('Burger left incomplete.');
          }
          removeTicket(b.ticketId);
        }
        state.burgers.splice(i, 1);
      }
    }
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function drawBottomBun(cx, y, scale = 1, squash = 0) {
    const sq = 1 + squash * 0.35;
    const tall = 1 - squash * 0.4;
    const w = 58 * scale * sq;
    const h = 12 * scale * tall;
    ctx.fillStyle = '#b87830';
    roundRect(cx - w / 2, y - h * 0.45, w, h, 4 * scale);
    ctx.fill();
    ctx.fillStyle = '#e0a858';
    roundRect(cx - w / 2 + 2, y - h * 0.55, w - 4, h * 0.45, 3 * scale);
    ctx.fill();
    // Toasted edge
    ctx.fillStyle = 'rgba(90,40,10,0.35)';
    roundRect(cx - w / 2, y + h * 0.15, w, h * 0.3, 2);
    ctx.fill();
  }

  function drawTopBun(cx, y, scale = 1, squash = 0, stretchY = 1) {
    const sq = 1 + squash * 0.3;
    const w = 56 * scale * sq;
    const h = 15 * scale * stretchY * (1 - squash * 0.35);
    ctx.fillStyle = '#d4a05a';
    ctx.beginPath();
    ctx.ellipse(cx, y, w / 2, h, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#e8b86a';
    ctx.beginPath();
    ctx.ellipse(cx, y + 2 * scale, w / 2 * 0.9, h * 0.5, 0, Math.PI, 0);
    ctx.fill();
    // Sesame seeds — greasy
    ctx.fillStyle = '#f5e6c8';
    for (let i = 0; i < 6; i++) {
      const a = -Math.PI + (i + 0.4) * (Math.PI / 6);
      ctx.beginPath();
      ctx.ellipse(cx + Math.cos(a) * w * 0.28, y - 1 + Math.sin(a) * 2, 2.4, 1.3, a, 0, Math.PI * 2);
      ctx.fill();
    }
    // Gloss
    ctx.fillStyle = 'rgba(255,240,200,0.25)';
    ctx.beginPath();
    ctx.ellipse(cx - 8, y - 4, 8, 3, -0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawIngredientLayer(ingId, cx, y, scale = 1, opts = {}) {
    const squash = opts.squash || 0;
    const stretch = opts.stretch || 1;
    const rot = opts.rot || 0;
    const ing = ING_BY_ID[ingId];

    ctx.save();
    ctx.translate(cx, y);
    ctx.rotate(rot);
    ctx.scale(1 + squash * 0.45, stretch * (1 - squash * 0.35));

    if (ingId === 'top') {
      drawTopBun(0, 0, scale, squash, 1);
      ctx.restore();
      return;
    }
    if (!ing) { ctx.restore(); return; }

    const w = 54 * scale;
    const h = (ingId === 'patty' ? 12 : ingId === 'cheese' ? 8 : 7) * scale;

    if (ingId === 'patty') {
      // Fat-marbled smash patty
      ctx.fillStyle = ing.color;
      roundRect(-w / 2, -h / 2, w, h, h / 2);
      ctx.fill();
      ctx.fillStyle = '#7a4428';
      roundRect(-w / 2 + 3, -h / 2 + 2, w - 6, h - 4, h / 2);
      ctx.fill();
      // Grease sheen
      ctx.fillStyle = 'rgba(255,200,120,0.22)';
      roundRect(-w / 2 + 6, -h / 2 + 1, w * 0.45, 3, 2);
      ctx.fill();
      // Char marks
      ctx.strokeStyle = 'rgba(20,10,5,0.45)';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(-w / 2 + 8 + i * 14, -1);
        ctx.lineTo(-w / 2 + 16 + i * 14, 2);
        ctx.stroke();
      }
      // Juice bead
      ctx.fillStyle = ing.juice;
      ctx.beginPath();
      ctx.ellipse(w / 2 - 4, 2, 3, 2, 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else if (ingId === 'cheese') {
      // Melted, drooping American
      ctx.fillStyle = ing.color;
      ctx.beginPath();
      ctx.moveTo(-w / 2, -h / 2);
      ctx.lineTo(w / 2, -h / 2 + 1);
      ctx.lineTo(w / 2 + 8, h / 2 + 4);
      ctx.quadraticCurveTo(w / 4, h / 2 + 10, 0, h / 2 + 3);
      ctx.quadraticCurveTo(-w / 4, h / 2 + 12, -w / 2 - 8, h / 2 + 5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,240,180,0.45)';
      ctx.beginPath();
      ctx.ellipse(-6, -1, 10, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Drip tip
      ctx.fillStyle = ing.drip;
      ctx.beginPath();
      ctx.ellipse(-w / 3, h / 2 + 8, 3, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (ingId === 'tomato') {
      // Wet slab with seeds
      ctx.fillStyle = ing.color;
      roundRect(-w / 2 + 2, -h / 2, w - 4, h, h / 2);
      ctx.fill();
      ctx.fillStyle = ing.juice;
      roundRect(-w / 2 + 6, -h / 2 + 1, w - 12, h - 2, h / 2);
      ctx.fill();
      ctx.fillStyle = '#fff0c8';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(-14 + i * 7, (i % 2) * 2 - 0.5, 1.3, 0, Math.PI * 2);
        ctx.fill();
      }
      // Pulp rim
      ctx.strokeStyle = 'rgba(90,10,10,0.35)';
      ctx.lineWidth = 1;
      roundRect(-w / 2 + 2, -h / 2, w - 4, h, h / 2);
      ctx.stroke();
    } else if (ingId === 'bacon') {
      // Wavy greasy strip
      ctx.lineCap = 'round';
      ctx.strokeStyle = ing.color;
      ctx.lineWidth = 5 * scale;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + 2, 0);
      ctx.bezierCurveTo(-10, -7, 10, 7, w / 2 - 2, -1);
      ctx.stroke();
      ctx.strokeStyle = '#f0c8a0';
      ctx.lineWidth = 1.8 * scale;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + 4, -1);
      ctx.bezierCurveTo(-8, -8, 12, 6, w / 2 - 4, -2);
      ctx.stroke();
      ctx.strokeStyle = '#6a2010';
      ctx.lineWidth = 1.2 * scale;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + 6, 2);
      ctx.bezierCurveTo(-6, -3, 8, 8, w / 2 - 6, 1);
      ctx.stroke();
      // Fat glisten
      ctx.fillStyle = 'rgba(255,230,190,0.5)';
      ctx.beginPath();
      ctx.ellipse(8, -3, 4, 1.5, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawFallingSlam(s) {
    const squash = s.phase === 'fall' ? 0 : 0.3;
    drawIngredientLayer(s.ingId, s.x, s.y, 1.05, {
      stretch: s.stretch,
      rot: s.rot * 0.15,
      squash
    });
    // Motion blur streak
    ctx.fillStyle = 'rgba(255,220,160,0.12)';
    ctx.fillRect(s.x - 4, s.y - 40, 8, 36);
  }

  function drawBurger(b) {
    const bounce = b.bounce > 0 ? Math.sin(b.bounce * 28) * 5 : 0;
    const squash = b.squash > 0 ? b.squash / 0.35 : 0;
    const cx = b.x + BURGER_W / 2;
    let y = LINE_Y - 8 + bounce;

    // Grease puddle under plate
    if (b.grease > 0) {
      ctx.fillStyle = `rgba(90,50,10,${0.15 + b.grease * 0.25})`;
      ctx.beginPath();
      ctx.ellipse(cx, LINE_Y + 12, 28 + b.grease * 16, 6 + b.grease * 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.ellipse(cx, LINE_Y + 10, 34, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = b.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(cx, LINE_Y + 10, 38, 9, 0, 0, Math.PI * 2);
    ctx.stroke();

    drawBottomBun(cx, y, 1, squash);

    for (let i = 0; i < b.stack.length; i++) {
      const id = b.stack[i];
      y -= layerGap(id) * (1 - squash * 0.15);
      const layerSquash = i === b.stack.length - 1 ? squash : squash * 0.4;
      drawIngredientLayer(id, cx, y, 1, { squash: layerSquash });
    }

    // Dripping cheese / juice from stack
    if (b.stack.includes('cheese') || b.stack.includes('tomato') || b.grease > 0.3) {
      const dripCol = b.stack.includes('tomato') ? '#d13a32' : '#e8a830';
      ctx.fillStyle = dripCol;
      const dx = cx + 18;
      ctx.beginPath();
      ctx.ellipse(dx, LINE_Y - 6 + Math.sin(b.x * 0.08) * 2, 2.5, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    if (b.ruined) {
      ctx.fillStyle = 'rgba(242,110,137,0.32)';
      roundRect(b.x + 6, LINE_Y - 78, BURGER_W - 12, 78, 6);
      ctx.fill();
    } else if (b.done) {
      ctx.fillStyle = 'rgba(113,209,137,0.22)';
      roundRect(b.x + 6, LINE_Y - 78, BURGER_W - 12, 78, 6);
      ctx.fill();
    }
  }

  function drawTicket(ticket, index) {
    const tw = 148;
    const th = 108;
    const gap = 12;
    const total = state.tickets.length * tw + Math.max(0, state.tickets.length - 1) * gap;
    const startX = (W - total) / 2;
    const x = startX + index * (tw + gap);
    const y = 16;
    const sway = Math.sin(ticket.age * 2 + index) * 1.5;

    ctx.fillStyle = '#8a3030';
    ctx.beginPath();
    ctx.arc(x + tw / 2, y + 4 + sway, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(0, sway);
    ctx.fillStyle = '#f3e6c8';
    roundRect(x, y + 8, tw, th, 4);
    ctx.fill();
    ctx.fillStyle = ticket.color;
    ctx.fillRect(x, y + 8, 6, th);

    ctx.fillStyle = '#2a2218';
    ctx.font = '700 12px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(ticket.recipe.name.toUpperCase(), x + 14, y + 28);
    ctx.fillStyle = '#6a5e48';
    ctx.font = '600 9px "General Sans", sans-serif';
    ctx.fillText(`${ticket.recipe.stack.length} LAYER` + (ticket.recipe.stack.length > 1 ? 'S' : ''), x + 14, y + 42);

    const stack = ticket.recipe.stack;
    const cx = x + tw / 2;
    let ly = y + 96;
    drawBottomBun(cx, ly, 0.5);
    const b = state.burgers.find(bb => bb.ticketId === ticket.id);
    for (let i = 0; i < stack.length; i++) {
      ly -= layerGap(stack[i]) * 0.5;
      const done = b && i < b.nextIdx;
      ctx.globalAlpha = done ? 0.3 : 1;
      drawIngredientLayer(stack[i], cx, ly, 0.5);
      ctx.globalAlpha = 1;
    }
    if (b && b.done) {
      ly -= 6;
      drawTopBun(cx, ly, 0.5);
    }

    if (b && !b.done && !b.ruined) {
      const next = ING_BY_ID[b.recipe.stack[b.nextIdx]];
      if (next) {
        ctx.fillStyle = '#8a3030';
        ctx.font = '700 10px "General Sans", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`SLAM ${next.key.toUpperCase()} · ${next.name.toUpperCase()}`, x + tw / 2, y + th + 2);
      }
    }
    ctx.restore();
  }

  function draw() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#2a221c');
    g.addColorStop(0.45, '#1c1814');
    g.addColorStop(1, '#12100e');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#3a322c';
    ctx.fillRect(0, 0, W, 155);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    for (let x = 0; x < W; x += 28) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 155); ctx.stroke();
    }
    for (let y = 0; y < 155; y += 20) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    for (const lx of [140, 280, 420]) {
      const glow = ctx.createRadialGradient(lx, 150, 4, lx, 200, 70);
      glow.addColorStop(0, 'rgba(255,180,80,0.22)');
      glow.addColorStop(1, 'rgba(255,180,80,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(lx - 70, 145, 140, 100);
      ctx.fillStyle = '#c47830';
      roundRect(lx - 18, 145, 36, 8, 2);
      ctx.fill();
    }

    state.tickets.forEach((t, i) => drawTicket(t, i));

    ctx.fillStyle = '#2e342f';
    ctx.fillRect(0, LINE_Y + 18, W, H - LINE_Y - 18);
    ctx.fillStyle = '#3d4540';
    ctx.fillRect(0, LINE_Y + 18, W, 10);

    // Conveyor
    ctx.fillStyle = '#1a1c1e';
    roundRect(8, LINE_Y - 16, W - 16, 42, 6);
    ctx.fill();
    ctx.fillStyle = '#25282c';
    roundRect(14, LINE_Y - 10, W - 28, 30, 4);
    ctx.fill();
    ctx.save();
    ctx.beginPath();
    roundRect(14, LINE_Y - 10, W - 28, 30, 4);
    ctx.clip();
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    for (let x = -40 + state.beltOffset; x < W; x += 40) ctx.fillRect(x, LINE_Y - 10, 18, 30);
    // Grease drips on belt
    for (const d of state.drips) {
      ctx.globalAlpha = Math.min(1, d.life * 0.5);
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.w / 2, d.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    const sl = STATION_X - STATION_W / 2;
    const active = state.mode === 'play' ? activeBurger() : null;
    ctx.fillStyle = active ? 'rgba(208,162,58,0.2)' : 'rgba(208,162,58,0.08)';
    roundRect(sl, LINE_Y - 96, STATION_W, 108, 8);
    ctx.fill();
    ctx.strokeStyle = active ? 'rgba(208,162,58,0.7)' : 'rgba(208,162,58,0.28)';
    ctx.lineWidth = 2;
    roundRect(sl, LINE_Y - 96, STATION_W, 108, 8);
    ctx.stroke();
    ctx.fillStyle = active ? '#d0a23a' : '#897f6d';
    ctx.font = '700 10px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(active ? 'SLAM ZONE' : 'STATION', STATION_X, LINE_Y - 82);

    // Slam arm
    const armDrop = state.armPulse > 0 ? 10 * (state.armPulse / 0.22) : 0;
    ctx.strokeStyle = '#6a7068';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(STATION_X, 148);
    ctx.lineTo(STATION_X, LINE_Y - 100 + armDrop);
    ctx.stroke();
    ctx.fillStyle = '#9a8a78';
    roundRect(STATION_X - 26, LINE_Y - 108 + armDrop, 52, 16, 4);
    ctx.fill();
    ctx.fillStyle = '#5a4a38';
    roundRect(STATION_X - 20, LINE_Y - 100 + armDrop, 40, 6, 2);
    ctx.fill();

    const sorted = [...state.burgers].sort((a, b) => a.x - b.x);
    for (const b of sorted) drawBurger(b);

    // Mid-air slams on top
    for (const s of state.slams) drawFallingSlam(s);

    // Flying goo
    for (const p of state.goo) {
      ctx.globalAlpha = Math.min(1, p.life * 2.2);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r * (1 + Math.sin(p.wobble) * 0.2), p.r * 0.7, p.wobble * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const f of state.floatText) {
      ctx.globalAlpha = Math.min(1, f.life * 2);
      ctx.fillStyle = f.color;
      ctx.font = '700 15px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#1a221c';
    ctx.fillRect(W - 28, LINE_Y - 90, 28, 120);
    ctx.fillStyle = 'rgba(113,209,137,0.15)';
    ctx.fillRect(W - 24, LINE_Y - 80, 16, 90);
    ctx.fillStyle = '#71d189';
    ctx.font = '700 9px "General Sans", sans-serif';
    ctx.save();
    ctx.translate(W - 12, LINE_Y - 20);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.fillText('SERVE', 0, 0);
    ctx.restore();

    if (state.flash > 0) {
      ctx.fillStyle = `rgba(242,110,137,${state.flash * 0.4})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(20,22,26,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e8dcc0';
      ctx.font = '700 22px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }

    if ((state.mode === 'title' || state.mode === 'gameover') && !state.burgers.length) {
      drawBottomBun(W / 2, LINE_Y);
      drawIngredientLayer('patty', W / 2, LINE_Y - 12, 1, { squash: 0.15 });
      drawIngredientLayer('cheese', W / 2, LINE_Y - 22, 1);
      drawIngredientLayer('bacon', W / 2, LINE_Y - 30, 1);
      drawTopBun(W / 2, LINE_Y - 42, 1, 0.1);
    }
  }

  function frame(ts) {
    if (!state.lastTs) state.lastTs = ts;
    let dt = (ts - state.lastTs) / 1000;
    state.lastTs = ts;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function togglePause() {
    if (state.mode === 'play') {
      state.mode = 'pause';
      pauseBtn.textContent = 'Resume';
      beep(320, 0.06);
    } else if (state.mode === 'pause') {
      state.mode = 'play';
      pauseBtn.textContent = 'Pause';
      beep(480, 0.06);
    }
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
      if (state.mode === 'play' || state.mode === 'pause') togglePause();
      return;
    }
    if (state.mode === 'title' || state.mode === 'gameover') {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        startBtn.click();
      }
      return;
    }
    const ing = KEY_TO_ING[e.key];
    if (ing) {
      e.preventDefault();
      requestSlam(ing);
    }
  });

  pauseBtn.addEventListener('click', togglePause);
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    muteBtn.setAttribute('aria-pressed', String(state.muted));
    muteBtn.textContent = state.muted ? 'Muted' : 'Sound';
  });
  startBtn.addEventListener('click', () => {
    ensureAudio();
    startGame();
  });

  function fitCanvas() {
    const wrap = document.getElementById('canvasWrap');
    const aw = wrap.clientWidth - 8;
    const ah = wrap.clientHeight - 8;
    const scale = Math.min(aw / W, ah / H);
    canvas.style.width = Math.floor(W * scale) + 'px';
    canvas.style.height = Math.floor(H * scale) + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  updateHUD();
  if (state.high > 0) {
    overlayText.textContent =
      `Mash A S D F to slam greasy layers onto tickets — 3 max. Best: ${state.high}`;
  }
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
