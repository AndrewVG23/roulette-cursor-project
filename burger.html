      skin: '#e8c8b0', blush: '#e0a090', hair: '#6a6a70', hairStyle: 'bob', shirt: '#5a6a4a', accent: '#d0b060',
      props: ['glasses', 'purse'], hurtChance: 0.8, dmg: [6, 10],
      happy: ['Worth every imaginary coupon.', 'I will tell the church group.', 'Stackable savings… on joy.'],
      pissed: ['I want a manager AND a priest.', 'This voids my emotional warranty.', 'I clipped a coupon for dignity.']
    },
    {
      id: 'tank', name: 'Tank', title: 'Gym Ghost',
      skin: '#c9a07a', blush: '#d07868', hair: '#1a1410', hairStyle: 'short', shirt: '#303038', accent: '#e04040',
      props: ['stubble', 'bandana'], hurtChance: 0.85, dmg: [12, 18],
      happy: ['Macros immaculate.', 'Protein? Present.', 'I will skip leg day for this.'],
      pissed: ['Bro. BRO.', 'That’s not gains. That’s grief.', 'Spot me… throwing this at you.']
    }
  ];

  const state = {
    mode: 'title',
    money: 0,
    pendingTips: Number(localStorage.getItem('grillTipsPending') || 0),
    high: Number(localStorage.getItem('nightShiftGrillHigh') || 0),
    level: 1,
    health: MAX_HEALTH,
    served: 0,
    tickets: [],
    burgers: [],
    spawnTimer: 1.2,
    beltOffset: 0,
    flash: 0,
    slams: [],
    goo: [],
    drips: [],
    floatText: [],
    armPulse: 0,
    muted: false,
    lastTs: 0,
    combo: 0,
    customer: null,
    hurtFlash: 0
  };

  let audioCtx = null;
  function ensureAudio() {
    if (state.muted) return null;
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep(freq, dur, type = 'square', vol = 0.04) {
    const ac = ensureAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g);
    g.connect(ac.destination);
    const t = ac.currentTime;
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur);
  }
  function squelch(kind) {
    const ac = ensureAudio();
    if (!ac) return;
    const t = ac.currentTime;
    const buf = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = 1 - i / data.length;
      data[i] = (Math.random() * 2 - 1) * env * env * 0.55;
    }
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    const ng = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = kind === 'cheese' ? 900 : kind === 'tomato' ? 1400 : kind === 'bacon' ? 1100 : 700;
    ng.gain.value = 0.08;
    noise.connect(filt);
    filt.connect(ng);
    ng.connect(ac.destination);
    noise.start(t);
    // wet thump
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(kind === 'patty' ? 90 : 140, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    o.connect(g);
    g.connect(ac.destination);
    o.start(t);
    o.stop(t + 0.15);
  }

  function layerId(x) {
    return typeof x === 'string' ? x : x.id;
  }
  function countOf(list, id) {
    let n = 0;
    for (const x of list) if (layerId(x) === id) n++;
    return n;
  }
  function canAccept(burger, ingId) {
    return countOf(burger.stack, ingId) < countOf(burger.recipe.stack, ingId);
  }
  function recipeComplete(burger) {
    return burger.stack.filter(x => layerId(x) !== 'top').length >= burger.recipe.stack.length;
  }
  function grossChance() {
    return Math.min(0.38, GROSS_CHANCE + (state.level - 1) * 0.025);
  }
  const ingButtons = {};
  for (const ing of INGREDIENTS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn ing';
    btn.dataset.ing = ing.id;
    btn.setAttribute('aria-label', `Slam ${ing.name}, key ${ing.key.toUpperCase()}`);
    const icon = document.createElement('canvas');
    icon.className = 'icon';
    icon.width = 104;
    icon.height = 68;
    icon.setAttribute('aria-hidden', 'true');
    btn.appendChild(icon);
    const label = document.createElement('span');
    label.textContent = ing.name;
    btn.appendChild(label);
    const key = document.createElement('span');
    key.className = 'key';
    key.textContent = ing.key.toUpperCase();
    btn.appendChild(key);
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      requestSlam(ing.id);
    });
    ingGrid.appendChild(btn);
    ingButtons[ing.id] = btn;
    // Drawn after drawIngredientLayer is defined — see paintButtonIcons()
    btn._icon = icon;
  }

  function beltSpeed() {
    return 95 + (state.level - 1) * 12 + Math.min(45, state.served * 1.4);
  }
  function spawnGap() {
    return Math.max(1.1, 2.4 - (state.level - 1) * 0.12 - state.served * 0.015);
  }
  function pickRecipe() {
    const unlock = Math.min(RECIPES.length, 3 + Math.floor((state.level - 1)) + Math.floor(state.served / 5));
    const pool = RECIPES.slice(0, unlock);
    return pool[Math.floor(Math.random() * pool.length)];
  }
  function nextColor() {
    return TICKET_COLORS[Math.floor(Math.random() * TICKET_COLORS.length)];
  }

  function addTicket() {
    if (state.tickets.length >= MAX_TICKETS) return;
    state.tickets.push({
      id: `t-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
      recipe: pickRecipe(),
      color: nextColor(),
      age: 0,
      assigned: false
    });
  }

  function makeBurger(ticket, x = -BURGER_W) {
    return {
      ticketId: ticket.id,
      color: ticket.color,
      recipe: ticket.recipe,
      x,
      stack: [],
      done: false,
      sealed: false,
      ruined: false,
      tainted: false,
      delivered: false,
      tossed: false,
      squash: 0,
      bounce: 0,
      grease: 0
    };
  }

  function spawnBurger() {
    let open = state.tickets.filter(t => !t.assigned);
    if (!open.length) {
      addTicket();
      open = state.tickets.filter(t => !t.assigned);
      if (!open.length) return;
    }
    const ticket = open[0];
    ticket.assigned = true;
    state.burgers.push(makeBurger(ticket));
  }

  function activeBurger() {
    const left = STATION_X - STATION_W / 2;
    const right = STATION_X + STATION_W / 2;
    let best = null;
    let bestDist = Infinity;
    for (const b of state.burgers) {
      if (b.done || b.ruined || b.sealed) continue;
      // Don't accept while a slam is mid-flight for this burger
      if (state.slams.some(s => s.burger === b)) continue;
      const cx = b.x + BURGER_W / 2;
      if (cx < left || cx > right) continue;
      const d = Math.abs(cx - STATION_X);
      if (d < bestDist) {
        bestDist = d;
        best = b;
      }
    }
    return best;
  }

  function flashBtn(id, ok) {
    const btn = ingButtons[id];
    if (!btn) return;
    btn.classList.remove('flash-ok', 'flash-bad');
    btn.classList.add(ok ? 'flash-ok' : 'flash-bad');
    setTimeout(() => btn.classList.remove('flash-ok', 'flash-bad'), 180);
  }

  function spawnGoo(cx, y, ingId, amount = 10, gross = false) {
    const ing = ING_BY_ID[ingId] || ING_BY_ID.patty;
    const sick = ['#6a8a30', '#4a6030', '#8a9a40', '#3a5028'];
    for (let i = 0; i < amount; i++) {
      const ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.2;
      const spd = 60 + Math.random() * 160;
      state.goo.push({
        x: cx + (Math.random() - 0.5) * 20,
        y: y,
        vx: Math.cos(ang) * spd * (0.6 + Math.random()),
        vy: Math.sin(ang) * spd - 40,
        r: 2 + Math.random() * 5,
        life: 0.35 + Math.random() * 0.45,
        color: gross
          ? sick[Math.floor(Math.random() * sick.length)]
          : (Math.random() > 0.45 ? ing.juice : ing.drip),
        wobble: Math.random() * Math.PI
      });
    }
    state.drips.push({
      x: cx + (Math.random() - 0.5) * 30,
      y: LINE_Y + 4 + Math.random() * 8,
      w: 10 + Math.random() * 22,
      h: 3 + Math.random() * 4,
      color: gross ? '#4a6030' : ing.drip,
      life: 2.2 + Math.random()
    });
  }

  function requestSlam(ingId) {
    if (state.mode !== 'play') return;
    const burger = activeBurger();
    if (!burger) {
      beep(150, 0.05, 'triangle', 0.03);
      flashBtn(ingId, false);
      // Still show a lonely slam into empty station for juice
      state.slams.push({
        ingId,
        burger: null,
        x: STATION_X,
        y: SLAM_Y0,
        vy: 0,
        rot: (Math.random() - 0.5) * 0.4,
        stretch: 1.2,
        wrong: true,
        life: 0.35,
        phase: 'fall'
      });
      state.armPulse = 0.2;
      return;
    }

    // Order does not matter — only whether this ingredient is still needed
    const wrong = !canAccept(burger, ingId);
    flashBtn(ingId, !wrong);
    state.armPulse = 0.22;

    const gross = !wrong && Math.random() < grossChance();
    const landY = stackTopY(burger);
    state.slams.push({
      ingId,
      burger,
      x: burger.x + BURGER_W / 2,
      y: SLAM_Y0,
      targetY: landY,
      vy: 0,
      rot: (Math.random() - 0.5) * 0.5,
      stretch: 1.35,
      wrong,
      gross,
      phase: 'fall',
      t: 0
    });
    beep(220, 0.04, 'square', 0.025);
  }

  function stackTopY(b) {
    let y = LINE_Y - 8;
    for (const layer of b.stack) {
      y -= layerGap(layerId(layer));
    }
    return y - 6;
  }

  function layerGap(id) {
    if (id === 'patty') return 11;
    if (id === 'cheese') return 7;
    if (id === 'bacon') return 8;
    if (id === 'tomato') return 8;
    if (id === 'top') return 12;
    return 7;
  }

  function impactSlam(slam) {
    const { ingId, burger, wrong, gross } = slam;
    const cx = slam.x;
    const y = slam.targetY || LINE_Y - 20;

    spawnGoo(cx, y, ingId, wrong || gross ? 16 : 12, gross);
    squelch(ingId);
    state.armPulse = 0.12;

    if (!burger) return;

    burger.squash = 0.35;
    burger.bounce = 0.28;
    burger.grease = Math.min(1, burger.grease + 0.25);

    if (wrong) {
      burger.ruined = true;
      state.combo = 0;
      beep(100, 0.2, 'sawtooth', 0.05);
      state.floatText.push({ x: cx, y: y - 30, text: 'WRONG!', life: 0.75, color: '#f26e89' });
      return;
    }

    burger.stack.push({ id: ingId, gross: !!gross });
    if (gross) {
      burger.tainted = true;
      const lines = GROSS_LINES[ingId] || ['GROSS'];
      const label = lines[Math.floor(Math.random() * lines.length)];
      beep(90, 0.16, 'sawtooth', 0.05);
      beep(60, 0.2, 'triangle', 0.04);
      state.floatText.push({ x: cx, y: y - 34, text: label, life: 1.0, color: '#8fd96a' });
      state.floatText.push({ x: cx, y: y - 52, text: 'TOSS IT!', life: 0.9, color: '#f0a46a' });
    } else {
      state.floatText.push({
        x: cx + (Math.random() - 0.5) * 10,
        y: y - 24,
        text: ING_BY_ID[ingId].name.toUpperCase(),
        life: 0.45,
        color: ING_BY_ID[ingId].juice
      });
    }

    if (recipeComplete(burger)) {
      burger.sealed = true;
      state.slams.push({
        ingId: 'top',
        burger,
        x: cx,
        y: SLAM_Y0 - 10,
        targetY: stackTopY(burger) - 4,
        vy: 0,
        rot: 0,
        stretch: 1.4,
        wrong: false,
        gross: false,
        phase: 'fall',
        t: 0,
        finish: true
      });
    }
  }

  function finishBurger(burger) {
    burger.done = true;
    burger.stack.push({ id: 'top', gross: false });
    burger.squash = 0.4;
  }

  function tossableBurger() {
    // Prefer slap-zone burger; else rightmost not-yet-served burger
    const active = activeBurger();
    if (active) return active;
    let best = null;
    let bestX = -Infinity;
    for (const b of state.burgers) {
      if (b.delivered || b.tossed) continue;
      if (b.x > bestX) {
        bestX = b.x;
        best = b;
      }
    }
    return best;
  }

  function tossBurger() {
    if (state.mode !== 'play') return;
    const b = tossableBurger();
    if (!b) {
      beep(160, 0.05, 'triangle', 0.03);
      return;
    }
    const ticket = state.tickets.find(t => t.id === b.ticketId);
    const cx = b.x + BURGER_W / 2;
    b.tossed = true;
    state.slams = state.slams.filter(s => s.burger !== b);
    spawnGoo(cx, LINE_Y - 20, 'tomato', 14, true);
    spawnGoo(cx, LINE_Y - 10, 'patty', 10, true);
    beep(140, 0.08, 'square', 0.04);
    beep(90, 0.12, 'sawtooth', 0.045);
    state.floatText.push({ x: cx, y: LINE_Y - 60, text: 'IN THE BIN', life: 0.7, color: '#f0a46a' });
    state.burgers = state.burgers.filter(x => x !== b);

    // Same order — fresh bun immediately
    if (ticket) {
      ticket.assigned = true;
      state.burgers.push(makeBurger(ticket, STATION_X - BURGER_W / 2 - 10));
      state.floatText.push({
        x: STATION_X, y: LINE_Y - 88,
        text: 'NEW BUN', life: 0.65, color: '#d0a23a'
      });
    }
  }

  function pickLine(lines) {
    return lines[Math.floor(Math.random() * lines.length)];
  }

  function pickCustomer(excludeId) {
    const pool = CUSTOMERS.filter(c => c.id !== excludeId);
    const base = (pool.length ? pool : CUSTOMERS)[Math.floor(Math.random() * (pool.length || CUSTOMERS.length))];
    return {
      ...base,
      mood: 'idle', // idle | eager | happy | eating | pissed
      t: 0,
      bob: 0,
      shake: 0,
      steam: 0,
      bite: 0,
      chew: 0,
      arm: 0,
      held: null,
      heldScale: 1,
      vein: 0,
      brow: 0,
      line: '',
      lineLife: 0,
      punch: 0
    };
  }

  function setCustomerMood(mood) {
    const c = state.customer;
    if (!c) return;
    c.mood = mood;
    c.t = 0;
    if (mood === 'pissed') {
      c.shake = 1;
      c.steam = 1;
      c.vein = 1;
      c.brow = 1;
      c.line = pickLine(c.pissed);
      c.lineLife = 1.4;
    }
    if (mood === 'happy' || mood === 'eating') {
      c.arm = 1;
      c.steam = 0;
      if (mood === 'happy') {
        c.line = pickLine(c.happy);
        c.lineLife = 1.2;
      }
    }
  }

  function chompSound() {
    const ac = ensureAudio();
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(55, t + 0.12);
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    o.connect(g);
    g.connect(ac.destination);
    o.start(t);
    o.stop(t + 0.15);
    // crunch noise
    const buf = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const n = ac.createBufferSource();
    n.buffer = buf;
    const ng = ac.createGain();
    const f = ac.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = 1200;
    ng.gain.value = 0.07;
    n.connect(f); f.connect(ng); ng.connect(ac.destination);
    n.start(t + 0.02);
  }

  function rageSound() {
    beep(90, 0.25, 'sawtooth', 0.06);
    beep(70, 0.35, 'square', 0.04);
    beep(140, 0.12, 'sawtooth', 0.05);
  }

  function deliverToCustomer(burger) {
    if (burger.delivered) return;
    burger.delivered = true;
    const c = state.customer;
    if (!c) return;

    const heldIds = burger.stack.map(layerId);
    if (burger.done && !burger.ruined && !burger.tainted) {
      // Paid $1 a burger — tips bank for the casino purse
      bankTip(1);
      state.served += 1;
      state.combo += 1;
      c.held = heldIds;
      c.heldScale = 1;
      setCustomerMood('happy');
      state.floatText.push({
        x: CUSTOMER_X - 10, y: CUSTOMER_Y - 100,
        text: '+$1', life: 1.05, color: '#8fd989'
      });
      beep(520, 0.08);
      beep(740, 0.1);
      removeTicket(burger.ticketId);
      if (state.served % 6 === 0) {
        state.level += 1;
        state.floatText.push({ x: W / 2, y: H / 2, text: `SHIFT ${state.level}`, life: 1.2, color: '#d0a23a' });
        beep(440, 0.08); beep(660, 0.1); beep(880, 0.12);
      }
      updateHUD();
      if (state.tickets.length < MAX_TICKETS) addTicket();
    } else {
      c.held = heldIds.length ? heldIds : ['patty'];
      c.heldScale = 1;
      setCustomerMood('pissed');
      state.combo = 0;
      rageSound();
      state.flash = Math.max(state.flash, 0.2);
      if (burger.tainted) {
        state.floatText.push({
          x: CUSTOMER_X, y: CUSTOMER_Y - 118,
          text: 'THAT WAS RANCID', life: 1.0, color: '#8fd96a'
        });
      }

      // Random violence from an unhappy customer
      if (Math.random() < c.hurtChance) {
        const dmg = c.dmg[0] + Math.floor(Math.random() * (c.dmg[1] - c.dmg[0] + 1));
        hurtPlayer(dmg, c);
      } else {
        state.floatText.push({
          x: CUSTOMER_X, y: CUSTOMER_Y - 108,
          text: 'LUCKY MISS', life: 0.85, color: '#f0a46a'
        });
      }
      removeTicket(burger.ticketId);
      updateHUD();
    }
  }

  function removeTicket(id) {
    state.tickets = state.tickets.filter(t => t.id !== id);
  }

  function hurtPlayer(amount, customer) {
    state.health = Math.max(0, state.health - amount);
    state.hurtFlash = 0.45;
    state.flash = 0.4;
    if (customer) customer.punch = 1;
    beep(70, 0.2, 'sawtooth', 0.06);
    beep(110, 0.12, 'square', 0.04);
    state.floatText.push({
      x: W * 0.35, y: H * 0.55,
      text: `-${amount} HP`, life: 1.0, color: '#f26e89'
    });
    updateHUD();
    if (state.health <= 0) {
      state.mode = 'gameover';
      if (state.money > state.high) {
        state.high = state.money;
        localStorage.setItem('nightShiftGrillHigh', String(state.high));
      }
      const who = customer ? customer.name : 'A customer';
      showOverlay(
        'Knocked Out',
        `${who}. $${state.money} · best $${state.high}`,
        'Again'
      );
      pauseBtn.disabled = true;
    }
  }

  function drawDollarBill() {
    const c = billCtx;
    const bw = billCanvas.width;
    const bh = billCanvas.height;
    c.clearRect(0, 0, bw, bh);

    // Greenback body
    const g = c.createLinearGradient(0, 0, 0, bh);
    g.addColorStop(0, '#cfe8d0');
    g.addColorStop(0.5, '#b7d4b4');
    g.addColorStop(1, '#9fc49c');
    c.fillStyle = g;
    roundRectPath(c, 4, 4, bw - 8, bh - 8, 5);
    c.fill();

    c.strokeStyle = '#2f6b3a';
    c.lineWidth = 2;
    roundRectPath(c, 8, 8, bw - 16, bh - 16, 3);
    c.stroke();

    // Ornamental corners
    c.strokeStyle = '#3d7a48';
    c.lineWidth = 1;
    [[12, 12], [bw - 12, 12], [12, bh - 12], [bw - 12, bh - 12]].forEach(([x, y], i) => {
      c.beginPath();
      c.arc(x, y, 6, 0, Math.PI * 2);
      c.stroke();
    });

    // Left "1"
    c.fillStyle = '#1f4d28';
    c.font = '700 28px Fredoka, Nunito, sans-serif';
    c.textAlign = 'left';
    c.fillText('1', 16, 48);

    // Right "1"
    c.textAlign = 'right';
    c.fillText('1', bw - 16, 48);

    // Portrait oval (generic founding-face blob)
    c.fillStyle = '#dcecdc';
    c.beginPath();
    c.ellipse(bw / 2, bh / 2 + 2, 22, 26, 0, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#2f6b3a';
    c.lineWidth = 1.5;
    c.stroke();
    // Tiny face
    c.fillStyle = '#c8b090';
    c.beginPath();
    c.ellipse(bw / 2, bh / 2, 12, 14, 0, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#3a2a20';
    c.beginPath();
    c.ellipse(bw / 2, bh / 2 - 8, 12, 6, 0, Math.PI, 0);
    c.fill();
    c.fillStyle = '#2a1c14';
    c.beginPath();
    c.arc(bw / 2 - 4, bh / 2 - 1, 1.2, 0, Math.PI * 2);
    c.arc(bw / 2 + 4, bh / 2 - 1, 1.2, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#5a3a28';
    c.lineWidth = 1;
    c.beginPath();
    c.arc(bw / 2, bh / 2 + 4, 4, 0.2, Math.PI - 0.2);
    c.stroke();

    // ONE DOLLAR
    c.fillStyle = '#1f4d28';
    c.font = '800 9px Nunito, sans-serif';
    c.textAlign = 'center';
    c.fillText('ONE DOLLAR', bw / 2, bh - 14);

    // Serial-ish
    c.font = '700 7px Nunito, sans-serif';
    c.fillStyle = '#3d6a44';
    c.textAlign = 'left';
    c.fillText('NIGHT SHIFT', 18, 18);
    c.textAlign = 'right';
    c.fillText('SERIES GRILL', bw - 18, 18);
  }

  function roundRectPath(c, x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + rr, y);
    c.arcTo(x + w, y, x + w, y + h, rr);
    c.arcTo(x + w, y + h, x, y + h, rr);
    c.arcTo(x, y + h, x, y, rr);
    c.arcTo(x, y, x + w, y, rr);
    c.closePath();
  }

  function bankTip(amount) {
    const n = Math.max(0, Math.round(amount));
    if (n <= 0) return;
    state.money += n;
    state.pendingTips = Math.max(0, Math.round(Number(localStorage.getItem('grillTipsPending') || 0))) + n;
    localStorage.setItem('grillTipsPending', String(state.pendingTips));
  }

  function startGame() {
    state.money = 0;
    state.pendingTips = Math.max(0, Math.round(Number(localStorage.getItem('grillTipsPending') || 0)));
    state.level = 1;
    state.health = MAX_HEALTH;
    state.served = 0;
    state.combo = 0;
    state.tickets = [];
    state.burgers = [];
    state.slams = [];
    state.goo = [];
    state.drips = [];
    state.floatText = [];
    state.hurtFlash = 0;
    state.spawnTimer = 0.8;
    state.customer = pickCustomer();
    state.mode = 'play';
    overlay.hidden = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';
    addTicket();
    updateHUD();
    beep(440, 0.08);
    beep(660, 0.1);
  }

  function updateHUD() {
    moneyVal.textContent = state.pendingTips > 0
      ? `$${state.money} · $${state.pendingTips}→tables`
      : `$${state.money}`;
    levelVal.textContent = String(state.level);
    healthVal.textContent = String(state.health);
    const pct = Math.max(0, Math.min(100, (state.health / MAX_HEALTH) * 100));
    healthFill.style.width = pct + '%';
    healthFill.classList.toggle('mid', state.health <= 60 && state.health > 30);
    healthFill.classList.toggle('low', state.health <= 30);
    drawDollarBill();
  }

  function showOverlay(title, text, btnLabel) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btnLabel;
    overlay.hidden = false;
  }

  function update(dt) {
    if (state.armPulse > 0) state.armPulse -= dt;
    if (state.hurtFlash > 0) state.hurtFlash -= dt;

    // Always animate goo / drips a bit
    for (const g of state.goo) {
      g.vy += 520 * dt;
      g.x += g.vx * dt;
      g.y += g.vy * dt;
      g.vx *= (1 - 1.8 * dt);
      g.life -= dt;
      g.wobble += dt * 10;
    }
    state.goo = state.goo.filter(g => g.life > 0 && g.y < H + 20);
    for (const d of state.drips) d.life -= dt;
    state.drips = state.drips.filter(d => d.life > 0);

    for (const f of state.floatText) {
      f.life -= dt;
      f.y -= 30 * dt;
    }
    state.floatText = state.floatText.filter(f => f.life > 0);

    updateCustomer(dt);

    // Slams animate even on title for flair? only in play/pause draw
    for (let i = state.slams.length - 1; i >= 0; i--) {
      const s = state.slams[i];
      if (s.burger && !state.burgers.includes(s.burger) && !s.finish) {
        state.slams.splice(i, 1);
        continue;
      }
      // Track burger X while falling
      if (s.burger) {
        s.x = s.burger.x + BURGER_W / 2;
        if (!s.finish) s.targetY = stackTopY(s.burger);
        else s.targetY = stackTopY(s.burger) - 2;
      }
      s.t += dt;
      s.vy += 2400 * dt;
      s.y += s.vy * dt;
      s.rot += dt * (s.wrong ? 6 : 3);
      s.stretch = 1.15 + Math.min(0.5, s.vy / 900);

      const target = s.targetY != null ? s.targetY : LINE_Y - 10;
      if (s.y >= target) {
        s.y = target;
        if (s.finish) {
          spawnGoo(s.x, s.y, 'cheese', 8);
          finishBurger(s.burger);
        } else {
          impactSlam(s);
        }
        // Impact squash ghost
        state.slams.splice(i, 1);
        // Leave a brief squash ring via goo already spawned
      }
    }

    if (state.mode !== 'play') {
      state.beltOffset = (state.beltOffset + 18 * dt) % 40;
      return;
    }

    state.beltOffset = (state.beltOffset + beltSpeed() * dt) % 40;
    if (state.flash > 0) state.flash -= dt;

    for (const t of state.tickets) t.age += dt;
    if (state.tickets.length < MAX_TICKETS) addTicket();

    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      const open = state.tickets.some(t => !t.assigned);
      const lastX = state.burgers.length ? Math.min(...state.burgers.map(b => b.x)) : 999;
      if (open && lastX > BURGER_W + 48) {
        spawnBurger();
        state.spawnTimer = spawnGap();
      } else {
        state.spawnTimer = 0.3;
      }
    }

    const speed = beltSpeed();
    const custBusy = state.customer && (state.customer.mood === 'eating' || state.customer.mood === 'happy' || state.customer.mood === 'pissed');
    for (const b of state.burgers) {
      // Pause at the window if customer is mid-reaction
      if (custBusy && b.x >= DELIVER_X - 8) {
        b.x = Math.min(b.x, DELIVER_X - 8);
      } else {
        b.x += speed * dt;
      }
      if (b.bounce > 0) b.bounce -= dt;
      if (b.squash > 0) b.squash -= dt;

      if (!b.delivered && b.x >= DELIVER_X && !custBusy) {
        deliverToCustomer(b);
      }
    }

    for (let i = state.burgers.length - 1; i >= 0; i--) {
      const b = state.burgers[i];
      // Remove once handed off (held by customer) or past the window
      if (b.delivered) {
        state.burgers.splice(i, 1);
      } else if (b.x > W + 24) {
        state.burgers.splice(i, 1);
      }
    }
  }

  function updateCustomer(dt) {
    let c = state.customer;
    if (!c) {
      if (state.mode === 'title' || state.mode === 'gameover') {
        state.customer = pickCustomer();
        c = state.customer;
      } else return;
    }
    c.bob += dt;
    c.t += dt;
    if (c.shake > 0) c.shake = Math.max(0, c.shake - dt * 0.7);
    if (c.punch > 0) c.punch = Math.max(0, c.punch - dt * 1.6);
    if (c.lineLife > 0) c.lineLife = Math.max(0, c.lineLife - dt);
    if (c.steam > 0 && c.mood === 'pissed') c.steam = Math.min(1.2, c.steam + dt * 0.15);
    else if (c.steam > 0) c.steam = Math.max(0, c.steam - dt);

    if (c.mood === 'idle') {
      // Lean in when a burger is approaching
      const approaching = state.burgers.some(b => b.x > STATION_X && !b.delivered);
      if (approaching) c.mood = 'eager';
    } else if (c.mood === 'eager') {
      const approaching = state.burgers.some(b => b.x > STATION_X && !b.delivered);
      if (!approaching) c.mood = 'idle';
    } else if (c.mood === 'happy') {
      if (c.t > 0.35) {
        setCustomerMood('eating');
        c.bite = 0;
        chompSound();
        spawnGoo(CUSTOMER_X - 8, CUSTOMER_Y - 40, 'patty', 8);
        spawnGoo(CUSTOMER_X - 8, CUSTOMER_Y - 40, 'cheese', 6);
      }
    } else if (c.mood === 'eating') {
      c.bite = Math.min(1, c.t / 0.28);
      c.heldScale = Math.max(0, 1 - c.bite * 1.15);
      c.chew = c.t;
      if (c.t > 0.85) {
        c.held = null;
        // Swap in the next hungry stranger
        state.customer = pickCustomer(c.id);
      }
    } else if (c.mood === 'pissed') {
      c.brow = 1;
      c.vein = 0.7 + Math.sin(c.t * 20) * 0.3;
      // Fling the garbage burger
      if (c.held && c.t > 0.2) {
        c.heldScale = Math.max(0, 1 - (c.t - 0.2) * 2.5);
        if (c.t > 0.45) {
          spawnGoo(CUSTOMER_X - 20, CUSTOMER_Y - 50, 'tomato', 10);
          c.held = null;
        }
      }
      if (c.t > 1.65) {
        state.customer = pickCustomer(c.id);
      }
    }
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function drawBottomBun(cx, y, scale = 1, squash = 0) {
    const sq = 1 + squash * 0.35;
    const tall = 1 - squash * 0.4;
    const w = 62 * scale * sq;
    const h = 14 * scale * tall;
    // Soft 3D underside shadow
    ctx.fillStyle = 'rgba(80,40,10,0.28)';
    ctx.beginPath();
    ctx.ellipse(cx + 1, y + 5 * scale, w * 0.48, 5 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    const grd = ctx.createLinearGradient(cx, y - h, cx, y + h);
    grd.addColorStop(0, '#f0c878');
    grd.addColorStop(0.45, '#e0a04a');
    grd.addColorStop(1, '#b86828');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(cx, y, w / 2, h * 0.72, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,230,180,0.55)';
    ctx.beginPath();
    ctx.ellipse(cx - 6 * scale, y - 3 * scale, w * 0.28, h * 0.28, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(120,50,10,0.28)';
    ctx.beginPath();
    ctx.ellipse(cx, y + h * 0.25, w * 0.42, h * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawTopBun(cx, y, scale = 1, squash = 0, stretchY = 1) {
    const sq = 1 + squash * 0.3;
    const w = 60 * scale * sq;
    const h = 18 * scale * stretchY * (1 - squash * 0.35);
    const grd = ctx.createRadialGradient(cx - 6, y - 4, 2, cx, y, w * 0.55);
    grd.addColorStop(0, '#ffe0a0');
    grd.addColorStop(0.45, '#f0b860');
    grd.addColorStop(1, '#c87830');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(cx, y, w / 2, h, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#e8a048';
    ctx.beginPath();
    ctx.ellipse(cx, y + 1 * scale, w / 2, h * 0.35, 0, 0, Math.PI);
    ctx.fill();
    // Cute sesame seeds
    ctx.fillStyle = '#fff6dc';
    for (let i = 0; i < 8; i++) {
      const a = -Math.PI + (i + 0.35) * (Math.PI / 7.5);
      ctx.beginPath();
      ctx.ellipse(cx + Math.cos(a) * w * 0.3, y - 2 + Math.sin(a) * 3, 2.6 * scale, 1.4 * scale, a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,250,230,0.45)';
    ctx.beginPath();
    ctx.ellipse(cx - 10 * scale, y - 6 * scale, 10 * scale, 4 * scale, -0.45, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawIngredientOn(c, ingId, cx, y, scale = 1, opts = {}) {
    const squash = opts.squash || 0;
    const stretch = opts.stretch || 1;
    const rot = opts.rot || 0;
    const gross = !!opts.gross;
    const ing = ING_BY_ID[ingId];

    c.save();
    c.translate(cx, y);
    c.rotate(rot);
    c.scale(1 + squash * 0.45, stretch * (1 - squash * 0.35));

    if (ingId === 'top') {
      const w = 56 * scale;
      const h = 15 * scale;
      c.fillStyle = gross ? '#7a8a40' : '#d4a05a';
      c.beginPath();
      c.ellipse(0, 0, w / 2, h, 0, Math.PI, 0);
      c.fill();
      c.restore();
      return;
    }
    if (!ing) { c.restore(); return; }

    const w = 54 * scale;

    if (ingId === 'patty') {
      const h = 13 * scale;
      // Irregular grilled patty
      const grd = c.createRadialGradient(-6, -2, 2, 0, 0, w * 0.55);
      if (gross) {
        grd.addColorStop(0, '#6a7a28');
        grd.addColorStop(0.45, '#3a4a18');
        grd.addColorStop(1, '#2a3010');
      } else {
        grd.addColorStop(0, '#8a4a28');
        grd.addColorStop(0.45, '#5c3018');
        grd.addColorStop(1, '#3a1c0c');
      }
      c.fillStyle = grd;
      c.beginPath();
      c.moveTo(-w / 2, 0);
      c.bezierCurveTo(-w / 2, -h, -w * 0.2, -h * 1.05, 0, -h * 0.95);
      c.bezierCurveTo(w * 0.25, -h * 1.05, w / 2, -h * 0.85, w / 2, 0);
      c.bezierCurveTo(w / 2, h * 0.9, w * 0.2, h, 0, h * 0.95);
      c.bezierCurveTo(-w * 0.25, h * 1.05, -w / 2, h * 0.85, -w / 2, 0);
      c.closePath();
      c.fill();
      // Fat flecks
      c.fillStyle = 'rgba(230,190,140,0.35)';
      for (const [fx, fy, fr] of [[-10, -2, 2.2], [8, 1, 1.8], [-2, 3, 1.5], [14, -3, 1.4]]) {
        c.beginPath();
        c.ellipse(fx * scale, fy * scale, fr * scale, fr * 0.6 * scale, 0.4, 0, Math.PI * 2);
        c.fill();
      }
      // Grill marks
      c.strokeStyle = 'rgba(20,8,4,0.55)';
      c.lineWidth = 1.6 * scale;
      c.lineCap = 'round';
      for (let i = 0; i < 4; i++) {
        const gx = -w / 2 + 10 * scale + i * 11 * scale;
        c.beginPath();
        c.moveTo(gx, -h * 0.55);
        c.lineTo(gx + 5 * scale, h * 0.55);
        c.stroke();
      }
      // Juice rim
      c.strokeStyle = 'rgba(120,50,20,0.5)';
      c.lineWidth = 1.2 * scale;
      c.stroke();
      c.fillStyle = gross ? '#5a7030' : '#6a3010';
      c.beginPath();
      c.ellipse(w / 2 - 5 * scale, 3 * scale, 3.5 * scale, 2 * scale, 0.3, 0, Math.PI * 2);
      c.fill();
      if (gross) {
        c.fillStyle = 'rgba(120,160,50,0.7)';
        for (const [mx, my] of [[-8, -2], [4, 1], [-2, 3], [10, -1]]) {
          c.beginPath();
          c.ellipse(mx * scale, my * scale, 3 * scale, 2 * scale, 0.5, 0, Math.PI * 2);
          c.fill();
        }
      }
    } else if (ingId === 'cheese') {
      // Soft American slice, slightly melted
      const h = 9 * scale;
      const grd = c.createLinearGradient(0, -h, 0, h + 8);
      if (gross) {
        grd.addColorStop(0, '#c8d060');
        grd.addColorStop(0.4, '#8a9a30');
        grd.addColorStop(1, '#5a6a20');
      } else {
        grd.addColorStop(0, '#ffe08a');
        grd.addColorStop(0.4, '#f0c24a');
        grd.addColorStop(1, '#d49a28');
      }
      c.fillStyle = grd;
      c.beginPath();
      c.moveTo(-w / 2 + 2, -h / 2);
      c.lineTo(w / 2 - 2, -h / 2 + 1);
      c.lineTo(w / 2 + 6 * scale, h / 2 + 2);
      c.quadraticCurveTo(w * 0.2, h / 2 + 9 * scale, 4 * scale, h / 2 + 4);
      c.quadraticCurveTo(-w * 0.15, h / 2 + 11 * scale, -w / 2 - 7 * scale, h / 2 + 3);
      c.closePath();
      c.fill();
      c.fillStyle = 'rgba(255,245,200,0.55)';
      c.beginPath();
      c.ellipse(-4 * scale, -h * 0.15, 12 * scale, 2.2 * scale, 0, 0, Math.PI * 2);
      c.fill();
      // Soft corner curl
      c.strokeStyle = 'rgba(180,120,30,0.35)';
      c.lineWidth = 1;
      c.stroke();
      c.fillStyle = gross ? '#6a8030' : '#e8a830';
      c.beginPath();
      c.ellipse(-w * 0.28, h / 2 + 7 * scale, 3 * scale, 5 * scale, 0.1, 0, Math.PI * 2);
      c.fill();
      if (gross) {
        c.fillStyle = '#3a4a18';
        c.beginPath();
        c.arc(-6 * scale, 0, 2.5 * scale, 0, Math.PI * 2);
        c.arc(8 * scale, 2 * scale, 2 * scale, 0, Math.PI * 2);
        c.fill();
      }
    } else if (ingId === 'tomato') {
      // Cross-section tomato slice
      const r = 22 * scale;
      const skin = c.createRadialGradient(-4, -3, 2, 0, 0, r);
      if (gross) {
        skin.addColorStop(0, '#9aaa50');
        skin.addColorStop(0.55, '#6a7a30');
        skin.addColorStop(0.85, '#4a5020');
        skin.addColorStop(1, '#2a3010');
      } else {
        skin.addColorStop(0, '#ff6a55');
        skin.addColorStop(0.55, '#d13a32');
        skin.addColorStop(0.85, '#b02820');
        skin.addColorStop(1, '#8e1e18');
      }
      c.fillStyle = skin;
      c.beginPath();
      c.ellipse(0, 0, r, r * 0.42, 0, 0, Math.PI * 2);
      c.fill();
      // Gel chambers
      c.fillStyle = 'rgba(255,120,90,0.55)';
      c.beginPath();
      c.ellipse(0, 0, r * 0.72, r * 0.28, 0, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = 'rgba(120,20,15,0.4)';
      c.lineWidth = 1 * scale;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        c.beginPath();
        c.moveTo(Math.cos(a) * 3 * scale, Math.sin(a) * 1.2 * scale);
        c.lineTo(Math.cos(a) * r * 0.65, Math.sin(a) * r * 0.28);
        c.stroke();
      }
      // Seeds
      c.fillStyle = '#fff2c4';
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + 0.2;
        c.beginPath();
        c.ellipse(Math.cos(a) * r * 0.38, Math.sin(a) * r * 0.16, 1.6 * scale, 1.1 * scale, a, 0, Math.PI * 2);
        c.fill();
      }
      // Wet highlight
      c.fillStyle = 'rgba(255,220,200,0.35)';
      c.beginPath();
      c.ellipse(-6 * scale, -3 * scale, 8 * scale, 2.5 * scale, -0.3, 0, Math.PI * 2);
      c.fill();
    } else if (ingId === 'bacon') {
      // Crispy wavy strip with meat/fat bands
      const drawStrip = (oy, meat, fat) => {
        c.lineCap = 'round';
        c.strokeStyle = meat;
        c.lineWidth = 6.5 * scale;
        c.beginPath();
        c.moveTo(-w / 2 + 2, oy);
        c.bezierCurveTo(-12 * scale, oy - 8 * scale, 12 * scale, oy + 8 * scale, w / 2 - 2, oy - 1);
        c.stroke();
        c.strokeStyle = fat;
        c.lineWidth = 2.4 * scale;
        c.beginPath();
        c.moveTo(-w / 2 + 5, oy - 1);
        c.bezierCurveTo(-10 * scale, oy - 9 * scale, 10 * scale, oy + 6 * scale, w / 2 - 5, oy - 2);
        c.stroke();
      };
      if (gross) {
        drawStrip(-2 * scale, '#6a6a40', '#a0a878');
        drawStrip(3 * scale, '#4a4a30', '#808860');
      } else {
        drawStrip(-2 * scale, '#a83822', '#f0d0a8');
        drawStrip(3 * scale, '#8a2818', '#e8c090');
      }
      c.fillStyle = 'rgba(255,230,190,0.45)';
      c.beginPath();
      c.ellipse(6 * scale, -4 * scale, 5 * scale, 1.6 * scale, -0.4, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = '#5a1810';
      c.beginPath();
      c.ellipse(w / 2 - 3, 0, 2.5 * scale, 3 * scale, 0.2, 0, Math.PI * 2);
      c.fill();
      if (gross) {
        // Suspicious hair
        c.strokeStyle = '#2a2a20';
        c.lineWidth = 1;
        c.beginPath();
        c.moveTo(-10 * scale, -4 * scale);
        c.quadraticCurveTo(0, 6 * scale, 12 * scale, -2 * scale);
        c.stroke();
      }
    }

    if (gross) {
      // Little flies
      c.fillStyle = '#1a1a14';
      for (const [fx, fy] of [[-16, -10], [14, -8], [2, -14]]) {
        c.beginPath();
        c.ellipse(fx * scale, fy * scale, 1.6 * scale, 1 * scale, 0.3, 0, Math.PI * 2);
        c.fill();
      }
    }

    c.restore();
  }

  function drawIngredientLayer(ingId, cx, y, scale = 1, opts = {}) {
    drawIngredientOn(ctx, ingId, cx, y, scale, opts);
  }

  function paintButtonIcons() {
    for (const ing of INGREDIENTS) {
      const btn = ingButtons[ing.id];
      if (!btn || !btn._icon) continue;
      const ic = btn._icon;
      const c = ic.getContext('2d');
      c.clearRect(0, 0, ic.width, ic.height);
      const g = c.createLinearGradient(0, 0, 0, ic.height);
      g.addColorStop(0, '#fffaf2');
      g.addColorStop(1, '#f0e2d0');
      c.fillStyle = g;
      c.fillRect(0, 0, ic.width, ic.height);
      c.fillStyle = 'rgba(200,16,46,0.08)';
      c.beginPath();
      c.ellipse(ic.width / 2, ic.height * 0.68, 38, 9, 0, 0, Math.PI * 2);
      c.fill();
      drawIngredientOn(c, ing.id, ic.width / 2, ic.height * 0.5, 1.4, {});
    }
  }

  function drawHair(c, hx, hy, mood) {
    ctx.fillStyle = c.hair;
    if (c.hairStyle === 'slick') {
      ctx.beginPath();
      ctx.ellipse(hx, hy - 16, 18, 12, 0, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(hx - 18, hy - 10);
      ctx.quadraticCurveTo(hx - 22, hy + 4, hx - 14, hy + 10);
      ctx.lineTo(hx - 10, hy - 4);
      ctx.fill();
    } else if (c.hairStyle === 'afro') {
      ctx.beginPath();
      ctx.arc(hx, hy - 14, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx - 12, hy - 8, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + 12, hy - 8, 12, 0, Math.PI * 2);
      ctx.fill();
    } else if (c.hairStyle === 'spike') {
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(hx + i * 7 - 3, hy - 10);
        ctx.lineTo(hx + i * 7, hy - 28 - Math.abs(i));
        ctx.lineTo(hx + i * 7 + 3, hy - 10);
        ctx.fill();
      }
      ctx.beginPath();
      ctx.ellipse(hx, hy - 12, 16, 8, 0, Math.PI, 0);
      ctx.fill();
    } else if (c.hairStyle === 'bob') {
      ctx.beginPath();
      ctx.ellipse(hx, hy - 8, 20, 18, 0, Math.PI, 0.15);
      ctx.fill();
      roundRect(hx - 20, hy - 10, 40, 22, 8);
      ctx.fill();
    } else if (c.hairStyle === 'pony') {
      ctx.beginPath();
      ctx.ellipse(hx, hy - 14, 17, 11, 0, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(hx + 16, hy + 2, 6, 14, 0.4, 0, Math.PI * 2);
      ctx.fill();
    } else if (c.hairStyle === 'cap') {
      ctx.fillStyle = c.accent;
      ctx.beginPath();
      ctx.ellipse(hx, hy - 14, 18, 10, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(hx - 20, hy - 16, 40, 6);
      ctx.fillStyle = c.hair;
      ctx.beginPath();
      ctx.ellipse(hx, hy - 10, 14, 6, 0, 0, Math.PI);
      ctx.fill();
    } else if (c.hairStyle === 'messy') {
      for (let i = 0; i < 6; i++) {
        const a = -Math.PI + i * 0.45;
        ctx.beginPath();
        ctx.ellipse(hx + Math.cos(a) * 12, hy - 12 + Math.sin(a) * 4, 7, 5, a, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // short
      ctx.beginPath();
      ctx.ellipse(hx, hy - 14, 17, 10, 0, Math.PI, 0);
      ctx.fill();
    }
    // Anger hair puff
    if (mood === 'pissed') {
      ctx.fillStyle = c.hair;
      ctx.beginPath();
      ctx.arc(hx - 16, hy - 22, 5, 0, Math.PI * 2);
      ctx.arc(hx + 15, hy - 24, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawCustomerWindow() {
    const wx = W - 108;
    const wy = LINE_Y - 142;
    // Cute 3D booth with red awning
    ctx.fillStyle = '#2a1418';
    roundRect(wx, wy + 18, 104, 168, 14);
    ctx.fill();
    // Depth side
    ctx.fillStyle = '#1a0c10';
    ctx.beginPath();
    ctx.moveTo(wx + 104, wy + 24);
    ctx.lineTo(W, wy + 34);
    ctx.lineTo(W, wy + 186);
    ctx.lineTo(wx + 104, wy + 186);
    ctx.closePath();
    ctx.fill();
    // Cream interior
    const ig = ctx.createLinearGradient(wx, 0, W, 0);
    ig.addColorStop(0, '#fff4ea');
    ig.addColorStop(1, '#e8d4c4');
    ctx.fillStyle = ig;
    roundRect(wx + 8, wy + 36, 88, 140, 12);
    ctx.fill();
    // Red striped awning
    ctx.fillStyle = '#c8102e';
    roundRect(wx - 4, wy + 8, 112, 28, 8);
    ctx.fill();
    ctx.fillStyle = '#f6efe4';
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(wx + 4 + i * 18, wy + 10, 9, 24);
    }
    ctx.fillStyle = '#fff8f0';
    ctx.font = '800 10px Fredoka, Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PICKUP', wx + 52, wy + 27);

    if (!state.customer) state.customer = pickCustomer();
    drawCustomer(state.customer);
  }

  function drawCustomer(c) {
    const shakeX = c.mood === 'pissed' ? Math.sin(c.t * 40) * 3.5 * c.shake : 0;
    const bobY = Math.sin(c.bob * (c.mood === 'eager' ? 8 : 3)) * (c.mood === 'eager' ? 3 : 1.5);
    const cx = CUSTOMER_X + shakeX;
    const cy = CUSTOMER_Y + bobY;
    const lean = c.mood === 'eager' ? -4 : c.mood === 'pissed' ? 2 : 0;

    ctx.save();
    ctx.translate(lean, 0);

    // Chibi body
    ctx.fillStyle = c.shirt;
    roundRect(cx - 20, cy - 14, 40, 46, 14);
    ctx.fill();
    ctx.fillStyle = c.accent;
    roundRect(cx - 5, cy - 14, 10, 34, 4);
    ctx.fill();

    // Arms
    ctx.strokeStyle = c.skin;
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    const armUp = (c.mood === 'happy' || c.mood === 'eating') ? -0.9 * c.arm : c.mood === 'pissed' ? -0.5 : 0.15;
    ctx.beginPath();
    ctx.moveTo(cx - 16, cy - 4);
    ctx.quadraticCurveTo(cx - 32, cy + armUp * 30, cx - 26, cy + 12 + armUp * 18);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 16, cy - 4);
    ctx.quadraticCurveTo(cx + 32, cy + 2 + armUp * 28, cx + 28, cy + 10 + armUp * 16);
    ctx.stroke();

    // Held burger (before the chomp finishes / while raging)
    if (c.held && c.heldScale > 0.05) {
      const hx = c.mood === 'eating' || c.mood === 'happy'
        ? cx - 4
        : cx - 26;
      const hy = c.mood === 'eating' || c.mood === 'happy'
        ? cy - 38 - (1 - c.heldScale) * 8
        : cy - 30 - c.t * 40;
      const sc = 0.7 * c.heldScale;
      ctx.save();
      ctx.translate(hx, hy);
      ctx.scale(sc, sc);
      ctx.rotate(c.mood === 'pissed' ? c.t * 8 : 0);
      drawBottomBun(0, 10, 1, 0);
      let ly = 10;
      for (const id of c.held) {
        if (id === 'top') continue;
        ly -= layerGap(id);
        drawIngredientLayer(id, 0, ly, 1, {});
      }
      if (c.held.includes('top') || c.mood === 'happy' || c.mood === 'eating') {
        ly -= 10;
        drawTopBun(0, ly, 1, 0);
      }
      ctx.restore();
    }

    // Neck
    ctx.fillStyle = c.skin;
    roundRect(cx - 6, cy - 24, 12, 12, 4);
    ctx.fill();

    // Bigger cute head
    const headY = cy - 50;
    ctx.fillStyle = 'rgba(40,10,14,0.15)';
    ctx.beginPath();
    ctx.ellipse(cx + 1, headY + 3, 23, 25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = c.skin;
    ctx.beginPath();
    ctx.ellipse(cx, headY, 22, 24, 0, 0, Math.PI * 2);
    ctx.fill();
    // Soft cheek highlights
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.ellipse(cx - 8, headY - 6, 7, 4, -0.4, 0, Math.PI * 2);
    ctx.fill();

    drawHair(c, cx, headY, c.mood);

    // Ears
    ctx.fillStyle = c.skin;
    ctx.beginPath();
    ctx.ellipse(cx - 20, headY + 2, 4, 6, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 20, headY + 2, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Face flush when pissed / happy
    if (c.mood === 'pissed') {
      ctx.fillStyle = 'rgba(220,40,40,0.35)';
      ctx.beginPath();
      ctx.ellipse(cx, headY + 4, 18, 18, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (c.mood === 'happy' || c.mood === 'eating') {
      ctx.fillStyle = c.blush;
      ctx.globalAlpha = 0.45;
      ctx.beginPath();
      ctx.ellipse(cx - 12, headY + 6, 5, 3, 0, 0, Math.PI * 2);
      ctx.ellipse(cx + 12, headY + 6, 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Brows + eyes
    if (c.mood === 'pissed') {
      ctx.strokeStyle = '#2a1810';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - 12, headY - 6);
      ctx.lineTo(cx - 4, headY - 2);
      ctx.moveTo(cx + 12, headY - 6);
      ctx.lineTo(cx + 4, headY - 2);
      ctx.stroke();
      // Angry slits
      ctx.strokeStyle = '#1a0c08';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(cx - 11, headY + 2);
      ctx.lineTo(cx - 3, headY + 4);
      ctx.moveTo(cx + 11, headY + 2);
      ctx.lineTo(cx + 3, headY + 4);
      ctx.stroke();
      // Vein
      ctx.strokeStyle = `rgba(180,40,60,${0.5 + c.vein * 0.4})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx + 10, headY - 14);
      ctx.lineTo(cx + 14, headY - 8);
      ctx.lineTo(cx + 11, headY - 4);
      ctx.stroke();
    } else if (c.mood === 'happy' || c.mood === 'eating') {
      // Happy closed crescents
      ctx.strokeStyle = '#2a1810';
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.arc(cx - 7, headY + 1, 4, Math.PI * 1.15, Math.PI * 1.85);
      ctx.arc(cx + 7, headY + 1, 4, Math.PI * 1.15, Math.PI * 1.85);
      ctx.stroke();
    } else {
      // Idle / eager eyes
      ctx.fillStyle = '#fff8f0';
      ctx.beginPath();
      ctx.ellipse(cx - 7, headY + 1, 5, 5.5, 0, 0, Math.PI * 2);
      ctx.ellipse(cx + 7, headY + 1, 5, 5.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a120c';
      const look = c.mood === 'eager' ? -2 : 0;
      ctx.beginPath();
      ctx.arc(cx - 7 + look, headY + 1.5, 2.4, 0, Math.PI * 2);
      ctx.arc(cx + 7 + look, headY + 1.5, 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx - 6 + look, headY, 1, 0, Math.PI * 2);
      ctx.arc(cx + 8 + look, headY, 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // Mouth
    ctx.strokeStyle = '#5a2018';
    ctx.fillStyle = '#5a2018';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    if (c.mood === 'eating') {
      // Massive chomp
      const open = 6 + c.bite * 10;
      ctx.fillStyle = '#3a1010';
      ctx.beginPath();
      ctx.ellipse(cx, headY + 12, 10, open, 0, 0, Math.PI * 2);
      ctx.fill();
      // Teeth
      ctx.fillStyle = '#f5ecd8';
      ctx.fillRect(cx - 7, headY + 12 - open * 0.5, 14, 3);
      // Chew wobble after bite
      if (c.bite >= 1) {
        ctx.strokeStyle = '#5a2018';
        ctx.beginPath();
        ctx.arc(cx, headY + 14, 7, 0.2, Math.PI - 0.2);
        ctx.stroke();
      }
    } else if (c.mood === 'happy') {
      ctx.beginPath();
      ctx.arc(cx, headY + 10, 8, 0.15, Math.PI - 0.15);
      ctx.stroke();
      // little tongue tip of joy
      ctx.fillStyle = '#e07070';
      ctx.beginPath();
      ctx.ellipse(cx, headY + 15, 3, 2, 0, 0, Math.PI);
      ctx.fill();
    } else if (c.mood === 'pissed') {
      // Snarl
      ctx.strokeStyle = '#4a1010';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(cx - 9, headY + 14);
      ctx.quadraticCurveTo(cx, headY + 8, cx + 9, headY + 14);
      ctx.stroke();
      // Teeth grit
      ctx.fillStyle = '#f0e8d8';
      ctx.fillRect(cx - 6, headY + 11, 3, 4);
      ctx.fillRect(cx + 3, headY + 11, 3, 4);
    } else if (c.mood === 'eager') {
      ctx.beginPath();
      ctx.ellipse(cx, headY + 13, 4, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(cx - 5, headY + 13);
      ctx.quadraticCurveTo(cx, headY + 15, cx + 5, headY + 13);
      ctx.stroke();
    }

    // Character props
    drawCustomerProps(c, cx, headY, cy);

    // Steam plumes when pissed
    if (c.mood === 'pissed' && c.steam > 0) {
      ctx.strokeStyle = `rgba(200,80,80,${0.35 + c.steam * 0.25})`;
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const sx = cx - 10 + i * 10;
        const sy = headY - 26 - (c.t * 30 + i * 8) % 24;
        ctx.beginPath();
        ctx.moveTo(sx, sy + 10);
        ctx.quadraticCurveTo(sx + 3, sy + 5, sx, sy);
        ctx.stroke();
      }
    }

    // Punch fist flying toward kitchen when they land a hit
    if (c.punch > 0) {
      const px = cx - 20 - (1 - c.punch) * 80;
      const py = cy - 20 + Math.sin(c.punch * 12) * 4;
      ctx.fillStyle = c.skin;
      ctx.beginPath();
      ctx.ellipse(px, py, 10, 8, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,80,80,0.35)';
      ctx.beginPath();
      ctx.arc(px - 8, py, 14 * (1 - c.punch), 0, Math.PI * 2);
      ctx.fill();
    }

    // Speech bubble
    if (c.line && c.lineLife > 0) {
      drawSpeechBubble(cx - 58, headY - 48, c.line, c.mood === 'pissed' ? '#3a1518' : '#1a2820', c.lineLife);
    }

    // Cute name tag
    ctx.fillStyle = '#c8102e';
    roundRect(cx - 38, cy + 28, 76, 24, 10);
    ctx.fill();
    ctx.fillStyle = '#fff8f0';
    ctx.font = '700 10px Fredoka, Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.name.toUpperCase(), cx, cy + 39);
    ctx.fillStyle = c.mood === 'pissed' ? '#ffd0d4' : c.mood === 'happy' || c.mood === 'eating' ? '#d8ffe0' : '#ffe8d8';
    ctx.font = '700 8px Nunito, sans-serif';
    ctx.fillText(c.title, cx, cy + 48);

    ctx.restore();
  }

  function drawCustomerProps(c, cx, headY, cy) {
    const props = c.props || [];
    if (props.includes('mustache')) {
      ctx.strokeStyle = c.hair;
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - 8, headY + 8);
      ctx.quadraticCurveTo(cx - 3, headY + 12, cx, headY + 9);
      ctx.quadraticCurveTo(cx + 3, headY + 12, cx + 8, headY + 8);
      ctx.stroke();
    }
    if (props.includes('stubble')) {
      ctx.fillStyle = 'rgba(40,30,25,0.25)';
      ctx.beginPath();
      ctx.ellipse(cx, headY + 12, 12, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    if (props.includes('glasses')) {
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.arc(cx - 7, headY + 1, 6, 0, Math.PI * 2);
      ctx.arc(cx + 7, headY + 1, 6, 0, Math.PI * 2);
      ctx.moveTo(cx - 1, headY + 1);
      ctx.lineTo(cx + 1, headY + 1);
      ctx.stroke();
    }
    if (props.includes('earrings')) {
      ctx.fillStyle = c.accent;
      ctx.beginPath();
      ctx.arc(cx - 20, headY + 8, 2.2, 0, Math.PI * 2);
      ctx.arc(cx + 20, headY + 8, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
    if (props.includes('goldchain')) {
      ctx.strokeStyle = '#d0a23a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy - 6, 10, 0.2, Math.PI - 0.2);
      ctx.stroke();
      ctx.fillStyle = '#efbb49';
      ctx.beginPath();
      ctx.moveTo(cx, cy + 2);
      ctx.lineTo(cx - 4, cy + 8);
      ctx.lineTo(cx + 4, cy + 8);
      ctx.closePath();
      ctx.fill();
    }
    if (props.includes('badge')) {
      ctx.fillStyle = '#c0c8d0';
      ctx.beginPath();
      ctx.moveTo(cx + 12, cy - 10);
      ctx.lineTo(cx + 18, cy - 6);
      ctx.lineTo(cx + 16, cy + 2);
      ctx.lineTo(cx + 8, cy + 2);
      ctx.lineTo(cx + 6, cy - 6);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#4050a0';
      ctx.beginPath();
      ctx.arc(cx + 12, cy - 3, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    if (props.includes('headset')) {
      ctx.strokeStyle = '#2a2a30';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, headY - 4, 18, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
      ctx.fillStyle = '#303040';
      ctx.beginPath();
      ctx.ellipse(cx - 20, headY + 2, 5, 8, 0, 0, Math.PI * 2);
      ctx.ellipse(cx + 20, headY + 2, 5, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = c.accent;
      ctx.fillRect(cx + 16, headY + 8, 3, 10);
    }
    if (props.includes('scar')) {
      ctx.strokeStyle = 'rgba(140,60,50,0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx + 6, headY - 4);
      ctx.lineTo(cx + 12, headY + 6);
      ctx.stroke();
    }
    if (props.includes('lipstick') && (c.mood === 'idle' || c.mood === 'eager' || c.mood === 'happy')) {
      ctx.strokeStyle = '#c04050';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, headY + 12, 5, 0.15, Math.PI - 0.15);
      ctx.stroke();
    }
    if (props.includes('bandana')) {
      ctx.fillStyle = '#c04040';
      ctx.beginPath();
      ctx.ellipse(cx, headY - 12, 18, 8, 0, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + 14, headY - 10);
      ctx.lineTo(cx + 24, headY - 4);
      ctx.lineTo(cx + 16, headY - 6);
      ctx.fill();
    }
    if (props.includes('purse')) {
      ctx.fillStyle = '#5a4030';
      roundRect(cx + 22, cy + 4, 14, 16, 3);
      ctx.fill();
      ctx.strokeStyle = '#c0a060';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx + 29, cy + 4, 5, Math.PI, 0);
      ctx.stroke();
    }
  }

  function drawSpeechBubble(x, y, text, bg, life) {
    const maxW = 120;
    ctx.font = '700 10px Fredoka, Nunito, sans-serif';
    // naive wrap
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxW - 12) {
        if (cur) lines.push(cur);
        cur = w;
      } else cur = test;
    }
    if (cur) lines.push(cur);
    const bw = Math.min(maxW, Math.max(...lines.map(l => ctx.measureText(l).width)) + 16);
    const bh = 10 + lines.length * 12;
    ctx.globalAlpha = Math.min(1, life * 2);
    ctx.fillStyle = bg === '#3a1518' ? '#3a1014' : '#fff8f0';
    roundRect(x - bw / 2, y - bh, bw, bh, 12);
    ctx.fill();
    ctx.strokeStyle = '#c8102e';
    ctx.lineWidth = 2;
    roundRect(x - bw / 2, y - bh, bw, bh, 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 4, y);
    ctx.lineTo(x + 6, y);
    ctx.lineTo(x + 2, y + 6);
    ctx.closePath();
    ctx.fillStyle = bg === '#3a1518' ? '#3a1014' : '#fff8f0';
    ctx.fill();
    ctx.fillStyle = bg === '#3a1518' ? '#ffd0d4' : '#2a1410';
    ctx.textAlign = 'center';
    lines.forEach((l, i) => ctx.fillText(l, x, y - bh + 14 + i * 12));
    ctx.globalAlpha = 1;
  }

  function drawFallingSlam(s) {
    const squash = s.phase === 'fall' ? 0 : 0.3;
    drawIngredientLayer(s.ingId, s.x, s.y, 1.05, {
      stretch: s.stretch,
      rot: s.rot * 0.15,
      squash,
      gross: !!s.gross
    });
    ctx.fillStyle = s.gross ? 'rgba(140,180,60,0.18)' : 'rgba(255,220,160,0.12)';
    ctx.fillRect(s.x - 4, s.y - 40, 8, 36);
  }

  function burgerDepth(x) {
    // Near station = larger; toward pickup = slightly smaller (3D depth)
    const t = Math.max(0, Math.min(1, x / (W - 40)));
    return 1.12 - t * 0.28;
  }

  function burgerGroundY(x) {
    // Conveyor rises slightly toward the back-right pickup
    return LINE_Y - 6 + (x / W) * -10;
  }

  function drawBurger(b) {
    const bounce = b.bounce > 0 ? Math.sin(b.bounce * 28) * 5 : 0;
    const squash = b.squash > 0 ? b.squash / 0.35 : 0;
    const scale = burgerDepth(b.x);
    const cx = b.x + BURGER_W / 2;
    const gy = burgerGroundY(b.x);
    let y = gy - 10 * scale + bounce;

    ctx.save();
    ctx.translate(cx, gy);
    ctx.scale(scale, scale * 0.92);
    ctx.translate(-cx, -gy);

    if (b.grease > 0) {
      ctx.fillStyle = `rgba(90,50,10,${0.15 + b.grease * 0.25})`;
      ctx.beginPath();
      ctx.ellipse(cx, gy + 14, 30 + b.grease * 16, 7 + b.grease * 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Soft plate with thickness
    ctx.fillStyle = 'rgba(40,20,20,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx + 2, gy + 14, 36, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    const plate = ctx.createRadialGradient(cx - 8, gy + 4, 4, cx, gy + 10, 40);
    plate.addColorStop(0, '#fffaf2');
    plate.addColorStop(0.7, '#efe0d0');
    plate.addColorStop(1, '#d8c4b0');
    ctx.fillStyle = plate;
    ctx.beginPath();
    ctx.ellipse(cx, gy + 10, 38, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.ellipse(cx, gy + 10, 40, 11, 0, 0, Math.PI * 2);
    ctx.stroke();

    drawBottomBun(cx, y, 1, squash);

    for (let i = 0; i < b.stack.length; i++) {
      const layer = b.stack[i];
      const id = layerId(layer);
      const isGross = typeof layer === 'object' && layer.gross;
      y -= layerGap(id) * (1 - squash * 0.15);
      const layerSquash = i === b.stack.length - 1 ? squash : squash * 0.4;
      drawIngredientLayer(id, cx, y, 1.05, { squash: layerSquash, gross: isGross });
    }

    const hasCheese = countOf(b.stack, 'cheese') > 0;
    const hasTomato = countOf(b.stack, 'tomato') > 0;
    if (hasCheese || hasTomato || b.grease > 0.3 || b.tainted) {
      const dripCol = b.tainted ? '#6a8a30' : hasTomato ? '#d13a32' : '#e8a830';
      ctx.fillStyle = dripCol;
      const dx = cx + 18;
      ctx.beginPath();
      ctx.ellipse(dx, gy - 4 + Math.sin(b.x * 0.08) * 2, 2.5, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    if (b.tainted) {
      ctx.fillStyle = 'rgba(100,140,40,0.28)';
      roundRect(cx - 34, gy - 86, 68, 78, 10);
      ctx.fill();
      ctx.fillStyle = '#5a7020';
      ctx.font = '800 10px Fredoka, Nunito, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GROSS', cx, gy - 76);
    } else if (b.ruined) {
      ctx.fillStyle = 'rgba(227,28,35,0.22)';
      roundRect(cx - 34, gy - 86, 68, 78, 10);
      ctx.fill();
    } else if (b.done) {
      ctx.fillStyle = 'rgba(80,180,100,0.18)';
      roundRect(cx - 34, gy - 86, 68, 78, 10);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawTicket(ticket) {
    const stack = ticket.recipe.stack;
    const rowH = 40;
    const tw = Math.min(400, W - 48);
    const th = 56 + stack.length * rowH + 14;
    const x = (W - tw) / 2 - 20;
    const y = 10;
    const sway = Math.sin(ticket.age * 1.6) * 1.5;
    const burger = state.burgers.find(bb => bb.ticketId === ticket.id);
    const have = burger ? burger.stack : [];

    const usedHave = {};
    const rows = stack.map((ingId) => {
      const haveCount = countOf(have, ingId);
      const used = usedHave[ingId] || 0;
      const checked = used < haveCount;
      let gross = false;
      if (checked) {
        let n = 0;
        for (const l of have) {
          if (layerId(l) !== ingId) continue;
          if (n === used) {
            gross = !!(typeof l === 'object' && l.gross);
            break;
          }
          n++;
        }
        usedHave[ingId] = used + 1;
      }
      return { ingId, checked, gross };
    });

    ctx.save();
    ctx.translate(0, sway);

    // Hanging clip
    ctx.fillStyle = '#8a9098';
    roundRect(x + tw / 2 - 10, y, 20, 12, 3);
    ctx.fill();
    ctx.fillStyle = '#c8102e';
    ctx.beginPath();
    ctx.arc(x + tw / 2, y + 4, 4, 0, Math.PI * 2);
    ctx.fill();

    // Soft paper shadow (3D hang)
    ctx.fillStyle = 'rgba(40,10,14,0.28)';
    roundRect(x + 4, y + 18, tw, th, 12);
    ctx.fill();

    // Kraft bag / pad style ticket
    const paper = ctx.createLinearGradient(x, y, x, y + th);
    paper.addColorStop(0, '#fffaf2');
    paper.addColorStop(1, '#f0e4d4');
    ctx.fillStyle = paper;
    roundRect(x, y + 14, tw, th, 12);
    ctx.fill();
    ctx.strokeStyle = '#c8102e';
    ctx.lineWidth = 3;
    roundRect(x, y + 14, tw, th, 12);
    ctx.stroke();

    // Red brand stamp
    ctx.fillStyle = '#c8102e';
    roundRect(x + 12, y + 22, 70, 18, 6);
    ctx.fill();
    ctx.fillStyle = '#fff8f0';
    ctx.font = '800 10px Fredoka, Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ORDER UP', x + 47, y + 35);

    ctx.fillStyle = '#2a1410';
    ctx.font = '700 20px Fredoka, Nunito, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(ticket.recipe.name, x + 92, y + 38);
    ctx.fillStyle = '#8a6a60';
    ctx.font = '800 11px Nunito, sans-serif';
    ctx.fillText('ANY ORDER  ·  TOSS GROSS WITH X', x + 92, y + 54);

    rows.forEach((row, i) => {
      const ry = y + 68 + i * rowH;
      const ing = ING_BY_ID[row.ingId];

      ctx.strokeStyle = row.gross ? '#6a8a30' : row.checked ? '#2f8f4e' : '#c8a898';
      ctx.lineWidth = 2.5;
      roundRect(x + 18, ry + 6, 22, 22, 7);
      ctx.stroke();
      if (row.checked) {
        ctx.fillStyle = row.gross ? '#6a8a30' : '#2f8f4e';
        roundRect(x + 21, ry + 9, 16, 16, 5);
        ctx.fill();
        ctx.strokeStyle = '#fff8f0';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(x + 24, ry + 17);
        ctx.lineTo(x + 28, ry + 21);
        ctx.lineTo(x + 35, ry + 12);
        ctx.stroke();
      }

      const iconCx = x + 70;
      const iconCy = ry + 17;
      ctx.fillStyle = row.gross ? 'rgba(100,140,40,0.15)' : 'rgba(200,16,46,0.06)';
      roundRect(iconCx - 26, iconCy - 13, 52, 26, 8);
      ctx.fill();
      ctx.globalAlpha = row.checked && !row.gross ? 0.4 : 1;
      drawIngredientLayer(row.ingId, iconCx, iconCy, 0.82, { gross: row.gross });
      ctx.globalAlpha = 1;

      ctx.fillStyle = row.gross ? '#4a6020' : row.checked ? '#6a8a6a' : '#2a1410';
      ctx.font = '800 15px Fredoka, Nunito, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(ing.name, x + 106, ry + 14);
      ctx.fillStyle = row.gross ? '#6a8030' : '#c8102e';
      ctx.font = '800 12px Nunito, sans-serif';
      ctx.fillText(row.gross ? 'EWW — TOSS IT' : `HIT  ${ing.key.toUpperCase()}`, x + 106, ry + 30);
    });

    const left = stack.length - have.filter(l => layerId(l) !== 'top').length;
    ctx.fillStyle = burger && burger.tainted ? '#5a7020'
      : burger && burger.ruined ? '#c8102e'
      : burger && burger.done ? '#2f8f4e'
      : '#8a6a60';
    ctx.font = '800 12px Fredoka, Nunito, sans-serif';
    ctx.textAlign = 'center';
    let status = `${left} TO GO`;
    if (burger && burger.tainted) status = 'GROSS — HIT TOSS';
    else if (burger && burger.ruined) status = 'RUINED — TOSS IT';
    else if (burger && burger.done) status = 'HEADING TO PICKUP';
    else if (burger && left === 0) status = 'SEALING…';
    else if (!ticket.assigned) status = 'WAITING ON THE LINE';
    ctx.fillText(status, x + tw / 2, y + th + 8);

    ctx.restore();
  }

  function drawCheckeredWall(x0, y0, x1, y1, size) {
    const cols = Math.ceil((x1 - x0) / size);
    const rows = Math.ceil((y1 - y0) / size);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        ctx.fillStyle = ((r + c) % 2 === 0) ? '#c8102e' : '#f6efe4';
        ctx.fillRect(x0 + c * size, y0 + r * size, size + 0.5, size + 0.5);
      }
    }
  }

  function drawKitchenScene() {
    // Warm room wash
    const room = ctx.createLinearGradient(0, 0, 0, H);
    room.addColorStop(0, '#5a3038');
    room.addColorStop(0.35, '#3a1c22');
    room.addColorStop(1, '#1a0c10');
    ctx.fillStyle = room;
    ctx.fillRect(0, 0, W, H);

    // Back wall checkers (perspective band)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, 40);
    ctx.lineTo(W, 55);
    ctx.lineTo(W, 210);
    ctx.lineTo(0, 230);
    ctx.closePath();
    ctx.clip();
    drawCheckeredWall(-20, 40, W + 20, 240, 26);
    ctx.fillStyle = 'rgba(40,10,14,0.28)';
    ctx.fillRect(0, 40, W, 200);
    ctx.restore();

    // Ceiling strip + cute hanging lights
    ctx.fillStyle = '#2a1418';
    ctx.fillRect(0, 0, W, 48);
    for (const lx of [120, 260, 400]) {
      ctx.strokeStyle = '#8a9098';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(lx, 20);
      ctx.lineTo(lx, 58);
      ctx.stroke();
      const glow = ctx.createRadialGradient(lx, 78, 2, lx, 90, 55);
      glow.addColorStop(0, 'rgba(255,210,140,0.45)');
      glow.addColorStop(1, 'rgba(255,180,80,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.ellipse(lx, 90, 55, 28, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff0c8';
      ctx.beginPath();
      ctx.ellipse(lx, 64, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c8102e';
      roundRect(lx - 10, 56, 20, 8, 3);
      ctx.fill();
    }

    // Brand sign on the left wall (stays clear of order ticket)
    ctx.fillStyle = '#111';
    roundRect(10, 58, 118, 52, 12);
    ctx.fill();
    ctx.strokeStyle = '#c8102e';
    ctx.lineWidth = 3;
    roundRect(10, 58, 118, 52, 12);
    ctx.stroke();
    ctx.fillStyle = '#c8102e';
    ctx.fillRect(18, 66, 102, 3);
    ctx.fillStyle = '#f6efe4';
    ctx.font = '700 11px Fredoka, Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('NIGHT SHIFT', 69, 88);
    ctx.fillText('GRILL', 69, 102);

    // Perspective floor (trapezoid checkers)
    const floorTop = LINE_Y + 8;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, floorTop);
    ctx.lineTo(W, floorTop - 12);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.clip();
    for (let r = 0; r < 12; r++) {
      for (let c = -2; c < 18; c++) {
        const s = 34;
        ctx.fillStyle = ((r + c) % 2 === 0) ? '#a01020' : '#ebe0d2';
        ctx.fillRect(c * s - (r * 4), floorTop + r * (s * 0.55), s, s * 0.55 + 1);
      }
    }
    ctx.fillStyle = 'rgba(20,6,8,0.35)';
    ctx.fillRect(0, floorTop, W, H - floorTop);
    ctx.restore();

    // Stainless counter edge (3D slab under belt)
    const cy = LINE_Y + 22;
    ctx.fillStyle = '#9aa2aa';
    ctx.beginPath();
    ctx.moveTo(0, cy);
    ctx.lineTo(W, cy - 10);
    ctx.lineTo(W, cy + 28);
    ctx.lineTo(0, cy + 38);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#c5ccd4';
    ctx.beginPath();
    ctx.moveTo(0, cy);
    ctx.lineTo(W, cy - 10);
    ctx.lineTo(W, cy + 4);
    ctx.lineTo(0, cy + 14);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(0, cy + 2, W, 3);

    // Little peanut piles (cute Five Guys nod)
    for (const [px, py] of [[36, cy + 18], [70, cy + 22], [W - 150, cy + 12]]) {
      ctx.fillStyle = '#d4a574';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.ellipse(px + i * 5, py + (i % 2) * 2, 4, 2.6, 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 3D perspective conveyor (trapezoid belt)
    ctx.fillStyle = '#3a4048';
    ctx.beginPath();
    ctx.moveTo(12, LINE_Y + 18);
    ctx.lineTo(W - 100, LINE_Y + 4);
    ctx.lineTo(W - 108, LINE_Y - 28);
    ctx.lineTo(20, LINE_Y - 10);
    ctx.closePath();
    ctx.fill();
    // Belt face
    const belt = ctx.createLinearGradient(0, LINE_Y - 20, 0, LINE_Y + 20);
    belt.addColorStop(0, '#2a2e34');
    belt.addColorStop(0.5, '#1a1e24');
    belt.addColorStop(1, '#12161a');
    ctx.fillStyle = belt;
    ctx.beginPath();
    ctx.moveTo(24, LINE_Y + 12);
    ctx.lineTo(W - 106, LINE_Y - 2);
    ctx.lineTo(W - 112, LINE_Y - 22);
    ctx.lineTo(28, LINE_Y - 6);
    ctx.closePath();
    ctx.fill();
    // Moving stripes
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(24, LINE_Y + 12);
    ctx.lineTo(W - 106, LINE_Y - 2);
    ctx.lineTo(W - 112, LINE_Y - 22);
    ctx.lineTo(28, LINE_Y - 6);
    ctx.closePath();
    ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 10;
    for (let x = -60 + state.beltOffset; x < W; x += 36) {
      ctx.beginPath();
      ctx.moveTo(x, LINE_Y + 20);
      ctx.lineTo(x + 40, LINE_Y - 30);
      ctx.stroke();
    }
    for (const d of state.drips) {
      ctx.globalAlpha = Math.min(1, d.life * 0.5);
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y - 4, d.w / 2, d.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // Steel rails
    ctx.strokeStyle = '#d0d6dc';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(22, LINE_Y - 8);
    ctx.lineTo(W - 110, LINE_Y - 24);
    ctx.moveTo(18, LINE_Y + 14);
    ctx.lineTo(W - 104, LINE_Y);
    ctx.stroke();
  }

  function draw() {
    drawKitchenScene();

    state.tickets.forEach((t) => drawTicket(t));

    const sl = STATION_X - STATION_W / 2;
    const active = state.mode === 'play' ? activeBurger() : null;
    // Cute 3D slam pad
    ctx.fillStyle = 'rgba(40,10,14,0.25)';
    roundRect(sl + 4, LINE_Y - 90, STATION_W, 100, 16);
    ctx.fill();
    const pad = ctx.createLinearGradient(sl, LINE_Y - 100, sl, LINE_Y + 10);
    pad.addColorStop(0, active ? 'rgba(255,240,230,0.55)' : 'rgba(255,240,230,0.22)');
    pad.addColorStop(1, active ? 'rgba(200,16,46,0.28)' : 'rgba(200,16,46,0.1)');
    ctx.fillStyle = pad;
    roundRect(sl, LINE_Y - 96, STATION_W, 104, 16);
    ctx.fill();
    ctx.strokeStyle = active ? '#c8102e' : 'rgba(246,239,228,0.35)';
    ctx.lineWidth = 3;
    roundRect(sl, LINE_Y - 96, STATION_W, 104, 16);
    ctx.stroke();
    ctx.fillStyle = active ? '#c8102e' : '#c09088';
    ctx.font = '800 11px Fredoka, Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(active ? 'SLAM ZONE' : 'BUILD HERE', STATION_X, LINE_Y - 80);

    // Cute press arm
    const armDrop = state.armPulse > 0 ? 10 * (state.armPulse / 0.22) : 0;
    ctx.strokeStyle = '#a8b0b8';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(STATION_X, 150);
    ctx.lineTo(STATION_X, LINE_Y - 102 + armDrop);
    ctx.stroke();
    ctx.fillStyle = '#c8102e';
    roundRect(STATION_X - 28, LINE_Y - 112 + armDrop, 56, 18, 8);
    ctx.fill();
    ctx.fillStyle = '#f6efe4';
    roundRect(STATION_X - 22, LINE_Y - 106 + armDrop, 44, 8, 4);
    ctx.fill();

    const sorted = [...state.burgers].sort((a, b) => a.x - b.x);
    for (const b of sorted) drawBurger(b);

    for (const s of state.slams) drawFallingSlam(s);

    for (const p of state.goo) {
      ctx.globalAlpha = Math.min(1, p.life * 2.2);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r * (1 + Math.sin(p.wobble) * 0.2), p.r * 0.7, p.wobble * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const f of state.floatText) {
      ctx.globalAlpha = Math.min(1, f.life * 2);
      ctx.fillStyle = f.color;
      ctx.font = '700 16px Fredoka, Nunito, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawCustomerWindow();

    if (state.flash > 0) {
      ctx.fillStyle = `rgba(227,28,35,${state.flash * 0.35})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (state.hurtFlash > 0) {
      ctx.fillStyle = `rgba(180,30,40,${state.hurtFlash * 0.35})`;
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = `rgba(255,80,90,${state.hurtFlash})`;
      ctx.lineWidth = 6;
      ctx.strokeRect(3, 3, W - 6, H - 6);
    }

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(30,8,12,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff8f0';
      ctx.font = '700 24px Fredoka, Nunito, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }

    if ((state.mode === 'title' || state.mode === 'gameover') && !state.burgers.length) {
      drawBottomBun(W / 2, LINE_Y);
      drawIngredientLayer('patty', W / 2, LINE_Y - 12, 1, { squash: 0.15 });
      drawIngredientLayer('cheese', W / 2, LINE_Y - 22, 1);
      drawIngredientLayer('bacon', W / 2, LINE_Y - 30, 1);
      drawTopBun(W / 2, LINE_Y - 42, 1, 0.1);
    }
  }

  function frame(ts) {
    if (!state.lastTs) state.lastTs = ts;
    let dt = (ts - state.lastTs) / 1000;
    state.lastTs = ts;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function togglePause() {
    if (state.mode === 'play') {
      state.mode = 'pause';
      pauseBtn.textContent = 'Resume';
      beep(320, 0.06);
    } else if (state.mode === 'pause') {
      state.mode = 'play';
      pauseBtn.textContent = 'Pause';
      beep(480, 0.06);
    }
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
      if (state.mode === 'play' || state.mode === 'pause') togglePause();
      return;
    }
    if (state.mode === 'title' || state.mode === 'gameover') {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        startBtn.click();
      }
      return;
    }
    if (e.key === 'x' || e.key === 'X' || e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      tossBurger();
      return;
    }
    const ing = KEY_TO_ING[e.key];
    if (ing) {
      e.preventDefault();
      requestSlam(ing);
    }
  });

  pauseBtn.addEventListener('click', togglePause);
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    muteBtn.setAttribute('aria-pressed', String(state.muted));
    muteBtn.textContent = state.muted ? 'Muted' : 'Sound';
  });
  tossBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    ensureAudio();
    tossBurger();
  });
  startBtn.addEventListener('click', () => {
    ensureAudio();
    startGame();
  });

  function fitCanvas() {
    canvas.style.width = '100%';
    canvas.style.height = '100%';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  paintButtonIcons();
  overlay.hidden = true;
  startGame();
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
