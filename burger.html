<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Night Shift Grill</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #1a0c0e; --color-surface: #2a1216; --color-surface-2: #3a181c;
      --color-border: #6a2a30; --color-text: #fff7ef; --color-text-muted: #e8c8c0;
      --color-text-faint: #c09088; --color-primary: #e31c23;
      --check-red: #c8102e; --check-cream: #f6efe4; --steel: #c5ccd4;
      --radius-sm: 0.5rem; --radius-md: 0.75rem; --radius-lg: 1rem; --radius-xl: 1.25rem; --radius-full: 9999px;
      --shadow-sm: 0 2px 6px rgba(80,10,16,.28); --shadow-md: 0 14px 34px rgba(60,8,12,.4);
      --font-display: 'Fredoka', 'Nunito', system-ui, sans-serif;
      --font-body: 'Nunito', 'Fredoka', system-ui, sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
      background:
        radial-gradient(ellipse 80% 45% at 50% -8%, rgba(227,28,35,.22), transparent 50%),
        radial-gradient(circle at 85% 90%, rgba(246,239,228,.08), transparent 30%),
        linear-gradient(180deg, #2a1014 0%, #14080a 55%, #0c0607 100%);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    button { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .app {
      max-width: none;
      width: 100%;
      height: 100dvh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 0;
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus {
      left: var(--space-4); top: var(--space-4);
      background: var(--color-surface); padding: var(--space-3);
      z-index: 20; border-radius: var(--radius-md);
    }
    .panel {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .panel-inner {
      position: relative;
      padding: 0;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-3);
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(40,10,14,.78), transparent);
      border: none;
      pointer-events: none;
    }
    .topbar .stats { pointer-events: auto; }
    .brand { display: none; }
    .stats {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .stat {
      min-width: 64px;
      padding: 7px 11px;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), transparent 40%),
        linear-gradient(180deg, #3a1418, #220c10);
      border: 2px solid rgba(246,239,228,.22);
      box-shadow: 0 4px 0 rgba(80,10,16,.45), inset 0 1px 0 rgba(255,255,255,.12);
      text-align: center;
    }
    .stat .label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--color-text-faint);
    }
    .stat .value {
      display: block;
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: #fff4ea;
      line-height: 1.2;
    }
    .stat.money-stat {
      min-width: 108px;
      padding: 5px 9px 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat.money-stat .bill {
      display: block;
      width: 92px;
      height: 40px;
      border-radius: 8px;
      box-shadow: 0 3px 8px rgba(0,0,0,.35);
    }
    .stat.money-stat .value {
      font-size: var(--text-sm);
      color: #7ddea0;
    }
    .stat.health-stat {
      min-width: 110px;
      text-align: left;
    }
    .health-bar {
      margin-top: 4px;
      height: 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.14);
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.4);
    }
    .health-fill {
      height: 100%;
      width: 100%;
      border-radius: 999px;
      background: linear-gradient(180deg, #8fe0a8, #3fa866);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
      transition: width 180ms ease, background 180ms ease;
    }
    .health-fill.mid {
      background: linear-gradient(180deg, #f0c86a, #d09028);
    }
    .health-fill.low {
      background: linear-gradient(180deg, #ff7a8a, #c8102e);
    }
    .stat.health-stat .value {
      font-size: 0.8rem;
      margin-top: 2px;
    }
    .canvas-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: block;
      border-radius: 0;
      overflow: hidden;
      background: #2a1418;
      border: none;
      box-shadow: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      object-fit: fill;
      image-rendering: auto;
      -webkit-optimize-contrast: true;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: rgba(30,8,12,.72);
      backdrop-filter: blur(5px);
      z-index: 2;
      transition: opacity var(--transition);
    }
    .overlay[hidden] { display: none; }
    .overlay-card {
      width: min(100%, 340px);
      text-align: center;
      padding: var(--space-6) var(--space-5);
      border-radius: 22px;
      background:
        linear-gradient(180deg, #fff8f0, #f0e4d4);
      border: 3px solid #c8102e;
      box-shadow: var(--shadow-md), 0 0 0 6px rgba(200,16,46,.18);
      color: #2a1410;
    }
    .overlay-card h2 {
      margin: 0 0 var(--space-2);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: #c8102e;
    }
    .overlay-card p {
      margin: 0 0 var(--space-5);
      color: #5a4038;
      font-size: var(--text-sm);
      line-height: 1.45;
      font-weight: 700;
    }
    .overlay-card .btn {
      min-height: 48px;
      min-width: 120px;
      padding: 10px 22px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #fff8f0;
      background: linear-gradient(180deg, #f04048, #c8102e);
      border: 2px solid rgba(160,20,30,.35);
      box-shadow: 0 4px 0 rgba(120,16,30,.4);
    }
    .help-btn {
      position: absolute;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: max(10px, env(safe-area-inset-bottom, 0px));
      z-index: 6;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1;
      color: #fff7ef;
      background: linear-gradient(180deg, #4a2228, #2a1014);
      border: 2px solid rgba(246,239,228,.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 3px 0 rgba(60,8,12,.55);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .help-btn[aria-expanded="true"] {
      background: linear-gradient(180deg, #f04048, #c8102e);
      border-color: rgba(255,230,220,.45);
    }
    .help-panel {
      position: absolute;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: calc(58px + env(safe-area-inset-bottom, 0px));
      z-index: 6;
      width: min(300px, calc(100vw - 20px));
      padding: 12px 14px 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(42,16,20,.97), rgba(20,8,10,.98));
      border: 2px solid rgba(246,239,228,.22);
      box-shadow: 0 12px 32px rgba(40,8,12,.5);
      display: grid;
      gap: 8px;
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      line-height: 1.45;
    }
    .help-panel[hidden] { display: none; }
    .help-panel strong { color: #fff7ef; font-weight: 800; }
    .controls {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 3;
      display: grid;
      gap: var(--space-2);
      padding: 10px 12px calc(12px + env(safe-area-inset-bottom, 0px));
      padding-left: 56px;
      background:
        linear-gradient(0deg, rgba(28,8,12,.94), rgba(28,8,12,.55) 55%, transparent),
        repeating-linear-gradient(90deg, #c8102e 0 14px, #f6efe4 14px 28px);
      background-size: auto, 100% 8px;
      background-position: 0 0, 0 100%;
      background-repeat: no-repeat, repeat-x;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
    body:not(.help-open) .controls .btn.ing .key { display: none; }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      justify-content: center;
    }
    .controls .btn {
      min-height: 44px;
      min-width: 64px;
      padding: var(--space-2) var(--space-3);
      border-radius: 999px;
      font-size: var(--text-xs);
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #fff7ef;
      background: linear-gradient(180deg, #4a2228, #2a1014);
      border: 2px solid rgba(246,239,228,.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 3px 0 rgba(60,8,12,.55);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .controls .btn.primary {
      background: linear-gradient(180deg, #f04048, #c8102e);
      color: #fff8f0;
      border-color: rgba(255,230,220,.45);
    }
    .controls .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,240,230,.55);
    }
    .controls .btn:active { transform: translateY(1px) scale(0.97); }
    .controls .btn:disabled {
      opacity: 0.45;
      pointer-events: none;
    }
    .ing-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-2);
    }
    .controls .btn.ing {
      flex-direction: column;
      min-height: 76px;
      padding: 8px 6px;
      letter-spacing: .03em;
      font-size: 0.74rem;
      gap: 4px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.2), transparent 45%),
        linear-gradient(180deg, #fff4ea, #e8d4c0);
      border: 2px solid #c8102e;
      color: #3a1810;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 4px 0 rgba(120,16,30,.35);
    }
    .controls .btn.ing .icon {
      width: 52px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(180deg, #fff, #f0e6d8);
      border: 1px solid rgba(200,16,46,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 2px 4px rgba(80,20,20,.12);
      display: block;
    }
    .controls .btn.ing .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: .06em;
      color: #fff8f0;
      background: linear-gradient(180deg, #f04048, #c8102e);
      border: 1px solid rgba(255,200,190,.45);
    }
    .controls .btn.ing.flash-ok {
      border-color: #2a9a4a;
      box-shadow: 0 0 0 3px rgba(80,200,120,.35), 0 4px 0 rgba(40,100,50,.3);
      transform: translateY(2px) scale(0.96);
    }
    .controls .btn.ing.flash-bad {
      border-color: #a01020;
      box-shadow: 0 0 0 3px rgba(227,28,35,.35), 0 4px 0 rgba(120,16,30,.35);
    }
    @media (max-width: 520px) {
      .brand h1 { font-size: var(--text-base); }
      .brand p { display: none; }
      .stat { min-width: 56px; padding: 4px 8px; }
      .controls .btn.ing { min-height: 64px; font-size: 0.65rem; }
      .ing-grid { gap: var(--space-1); }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="app">
    <main id="main" class="panel">
      <div class="panel-inner">
        <div class="topbar">
          <div class="brand" hidden>
            <h1>Night Shift Grill</h1>
            <p></p>
          </div>
          <div class="stats" aria-live="polite">
            <div class="stat money-stat">
              <span class="label">Tips</span>
              <canvas class="bill" id="billCanvas" width="184" height="80" aria-hidden="true"></canvas>
              <span class="value" id="moneyVal">$0</span>
            </div>
            <div class="stat">
              <span class="label">Shift</span>
              <span class="value" id="levelVal">1</span>
            </div>
            <div class="stat health-stat">
              <span class="label">Health</span>
              <div class="health-bar" aria-hidden="true"><div class="health-fill" id="healthFill"></div></div>
              <span class="value" id="healthVal">100</span>
            </div>
          </div>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="game" width="560" height="420" aria-label="Night Shift Grill assembly line"></canvas>
          <div class="overlay" id="overlay" hidden>
            <div class="overlay-card">
              <h2 id="overlayTitle">Knocked Out</h2>
              <p id="overlayText"></p>
              <div class="control-row">
                <button class="btn primary" id="startBtn" type="button">Again</button>
              </div>
            </div>
          </div>
        </div>

        <button class="help-btn" id="helpBtn" type="button" aria-label="Show controls" aria-expanded="false" aria-controls="helpPanel">?</button>
        <div class="help-panel" id="helpPanel" hidden role="dialog" aria-label="Controls">
          <div><strong>A / S / D / F</strong> — slam Patty, Cheese, Tomato, Bacon</div>
          <div><strong>X</strong> — toss a ruined or gross burger</div>
          <div>Match the ticket order, then the bun seals itself. Tap the ingredient buttons if you skip the keys.</div>
        </div>

        <div class="controls" aria-label="Game controls">
          <div class="control-row">
            <button class="btn subtle" id="pauseBtn" type="button">Pause</button>
            <button class="btn subtle" id="muteBtn" type="button" aria-pressed="false">Sound</button>
            <button class="btn primary" id="tossBtn" type="button" title="Trash this burger">Toss</button>
            <a class="btn subtle" href="frogger.html?from=grill">Leave</a>
            <a class="btn subtle" href="index.html">Tables</a>
          </div>
          <div class="ing-grid" id="ingGrid" aria-label="Slam ingredients"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
(() => {
  const W = 560;
  const H = 420;

  // Four slam keys — gross, delicious, loud
  const INGREDIENTS = [
    {
      id: 'patty', name: 'Patty', key: 'a',
      color: '#5a2e18', edge: '#2e160c', juice: '#7a3a18',
      drip: '#3a1c0c'
    },
    {
      id: 'cheese', name: 'Cheese', key: 's',
      color: '#f0c24a', edge: '#c49220', juice: '#ffe08a',
      drip: '#e8a830'
    },
    {
      id: 'tomato', name: 'Tomato', key: 'd',
      color: '#d13a32', edge: '#8e1e18', juice: '#ff6a55',
      drip: '#b02820'
    },
    {
      id: 'bacon', name: 'Bacon', key: 'f',
      color: '#c24a2e', edge: '#7a2414', juice: '#e8a878',
      drip: '#8a3020'
    }
  ];
  const ING_BY_ID = Object.fromEntries(INGREDIENTS.map(i => [i.id, i]));
  const KEY_TO_ING = Object.fromEntries(
    INGREDIENTS.flatMap(i => [[i.key, i.id], [i.key.toUpperCase(), i.id]])
  );

  // Max 3 ingredients — no top bun button; bun auto-seals when done
  const RECIPES = [
    { id: 'smash',   name: 'Smash',      stack: ['patty', 'cheese', 'tomato'] },
    { id: 'grease',  name: 'Grease Cup', stack: ['patty', 'cheese', 'bacon'] },
    { id: 'bleed',   name: 'Bleed Out',  stack: ['patty', 'tomato', 'bacon'] },
    { id: 'melt',    name: 'Melt Job',   stack: ['cheese', 'cheese', 'patty'] },
    { id: 'crisp',   name: 'Crisp',      stack: ['bacon', 'cheese', 'bacon'] },
    { id: 'rare',    name: 'Still Moos', stack: ['patty', 'patty', 'cheese'] },
    { id: 'pulp',    name: 'Pulp Fiction', stack: ['tomato', 'patty', 'tomato'] },
    { id: 'duo',     name: 'Dirty Duo',  stack: ['patty', 'bacon'] },
    { id: 'slick',   name: 'Slick',      stack: ['cheese', 'bacon'] },
    { id: 'solo',    name: 'Lonely Pat', stack: ['patty'] }
  ];

  const TICKET_COLORS = ['#c8102e', '#e85a20', '#d4a017', '#2f8f4e', '#3a6ec8', '#a048a0'];

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let canvasDpr = 1;
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const tossBtn = document.getElementById('tossBtn');
  const moneyVal = document.getElementById('moneyVal');
  const levelVal = document.getElementById('levelVal');
  const healthVal = document.getElementById('healthVal');
  const healthFill = document.getElementById('healthFill');
  const billCanvas = document.getElementById('billCanvas');
  const billCtx = billCanvas.getContext('2d');
  const ingGrid = document.getElementById('ingGrid');
  const helpBtn = document.getElementById('helpBtn');
  const helpPanel = document.getElementById('helpPanel');
  const MAX_HEALTH = 100;

  function setHelpOpen(open) {
    helpPanel.hidden = !open;
    helpBtn.setAttribute('aria-expanded', String(open));
    helpBtn.setAttribute('aria-label', open ? 'Hide controls' : 'Show controls');
    document.body.classList.toggle('help-open', open);
  }
  function toggleHelp() {
    setHelpOpen(helpPanel.hidden);
  }

  const LINE_Y = 290;
  const STATION_X = 260;
  const STATION_W = 120;
  const BURGER_W = 76;
  const MAX_TICKETS = 1;
  const GROSS_CHANCE = 0.24;
  const GROSS_LINES = {
    patty: ['GREEN MEAT', 'STILL MOOING', 'FLOOR PATTY'],
    cheese: ['MOLD WHEEL', 'SWEATY SLICE', 'SOCK CHEESE'],
    tomato: ['WEEVIL CUT', 'SLIME SLICE', 'FRIDGE SCIENCE'],
    bacon: ['HAIR STRIP', 'GREY BACON', 'BAND-AID?']
  };
  const SLAM_Y0 = 150;
  const DELIVER_X = W - 118;
  const CUSTOMER_SPOT_X = W - 78;
  const CUSTOMER_QUEUE_X = W + 115;
  const LUNGE_TARGET_X = STATION_X + 72;
  const CUSTOMER_Y = LINE_Y - 8;
  const CUSTOMER_WALK_SPEED = 118;

  const CUSTOMERS = [
    {
      id: 'pat', name: 'Pat', title: 'Night DJ',
      bio: 'On-air till 2 AM. Eats with one hand on the dial.',
      skin: '#e0b090', blush: '#e08a78', hair: '#3a2a20', hairStyle: 'short', shirt: '#4a3038', accent: '#c8102e',
      quirk: 'antenna', hurtChance: 0.55, dmg: [8, 14],
      idle: ['You open late. I respect that.', 'Keep the grill hot — I\'m between songs.'],
      eager: ['That bun looks radio-ready.', 'Slide it over before the next caller.'],
      happy: ['Perfect stack. Going out on this high note.', 'That hit the spot like a good chorus.', 'Soft bun, loud flavor. I\'ll mention you on air.'],
      pissed: ['That patty was still doing call-in hours.', 'Wrong order. My listeners heard me sigh.', 'I came off shift for this?']
    },
    {
      id: 'sam', name: 'Sam', title: 'Cab Driver',
      bio: 'Third shift. Knows every shortcut and every grill.',
      skin: '#c68642', blush: '#d47868', hair: '#1a0e08', hairStyle: 'bob', shirt: '#3a3a48', accent: '#e8b050',
      quirk: 'monobrow', hurtChance: 0.5, dmg: [7, 12],
