    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 220 * intensity;
      state.particles.push({
        type: 'shard',
        x: screenX, y: screenY,
        vx: Math.cos(ang) * sp + impactDir * 60,
        vy: Math.sin(ang) * sp - 40 - Math.random() * 120,
        rot: Math.random() * Math.PI,
        rotV: (Math.random() - 0.5) * 14,
        life: 0.55 + Math.random() * 0.7,
        maxLife: 1.1,
        size: 4 + Math.random() * 10 * intensity,
        color: shardColors[Math.floor(Math.random() * shardColors.length)],
        sides: 3 + Math.floor(Math.random() * 2)
      });
    }
    for (let i = 0; i < 14 + intensity * 10; i++) {
      state.particles.push({
        type: 'spark',
        x: screenX, y: screenY,
        vx: (Math.random() - 0.5) * 340 + impactDir * 80,
        vy: -80 - Math.random() * 220,
        life: 0.2 + Math.random() * 0.35,
        maxLife: 0.5,
        color: Math.random() > 0.4 ? '#ffe08a' : '#ff6b3d'
      });
    }
    for (let i = 0; i < 8; i++) {
      state.particles.push({
        type: 'smoke',
        x: screenX + (Math.random() - 0.5) * 20,
        y: screenY,
        vx: (Math.random() - 0.5) * 40,
        vy: -20 - Math.random() * 50,
        life: 0.6 + Math.random() * 0.8,
        maxLife: 1.2,
        size: 10 + Math.random() * 24
      });
    }
  }

  // --- Chase cop: hunts you from behind, lunges to ram — dodge it and smash him back ---
  function spawnChaseCop(d) {
    const stats = CAR_KIND_STATS.police;
    d.chaser = {
      z: d.z - 110,
      x: Math.max(-DW.LANE, Math.min(DW.LANE, Math.round(d.playerX / DW.LANE) * DW.LANE)),
      model: 'Ford Police Interceptor',
      kind: 'police',
      chaser: true,
      color: '#1a2330',
      trim: shade('#1a2330', -38),
      bodyScale: stats.bodyScale,
      roof: stats.roof,
      speed: d.speed + 26,
      halfW: stats.halfW,
      len: stats.len,
      wheelSpin: Math.random() * Math.PI * 2,
      bob: 0, pitch: 0, yaw: 0, yawVel: 0, roll: 0, rollVel: 0,
      velX: 0, flyY: 0, flyVel: 0, crush: 0, spinT: 0, smashed: false,
      bumpCd: 0,
      ai: 'closein', // closein | stalk | windup | ram | exposed | fallback
      aiT: 0,
      lockX: 0,
      hitCd: 0,
      sirenT: 0,
      sirenHi: false
    };
    beep(520, 0.16, 'square', 0.03);
    beep(760, 0.16, 'square', 0.03);
    setTimeout(() => { beep(520, 0.16, 'square', 0.025); beep(760, 0.16, 'square', 0.025); }, 260);
  }

  // Launch a car into a wreck without involving the player (cop-vs-traffic pileups)
  function smashCarAway(d, car, dir, intensity) {
    car.smashed = true;
    car.crush = 0.15;
    car.spinT = 0;
    car.velX = dir * (4 + intensity * 5) + (Math.random() - 0.5);
    car.yawVel = dir * (18 + intensity * 20) + (Math.random() - 0.5) * 6;
    car.yaw = dir * 0.8;
    car.rollVel = dir * (11 + intensity * 12);
    car.roll = dir * 0.35;
    car.flyVel = 24 + intensity * 22;
    car.flyY = 6;
    car.speed = Math.max(12, car.speed * 0.8 + 20);
    const p = projectWorld(car.x, 0, car.z, d);
    state.particles.push({
      type: 'flash',
      x: p.x, y: p.y - 14 * p.scale,
      vx: 0, vy: 0,
      life: 0.28, maxLife: 0.28,
      size: 90 * Math.min(1.5, 0.7 + p.scale)
    });
    for (let i = 0; i < 14; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 220;
      state.particles.push({
        type: 'shard',
        x: p.x, y: p.y - 10 * p.scale,
        vx: Math.cos(ang) * sp + dir * 100,
        vy: Math.sin(ang) * sp - 90 - Math.random() * 160,
        rot: Math.random() * Math.PI,
        rotV: (Math.random() - 0.5) * 22,
        life: 0.7 + Math.random() * 0.8,
        maxLife: 1.5,
        size: 5 + Math.random() * 11,
        color: Math.random() > 0.35 ? (car.color || '#4a5560') : '#2a2a30',
        sides: 3 + Math.floor(Math.random() * 2)
      });
    }
    for (let i = 0; i < 12; i++) {
      const ang = -Math.PI * (0.1 + Math.random() * 0.8);
      const sp = 150 + Math.random() * 320;
      state.particles.push({
        type: 'spark',
        x: p.x, y: p.y - 8 * p.scale,
        vx: Math.cos(ang) * sp + dir * 80,
        vy: Math.sin(ang) * sp,
        life: 0.22 + Math.random() * 0.35,
        maxLife: 0.6,
        color: Math.random() > 0.4 ? '#ffe08a' : '#ff9040'
      });
    }
  }

  function chaserWrecksOnTraffic(d, cop, civ) {
    const dir = Math.sign(civ.x - cop.x) || (Math.random() < 0.5 ? -1 : 1);
    smashCarAway(d, civ, dir, 1);
    smashCarAway(d, cop, -dir, 1.2);
    cop.chaser = false;
    if (!d.traffic.includes(cop)) d.traffic.push(cop);
    d.chaser = null;
    d.chaserSpawnT = 4 + Math.random() * 3;
    state.score += 100;
    d.slowMo = Math.max(d.slowMo || 0, 0.5);
    d.zoomPunch = 1.2;
    d.camShake = Math.max(d.camShake, 6);
    beep(880, 0.06, 'square', 0.04);
    beep(1320, 0.09, 'square', 0.035);
    beep(60, 0.2, 'sawtooth', 0.05);
    updateHUD();
  }

  function copRamPlayer(d, cop) {
    if (d.invuln > 0) return;
    const dir = Math.sign(d.playerX - cop.x) || (Math.random() < 0.5 ? -1 : 1);
    const dmg = 10 + Math.floor(Math.random() * 8);
    d.hp = Math.max(0, d.hp - dmg);
    d.velX += dir * (1.5 + Math.random() * 0.5);
    d.yawVel += -dir * 2.4;
    d.speed = Math.min(d.maxSpeed, d.speed + 8);
    d.suspVel -= 10;
    d.camShake = Math.max(d.camShake, 11);
    d.crashFlash = Math.max(d.crashFlash, 0.4);
    d.skid = Math.max(d.skid, 0.9);
    cop.hitCd = 1.3;
    cop.ai = 'fallback';
    cop.aiT = 2.4;
    cop.speed = Math.max(16, cop.speed * 0.62);
    cop.velX = -dir * 1.4;
    const ground = projectWorld(d.playerX, 0, d.z + 6, d);
    spawnCrashFX(ground.x, ground.y - 12 * ground.scale, dir, 0.9);
    beep(110, 0.09, 'sawtooth', 0.055);
    beep(65, 0.14, 'square', 0.045);
    updateHUD();
    if (d.hp <= 0) {
      loseLife('Out of HP.');
    } else {
      d.invuln = 1.0;
    }
  }

  function updateChaser(d, dt) {
    if (!d.chaser) {
      d.chaserSpawnT -= dt;
      if (d.chaserSpawnT <= 0) spawnChaseCop(d);
      return;
    }
    const cop = d.chaser;
    cop.aiT -= dt;
    if (cop.hitCd > 0) cop.hitCd -= dt;
    if (cop.bumpCd > 0) cop.bumpCd = Math.max(0, cop.bumpCd - dt);

    // Two-tone siren — faster and louder while he's lining up the hit
    cop.sirenT += dt;
    const hot = cop.ai === 'windup' || cop.ai === 'ram';
    if (cop.sirenT >= (hot ? 0.22 : 0.48)) {
      cop.sirenT = 0;
      cop.sirenHi = !cop.sirenHi;
      beep(cop.sirenHi ? 740 : 555, hot ? 0.1 : 0.14, 'square', hot ? 0.02 : 0.011);
    }

    const dzc = cop.z - (d.z + 14);
    let targetX = d.playerX;
    let targetSpeed = d.speed;
    let steerRate = 2.4;

    if (cop.ai === 'closein') {
      targetSpeed = d.speed + Math.max(8, (-34 - dzc) * 0.35);
      if (dzc > -44) { cop.ai = 'stalk'; cop.aiT = 1 + Math.random() * 1.5; }
    } else if (cop.ai === 'stalk') {
      // Sits on your bumper, mirroring your lane before committing
      targetSpeed = d.speed + (-34 - dzc) * 0.5;
      targetX = d.playerX + Math.sin(performance.now() / 320) * 0.07;
      if (dzc < -70) cop.ai = 'closein';
      else if (cop.aiT <= 0) {
        cop.ai = 'windup';
        cop.aiT = 0.5;
        cop.lockX = d.playerX;
        beep(880, 0.1, 'square', 0.03);
        beep(660, 0.14, 'square', 0.03);
      }
    } else if (cop.ai === 'windup') {
      // Telegraph: coils back for half a beat — your cue to switch lanes
      targetSpeed = d.speed - 5;
      targetX = cop.lockX;
      if (cop.aiT <= 0) { cop.ai = 'ram'; cop.aiT = 1.5; cop.lockX = d.playerX; }
    } else if (cop.ai === 'ram') {
      // Committed lunge at where you were — dodging leaves him exposed ahead
      targetSpeed = d.speed + 32;
      targetX = cop.lockX;
      steerRate = 6;
      if (dzc > 44 || cop.aiT <= 0) {
        cop.ai = 'exposed';
        cop.aiT = 3.4;
      }
    } else if (cop.ai === 'exposed') {
      // Overshot into traffic ahead — your window to smash him
      targetSpeed = d.speed + (55 - dzc) * 0.3;
      steerRate = 1.5;
      if (cop.aiT <= 0) { cop.ai = 'fallback'; cop.aiT = 2.6; }
    } else { // fallback
      targetSpeed = Math.max(18, d.speed - 15);
      targetX = d.playerX * 0.4;
      if (dzc < -60 || cop.aiT <= 0) cop.ai = 'closein';
    }

    cop.speed += (targetSpeed - cop.speed) * Math.min(1, (cop.ai === 'ram' ? 4.5 : 2.2) * dt);
    cop.speed = Math.max(10, Math.min(cop.speed, d.maxSpeed + 36));
    cop.z += cop.speed * DW.MPH_Z * dt;

    const roadEdge = DW.ROAD * 0.92 - cop.halfW;
    const dx = Math.max(-roadEdge, Math.min(roadEdge, targetX)) - cop.x;
    cop.velX += (dx * steerRate - cop.velX) * Math.min(1, 8 * dt);
    cop.x += cop.velX * dt;
    cop.x = Math.max(-DW.CURB + 0.06, Math.min(DW.CURB - 0.06, cop.x));
    cop.yaw += (cop.velX * 0.32 - cop.yaw) * Math.min(1, 8 * dt);
    cop.pitch += ((cop.ai === 'ram' ? -0.05 : 0) - cop.pitch) * Math.min(1, 6 * dt);
    cop.wheelSpin += cop.speed * dt * 0.095;
    const targetBob = Math.sin(cop.wheelSpin * 2.1) * (cop.speed / 720) * 2.4;
    cop.bob += (targetBob - cop.bob) * Math.min(1, 10 * dt);

    // A lunging cop that clips a civilian wrecks them both — free bounty
    if (cop.ai === 'ram' || cop.ai === 'exposed') {
      for (const civ of d.traffic) {
        if (civ.smashed) continue;
        if (Math.abs(civ.z - cop.z) >= (civ.len + cop.len) * 0.38) continue;
        if ((civ.halfW + cop.halfW) - Math.abs(civ.x - cop.x) <= 0) continue;
        chaserWrecksOnTraffic(d, cop, civ);
        return;
      }
    }

    // Cop vs player contact
    if (cop.hitCd <= 0) {
      const zTouch = Math.abs(dzc) < (cop.len + DW.CAR_LEN) * 0.42;
      const latOver = (cop.halfW + DW.CAR_HALF_W) - Math.abs(cop.x - d.playerX);
      if (zTouch && latOver > 0) {
        if (cop.ai === 'ram' && dzc < 5) {
          copRamPlayer(d, cop);
        } else if (dzc > 7) {
          // He's ahead of you — normal bump/smash rules apply
          const hit = driveHitOverlap(cop, d);
          if (hit) {
            if (hit.overlap < 0.32) {
              triggerDriveBump(hit.impactX, cop);
              cop.hitCd = 0.45;
            } else {
              triggerDriveCrash('Collision.', hit.impactX, cop);
            }
          }
        } else {
          // Door to door — slam into him hard to wreck him, else trade paint
          const sideDir = Math.sign(cop.x - d.playerX) || 1;
          if (Math.sign(d.velX) === sideDir && Math.abs(d.velX) > 1.05) {
            triggerDriveCrash('Collision.', d.playerX - cop.x, cop);
          } else {
            triggerDriveBump(d.playerX - cop.x, cop);
            cop.velX += sideDir * 0.9;
            cop.hitCd = 0.5;
          }
        }
      }
    }
  }

  function driveHitOverlap(car, d) {
    const dz = car.z - (d.z + 10);
    const hitLen = (car.len + DW.CAR_LEN) * 0.35;
    if (dz <= 0 || dz >= hitLen) return null;
    const latSum = car.halfW + DW.CAR_HALF_W;
    const latOverlap = latSum - Math.abs(car.x - d.playerX);
    if (latOverlap <= 0) return null;
    const latRatio = latOverlap / latSum;
    const depthRatio = (hitLen - dz) / hitLen;
    // True box overlap — both axes must count (old blend always added ~0.32 from depth alone)
    const overlap = Math.min(latRatio, depthRatio);
    return {
      overlap,
      impactX: d.playerX - car.x,
      latRatio,
      depthRatio
    };
  }

  function triggerDriveBump(impactX, other) {
    const d = state.drive;
    if (!d || d.invuln > 0 || (d.bumpCd || 0) > 0 || state.mode !== 'drive') return;
    if (other && (other.smashed || (other.bumpCd || 0) > 0)) return;

    const dir = Math.sign(impactX) || (Math.random() < 0.5 ? -1 : 1);
    const intensity = Math.min(0.55, 0.12 + d.speed / 130);
    const ground = projectWorld(d.playerX, 0, d.z + 14, d);

    d.velX += dir * (0.28 + intensity * 0.22);
    d.yawVel += -dir * (0.25 + intensity * 0.2);
    d.speed = Math.max(16, d.speed * (0.93 + Math.random() * 0.04));
    d.suspVel -= 2.5 * intensity;
    d.camShake = Math.max(d.camShake, 1.5 + intensity * 2.5);
    d.crashT = 0.12;
    d.bumpCd = 0.35;

    if (other) {
      other.bumpCd = 0.4;
      other.velX = (other.velX || 0) - dir * (0.2 + intensity * 0.18);
      other.x += -dir * 0.018;
      other.yaw = dir * 0.1;
      other.speed = Math.max(14, other.speed * 0.97);
    }

    if (Math.random() < 0.55) {
      state.particles.push({
        type: 'spark',
        x: ground.x + dir * 8,
        y: ground.y - 8 * ground.scale,
        vx: dir * 40 + (Math.random() - 0.5) * 30,
        vy: -20 - Math.random() * 30,
        life: 0.12 + Math.random() * 0.15,
        maxLife: 0.28,
        color: '#ccc8b8'
      });
    }
    beep(220 + Math.abs(d.velX) * 40, 0.028, 'triangle', 0.018);
    updateHUD();
  }

  function triggerDriveCrash(reason, impactX, other, opts = {}) {
    const d = state.drive;
    if (!d || d.invuln > 0 || state.mode !== 'drive') return;

    const ground = projectWorld(d.playerX, 0, d.z + 14, d);
    const intensity = Math.min(1.5, 0.4 + d.speed / 70);
    const hit = impactX || (Math.random() - 0.5) || 0.3;
    const dir = Math.sign(hit) || (Math.random() < 0.5 ? -1 : 1);
    spawnCrashFX(ground.x, ground.y - 16 * ground.scale, dir, intensity);

    // Soft smash: launch the other car and adjust cash. Hard wreck costs HP + a life.
    const hard = !!opts.hard;

    const isCop = !!(other && other.kind === 'police');
    const isChaser = !!(other && other.chaser);
    let cashTag = '';
    if (isChaser) {
      state.score += 150;
      cashTag = '+$150';
    } else if (isCop) {
      state.score += 50;
      cashTag = '+$50';
    } else {
      const fine = hard ? 80 + Math.floor(Math.random() * 120) : 10;
      state.score = Math.max(0, state.score - fine);
      cashTag = `-$${fine}`;
    }
    if (other) {
      // Full spin-out + crunch — car launches skyward with heavy yaw/roll
      other.smashed = true;
      other.crush = 0.15;
      other.spinT = 0;
      other.velX = dir * (4.8 + intensity * 5.5) + (Math.random() - 0.5);
      other.yawVel = dir * (22 + intensity * 24) + (Math.random() - 0.5) * 8;
      other.yaw = dir * 0.9;
      other.rollVel = dir * (14 + intensity * 15);
      other.roll = dir * 0.4;
      other.flyVel = 28 + intensity * 26;
      other.flyY = 8;
      other.speed = Math.max(12, d.speed * 0.7 + 24 + Math.random() * 30);
      other.z += 8;
      // Slow-mo beat + camera lunge + flash so the launch reads huge
      d.slowMo = 0.6;
      d.zoomPunch = 1.5;
      d.crashFlash = Math.max(d.crashFlash, 0.35);
      const hitP = projectWorld(other.x, 0, other.z, d);
      // Explosion flash at the impact point
      state.particles.push({
        type: 'flash',
        x: hitP.x, y: hitP.y - 14 * hitP.scale,
        vx: 0, vy: 0,
        life: 0.32, maxLife: 0.32,
        size: 110 * Math.min(1.6, 0.7 + hitP.scale)
      });
      // Fireball puffs rolling up out of the hit
      for (let i = 0; i < 6; i++) {
        state.particles.push({
          type: 'smoke',
          x: hitP.x + (Math.random() - 0.5) * 20,
          y: hitP.y - 10 * hitP.scale,
          vx: (Math.random() - 0.5) * 60 + dir * 30,
          vy: -40 - Math.random() * 70,
          life: 0.35 + Math.random() * 0.35,
          maxLife: 0.7,
          size: 10 + Math.random() * 16,
          color: i < 3 ? '#e8722a' : '#c4471e'
        });
      }
      // Body panels tearing off
      for (let i = 0; i < 22 + intensity * 12; i++) {
        const ang = Math.random() * Math.PI * 2;
        const sp = 90 + Math.random() * 260 * intensity;
        state.particles.push({
          type: 'shard',
          x: hitP.x, y: hitP.y - 10 * hitP.scale,
          vx: Math.cos(ang) * sp + dir * 130,
          vy: Math.sin(ang) * sp - 110 - Math.random() * 200,
          rot: Math.random() * Math.PI,
          rotV: (Math.random() - 0.5) * 26,
          life: 0.8 + Math.random() * 1,
          maxLife: 1.8,
          size: 5 + Math.random() * 14 * intensity,
          color: Math.random() > 0.35 ? (other.color || '#4a5560') : '#2a2a30',
          sides: 3 + Math.floor(Math.random() * 2)
        });
      }
      // Spark fountain out of the impact point
      for (let i = 0; i < 20; i++) {
        const ang = -Math.PI * (0.1 + Math.random() * 0.8);
        const sp = 180 + Math.random() * 380;
        state.particles.push({
          type: 'spark',
          x: hitP.x, y: hitP.y - 8 * hitP.scale,
          vx: Math.cos(ang) * sp + dir * 90,
          vy: Math.sin(ang) * sp,
          life: 0.25 + Math.random() * 0.4,
          maxLife: 0.65,
          color: Math.random() > 0.4 ? '#ffe08a' : '#ff9040'
        });
      }
      // Floating tag: cop hits pay a bounty, everyone else sends a bill
      state.particles.push({
        type: 'text',
        text: cashTag,
        x: hitP.x, y: hitP.y - 40 * hitP.scale,
        vx: 0, vy: -46,
        life: 1.2, maxLife: 1.2,
        size: isCop ? 17 : 15,
        color: isCop ? '#7dce7a' : '#ff6a5a'
      });
      // Wrecked chase cop hands off to the traffic system for tumble physics
      if (isChaser) {
        other.chaser = false;
        if (!d.traffic.includes(other)) d.traffic.push(other);
        if (d.chaser === other) {
          d.chaser = null;
          d.chaserSpawnT = 4 + Math.random() * 3;
        }
      }
    }

    // Player: nudge, brief slowdown — not a full wipeout
    d.yawVel += -dir * (1.2 + intensity * 1.4);
    d.velX += -dir * (0.45 + intensity * 0.35);
    d.speed = Math.max(14, d.speed * (hard ? 0.22 : 0.72 + Math.random() * 0.1));
    d.suspVel -= (hard ? 18 : 7) * intensity;
    d.camShake = (hard ? 12 : 5) + intensity * (hard ? 14 : 6);
    d.crashT = hard ? 0.9 : 0.35;
    d.crashFlash = hard ? 0.65 : 0.28;
    d.skid = hard ? 1.1 : 0.45;
    d.roll = -dir * (hard ? 0.4 : 0.12);
    d.invuln = hard ? 1.4 : 0.85;

    // Soft smashes only move cash. Hard wrecks (barriers) still tear up the car.
    if (hard) {
      const dmg = 35 + Math.floor(Math.random() * 25);
      d.hp = Math.max(0, d.hp - dmg);
    }
    beep(110, 0.08, 'sawtooth', 0.05);
    beep(70, 0.12, 'square', 0.04);
    if (other) {
      beep(200, 0.05, 'square', 0.045);
      beep(48, 0.2, 'sawtooth', 0.05);
    }
    if (isCop) {
      // Cash-register chirp on the bounty
      beep(880, 0.06, 'square', 0.04);
      beep(1320, 0.09, 'square', 0.035);
    }
    updateHUD();

    if (hard || d.hp <= 0) {
      if (d.hp <= 0) d.hp = 0;
      loseLife(d.hp <= 0 ? `${reason} Car's done — out of HP.` : reason);
    }
  }

  function updateDrive(dt) {
    const d = state.drive;
    if (!d) return;

    if (d.camShake > 0) d.camShake = Math.max(0, d.camShake - 36 * dt);
    if (d.crashT > 0) d.crashT = Math.max(0, d.crashT - dt);
    if (d.skid > 0) d.skid = Math.max(0, d.skid - dt);
    if (d.rumble > 0) d.rumble = Math.max(0, d.rumble - dt);

    if (state.mode === 'pause' || state.mode === 'gameover' || state.mode === 'arrived') {
      d.rpmPulse += dt;
      updateParticles(dt);
      return;
    }
    if (state.mode !== 'drive') {
      updateParticles(dt);
      return;
    }

    if (d.invuln > 0) d.invuln -= dt;
    if (d.bumpCd > 0) d.bumpCd = Math.max(0, d.bumpCd - dt);
    if (d.crashFlash > 0) d.crashFlash -= dt;
    if (state.flash > 0) state.flash -= dt;

    // Impact slow-mo: the whole drive sim runs at quarter speed for a beat
    if (d.slowMo > 0) {
      d.slowMo = Math.max(0, d.slowMo - dt);
      dt *= 0.3;
    }
    d.replayClock = (d.replayClock || 0) + dt;
    d.zoomPunch = (d.zoomPunch || 0) * Math.exp(-4.5 * dt);

    const gas = state.keys.up ? 1 : 0;
    const brake = state.keys.down ? 1 : 0;
    const speedNorm = d.speed / d.maxSpeed;

    // Engine force falls off toward top speed; aero drag + rolling resistance
    const engine = gas * 48 * (1 - speedNorm * 0.82);
    const brakes = brake * 70;
    const drag = 0.018 * d.speed * d.speed * 0.01 + 6.5 + (d.surface === 'curb' ? 14 : 0);
    d.accel = engine - brakes - drag * 0.15;
    d.speed = Math.max(0, Math.min(d.maxSpeed, d.speed + d.accel * dt));
    // Idle creep so you don't stall dead in traffic unless hard-braking
    if (!brake && d.speed < 12) d.speed += 18 * dt;

    // Surface under the tires
    const ax = Math.abs(d.playerX);
    if (ax > DW.CURB) d.surface = 'barrier';
    else if (ax > DW.ROAD * 0.92) d.surface = 'curb';
    else d.surface = 'asphalt';
    const gripMax = d.surface === 'asphalt' ? 16 : d.surface === 'curb' ? 7 : 2.5;

    // Steering: snappy arcade lane changes — hold left/right to slide across quickly
    let steerInput = 0;
    if (state.keys.left) steerInput -= 1;
    if (state.keys.right) steerInput += 1;
    d.steer += (steerInput - d.steer) * Math.min(1, 11 * dt);
    // Keep authority high even at speed so dodging stays easy
    const steerAuth = 0.92 + 0.08 * (1 - speedNorm);
    const desiredLat = d.steer * steerAuth * (2.85 + d.speed * 0.032);

    // Road curvature pushes you wide (v²/r feel) — mild so it doesn't fight the wheel
    const curveForce = d.curve * (d.speed * d.speed) * 0.000018;
    let latAccel = (desiredLat - d.velX) * 20 - curveForce;
    latAccel = Math.max(-gripMax, Math.min(gripMax, latAccel));
    d.velX += latAccel * dt;
    // Light damping so the car keeps sliding while you hold a direction
    const damp = steerInput !== 0 ? 0.18 : 0.45;
    d.velX *= Math.exp(-(gripMax * damp) * dt);
    // Lateral motion from velocity only — avoids double-steer twitch on the road plane
    d.playerX += d.velX * dt;

    // Slip / yaw / body roll from real lateral accel
    const slip = d.velX - desiredLat * 0.5;
    d.skid = Math.max(d.skid, Math.abs(slip) > 0.55 ? 0.35 : 0);
    d.yawVel += (-d.steer * 1.1 * steerAuth + slip * 1.3 - d.yaw * 5) * dt;
    d.yawVel *= Math.exp(-6 * dt);
    d.yaw = Math.max(-0.5, Math.min(0.5, d.yaw + d.yawVel * dt));
    const targetRoll = -latAccel * 0.018 - d.steer * 0.06;
    d.roll += (targetRoll - d.roll) * Math.min(1, 7 * dt);
    const targetPitch = (d.accel > 8 ? -0.07 : d.accel < -20 ? 0.11 : 0) + d.susp * 0.02;
    d.pitch += (targetPitch - d.pitch) * Math.min(1, 6 * dt);

    // Suspension spring-damper
    d.suspVel += (-d.susp * 70 - d.suspVel * 9) * dt;
    d.susp += d.suspVel * dt;

    // Concrete curb / jersey barrier response
    if (d.surface === 'curb') {
      d.speed = Math.max(0, d.speed - 28 * dt);
      d.rumble = Math.max(d.rumble, 0.14);
      d.suspVel -= 32 * dt * (1 + Math.sin(d.wheelSpin * 2.6) * 0.45);
      d.camShake = Math.max(d.camShake, 1.4);
    }
    if (ax > DW.ROAD * 0.92) {
      const over = ax - DW.ROAD * 0.92;
      d.velX -= Math.sign(d.playerX) * over * 8 * dt;
    }
    if (ax > DW.CURB + 0.02) {
      // Hit the jersey barrier — elastic bounce then scrape
      d.playerX = Math.sign(d.playerX) * DW.CURB;
      d.velX *= -0.35;
      d.speed = Math.max(6, d.speed * 0.72);
      d.suspVel -= 12;
      d.camShake = Math.max(d.camShake, 8);
      d.skid = 1;
      if (d.speed > 45 && Math.random() < dt * 2.2) {
        triggerDriveCrash('Jersey barrier. Concrete always wins.', d.playerX, null, { hard: true });
        if (state.mode !== 'drive') return;
      }
    }
    d.playerX = Math.max(-DW.CURB - 0.02, Math.min(DW.CURB + 0.02, d.playerX));

    // Traffic signals — stop at red/yellow unless you're on the gas
    const signalTime = performance.now() / 1000;
    d.atSignal = null;
    d.mustStop = false;
    if (d.signalFineCd > 0) d.signalFineCd -= dt;
    if (d.signalFlash > 0) d.signalFlash -= dt;
    else d.flashingSignalZ = null;
    for (const sig of d.signals || []) {
      const dist = routeSignedDist(d.z, sig.z, d.route.length);
      if (dist < -12 || dist > 70) continue;
      const phase = signalPhase(sig, signalTime);
      d.atSignal = { ...sig, phase, dist };
      if (dist > 0 && dist < 52) {
        if (phase === 'red') d.mustStop = true;
        else if (phase === 'yellow' && dist < 38) d.mustStop = true;
      }
      // Ran the red on gas — $100 fine once per signal
      if (phase === 'red' && dist <= 0 && dist > -8 && d.speed > 6 && gas && d.signalFineCd <= 0) {
        state.score = Math.max(0, state.score - 100);
        d.signalFineCd = 3;
        d.signalFlash = 0.75;
        d.flashingSignalZ = sig.z;
        d.camShake = Math.max(d.camShake, 10);
        state.flash = Math.max(state.flash, 0.4);
        spawnFloat('−$100  RED LIGHT', W / 2, H * 0.38, '#ff6b6b');
        beep(120, 0.14, 'sawtooth', 0.07);
        beep(80, 0.2, 'square', 0.05);
        updateHUD();
      }
      break;
    }
    const runTheLight = d.mustStop && gas && d.atSignal
      && (d.atSignal.phase === 'red' || d.atSignal.phase === 'yellow');
    if (d.mustStop && !runTheLight) {
      const stopDist = d.atSignal ? Math.max(0, d.atSignal.dist - 6) : 0;
      const cap = stopDist < 18 ? Math.max(0, stopDist * 1.6) : d.speed;
      d.speed = Math.min(d.speed, cap);
      if (stopDist < 4) d.speed = Math.min(d.speed, 2);
    }

    // Turning mechanic — at green, steer into the turn to proceed
    const leg = currentDriveLeg(d);
    d.awaitTurn = null;
    if (leg && leg.turn && leg.turn !== 'straight' && !leg.done) {
      const distIx = routeSignedDist(d.z, leg.z1, d.route.length);
      if (distIx < 75 && distIx > -15) d.awaitTurn = leg.turn;

      const routeZ = wrapRouteZ(d.z, d.route.length);
      const atLine = routeZ >= leg.z1 - 14;
      const green = d.atSignal && d.atSignal.phase === 'green' && !d.mustStop;
      const steerLeft = state.keys.left || d.steer < -0.28;
      const steerRight = state.keys.right || d.steer > 0.28;
      const turned = leg.turn === 'left'
        ? steerLeft && d.playerX < -0.12
        : steerRight && d.playerX > 0.12;

      if (atLine && !leg.done) {
        if (!green && !gas) {
          d.speed = Math.min(d.speed, Math.max(0, distIx * 0.35));
        } else if (turned && d.speed > 2) {
          leg.done = true;
          d.legIndex += 1;
          d.awaitTurn = null;
          d.turnFlash = 0.55;
          d.yawVel += leg.turn === 'left' ? -0.35 : 0.35;
          beep(659, 0.07);
          beep(988, 0.11);
        } else if (green) {
          d.speed = Math.min(d.speed, 14);
        }
      }
    }
    if (d.turnFlash > 0) d.turnFlash -= dt;

    // Track curvature from the map path
    const routeSample = sampleRouteAt(d.route, d.z, d);
    d.targetCurve = routeSample.curve;
    d.curve += (d.targetCurve - d.curve) * Math.min(1, 3.2 * dt);
    const targetHills = Math.sin(d.z * 0.0006) * 5 + Math.sin(d.z * 0.0015) * 1.6;
    d.hills = (d.hills || 0) + (targetHills - (d.hills || 0)) * Math.min(1, 2.8 * dt);

    // Pothole bumps when you roll over them
    for (const pr of d.props) {
      if (pr.kind !== 'pothole') continue;
      const dz = routeSignedDist(d.z + 14, pr.z, d.route.length);
      if (dz > -8 && dz < 8 && Math.abs((pr.x || 0) - d.playerX) < 0.28) {
        d.suspVel -= 22 + d.speed * 0.15;
        d.rumble = 0.35;
        d.camShake = Math.max(d.camShake, 3 + d.speed * 0.04);
      }
    }

    // Integrate world position from MPH
    const pathLen = d.route ? d.route.length : d.goal;
    const prevRouteZ = wrapRouteZ(d.z, pathLen);
    d.z += d.speed * DW.MPH_Z * dt;
    const newRouteZ = wrapRouteZ(d.z, pathLen);

    // Hold at intersection until turn is committed on green (unless running the light on gas)
    const legAfter = currentDriveLeg(d);
    if (legAfter && legAfter.turn && legAfter.turn !== 'straight' && !legAfter.done) {
      const green = d.atSignal && d.atSignal.phase === 'green' && !d.mustStop;
      const runLight = gas && d.atSignal
        && (d.atSignal.phase === 'red' || d.atSignal.phase === 'yellow')
        && d.atSignal.dist <= 14;
      if (!runLight) {
        const hold = green ? 4 : 8;
        const distToLine = routeSignedDist(d.z, legAfter.z1, pathLen);
        const routeZ = wrapRouteZ(d.z, pathLen);
        const maxRoute = legAfter.z1 - hold;
        if (distToLine > 0 && distToLine < hold && routeZ > maxRoute) {
          d.z -= routeZ - maxRoute;
        }
      }
    }

    // Lap complete — keep driving; route geometry wraps, world does not reset
    if (newRouteZ < prevRouteZ && d.speed > 0.5) {
      d.lap = (d.lap || 1) + 1;
      d.legIndex = 0;
      for (const l of d.legs) l.done = false;
      d.invuln = Math.max(d.invuln, 0.6);
      beep(523, 0.07);
      beep(784, 0.12);
      updateHUD();
    }

    d.wheelSpin += d.speed * dt * 0.35;
    d.rpmPulse += dt * (0.7 + d.speed / 50);

    // Chase cam: softer follow so the road scroll feels steady, not twitchy
    d.camX += (d.playerX - d.camX) * Math.min(1, 1.8 * dt);
    const camTargetY = 40 + d.speed * 0.05 + Math.abs(d.velX) * 0.55 - d.susp * 0.35;
    d.camY += (camTargetY - d.camY) * Math.min(1, 1.6 * dt);
    const camBackTarget = 112 + d.speed * 0.13 - (d.zoomPunch || 0) * 26;
    d.camBack = (d.camBack || 112) + (camBackTarget - (d.camBack || 112)) * Math.min(1, 3.8 * dt);

    maintainEnvAroundPlayer(d);
    d.exits = d.exits.filter(e => routeInWindow(e.z, d.z, 200, 400, d.route.length));

    // Take EXIT · GRILL / CASINO — steer onto the ramp in the exit window
    d.approachingExit = null;
    for (const ex of d.exits) {
      if (ex.taken) continue;
      const routeZ = wrapRouteZ(d.z, d.route.length);
      if (routeZ >= ex.startZ && routeZ <= ex.endZ) {
        d.approachingExit = ex;
        const onRamp = ex.side > 0
          ? d.playerX > DW.ROAD * 0.55
          : d.playerX < -DW.ROAD * 0.55;
        if (onRamp) {
          takeExit(ex);
          return;
        }
      }
    }

    // Traffic in absolute world MPH (same integrator as player)
    d.spawnTimer -= dt;
    if (d.spawnTimer <= 0 && d.traffic.length < 9) {
      spawnTraffic(d);
      d.spawnTimer = Math.max(0.55, 1.2 - state.level * 0.07);
    }
    for (const car of d.traffic) {
      if (car.bumpCd > 0) car.bumpCd = Math.max(0, car.bumpCd - dt);
      if (car.smashed) {
        car.spinT = (car.spinT || 0) + dt;
        car.z += car.speed * DW.MPH_Z * 0.65 * dt;
        car.x += car.velX * dt;
        car.velX *= Math.exp(-0.7 * dt);
        // Keep spinning hard for a beat, then ease
        const spinDamp = car.spinT < 0.7 ? 0.25 : 1.4;
        car.yawVel = (car.yawVel || 0) * Math.exp(-spinDamp * dt);
        car.yaw += car.yawVel * dt;
        car.rollVel = (car.rollVel || 0) * Math.exp(-spinDamp * 0.8 * dt);
        car.roll = (car.roll || 0) + car.rollVel * dt;
        car.flyVel = (car.flyVel || 0) - 28 * dt;
        car.flyY = (car.flyY || 0) + car.flyVel * dt;
        if (car.flyY < 0) {
          car.flyY = 0;
          car.flyVel *= -0.45;
          car.crush = Math.min(1, (car.crush || 0) + 0.18);
          car.yawVel += (Math.random() - 0.5) * 4;
          car.rollVel += (Math.random() - 0.5) * 3;
          if (Math.abs(car.flyVel) < 3) car.flyVel = 0;
          // Sparks on bounce
          if (Math.random() < 0.7) {
            const p = projectWorld(car.x, 0, car.z, d);
            state.particles.push({
              type: 'spark',
              x: p.x, y: p.y,
              vx: (Math.random() - 0.5) * 200,
              vy: -40 - Math.random() * 120,
              life: 0.2 + Math.random() * 0.25,
              maxLife: 0.4,
              color: '#ffe08a'
            });
          }
        }
        // Progressive crumple while tumbling
        car.crush = Math.min(1, (car.crush || 0) + dt * 0.55);
        car.speed *= Math.exp(-0.55 * dt);
        // Smoke trail off the wreck
        if (car.spinT < 1.8 && Math.random() < dt * 14) {
          const p = projectWorld(car.x, car.flyY, car.z, d);
          state.particles.push({
            type: 'smoke',
            x: p.x + (Math.random() - 0.5) * 12,
            y: p.y,
            vx: (Math.random() - 0.5) * 30,
            vy: -15 - Math.random() * 25,
            life: 0.4 + Math.random() * 0.4,
            maxLife: 0.8,
            size: 8 + Math.random() * 14
          });
        }
      } else {
        // Traffic holds its lane — smooth settle + suspension bob
        car.z += car.speed * DW.MPH_Z * dt;
        car.wheelSpin = (car.wheelSpin || 0) + car.speed * dt * 0.095;
        const targetBob = Math.sin(car.wheelSpin * 2.1) * (car.speed / 720) * 2.4;
        car.bob = (car.bob || 0) + (targetBob - (car.bob || 0)) * Math.min(1, 10 * dt);
        car.pitch = (car.pitch || 0) * Math.exp(-5 * dt);
        if (car.velX) {
          car.x += car.velX * dt;
          car.velX *= Math.exp(-2.8 * dt);
          if (Math.abs(car.velX) < 0.02) car.velX = 0;
        }
        const lane = Math.round(car.x / DW.LANE) * DW.LANE;
        const laneErr = lane - car.x;
        car.x += laneErr * Math.min(1, 2.4 * dt);
        if (car.bumpCd > 0) {
          car.yaw = (car.yaw || 0) * Math.exp(-4 * dt);
        } else if (Math.abs(laneErr) > 0.025) {
          car.yaw = laneErr * 0.2;
          car.pitch = Math.max(car.pitch || 0, Math.abs(laneErr) * 0.06);
        } else {
          car.yaw = (car.yaw || 0) * Math.exp(-6 * dt);
        }
      }
    }
    d.traffic = d.traffic.filter(c => c.z > d.z - 80 && c.z < d.z + 1800);

    // Chase cop — spawns behind you, lunges to ram, can be dodged and smashed
    updateChaser(d, dt);
    if (state.mode !== 'drive') return;

    // AABB-ish collision — light overlap = bump, 32%+ overlap = smash
    const SMASH_OVERLAP = 0.32;
    for (const car of d.traffic) {
      if (car.smashed) continue;
      const hit = driveHitOverlap(car, d);
      if (!hit) continue;
      if (hit.overlap < SMASH_OVERLAP) {
        triggerDriveBump(hit.impactX, car);
      } else {
        triggerDriveCrash(
          car.kind === 'police' ? 'NYPD launched. $50 bounty.'
            : car.kind === 'bus' ? 'Clipped an MTA bus.'
            : car.kind === 'taxi' ? 'Launched a yellow cab.'
            : car.cool ? `Sent a ${car.model} flying!`
            : car.model ? `Bounced off a ${car.model}.`
            : 'Sent them flying.',
          hit.impactX,
          car
        );
      }
      if (state.mode !== 'drive') return;
    }

    if (d.speed > 40) state.score += Math.floor(d.speed * dt * 0.2);
    updateHUD();

    if (Math.floor(d.rpmPulse * 5) !== Math.floor((d.rpmPulse - dt) * 5) && d.speed > 20) {
      beep(70 + d.speed * 1.1, 0.025, 'sawtooth', 0.01);
    }
    if (d.skid > 0.2 && Math.floor(d.rpmPulse * 9) !== Math.floor((d.rpmPulse - dt) * 9)) {
      beep(160 + Math.abs(d.velX) * 50, 0.02, 'triangle', 0.014);
    }

    if ((Math.abs(slip) > 0.5 || d.skid > 0.15 || d.surface === 'curb') && Math.random() < dt * 12) {
      const tire = projectWorld(d.playerX + (Math.random() > 0.5 ? 0.1 : -0.1), 0, d.z + 10, d);
      state.particles.push({
        type: 'smoke',
        x: tire.x + (Math.random() - 0.5) * 8,
        y: tire.y,
        vx: -d.velX * 10 + (Math.random() - 0.5) * 16,
        vy: -8 - Math.random() * 16,
        life: 0.3 + Math.random() * 0.25,
        maxLife: 0.55,
        size: 5 + Math.random() * 9
      });
    }

    updateParticles(dt);
    recordReplayFrame();
  }

  function updateParticles(dt) {
    for (const p of state.particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.type === 'shard') {
        p.vy += 380 * dt;
        p.vx *= Math.pow(0.4, dt);
        p.rot += (p.rotV || 0) * dt;
      } else if (p.type === 'spark') {
        p.vy += 420 * dt;
        p.vx *= Math.pow(0.25, dt);
      } else if (p.type === 'smoke') {
        p.vy -= 10 * dt;
        p.size = (p.size || 10) + 28 * dt;
        p.vx *= Math.pow(0.5, dt);
      } else if (p.type === 'text') {
        p.vy *= Math.pow(0.3, dt);
      } else if (p.type === 'flash') {
        // Stationary — just burns out
      } else {
        p.vy += 120 * dt;
      }
      p.life -= dt;
    }
    state.particles = state.particles.filter(p => p.life > 0);
  }

  function update(dt) {
    if (state.mode === 'replay') {
      updateInstantReplay(dt);
      return;
    }
    if (state.phase === 'drive') updateDrive(dt);
    else updateCross(dt);
  }

  // --- Drawing ---
  const C = {
    garageBg: '#3d3f42',
    pillar: '#6a6d72',
    // Concrete sidewalk
    safe: '#9b968c',
    safeHi: '#b0aaa0',
    safeLo: '#868178',
    // East River — cold slate with olive undertone
    water: '#3f5c66',
    waterDeep: '#334a52',
    waterFoam: 'rgba(210,220,218,0.28)',
    waterShade: 'rgba(20,35,40,0.22)',
    // NYC asphalt
    road: '#2f2f32',
    roadAlt: '#28282b',
    dash: '#d8d2c0',
    yellowLine: '#d4a017',
    curb: '#c4a035'
  };

  function drawSafeBand(row, label) {
    const y = row * TILE;
    ctx.fillStyle = C.safe;
    ctx.fillRect(0, y, W, TILE);
    // Concrete slab seams
    ctx.fillStyle = C.safeLo;
    for (let x = 0; x < W; x += 40) {
      ctx.fillRect(x, y, 1, TILE);
    }
    ctx.fillRect(0, y + TILE / 2, W, 1);
    // Speckle
    ctx.fillStyle = 'rgba(60,55,50,0.12)';
    for (let x = 4; x < W; x += 11) {
      ctx.fillRect(x, y + 6 + (x % 7), 2, 2);
      ctx.fillRect(x + 5, y + 22 + (x % 5), 2, 2);
    }
    // Soft glow when you're standing here
    if (state.frog && state.frog.row === row && state.phase === 'cross') {
      const pulse = 0.08 + 0.06 * Math.sin(performance.now() / 220);
      ctx.fillStyle = `rgba(239,200,74,${pulse})`;
      ctx.fillRect(0, y, W, TILE);
    }
    // Painted yellow curb edge
    ctx.fillStyle = C.curb;
    ctx.fillRect(0, y, W, 2);
    ctx.fillRect(0, y + TILE - 2, W, 2);
    if (label) {
      ctx.fillStyle = 'rgba(40,38,34,0.55)';
      ctx.font = '700 9px "General Sans", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(label, 8, y + 15);
    }
  }

  function drawRoad(row) {
    const y = row * TILE;
    ctx.fillStyle = (row % 2 === 0) ? C.road : C.roadAlt;
    ctx.fillRect(0, y, W, TILE);
    // Faded white lane dashes
    ctx.fillStyle = C.dash;
    const mid = y + TILE / 2 - 1;
    for (let x = 4; x < W; x += 28) ctx.fillRect(x, mid, 14, 2);
    // Worn yellow edge stripe
    ctx.fillStyle = C.yellowLine;
    ctx.fillRect(0, y + 1, W, 1);
    ctx.fillRect(0, y + TILE - 2, W, 1);
  }

  function drawRiver(row) {
    const y = row * TILE;
    const t = performance.now() / 1000;
    // Depth gradient — colder / darker toward the far bank feel
    const g = ctx.createLinearGradient(0, y, 0, y + TILE);
    if (row % 2 === 0) {
      g.addColorStop(0, '#4a6870');
      g.addColorStop(0.45, '#3f5c66');
      g.addColorStop(1, '#355058');
    } else {
      g.addColorStop(0, '#3a545c');
      g.addColorStop(0.5, '#334a52');
      g.addColorStop(1, '#2c424a');
    }
    ctx.fillStyle = g;
    ctx.fillRect(0, y, W, TILE);

    // Soft vertical shading so the river reads as a continuous body
    ctx.fillStyle = C.waterShade;
    ctx.fillRect(0, y + TILE - 5, W, 5);

    // Rolling wave bands (smooth sine, not arcade blocks)
    ctx.lineWidth = 1.25;
    for (let band = 0; band < 4; band++) {
      const baseY = y + 7 + band * 8;
      const phase = t * (1.1 + band * 0.15) + row * 0.7 + band * 1.3;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 4) {
        const yy = baseY + Math.sin(x * 0.045 + phase) * 2.2
          + Math.sin(x * 0.11 + phase * 1.7) * 0.9;
        if (x === 0) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.strokeStyle = band % 2 === 0
        ? 'rgba(190,210,205,0.22)'
        : 'rgba(30,50,55,0.18)';
      ctx.stroke();
    }

    // Bright foam crests that drift with the current
    ctx.fillStyle = C.waterFoam;
    for (let i = 0; i < 7; i++) {
      const wx = ((t * 28 + i * 67 + row * 40) % (W + 40)) - 20;
      const wy = y + 10 + (i % 3) * 10 + Math.sin(t * 2 + i) * 2;
      ctx.globalAlpha = 0.35 + (i % 3) * 0.1;
      ctx.beginPath();
      ctx.ellipse(wx, wy, 7 + (i % 3), 1.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Faint olive / harbor sheen
    ctx.fillStyle = 'rgba(100,130,90,0.07)';
    ctx.fillRect(0, y + 12 + Math.sin(t + row) * 2, W, 5);
  }

  function drawParkedCar(cx, cy, color, yours) {
    ctx.save();
    ctx.translate(cx, cy);
    if (yours) {
      const pulse = 0.45 + 0.55 * Math.sin(performance.now() / 260);
      ctx.shadowColor = '#efc84a';
      ctx.shadowBlur = 6 + pulse * 14;
      ctx.fillStyle = `rgba(239,200,74,${0.12 + pulse * 0.12})`;
      ctx.beginPath();
      ctx.ellipse(0, 2, 22 + pulse * 3, 14 + pulse * 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = color;
    ctx.fillRect(-14, -8, 28, 16);
    ctx.fillStyle = yours ? '#7ec8e3' : '#4a6a7a';
    ctx.fillRect(-10, -6, 8, 6);
    ctx.fillRect(2, -6, 8, 6);
    ctx.fillStyle = '#111';
    ctx.fillRect(-12, 6, 7, 3);
    ctx.fillRect(5, 6, 7, 3);
    if (yours) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 260);
      ctx.strokeStyle = '#efc84a';
      ctx.lineWidth = 2 + pulse;
      ctx.strokeRect(-16, -10, 32, 20);
      ctx.fillStyle = '#efc84a';
      ctx.font = '700 7px "General Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.75 + pulse * 0.25;
      ctx.fillText('YOURS', 0, -12);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  function drawGarage() {
    const y = 0;
    // Fluorescent concrete deck
    ctx.fillStyle = C.garageBg;
    ctx.fillRect(0, y, W, TILE);
    ctx.fillStyle = 'rgba(255,245,200,0.06)';
    ctx.fillRect(0, y, W, 6);

    for (let c = 0; c < COLS; c++) {
      if (PARK_SLOTS.includes(c)) continue;
      ctx.fillStyle = C.pillar;
      ctx.fillRect(c * TILE + 8, y + 2, TILE - 16, TILE - 4);
      ctx.fillStyle = '#55585e';
      ctx.fillRect(c * TILE + 12, y + 6, TILE - 24, 8);
    }

    PARK_SLOTS.forEach((c) => {
      const x = c * TILE;
      ctx.fillStyle = '#2a2c30';
      ctx.fillRect(x + 2, y + 4, TILE - 4, TILE - 6);
      // Stall paint
      ctx.strokeStyle = 'rgba(230,220,180,0.45)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 4, y + 6, TILE - 8, TILE - 10);

      if (c === CAR_COL) {
        drawParkedCar(x + TILE / 2, y + TILE / 2 + 2, '#1c2430', true);
      } else {
        const colors = ['#6b2e2e', '#2e4570', '#3d5a3a', '#5a4e2e', '#4a4a4e'];
        drawParkedCar(x + TILE / 2, y + TILE / 2 + 2, colors[c % colors.length], false);
      }
    });

    ctx.fillStyle = 'rgba(230,220,180,0.75)';
    ctx.font = '700 9px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('GARAGE  •  YOUR CAR', 6, y + TILE - 4);
  }

  function withFacing(x, y, w, h, dir, drawFn) {
    ctx.save();
    if (dir < 0) {
      ctx.translate(x + w, y);
      ctx.scale(-1, 1);
      drawFn(0, 0, w, h);
    } else {
      ctx.translate(x, y);
      drawFn(0, 0, w, h);
    }
    ctx.restore();
  }

  function drawTaxi(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      // Medallion taxi yellow
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(lx, ly + 6, lw, lh - 6);
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(lx + lw * 0.28, ly + 2, lw * 0.42, lh * 0.5);
      ctx.fillStyle = '#5a8fa8';
      ctx.fillRect(lx + lw * 0.32, ly + 4, lw * 0.16, lh * 0.32);
      ctx.fillRect(lx + lw * 0.52, ly + 4, lw * 0.14, lh * 0.32);
      ctx.fillStyle = '#f5f0d8';
      ctx.fillRect(lx + lw * 0.42, ly, lw * 0.16, 4);
      ctx.fillStyle = '#f0e6a0';
      ctx.fillRect(lx + lw - 4, ly + lh - 10, 3, 4);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(lx + 6, ly + lh - 3, 8, 4);
      ctx.fillRect(lx + lw - 14, ly + lh - 3, 8, 4);
      // TAXI door mark
      ctx.fillStyle = 'rgba(30,30,30,0.35)';
      ctx.fillRect(lx + lw * 0.15, ly + lh * 0.55, lw * 0.2, 3);
    });
  }

  function drawBus(x, y, w, dir) {
    const h = TILE - 10;
    const yy = y + 5;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      ctx.fillStyle = '#f2f2f0';
      ctx.fillRect(lx, ly + 4, lw, lh - 4);
      ctx.fillStyle = '#0039a6';
      ctx.fillRect(lx, ly + lh * 0.42, lw, 7);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(lx, ly + lh - 8, lw, 8);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + lw - 22, ly + 2, 20, 10);
      ctx.fillStyle = '#5eb0d4';
      ctx.fillRect(lx + lw - 12, ly + 14, 9, lh * 0.28);
      ctx.fillStyle = '#7ec8e3';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(lx + 6 + i * ((lw - 30) / 4), ly + 8, 10, lh * 0.28);
      }
      ctx.fillStyle = '#fff6a8';
      ctx.fillRect(lx + lw - 5, ly + lh - 14, 3, 4);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 10, ly + lh - 4, 10, 5);
      ctx.fillRect(lx + lw - 22, ly + lh - 4, 10, 5);
    });
    const front = dir > 0 ? x + w - 12 : x + 12;
    ctx.fillStyle = '#f0c400';
    ctx.font = '700 7px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('M14', front, yy + 10);
  }

  function drawTruck(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      const cabW = lw * 0.32;
      const bedW = lw - cabW;
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(lx, ly + 4, bedW, lh - 4);
      ctx.fillStyle = '#c45c26';
      ctx.fillRect(lx + bedW, ly, cabW, lh);
      ctx.fillStyle = '#7ec8e3';
      ctx.fillRect(lx + bedW + 4, ly + 4, cabW - 8, lh * 0.38);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 8, ly + lh - 3, 9, 4);
      ctx.fillRect(lx + lw - 14, ly + lh - 3, 9, 4);
    });
  }

  function drawBike(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      const rearX = lx + 8;
      const frontX = lx + lw - 8;
      const hubY = ly + lh - 7;
      const r = 6;

      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(lx + lw / 2, ly + lh - 1, lw * 0.38, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wheels
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(rearX, hubY, r, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#6a6a6a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(rearX, hubY, r - 2.5, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, r - 2.5, 0, Math.PI * 2);
      ctx.stroke();
      // Hubs
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(rearX, hubY, 1.5, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Frame — Citi Bike blue / messenger black mix
      const seatX = lx + lw * 0.38;
      const seatY = ly + lh * 0.28;
      const pedalX = lx + lw * 0.42;
      const pedalY = hubY - 1;
      ctx.strokeStyle = '#0b5cab';
      ctx.lineWidth = 2.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      // Rear triangle
      ctx.moveTo(rearX, hubY);
      ctx.lineTo(seatX, seatY);
      ctx.lineTo(pedalX, pedalY);
      ctx.closePath();
      ctx.stroke();
      // Down tube + top tube to head
      const headX = lx + lw * 0.72;
      const headY = ly + lh * 0.32;
      ctx.beginPath();
      ctx.moveTo(seatX, seatY);
      ctx.lineTo(headX, headY);
      ctx.lineTo(frontX, hubY);
      ctx.moveTo(pedalX, pedalY);
      ctx.lineTo(headX, headY);
      ctx.stroke();

      // Handlebars
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 1, headY);
      ctx.lineTo(headX + 5, headY - 4);
      ctx.lineTo(headX + 9, headY - 3);
      ctx.stroke();

      // Seat
      ctx.fillStyle = '#222';
      ctx.fillRect(seatX - 5, seatY - 2, 8, 3);

      // Pedal crank
      const crank = Math.sin(performance.now() / 90) * 4;
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pedalX, pedalY);
      ctx.lineTo(pedalX + 3, pedalY + crank);
      ctx.stroke();

      // Messenger rider
      const hipX = seatX + 1;
      const hipY = seatY - 1;
      // Legs pedaling
      ctx.strokeStyle = '#2a3544';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(pedalX + 2, pedalY + crank);
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(pedalX - 2, pedalY - crank * 0.6);
      ctx.stroke();
      // Torso lean
      ctx.strokeStyle = '#1a3a6a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(headX - 2, headY - 2);
      ctx.stroke();
      // Arms to bars
      ctx.strokeStyle = '#e6b89a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 4, headY + 2);
      ctx.lineTo(headX + 4, headY - 2);
      ctx.stroke();
      // Head + helmet
      ctx.fillStyle = '#e6b89a';
      ctx.beginPath();
      ctx.arc(headX - 1, headY - 7, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f0c400';
      ctx.beginPath();
      ctx.arc(headX - 1, headY - 8, 3.8, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(headX - 5, headY - 8, 8, 2);

      // Messenger bag
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(hipX - 6, hipY - 6, 5, 7);
    });
  }

  function drawFerry(x, y, w, kind, dir) {
    const h = TILE - 14;
    const yy = y + 7;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      if (kind === 'kayak') {
        ctx.fillStyle = '#c45c26';
        ctx.fillRect(lx, ly + 6, lw, lh - 8);
        ctx.fillStyle = '#e8c4a8';
        ctx.fillRect(lx + lw * 0.4, ly + 4, 8, 8);
        return;
      }
      if (kind === 'barge') {
        // Rust / working barge
        ctx.fillStyle = '#5c5348';
        ctx.fillRect(lx, ly + 4, lw, lh - 4);
        ctx.fillStyle = '#7a6a55';
        for (let i = 0; i < 3; i++) ctx.fillRect(lx + 6 + i * (lw / 3), ly + 8, lw / 4, 6);
        ctx.fillStyle = '#8a4030';
        ctx.fillRect(lx + 4, ly + 2, 12, 4);
        return;
      }
      // NYC Ferry — white hull, orange accent
      ctx.fillStyle = '#e8e6e0';
      ctx.fillRect(lx, ly + 8, lw, lh - 8);
      ctx.fillStyle = '#2c5a7a';
      ctx.fillRect(lx + 6, ly, lw - 18, lh * 0.55);
      ctx.fillStyle = '#6a9ab0';
      for (let i = 0; i < 3; i++) ctx.fillRect(lx + 10 + i * 14, ly + 4, 10, lh * 0.28);
      ctx.fillStyle = '#e85d04';
      ctx.fillRect(lx + lw - 14, ly + 2, 10, 5);
    });
  }

  function drawBanker(cx, cy, scale = 1, resting = false, opts = {}) {
    const sx = opts.sx != null ? opts.sx : 1;
    const sy = opts.sy != null ? opts.sy : 1;
    const facing = opts.facing || state.facing || 'up';
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale * sx, scale * sy);
    if (facing === 'left') ctx.scale(-1, 1);
    const hopping = !!state.hopAnim && state.phase === 'cross';
    const bob = resting || hopping ? 0 : Math.sin(performance.now() / 160) * 1.4;
    ctx.translate(0, bob);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(-10, 12, 20, 4);
    ctx.fillStyle = '#1a1f2a';
    ctx.fillRect(-7, 6, 5, 9);
    ctx.fillRect(2, 6, 5, 9);
    ctx.fillStyle = '#0d0d10';
    ctx.fillRect(-8, 13, 6, 3);
    ctx.fillRect(2, 13, 6, 3);
    ctx.fillStyle = '#1e2430';
    ctx.fillRect(-9, -4, 18, 12);
    ctx.fillStyle = '#f5f0e6';
    ctx.fillRect(-3, -4, 6, 10);
    ctx.fillStyle = '#b01030';
    ctx.fillRect(-1, -3, 2, 8);
    // Briefcase swings with facing
    const caseX = facing === 'right' ? 8 : -14;
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(caseX, facing === 'up' ? -1 : 0, 6, 8);
    ctx.fillStyle = '#efc84a';
    ctx.fillRect(caseX + 1, facing === 'up' ? 1 : 2, 4, 1);
    ctx.fillStyle = '#e6b89a';
    ctx.fillRect(-6, -14, 12, 10);
    ctx.fillStyle = '#2a2430';
    ctx.fillRect(-6, -15, 12, 4);
    ctx.fillRect(-6, -12, 3, 4);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.strokeRect(-5, -11, 4, 3);
    ctx.strokeRect(1, -11, 4, 3);
    ctx.fillStyle = '#111';
    ctx.fillRect(-3.5, -10, 1.5, 1.5);
    ctx.fillRect(2.5, -10, 1.5, 1.5);
    ctx.fillStyle = '#1e2430';
    ctx.fillRect(-12, -2, 4, 8);
    ctx.fillRect(8, -2, 4, 8);
    ctx.restore();
  }

  function drawTimer() {
    const y = H - 5;
    const pct = Math.max(0, state.time / state.maxTime);
    ctx.fillStyle = '#2a2c30';
    ctx.fillRect(4, y - 5, W - 8, 5);
    ctx.fillStyle = pct < 0.22 ? '#c0392b' : pct < 0.45 ? '#d4a017' : '#3d9b6e';
    ctx.fillRect(4, y - 5, (W - 8) * pct, 5);
    if (state.combo >= 2 && state.mode === 'play') {
      ctx.fillStyle = '#7ec8e3';
      ctx.font = '700 9px "General Sans", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(`${state.combo}× COMBO`, W - 8, y - 10);
    }
  }

  function drawBrickWall(x, y, w, h, seed) {
    ctx.fillStyle = seed % 2 === 0 ? '#5a3a32' : '#4e342c';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(30,18,14,0.35)';
    ctx.lineWidth = 1;
    for (let by = y + 4; by < y + h; by += 5) {
      ctx.beginPath();
      ctx.moveTo(x, by);
      ctx.lineTo(x + w, by);
      ctx.stroke();
      const off = ((by / 5) | 0) % 2 ? 6 : 0;
      for (let bx = x + off; bx < x + w; bx += 12) {
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(bx, Math.min(by + 5, y + h));
        ctx.stroke();
      }
    }
  }

  function drawBoardedWindow(x, y, w, h) {
    ctx.fillStyle = '#3a3028';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(20,14,10,0.55)';
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.beginPath();
    ctx.moveTo(x + 2, y + 2);
    ctx.lineTo(x + w - 2, y + h - 2);
    ctx.moveTo(x + w - 2, y + 2);
    ctx.lineTo(x + 2, y + h - 2);
    ctx.stroke();
    // Plywood seams
    ctx.strokeStyle = 'rgba(60,45,30,0.4)';
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w / 2, y + h);
    ctx.stroke();
  }

  function drawSecurityGate(x, y, w, h) {
    ctx.fillStyle = '#2a2a2e';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(120,120,130,0.45)';
    ctx.lineWidth = 1;
    for (let gx = x + 3; gx < x + w; gx += 4) {
      ctx.beginPath();
      ctx.moveTo(gx, y);
      ctx.lineTo(gx, y + h);
      ctx.stroke();
    }
    for (let gy = y + 3; gy < y + h; gy += 4) {
      ctx.beginPath();
      ctx.moveTo(x, gy);
      ctx.lineTo(x + w, gy);
      ctx.stroke();
    }
  }

  function drawStoreSign(x, y, w, h, bg, fg, text) {
    ctx.fillStyle = bg;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.fillStyle = fg;
    ctx.font = `700 ${Math.max(7, Math.min(10, h - 2))}px "General Sans", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x + w / 2, y + h / 2 + 0.5);
    ctx.textBaseline = 'alphabetic';
  }

  function drawAbandonedStore(x, y, w, h, opts) {
    const { brick = 1, signBg, signFg, name, gated = true, neon = null } = opts;
    drawBrickWall(x, y, w, h, brick);
    // Cornice
    ctx.fillStyle = '#2a221c';
    ctx.fillRect(x, y, w, 4);
    // Signband
    drawStoreSign(x + 3, y + 6, w - 6, 11, signBg, signFg, name);
    if (neon) {
      ctx.fillStyle = neon;
      ctx.fillRect(x + 4, y + 6, w - 8, 2);
    }
    // Storefront
    const winY = y + 20;
    const winH = h - 24;
    if (gated) {
      drawSecurityGate(x + 4, winY, w - 8, winH);
      // Partial boards behind gate
      ctx.fillStyle = 'rgba(50,40,30,0.5)';
      ctx.fillRect(x + 8, winY + 4, (w - 16) / 2 - 2, winH - 8);
    } else {
      drawBoardedWindow(x + 4, winY, w - 8, winH);
    }
    // Door recess
    ctx.fillStyle = '#1a1612';
    ctx.fillRect(x + w * 0.4, winY + 2, w * 0.2, winH - 2);
    // CLOSED sticker
    ctx.fillStyle = 'rgba(180,40,40,0.75)';
    ctx.fillRect(x + w * 0.42, winY + winH * 0.35, w * 0.16, 7);
    ctx.fillStyle = '#f0e6d0';
    ctx.font = '700 6px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('CLOSED', x + w * 0.5, winY + winH * 0.35 + 5.5);
  }

  function drawJunkyGasStation(x, y, w, h) {
    // Lot asphalt under canopy
    ctx.fillStyle = '#2e2e30';
    ctx.fillRect(x, y, w, h);
    // Oil stains
    ctx.fillStyle = 'rgba(10,10,12,0.45)';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.3, y + h * 0.7, 14, 5, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + w * 0.65, y + h * 0.55, 10, 4, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Canopy
    ctx.fillStyle = '#6a2020';
    ctx.fillRect(x + 4, y + 2, w - 8, 14);
    ctx.fillStyle = '#8a3030';
    ctx.fillRect(x + 4, y + 2, w - 8, 4);
    // Faded brand
    ctx.fillStyle = 'rgba(240,220,160,0.7)';
    ctx.font = '700 9px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('QUIK-FILL', x + w / 2, y + 12);
    // Price board busted
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + w - 28, y + 4, 20, 10);
    ctx.fillStyle = '#c0392b';
    ctx.font = '700 7px "General Sans", sans-serif';
    ctx.fillText('$??', x + w - 18, y + 11);

    // Support poles
    ctx.fillStyle = '#4a4a4e';
    ctx.fillRect(x + 10, y + 16, 4, h - 18);
    ctx.fillRect(x + w - 14, y + 16, 4, h - 18);

    // Convenience hut (boarded)
    ctx.fillStyle = '#3a3834';
    ctx.fillRect(x + w * 0.55, y + 18, w * 0.38, h - 22);
    drawBoardedWindow(x + w * 0.55 + 4, y + 24, w * 0.38 - 8, 14);
    ctx.fillStyle = 'rgba(200,40,40,0.5)';
    ctx.font = '700 6px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('NO GAS', x + w * 0.58, y + h - 6);

    // Pumps — rusty, taped
    for (let i = 0; i < 2; i++) {
      const px = x + 16 + i * 28;
      const py = y + 22;
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(px, py, 14, 20);
      ctx.fillStyle = '#3a3028';
      ctx.fillRect(px + 2, py + 3, 10, 8);
      ctx.fillStyle = '#c9a227';
      ctx.fillRect(px + 3, py + 12, 8, 2);
      // Out of order tape
      ctx.strokeStyle = '#f0c400';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px - 1, py + 2);
      ctx.lineTo(px + 15, py + 18);
      ctx.stroke();
      // Hose on ground
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px + 14, py + 16);
      ctx.quadraticCurveTo(px + 22, py + 24, px + 10, py + 28);
      ctx.stroke();
    }

    // Stack of tires
    ctx.fillStyle = '#1a1a1a';
    for (let t = 0; t < 3; t++) {
      ctx.beginPath();
      ctx.ellipse(x + w * 0.48, y + h - 6 - t * 5, 8, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawTopBlock() {
    const y0 = 0;

    ctx.fillRect(0, y, W, TILE);
    // Concrete slabs
    ctx.fillStyle = '#5a554c';
    for (let x = 0; x < W; x += 40) ctx.fillRect(x, y, 1, TILE);
    ctx.fillRect(0, y + TILE / 2, W, 1);
    // Speckle
    ctx.fillStyle = 'rgba(40,35,30,0.15)';
    for (let i = 0; i < 18; i++) {
      ctx.fillRect((i * 53) % W, y + 4 + (i * 7) % (TILE - 8), 2, 2);

    ctx.strokeStyle = 'rgba(30,28,24,0.4)';
    ctx.beginPath();
    ctx.moveTo(40, y + 6);
    ctx.lineTo(70, y + 28);
    ctx.lineTo(100, y + 16);
    ctx.moveTo(300, y + 8);
    ctx.lineTo(360, y + 30);
    ctx.stroke();

    // Street furniture

      ctx.fillRect(24, y + 14, 8, 16);
      ctx.fillRect(20, y + 18, 16, 5);

      ctx.strokeRect(150, y + 16, 22, 14);
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(152, y + 18, 18, 8);

      ctx.beginPath();
      ctx.ellipse(220, y + 26, 8, 5, 0, 0, Math.PI * 2);

      ctx.beginPath();
      ctx.ellipse(232, y + 28, 6, 4, 0.2, 0, Math.PI * 2);

      // Newspaper box

      ctx.fillRect(400, y + 12, 14, 20);
      ctx.fillStyle = '#f0e6d0';

    ctx.beginPath();
    ctx.moveTo(30, y + 8);
    ctx.lineTo(70, y + 22);
    ctx.lineTo(110, y + 14);
    ctx.moveTo(280, y + 30);
    ctx.lineTo(340, y + 10);
    ctx.stroke();
    // Worn dashed line
    ctx.fillStyle = 'rgba(200,190,160,0.35)';
    const mid = y + TILE / 2 - 1;
    for (let x = 2; x < W; x += 30) ctx.fillRect(x, mid, 12, 2);

      ctx.fillStyle = '#1a1a1c';

    const x = GRILL.CAR_COL * TILE;
    const y = GRILL.GOAL * TILE;
    const pulse = 0.45 + 0.55 * Math.sin(performance.now() / 260);
    // Highlight stall
    ctx.strokeStyle = `rgba(212,160,23,${0.4 + pulse * 0.45})`;
    ctx.lineWidth = 2 + pulse;
    ctx.strokeRect(x + 3, y + 4, TILE - 6, TILE - 8);
    // Your beat-up car
    ctx.save();
    ctx.translate(x + TILE / 2, y + TILE / 2 + 2);
    ctx.rotate(-0.04);
    ctx.shadowColor = '#d4a017';
    ctx.shadowBlur = 5 + pulse * 12;
    ctx.fillStyle = '#3a4a38';
    ctx.fillRect(-16, -8, 32, 16);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(-10, -6, 8, 6);
    ctx.fillRect(2, -6, 8, 6);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-14, 6, 8, 3);
    ctx.fillRect(6, 6, 8, 3);

    ctx.fillStyle = '#8a4030';
    ctx.fillRect(8, 0, 6, 4);
    ctx.fillStyle = '#d4a017';

    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.75 + pulse * 0.25;

  function drawJankyCar(e, row, dir) {
    const y = row * TILE;
    const h = TILE - 12;
    const yy = y + 6 + Math.sin(e.bob || 0) * 0.8;
    withFacing(e.x, yy, e.w, h, dir, (lx, ly, lw, lh) => {
      ctx.save();
      ctx.translate(lw / 2, lh / 2);
      ctx.rotate(e.lean || 0);
      ctx.translate(-lw / 2, -lh / 2);

      const bodyH = e.kind === 'van' ? lh : e.kind === 'rice' ? lh * 0.75 : lh * 0.85;
      const bodyY = ly + (lh - bodyH);

      // Body
      ctx.fillStyle = e.color || '#555';
      ctx.fillRect(lx, bodyY + 4, lw, bodyH - 4);
      // Primer / rust blotches
      if (e.primer) {
        ctx.fillStyle = 'rgba(160,150,130,0.55)';
        ctx.fillRect(lx + lw * 0.2, bodyY + 6, lw * 0.18, bodyH * 0.35);
      }
      ctx.fillStyle = '#8a4030';
      ctx.fillRect(lx + lw * 0.55, bodyY + bodyH - 10, 8, 5);
      ctx.fillRect(lx + 4, bodyY + 10, 5, 4);

      // Cabin
      const cabW = e.kind === 'van' ? lw * 0.55 : lw * 0.4;
      ctx.fillStyle = e.accent || '#2a2a2a';
      ctx.fillRect(lx + lw - cabW - 2, bodyY, cabW, bodyH * 0.55);
      ctx.fillStyle = 'rgba(80,120,140,0.55)';
      ctx.fillRect(lx + lw - cabW + 2, bodyY + 3, cabW - 8, bodyH * 0.35);

      // Missing bumper gap
      if (!e.missingBumper) {
        ctx.fillStyle = '#222';
        ctx.fillRect(lx + lw - 3, bodyY + bodyH - 8, 3, 6);
      }

      // Crooked spoiler on rice
      if (e.kind === 'rice') {
        ctx.fillStyle = '#111';
        ctx.fillRect(lx + 2, bodyY - 2, lw * 0.35, 3);
      }
      // Lowrider hydraulics look
      if (e.kind === 'lowrider') {
        ctx.fillStyle = '#c9a227';
        ctx.fillRect(lx + 4, bodyY + bodyH - 6, lw - 8, 2);
      }

      // Wheels — uneven
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 5, ly + lh - 4, 9, 5);
      ctx.fillRect(lx + lw - 16, ly + lh - 3, 9, 4);

      // Headlight (some cars run one-eyed)
      ctx.fillStyle = e.bustedLight ? '#333' : '#f0e6a0';
      ctx.fillRect(lx + lw - 5, bodyY + bodyH - 14, 3, 4);

      ctx.restore();
    });
  }

  function drawGhettoCross() {
    drawTopBlock();
    drawHooptyGoal();
    for (let r = GRILL.ROAD_START; r <= GRILL.ROAD_END; r++) drawGhettoRoad(r);
    drawGhettoCurb(GRILL.START, 'GRILL EXIT  •  START', 'start');
    drawBottomBlock();

    // Flickery streetlight cones
    const flicker = 0.05 + Math.sin(performance.now() / 400) * 0.015;
    ctx.fillStyle = `rgba(220,180,80,${flicker})`;
    ctx.beginPath();
    ctx.moveTo(60, GRILL.START * TILE);
    ctx.lineTo(20, GRILL.GOAL * TILE);
    ctx.lineTo(100, GRILL.GOAL * TILE);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(400, GRILL.START * TILE);
    ctx.lineTo(360, GRILL.GOAL * TILE);
    ctx.lineTo(440, GRILL.GOAL * TILE);
    ctx.fill();

    // Gas-station canopy spill onto the far curb
    ctx.fillStyle = 'rgba(140,40,40,0.08)';
    ctx.fillRect(TILE * 2.15, GRILL.GOAL * TILE, TILE * 3.3, 6);

    for (const lane of state.lanes) {

        drawJankyCar(e, lane.row, lane.dir);
