<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Return to Your Car</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=zodiak@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #0d1512; --color-surface: #13211b; --color-surface-2: #173027;
      --color-border: #2c473c; --color-text: #f5edd8; --color-text-muted: #bdb39b;
      --color-text-faint: #897f6d; --color-primary: #d0a23a;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 2px 4px rgba(0,0,0,.28); --shadow-md: 0 12px 30px rgba(0,0,0,.34);
      --font-display: 'Zodiak', Georgia, serif;
      --font-body: 'General Sans', 'Inter', sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
      background:
        radial-gradient(ellipse 90% 50% at 50% -10%, rgba(208,162,58,.12), transparent 45%),
        radial-gradient(circle at 80% 20%, rgba(90,140,180,.06), transparent 30%),
        linear-gradient(180deg, #0d1512, #07100d 60%);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    button { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .app {
      max-width: 720px;
      height: 100dvh;
      margin: 0 auto;
      padding: var(--space-2);
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: var(--space-2);
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus {
      left: var(--space-4); top: var(--space-4);
      background: var(--color-surface); padding: var(--space-3);
      z-index: 20; border-radius: var(--radius-md);
    }
    .panel {
      background: linear-gradient(180deg, rgba(23,48,39,.92), rgba(15,27,23,.96));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .panel-inner {
      padding: var(--space-3);
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .brand h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: .02em;
      color: #f7ead0;
      line-height: 1.1;
    }
    .brand p {
      margin: 0;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .stats {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .stat {
      min-width: 64px;
      padding: 6px 10px;
      border-radius: 3px;
      background: linear-gradient(180deg, rgba(20,53,40,.78), rgba(12,26,21,.92));
      border: 1px solid rgba(238,194,97,.18);
      text-align: center;
    }
    .stat .label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--color-text-faint);
    }
    .stat .value {
      display: block;
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.2;
    }
    .canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #1a1c20;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 0 3px rgba(70,74,82,.4);
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: rgba(7,16,13,.72);
      backdrop-filter: blur(4px);
      z-index: 2;
      transition: opacity var(--transition);
    }
    .overlay[hidden] { display: none; }
    .overlay-card {
      width: min(100%, 340px);
      text-align: center;
      padding: var(--space-6) var(--space-5);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(23,48,39,.96), rgba(12,26,21,.98));
      border: 1px solid rgba(238,194,97,.28);
      box-shadow: var(--shadow-md), 0 0 40px rgba(208,162,58,.08);
    }
    .overlay-card h2 {
      margin: 0 0 var(--space-2);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: #f7ead0;
    }
    .overlay-card p {
      margin: 0 0 var(--space-5);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }
    .controls {
      display: grid;
      gap: var(--space-2);
      flex-shrink: 0;
      padding: var(--space-2);
      background: linear-gradient(180deg, rgba(20,53,40,.78), rgba(12,26,21,.92));
      border: 1px solid rgba(238,194,97,.18);
      border-radius: 4px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 4px 14px rgba(0,0,0,.22);
    }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      justify-content: center;
    }
    .controls .btn {
      min-height: 52px;
      min-width: 72px;
      padding: var(--space-2) var(--space-4);
      border-radius: 3px;
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #f7ead0;
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
      border: 1px solid rgba(255,238,198,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.18), 0 2px 5px rgba(0,0,0,.24);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .controls .btn.primary {
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03)), linear-gradient(180deg, #d44a45, #8f2420);
      color: #fff6e3;
      border-color: rgba(255,210,200,.28);
    }
    .controls .btn.subtle {
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
    }
    .controls .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(239,187,73,.42);
    }
    .controls .btn:active { transform: translateY(0); }
    .controls .btn.dir {
      width: 56px;
      min-width: 56px;
      height: 52px;
      padding: 0;
      font-size: 1.25rem;
      line-height: 1;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(2, 52px);
      gap: var(--space-2);
      justify-content: center;
    }
    .dpad .up { grid-column: 2; grid-row: 1; }
    .dpad .left { grid-column: 1; grid-row: 2; }
    .dpad .down { grid-column: 2; grid-row: 2; }
    .dpad .right { grid-column: 3; grid-row: 2; }
    .dpad.drive-mode .up,
    .dpad.drive-mode .down { opacity: 0.35; pointer-events: none; }
    .hint {
      margin: 0;
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      letter-spacing: .04em;
    }
    .lives-pips {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 2px;
    }
    .lives-pips span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(208,162,58,.25);
      border: 1px solid rgba(208,162,58,.35);
    }
    .lives-pips span.on {
      background: var(--color-primary);
      box-shadow: 0 0 6px rgba(208,162,58,.45);
    }
    @media (max-width: 520px) {
      .app { padding: var(--space-1); gap: var(--space-1); }
      .panel-inner { padding: var(--space-2); }
      .brand h1 { font-size: var(--text-base); }
      .stat { min-width: 56px; padding: 4px 8px; }
      .controls .btn { min-height: 48px; }
      .controls .btn.dir { width: 52px; min-width: 52px; height: 48px; }
      .dpad {
        grid-template-columns: repeat(3, 52px);
        grid-template-rows: repeat(2, 48px);
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="app">
    <main id="main" class="panel">
      <div class="panel-inner">
        <div class="topbar">
          <div class="brand">
            <h1 id="brandTitle">Return to Your Car</h1>
            <p id="brandSub">Cross the city · get to the garage</p>
          </div>
          <div class="stats" aria-live="polite">
            <div class="stat">
              <span class="label">Score</span>
              <span class="value" id="scoreVal">0</span>
            </div>
            <div class="stat">
              <span class="label" id="meterLabel">Level</span>
              <span class="value" id="levelVal">1</span>
            </div>
            <div class="stat">
              <span class="label">Lives</span>
              <span class="value" id="livesVal">3</span>
              <div class="lives-pips" id="livesPips" aria-hidden="true"></div>
            </div>
          </div>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="game" width="480" height="600" aria-label="Return to your car"></canvas>
          <div class="overlay" id="overlay">
            <div class="overlay-card">
              <h2 id="overlayTitle">Return to your car</h2>
              <p id="overlayText">Leave the tables, cross Midtown, and reach your parked car. Then drive to the next stop. Arrow keys, WASD, or swipe.</p>
              <div class="control-row">
                <button class="btn primary" id="startBtn" type="button">Leave the Tables</button>
              </div>
            </div>
          </div>
        </div>

        <div class="controls" aria-label="Game controls">
          <div class="control-row">
            <button class="btn subtle" id="pauseBtn" type="button" disabled>Pause</button>
            <button class="btn subtle" id="muteBtn" type="button" aria-pressed="false">Sound</button>
            <a class="btn subtle" href="burger.html">Grill</a>
            <a class="btn subtle" href="index.html">Tables</a>
          </div>
          <div class="dpad" id="dpad" aria-label="Direction pad">
            <button class="btn dir up" type="button" data-dir="up" aria-label="Move up">▲</button>
            <button class="btn dir left" type="button" data-dir="left" aria-label="Move left">◀</button>
            <button class="btn dir down" type="button" data-dir="down" aria-label="Move down">▼</button>
            <button class="btn dir right" type="button" data-dir="right" aria-label="Move right">▶</button>
          </div>
          <p class="hint" id="hintText">Arrows / WASD · swipe · cross Midtown to your car</p>
        </div>
      </div>
    </main>
  </div>

  <script>
(() => {
  const COLS = 12;
  const ROWS = 14;
  const TILE = 40;
  const W = COLS * TILE;
  const H = ROWS * TILE;

  const DESTINATIONS = [
    { id: 'tables', name: 'The Tables', href: 'index.html', blurb: 'Back to the casino floor.' },
    { id: 'grill', name: 'Night Shift Grill', href: 'burger.html', blurb: 'Late-night burgers on the line.' },
    { id: 'soho', name: 'SoHo Lounge', href: 'index.html', blurb: 'A quieter room uptown.' },
    { id: 'pier', name: 'East River Club', href: 'index.html', blurb: 'Private tables by the water.' }
  ];

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const scoreVal = document.getElementById('scoreVal');
  const levelVal = document.getElementById('levelVal');
  const livesVal = document.getElementById('livesVal');
  const livesPips = document.getElementById('livesPips');
  const brandTitle = document.getElementById('brandTitle');
  const brandSub = document.getElementById('brandSub');
  const meterLabel = document.getElementById('meterLabel');
  const hintText = document.getElementById('hintText');
  const dpad = document.getElementById('dpad');

  const ROW = {
    GARAGE: 0,
    BANK: 1,
    RIVER_START: 2,
    RIVER_END: 6,
    MEDIAN: 7,
    ROAD_START: 8,
    ROAD_END: 12,
    START: 13
  };

  // Your car sits in one bay; other bays are pillars / strangers' cars
  const CAR_COL = 5;
  const PARK_SLOTS = [1, 3, 5, 7, 9];

  const state = {
    phase: 'cross', // cross | drive
    mode: 'title', // title | play | pause | dead | win | gameover | drive | arrived
    score: 0,
    high: Number(localStorage.getItem('returnToCarHigh') || 0),
    level: 1,
    lives: 3,
    frog: { col: 5.5, row: ROW.START, onFerry: null },
    lanes: [],
    time: 45,
    maxTime: 45,
    hopCooldown: 0,
    invuln: 0,
    flash: 0,
    particles: [],
    muted: false,
    lastTs: 0,
    reachedRows: new Set([ROW.START]),
    destination: DESTINATIONS[0],
    drive: null,
    keys: { left: false, right: false, up: false, down: false }
  };

  let audioCtx = null;
  function ensureAudio() {
    if (state.muted) return null;
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep(freq, dur, type = 'square', vol = 0.04) {
    const ac = ensureAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g);
    g.connect(ac.destination);
    const t = ac.currentTime;
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur);
  }

  function pickDestination(level) {
    return DESTINATIONS[(level - 1) % DESTINATIONS.length];
  }

  function setPhaseUI() {
    if (state.phase === 'drive') {
      brandTitle.textContent = 'Night Drive';
      brandSub.textContent = `En route · ${state.destination.name}`;
      meterLabel.textContent = 'Mi';
      hintText.textContent = 'Steer · hold gas · dodge traffic · reach the next stop';
      dpad.classList.add('drive-mode');
    } else {
      brandTitle.textContent = 'Return to Your Car';
      brandSub.textContent = 'Cross the city · get to the garage';
      meterLabel.textContent = 'Level';
      hintText.textContent = 'Arrows / WASD · swipe · cross Midtown to your car';
      dpad.classList.remove('drive-mode');
    }
  }

  function buildLanes(level) {
    const speed = 1 + (level - 1) * 0.18;
    const lanes = [];
    const riverSpecs = [
      { row: 2, dir: 1, speed: 1.1 * speed, gap: 220, len: 2.4, kind: 'ferry' },
      { row: 3, dir: -1, speed: 1.35 * speed, gap: 200, len: 1.8, kind: 'barge' },
      { row: 4, dir: 1, speed: 0.95 * speed, gap: 240, len: 2.8, kind: 'ferry' },
      { row: 5, dir: -1, speed: 1.5 * speed, gap: 180, len: 1.6, kind: 'kayak' },
      { row: 6, dir: 1, speed: 1.2 * speed, gap: 210, len: 2.2, kind: 'barge' }
    ];
    const roadSpecs = [
      { row: 8, dir: -1, speed: 1.6 * speed, gap: 170, len: 1.1, kind: 'taxi' },
      { row: 9, dir: 1, speed: 1.2 * speed, gap: 200, len: 1.8, kind: 'bus' },
      { row: 10, dir: -1, speed: 2.0 * speed, gap: 150, len: 0.9, kind: 'bike' },
      { row: 11, dir: 1, speed: 1.4 * speed, gap: 185, len: 1.2, kind: 'taxi' },
      { row: 12, dir: -1, speed: 1.1 * speed, gap: 220, len: 2.0, kind: 'truck' }
    ];
    for (const spec of [...riverSpecs, ...roadSpecs]) {
      const entities = [];
      const lenPx = spec.len * TILE;
      const count = Math.ceil((W + spec.gap) / spec.gap) + 1;
      for (let i = 0; i < count; i++) {
        entities.push({
          x: i * spec.gap + (spec.dir > 0 ? -lenPx : W),
          w: lenPx,
          kind: spec.kind
        });
      }
      lanes.push({ ...spec, entities, lenPx });
    }
    return lanes;
  }

  function resetFrog() {
    state.frog = { col: 5.5, row: ROW.START, onFerry: null };
    state.time = state.maxTime;
    state.hopCooldown = 0;
    state.invuln = 0.6;
    state.reachedRows = new Set([ROW.START]);
  }

  function startCrossingLevel(level) {
    state.phase = 'cross';
    state.level = level;
    state.destination = pickDestination(level);
    state.maxTime = Math.max(28, 45 - (level - 1) * 2);
    state.lanes = buildLanes(level);
    resetFrog();
    setPhaseUI();
    updateHUD();
  }

  function startGame() {
    state.score = 0;
    state.lives = 3;
    state.mode = 'play';
    startCrossingLevel(1);
    overlay.hidden = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';
    beep(440, 0.08);
    beep(660, 0.1);
  }

  function beginDrive() {
    state.phase = 'drive';
    state.mode = 'drive';
    state.invuln = 0;
    state.flash = 0;
    state.particles = [];
    state.destination = pickDestination(state.level);
    const trip = 2600 + state.level * 320;
    state.drive = {
      z: 0,
      goal: trip,
      speed: 40,
      maxSpeed: 300 + state.level * 20,
      accel: 0,
      playerX: 0,
      velX: 0,
      steer: 0,
      yaw: 0,
      yawVel: 0,
      pitch: 0,
      roll: 0,
      curve: 0,
      targetCurve: 0,
      curveTimer: 0,
      hills: 0,
      traffic: [],
      props: [],
      buildings: [],
      nextPropZ: 40,
      nextBuildZ: 20,
      spawnTimer: 0.5,
      invuln: 1.4,
      rpmPulse: 0,
      crashFlash: 0,
      camShake: 0,
      crashT: 0,
      skid: 0,
      wheelSpin: 0
    };
    seedCityBlocks(state.drive, 0, 1400);
    setPhaseUI();
    overlay.hidden = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';
    updateHUD();
    beep(392, 0.08);
    beep(523, 0.1);
    beep(784, 0.14);
  }

  function seedCityBlocks(d, fromZ, toZ) {
    const facades = ['#5a4a3e', '#4a525c', '#6a6058', '#3d4a55', '#6b5344', '#4e5a48'];
    for (let z = fromZ; z < toZ; z += 55 + Math.random() * 40) {
      const h = 70 + Math.random() * 160;
      const w = 0.55 + Math.random() * 0.45;
      d.buildings.push({
        z, side: -1, h, w, color: facades[Math.floor(Math.random() * facades.length)],
        windows: 2 + Math.floor(Math.random() * 3)
      });
      d.buildings.push({
        z: z + 18, side: 1, h: 60 + Math.random() * 150, w: 0.5 + Math.random() * 0.5,
        color: facades[Math.floor(Math.random() * facades.length)],
        windows: 2 + Math.floor(Math.random() * 3)
      });
    }
    for (let z = fromZ + 30; z < toZ; z += 90 + Math.random() * 50) {
      d.props.push({ z, side: -1, kind: 'light' });
      d.props.push({ z: z + 12, side: 1, kind: 'light' });
    }
    for (let z = fromZ + 80; z < toZ; z += 220 + Math.random() * 80) {
      d.props.push({ z, side: Math.random() > 0.5 ? 1 : -1, kind: 'hydrant' });
      d.props.push({ z: z + 40, side: 0, kind: 'crosswalk' });
    }
    d.nextBuildZ = toZ;
    d.nextPropZ = toZ;
  }

  function updateHUD() {
    scoreVal.textContent = String(state.score);
    livesVal.textContent = String(state.lives);
    if (state.phase === 'drive' && state.drive) {
      const left = Math.max(0, state.drive.goal - state.drive.z);
      levelVal.textContent = (left / 1000).toFixed(1);
    } else {
      levelVal.textContent = String(state.level);
    }
    livesPips.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      if (i < state.lives) s.classList.add('on');
      livesPips.appendChild(s);
    }
  }

  function showOverlay(title, text, btnLabel) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btnLabel;
    overlay.hidden = false;
  }

  function loseLife(reason) {
    if (state.mode !== 'play' && state.mode !== 'drive') return;
    if (state.phase === 'cross' && state.invuln > 0) return;
    if (state.phase === 'drive' && state.drive && state.drive.invuln > 0) return;

    state.lives -= 1;
    state.flash = 0.35;
    if (state.phase === 'cross') {
      spawnSplash(state.frog.col * TILE, state.frog.row * TILE + TILE / 2);
    } else if (state.drive) {
      // crash FX already spawned by triggerDriveCrash
      state.drive.crashFlash = 0.55;
      state.drive.invuln = 1.6;
    }
    beep(90, 0.12, 'sawtooth', 0.06);
    beep(60, 0.22, 'square', 0.05);
    updateHUD();

    if (state.lives <= 0) {
      state.mode = 'gameover';
      if (state.score > state.high) {
        state.high = state.score;
        localStorage.setItem('returnToCarHigh', String(state.high));
      }
      showOverlay(
        state.phase === 'drive' ? 'Wrecked' : 'Never made it to the car',
        `${reason} Final score ${state.score}. Best ${state.high}.`,
        'Try Again'
      );
      pauseBtn.disabled = true;
      return;
    }

    if (state.phase === 'cross') {
      state.mode = 'dead';
      setTimeout(() => {
        if (state.mode === 'dead') {
          resetFrog();
          state.mode = 'play';
        }
      }, 700);
    }
  }

  function reachCar() {
    const bonus = 120 + Math.floor(state.time * 2) + state.level * 20;
    state.score += bonus;
    updateHUD();
    state.mode = 'win';
    beep(523, 0.08);
    beep(659, 0.1);
    beep(784, 0.16);
    showOverlay(
      'Keys in the ignition',
      `You made it to your car. Score ${state.score}. Next: drive to ${state.destination.name}.`,
      'Hit the Gas'
    );
    pauseBtn.disabled = true;
  }

  function arriveDestination() {
    state.score += 250 + state.level * 40;
    updateHUD();
    state.mode = 'arrived';
    if (state.score > state.high) {
      state.high = state.score;
      localStorage.setItem('returnToCarHigh', String(state.high));
    }
    beep(523, 0.08);
    beep(784, 0.12);
    beep(1046, 0.18);
    showOverlay(
      `Arrived · ${state.destination.name}`,
      `${state.destination.blurb} Score ${state.score}. Keep the night going, or park it here.`,
      'Enter'
    );
    pauseBtn.disabled = true;
  }

  function tryMove(dx, dy) {
    if (state.phase !== 'cross' || state.mode !== 'play' || state.hopCooldown > 0) return;
    const f = state.frog;
    const nc = f.col + dx;
    const nr = f.row + dy;
    if (nc < 0 || nc > COLS - 1 || nr < 0 || nr > ROWS - 1) return;

    if (nr === ROW.GARAGE) {
      const slot = PARK_SLOTS.find(c => Math.abs(nc - c) < 0.6);
      if (slot === CAR_COL) {
        f.col = CAR_COL;
        f.row = nr;
        f.onFerry = null;
        reachCar();
        return;
      }
      loseLife(slot != null ? 'Wrong car — alarms everywhere.' : 'Slammed into a garage pillar.');
      return;
    }

    f.col = Math.max(0, Math.min(COLS - 1, nc));
    f.row = nr;
    f.onFerry = null;
    state.hopCooldown = 0.12;
    beep(280 + (ROWS - nr) * 18, 0.05, 'triangle', 0.03);

    if (!state.reachedRows.has(nr) && nr < ROW.START) {
      state.reachedRows.add(nr);
      state.score += 10;
      updateHUD();
    }
  }

  function spawnSplash(x, y) {
    for (let i = 0; i < 10; i++) {
      state.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 80,
        vy: (Math.random() - 0.5) * 80 - 20,
        life: 0.4 + Math.random() * 0.3,
        color: Math.random() > 0.5 ? '#efbb49' : '#71d189'
      });
    }
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // --- Crossing update ---
  function updateCross(dt) {
    if (state.mode !== 'play') {
      if (state.mode === 'title' || state.mode === 'pause' || state.mode === 'gameover' || state.mode === 'win' || state.mode === 'arrived') {
        for (const lane of state.lanes) {
          for (const e of lane.entities) {
            e.x += lane.dir * lane.speed * 40 * dt * 0.35;
            if (lane.dir > 0 && e.x > W + 20) e.x -= lane.gap * Math.ceil((W + lane.gap) / lane.gap);
            if (lane.dir < 0 && e.x + e.w < -20) e.x += lane.gap * Math.ceil((W + lane.gap) / lane.gap);
          }
        }
      }
      updateParticles(dt);
      return;
    }

    state.time -= dt;
    if (state.hopCooldown > 0) state.hopCooldown -= dt;
    if (state.invuln > 0) state.invuln -= dt;
    if (state.flash > 0) state.flash -= dt;
    if (state.time <= 0) {
      loseLife('The garage closed — time ran out.');
      return;
    }

    const f = state.frog;
    const frogPad = 6;
    const fx = f.col * TILE + frogPad;
    const fy = f.row * TILE + frogPad;
    const fw = TILE - frogPad * 2;
    const fh = TILE - frogPad * 2;

    let riding = null;
    for (const lane of state.lanes) {
      for (const e of lane.entities) {
        e.x += lane.dir * lane.speed * 40 * dt;
        if (lane.dir > 0 && e.x > W + 40) e.x = -e.w - (lane.gap - e.w) * Math.random() * 0.2;
        if (lane.dir < 0 && e.x + e.w < -40) e.x = W + (lane.gap - e.w) * Math.random() * 0.2;
      }

      if (f.row === lane.row) {
        for (const e of lane.entities) {
          const ey = lane.row * TILE + 4;
          const eh = TILE - 8;
          if (rectsOverlap(fx, fy, fw, fh, e.x, ey, e.w, eh)) {
            if (lane.row >= ROW.RIVER_START && lane.row <= ROW.RIVER_END) {
              riding = { lane, e };
            } else if (lane.row >= ROW.ROAD_START && lane.row <= ROW.ROAD_END) {
              loseLife(e.kind === 'bus' ? 'Hit by an MTA bus.' : e.kind === 'truck' ? 'Flattened by a truck.' : 'Yellow cab. Classic.');
              return;
            }
          }
        }
      }
    }

    if (f.row >= ROW.RIVER_START && f.row <= ROW.RIVER_END) {
      if (!riding) {
        loseLife('You fell in the East River.');
        return;
      }
      f.col += (riding.lane.dir * riding.lane.speed * 40 * dt) / TILE;
      f.onFerry = riding;
      if (f.col < -0.2 || f.col > COLS - 0.8) {
        loseLife('Swept past the pier.');
        return;
      }
    }

    updateParticles(dt);
  }

  // --- Drive update (low-poly city + momentum physics) ---
  function spawnTraffic(d) {
    const lane = [-0.52, 0, 0.52][Math.floor(Math.random() * 3)];
    const kinds = ['taxi', 'sedan', 'bus', 'sports', 'van'];
    d.traffic.push({
      z: d.z + 820 + Math.random() * 600,
      x: lane + (Math.random() - 0.5) * 0.06,
      kind: kinds[Math.floor(Math.random() * kinds.length)],
      speed: 70 + Math.random() * 100,
      w: 0.24,
      yaw: 0,
      smashed: false
    });
  }

  function spawnCrashFX(screenX, screenY, impactDir, intensity) {
    const n = Math.floor(18 + intensity * 22);
    const shardColors = ['#1a2430', '#efc84a', '#c0392b', '#7ec8e3', '#4a5568', '#e8dcc0', '#f5c400'];
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 220 * intensity;
      state.particles.push({
        type: 'shard',
        x: screenX, y: screenY,
        vx: Math.cos(ang) * sp + impactDir * 60,
        vy: Math.sin(ang) * sp - 40 - Math.random() * 120,
        rot: Math.random() * Math.PI,
        rotV: (Math.random() - 0.5) * 14,
        life: 0.55 + Math.random() * 0.7,
        maxLife: 1.1,
        size: 4 + Math.random() * 10 * intensity,
        color: shardColors[Math.floor(Math.random() * shardColors.length)],
        sides: 3 + Math.floor(Math.random() * 2)
      });
    }
    for (let i = 0; i < 14 + intensity * 10; i++) {
      state.particles.push({
        type: 'spark',
        x: screenX, y: screenY,
        vx: (Math.random() - 0.5) * 340 + impactDir * 80,
        vy: -80 - Math.random() * 220,
        life: 0.2 + Math.random() * 0.35,
        maxLife: 0.5,
        color: Math.random() > 0.4 ? '#ffe08a' : '#ff6b3d'
      });
    }
    for (let i = 0; i < 8; i++) {
      state.particles.push({
        type: 'smoke',
        x: screenX + (Math.random() - 0.5) * 20,
        y: screenY,
        vx: (Math.random() - 0.5) * 40,
        vy: -20 - Math.random() * 50,
        life: 0.6 + Math.random() * 0.8,
        maxLife: 1.2,
        size: 10 + Math.random() * 24
      });
    }
  }

  function triggerDriveCrash(reason, impactX, other) {
    const d = state.drive;
    if (!d || d.invuln > 0 || state.mode !== 'drive') return;

    const px = W / 2 + d.playerX * 150;
    const py = H - 78;
    const intensity = Math.min(1.4, 0.55 + d.speed / 260);
    spawnCrashFX(px, py, Math.sign(impactX || (Math.random() - 0.5)), intensity);

    d.yawVel += (impactX || (Math.random() - 0.5)) * (6 + intensity * 5);
    d.velX += -(impactX || 0) * 2.2 - Math.sign(d.playerX || 0.01) * 0.4;
    d.speed *= 0.22;
    d.camShake = 14 + intensity * 16;
    d.crashT = 0.85;
    d.crashFlash = 0.6;
    d.skid = 1;
    d.roll = (impactX || 0.2) * 0.35;

    if (other) {
      other.smashed = true;
      other.yaw = (Math.random() - 0.5) * 1.2;
      other.z = d.z + 40;
      other.x += (Math.random() - 0.5) * 0.4;
    }

    loseLife(reason);
  }

  function updateDrive(dt) {
    const d = state.drive;
    if (!d) return;

    if (d.camShake > 0) d.camShake = Math.max(0, d.camShake - 40 * dt);
    if (d.crashT > 0) d.crashT = Math.max(0, d.crashT - dt);
    if (d.skid > 0) d.skid = Math.max(0, d.skid - dt);

    if (state.mode === 'pause' || state.mode === 'gameover' || state.mode === 'arrived') {
      d.rpmPulse += dt;
      updateParticles(dt);
      return;
    }
    if (state.mode !== 'drive') {
      updateParticles(dt);
      return;
    }

    if (d.invuln > 0) d.invuln -= dt;
    if (d.crashFlash > 0) d.crashFlash -= dt;
    if (state.flash > 0) state.flash -= dt;

    // Momentum throttle
    const gas = state.keys.up ? 1 : 0;
    const brake = state.keys.down ? 1 : 0;
    if (gas) d.accel = 165;
    else if (brake) d.accel = -210;
    else d.accel = -28;
    d.speed = Math.max(18, Math.min(d.maxSpeed, d.speed + d.accel * dt));
    // Nose pitch from accel/brake
    const targetPitch = (d.accel > 40 ? -0.08 : d.accel < -80 ? 0.12 : 0) + (d.speed / d.maxSpeed) * 0.02;
    d.pitch += (targetPitch - d.pitch) * Math.min(1, 6 * dt);

    // Steering with grip falloff + lateral inertia
    let steerInput = 0;
    if (state.keys.left) steerInput -= 1;
    if (state.keys.right) steerInput += 1;
    d.steer += (steerInput - d.steer) * Math.min(1, 10 * dt);
    const grip = Math.max(0.35, 1.15 - d.speed / 420);
    const steerForce = d.steer * (1.8 + d.speed * 0.004) * grip;
    d.velX += steerForce * dt;
    d.velX *= Math.pow(0.12, dt); // damping
    // Road bank / curve force
    d.velX -= d.curve * (d.speed / 300) * dt * 0.9;
    d.playerX += d.velX * dt;
    // Visual yaw from lateral slip
    const slip = d.velX - d.steer * 0.6;
    d.yawVel += (-d.steer * 1.4 - d.yaw * 4 + slip * 0.8) * dt;
    d.yawVel *= Math.pow(0.08, dt);
    d.yaw += d.yawVel * dt;
    d.yaw = Math.max(-0.55, Math.min(0.55, d.yaw));
    d.roll += ((-d.steer * 0.12 + d.velX * 0.04) - d.roll) * Math.min(1, 5 * dt);

    // Soft curb bounce
    if (Math.abs(d.playerX) > 0.82) {
      const over = d.playerX - Math.sign(d.playerX) * 0.82;
      d.playerX -= over * 0.35;
      d.velX *= -0.45;
      d.speed = Math.max(24, d.speed - 70 * dt);
      d.camShake = Math.max(d.camShake, 4);
      d.skid = Math.max(d.skid, 0.25);
      if (Math.abs(d.playerX) > 0.95) {
        triggerDriveCrash('Jersey barrier. Low-poly meets concrete.', d.playerX, null);
        return;
      }
    }
    d.playerX = Math.max(-0.96, Math.min(0.96, d.playerX));

    // Road path — city blocks feel more angular
    d.curveTimer -= dt;
    if (d.curveTimer <= 0) {
      d.targetCurve = (Math.random() - 0.5) * (Math.random() > 0.7 ? 2.1 : 1.1);
      d.curveTimer = 1.2 + Math.random() * 2.4;
    }
    d.curve += (d.targetCurve - d.curve) * Math.min(1, 1.4 * dt);
    d.hills = Math.sin(d.z * 0.0018) * 18 + Math.sin(d.z * 0.004) * 8;

    d.z += d.speed * dt;
    d.wheelSpin += d.speed * dt * 0.08;
    d.rpmPulse += dt * (0.8 + d.speed / 200);

    // Extend city ahead
    if (d.z + 1200 > d.nextBuildZ) {
      seedCityBlocks(d, d.nextBuildZ, d.nextBuildZ + 900);
    }
    d.buildings = d.buildings.filter(b => b.z > d.z - 80);
    d.props = d.props.filter(p => p.z > d.z - 60);

    // Traffic
    d.spawnTimer -= dt;
    if (d.spawnTimer <= 0 && d.traffic.length < 10) {
      spawnTraffic(d);
      d.spawnTimer = Math.max(0.4, 1.05 - state.level * 0.08);
    }
    for (const car of d.traffic) {
      if (car.smashed) {
        car.z += 40 * dt;
        car.x += car.yaw * dt * 0.4;
      } else {
        car.z += car.speed * dt * 0.15;
        car.z -= d.speed * dt * 0.92;
      }
    }
    d.traffic = d.traffic.filter(c => c.z > d.z - 50 && c.z < d.z + 1700);

    // Collisions with impulse
    for (const car of d.traffic) {
      if (car.smashed) continue;
      const rel = car.z - d.z;
      if (rel > 12 && rel < 62) {
        const hitW = car.kind === 'bus' ? 0.34 : 0.26;
        if (Math.abs(car.x - d.playerX) < hitW) {
          const impactX = d.playerX - car.x;
          triggerDriveCrash(
            car.kind === 'bus' ? 'Bus vs banker. Bus wins.' : car.kind === 'taxi' ? 'Yellow cab reunion.' : 'Chrome confetti.',
            impactX,
            car
          );
          return;
        }
      }
    }

    if (d.z >= d.goal) {
      arriveDestination();
      return;
    }

    if (d.speed > 160) state.score += Math.floor(d.speed * dt * 0.09);
    updateHUD();

    if (Math.floor(d.rpmPulse * 6) !== Math.floor((d.rpmPulse - dt) * 6) && d.speed > 50) {
      beep(85 + d.speed * 0.4, 0.025, 'sawtooth', 0.01);
    }
    // Tire squeal cue
    if (Math.abs(d.velX) > 1.4 && Math.floor(d.rpmPulse * 10) !== Math.floor((d.rpmPulse - dt) * 10)) {
      beep(180 + Math.abs(d.velX) * 40, 0.02, 'triangle', 0.015);
    }

    // Skid smoke while sliding
    if ((Math.abs(d.velX) > 1.2 || d.skid > 0) && Math.random() < dt * 10) {
      state.particles.push({
        type: 'smoke',
        x: W / 2 + d.playerX * 150 + (Math.random() - 0.5) * 16,
        y: H - 64,
        vx: -d.velX * 8 + (Math.random() - 0.5) * 20,
        vy: -10 - Math.random() * 20,
        life: 0.35 + Math.random() * 0.3,
        maxLife: 0.6,
        size: 6 + Math.random() * 10
      });
    }

    updateParticles(dt);
  }

  function updateParticles(dt) {
    for (const p of state.particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.type === 'shard') {
        p.vy += 380 * dt;
        p.vx *= Math.pow(0.4, dt);
        p.rot += (p.rotV || 0) * dt;
      } else if (p.type === 'spark') {
        p.vy += 420 * dt;
        p.vx *= Math.pow(0.25, dt);
      } else if (p.type === 'smoke') {
        p.vy -= 10 * dt;
        p.size = (p.size || 10) + 28 * dt;
        p.vx *= Math.pow(0.5, dt);
      } else {
        p.vy += 120 * dt;
      }
      p.life -= dt;
    }
    state.particles = state.particles.filter(p => p.life > 0);
  }

  function update(dt) {
    if (state.phase === 'drive') updateDrive(dt);
    else updateCross(dt);
  }

  // --- Drawing ---
  const C = {
    garageBg: '#3d3f42',
    pillar: '#6a6d72',
    // Concrete sidewalk
    safe: '#9b968c',
    safeHi: '#b0aaa0',
    safeLo: '#868178',
    // East River — cold slate with olive undertone
    water: '#3f5c66',
    waterDeep: '#334a52',
    waterFoam: 'rgba(210,220,218,0.28)',
    waterShade: 'rgba(20,35,40,0.22)',
    // NYC asphalt
    road: '#2f2f32',
    roadAlt: '#28282b',
    dash: '#d8d2c0',
    yellowLine: '#d4a017',
    curb: '#c4a035'
  };

  function drawSafeBand(row, label) {
    const y = row * TILE;
    ctx.fillStyle = C.safe;
    ctx.fillRect(0, y, W, TILE);
    // Concrete slab seams
    ctx.fillStyle = C.safeLo;
    for (let x = 0; x < W; x += 40) {
      ctx.fillRect(x, y, 1, TILE);
    }
    ctx.fillRect(0, y + TILE / 2, W, 1);
    // Speckle
    ctx.fillStyle = 'rgba(60,55,50,0.12)';
    for (let x = 4; x < W; x += 11) {
      ctx.fillRect(x, y + 6 + (x % 7), 2, 2);
      ctx.fillRect(x + 5, y + 22 + (x % 5), 2, 2);
    }
    // Painted yellow curb edge
    ctx.fillStyle = C.curb;
    ctx.fillRect(0, y, W, 2);
    ctx.fillRect(0, y + TILE - 2, W, 2);
    if (label) {
      ctx.fillStyle = 'rgba(40,38,34,0.55)';
      ctx.font = '700 9px "General Sans", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(label, 8, y + 15);
    }
  }

  function drawRoad(row) {
    const y = row * TILE;
    ctx.fillStyle = (row % 2 === 0) ? C.road : C.roadAlt;
    ctx.fillRect(0, y, W, TILE);
    // Faded white lane dashes
    ctx.fillStyle = C.dash;
    const mid = y + TILE / 2 - 1;
    for (let x = 4; x < W; x += 28) ctx.fillRect(x, mid, 14, 2);
    // Worn yellow edge stripe
    ctx.fillStyle = C.yellowLine;
    ctx.fillRect(0, y + 1, W, 1);
    ctx.fillRect(0, y + TILE - 2, W, 1);
  }

  function drawRiver(row) {
    const y = row * TILE;
    const t = performance.now() / 1000;
    // Depth gradient — colder / darker toward the far bank feel
    const g = ctx.createLinearGradient(0, y, 0, y + TILE);
    if (row % 2 === 0) {
      g.addColorStop(0, '#4a6870');
      g.addColorStop(0.45, '#3f5c66');
      g.addColorStop(1, '#355058');
    } else {
      g.addColorStop(0, '#3a545c');
      g.addColorStop(0.5, '#334a52');
      g.addColorStop(1, '#2c424a');
    }
    ctx.fillStyle = g;
    ctx.fillRect(0, y, W, TILE);

    // Soft vertical shading so the river reads as a continuous body
    ctx.fillStyle = C.waterShade;
    ctx.fillRect(0, y + TILE - 5, W, 5);

    // Rolling wave bands (smooth sine, not arcade blocks)
    ctx.lineWidth = 1.25;
    for (let band = 0; band < 4; band++) {
      const baseY = y + 7 + band * 8;
      const phase = t * (1.1 + band * 0.15) + row * 0.7 + band * 1.3;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 4) {
        const yy = baseY + Math.sin(x * 0.045 + phase) * 2.2
          + Math.sin(x * 0.11 + phase * 1.7) * 0.9;
        if (x === 0) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.strokeStyle = band % 2 === 0
        ? 'rgba(190,210,205,0.22)'
        : 'rgba(30,50,55,0.18)';
      ctx.stroke();
    }

    // Bright foam crests that drift with the current
    ctx.fillStyle = C.waterFoam;
    for (let i = 0; i < 7; i++) {
      const wx = ((t * 28 + i * 67 + row * 40) % (W + 40)) - 20;
      const wy = y + 10 + (i % 3) * 10 + Math.sin(t * 2 + i) * 2;
      ctx.globalAlpha = 0.35 + (i % 3) * 0.1;
      ctx.beginPath();
      ctx.ellipse(wx, wy, 7 + (i % 3), 1.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Faint olive / harbor sheen
    ctx.fillStyle = 'rgba(100,130,90,0.07)';
    ctx.fillRect(0, y + 12 + Math.sin(t + row) * 2, W, 5);
  }

  function drawParkedCar(cx, cy, color, yours) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.fillRect(-14, -8, 28, 16);
    ctx.fillStyle = yours ? '#7ec8e3' : '#4a6a7a';
    ctx.fillRect(-10, -6, 8, 6);
    ctx.fillRect(2, -6, 8, 6);
    ctx.fillStyle = '#111';
    ctx.fillRect(-12, 6, 7, 3);
    ctx.fillRect(5, 6, 7, 3);
    if (yours) {
      ctx.strokeStyle = '#efc84a';
      ctx.lineWidth = 2;
      ctx.strokeRect(-16, -10, 32, 20);
      ctx.fillStyle = '#efc84a';
      ctx.font = '700 7px "General Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('YOURS', 0, -12);
    }
    ctx.restore();
  }

  function drawGarage() {
    const y = 0;
    // Fluorescent concrete deck
    ctx.fillStyle = C.garageBg;
    ctx.fillRect(0, y, W, TILE);
    ctx.fillStyle = 'rgba(255,245,200,0.06)';
    ctx.fillRect(0, y, W, 6);

    for (let c = 0; c < COLS; c++) {
      if (PARK_SLOTS.includes(c)) continue;
      ctx.fillStyle = C.pillar;
      ctx.fillRect(c * TILE + 8, y + 2, TILE - 16, TILE - 4);
      ctx.fillStyle = '#55585e';
      ctx.fillRect(c * TILE + 12, y + 6, TILE - 24, 8);
    }

    PARK_SLOTS.forEach((c) => {
      const x = c * TILE;
      ctx.fillStyle = '#2a2c30';
      ctx.fillRect(x + 2, y + 4, TILE - 4, TILE - 6);
      // Stall paint
      ctx.strokeStyle = 'rgba(230,220,180,0.45)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 4, y + 6, TILE - 8, TILE - 10);

      if (c === CAR_COL) {
        drawParkedCar(x + TILE / 2, y + TILE / 2 + 2, '#1c2430', true);
      } else {
        const colors = ['#6b2e2e', '#2e4570', '#3d5a3a', '#5a4e2e', '#4a4a4e'];
        drawParkedCar(x + TILE / 2, y + TILE / 2 + 2, colors[c % colors.length], false);
      }
    });

    ctx.fillStyle = 'rgba(230,220,180,0.75)';
    ctx.font = '700 9px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('GARAGE  •  YOUR CAR', 6, y + TILE - 4);
  }

  function withFacing(x, y, w, h, dir, drawFn) {
    ctx.save();
    if (dir < 0) {
      ctx.translate(x + w, y);
      ctx.scale(-1, 1);
      drawFn(0, 0, w, h);
    } else {
      ctx.translate(x, y);
      drawFn(0, 0, w, h);
    }
    ctx.restore();
  }

  function drawTaxi(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      // Medallion taxi yellow
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(lx, ly + 6, lw, lh - 6);
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(lx + lw * 0.28, ly + 2, lw * 0.42, lh * 0.5);
      ctx.fillStyle = '#5a8fa8';
      ctx.fillRect(lx + lw * 0.32, ly + 4, lw * 0.16, lh * 0.32);
      ctx.fillRect(lx + lw * 0.52, ly + 4, lw * 0.14, lh * 0.32);
      ctx.fillStyle = '#f5f0d8';
      ctx.fillRect(lx + lw * 0.42, ly, lw * 0.16, 4);
      ctx.fillStyle = '#f0e6a0';
      ctx.fillRect(lx + lw - 4, ly + lh - 10, 3, 4);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(lx + 6, ly + lh - 3, 8, 4);
      ctx.fillRect(lx + lw - 14, ly + lh - 3, 8, 4);
      // TAXI door mark
      ctx.fillStyle = 'rgba(30,30,30,0.35)';
      ctx.fillRect(lx + lw * 0.15, ly + lh * 0.55, lw * 0.2, 3);
    });
  }

  function drawBus(x, y, w, dir) {
    const h = TILE - 10;
    const yy = y + 5;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      ctx.fillStyle = '#f2f2f0';
      ctx.fillRect(lx, ly + 4, lw, lh - 4);
      ctx.fillStyle = '#0039a6';
      ctx.fillRect(lx, ly + lh * 0.42, lw, 7);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(lx, ly + lh - 8, lw, 8);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + lw - 22, ly + 2, 20, 10);
      ctx.fillStyle = '#5eb0d4';
      ctx.fillRect(lx + lw - 12, ly + 14, 9, lh * 0.28);
      ctx.fillStyle = '#7ec8e3';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(lx + 6 + i * ((lw - 30) / 4), ly + 8, 10, lh * 0.28);
      }
      ctx.fillStyle = '#fff6a8';
      ctx.fillRect(lx + lw - 5, ly + lh - 14, 3, 4);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 10, ly + lh - 4, 10, 5);
      ctx.fillRect(lx + lw - 22, ly + lh - 4, 10, 5);
    });
    const front = dir > 0 ? x + w - 12 : x + 12;
    ctx.fillStyle = '#f0c400';
    ctx.font = '700 7px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('M14', front, yy + 10);
  }

  function drawTruck(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      const cabW = lw * 0.32;
      const bedW = lw - cabW;
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(lx, ly + 4, bedW, lh - 4);
      ctx.fillStyle = '#c45c26';
      ctx.fillRect(lx + bedW, ly, cabW, lh);
      ctx.fillStyle = '#7ec8e3';
      ctx.fillRect(lx + bedW + 4, ly + 4, cabW - 8, lh * 0.38);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 8, ly + lh - 3, 9, 4);
      ctx.fillRect(lx + lw - 14, ly + lh - 3, 9, 4);
    });
  }

  function drawBike(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      const rearX = lx + 8;
      const frontX = lx + lw - 8;
      const hubY = ly + lh - 7;
      const r = 6;

      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(lx + lw / 2, ly + lh - 1, lw * 0.38, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wheels
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(rearX, hubY, r, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#6a6a6a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(rearX, hubY, r - 2.5, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, r - 2.5, 0, Math.PI * 2);
      ctx.stroke();
      // Hubs
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(rearX, hubY, 1.5, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Frame — Citi Bike blue / messenger black mix
      const seatX = lx + lw * 0.38;
      const seatY = ly + lh * 0.28;
      const pedalX = lx + lw * 0.42;
      const pedalY = hubY - 1;
      ctx.strokeStyle = '#0b5cab';
      ctx.lineWidth = 2.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      // Rear triangle
      ctx.moveTo(rearX, hubY);
      ctx.lineTo(seatX, seatY);
      ctx.lineTo(pedalX, pedalY);
      ctx.closePath();
      ctx.stroke();
      // Down tube + top tube to head
      const headX = lx + lw * 0.72;
      const headY = ly + lh * 0.32;
      ctx.beginPath();
      ctx.moveTo(seatX, seatY);
      ctx.lineTo(headX, headY);
      ctx.lineTo(frontX, hubY);
      ctx.moveTo(pedalX, pedalY);
      ctx.lineTo(headX, headY);
      ctx.stroke();

      // Handlebars
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 1, headY);
      ctx.lineTo(headX + 5, headY - 4);
      ctx.lineTo(headX + 9, headY - 3);
      ctx.stroke();

      // Seat
      ctx.fillStyle = '#222';
      ctx.fillRect(seatX - 5, seatY - 2, 8, 3);

      // Pedal crank
      const crank = Math.sin(performance.now() / 90) * 4;
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pedalX, pedalY);
      ctx.lineTo(pedalX + 3, pedalY + crank);
      ctx.stroke();

      // Messenger rider
      const hipX = seatX + 1;
      const hipY = seatY - 1;
      // Legs pedaling
      ctx.strokeStyle = '#2a3544';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(pedalX + 2, pedalY + crank);
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(pedalX - 2, pedalY - crank * 0.6);
      ctx.stroke();
      // Torso lean
      ctx.strokeStyle = '#1a3a6a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(headX - 2, headY - 2);
      ctx.stroke();
      // Arms to bars
      ctx.strokeStyle = '#e6b89a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 4, headY + 2);
      ctx.lineTo(headX + 4, headY - 2);
      ctx.stroke();
      // Head + helmet
      ctx.fillStyle = '#e6b89a';
      ctx.beginPath();
      ctx.arc(headX - 1, headY - 7, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f0c400';
      ctx.beginPath();
      ctx.arc(headX - 1, headY - 8, 3.8, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(headX - 5, headY - 8, 8, 2);

      // Messenger bag
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(hipX - 6, hipY - 6, 5, 7);
    });
  }

  function drawFerry(x, y, w, kind, dir) {
    const h = TILE - 14;
    const yy = y + 7;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      if (kind === 'kayak') {
        ctx.fillStyle = '#c45c26';
        ctx.fillRect(lx, ly + 6, lw, lh - 8);
        ctx.fillStyle = '#e8c4a8';
        ctx.fillRect(lx + lw * 0.4, ly + 4, 8, 8);
        return;
      }
      if (kind === 'barge') {
        // Rust / working barge
        ctx.fillStyle = '#5c5348';
        ctx.fillRect(lx, ly + 4, lw, lh - 4);
        ctx.fillStyle = '#7a6a55';
        for (let i = 0; i < 3; i++) ctx.fillRect(lx + 6 + i * (lw / 3), ly + 8, lw / 4, 6);
        ctx.fillStyle = '#8a4030';
        ctx.fillRect(lx + 4, ly + 2, 12, 4);
        return;
      }
      // NYC Ferry — white hull, orange accent
      ctx.fillStyle = '#e8e6e0';
      ctx.fillRect(lx, ly + 8, lw, lh - 8);
      ctx.fillStyle = '#2c5a7a';
      ctx.fillRect(lx + 6, ly, lw - 18, lh * 0.55);
      ctx.fillStyle = '#6a9ab0';
      for (let i = 0; i < 3; i++) ctx.fillRect(lx + 10 + i * 14, ly + 4, 10, lh * 0.28);
      ctx.fillStyle = '#e85d04';
      ctx.fillRect(lx + lw - 14, ly + 2, 10, 5);
    });
  }

  function drawBanker(cx, cy, scale = 1, resting = false) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    const bob = resting ? 0 : Math.sin(performance.now() / 160) * 1;
    ctx.translate(0, bob);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(-10, 12, 20, 4);
    ctx.fillStyle = '#1a1f2a';
    ctx.fillRect(-7, 6, 5, 9);
    ctx.fillRect(2, 6, 5, 9);
    ctx.fillStyle = '#0d0d10';
    ctx.fillRect(-8, 13, 6, 3);
    ctx.fillRect(2, 13, 6, 3);
    ctx.fillStyle = '#1e2430';
    ctx.fillRect(-9, -4, 18, 12);
    ctx.fillStyle = '#f5f0e6';
    ctx.fillRect(-3, -4, 6, 10);
    ctx.fillStyle = '#b01030';
    ctx.fillRect(-1, -3, 2, 8);
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(-14, 0, 6, 8);
    ctx.fillStyle = '#efc84a';
    ctx.fillRect(-13, 2, 4, 1);
    ctx.fillStyle = '#e6b89a';
    ctx.fillRect(-6, -14, 12, 10);
    ctx.fillStyle = '#2a2430';
    ctx.fillRect(-6, -15, 12, 4);
    ctx.fillRect(-6, -12, 3, 4);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.strokeRect(-5, -11, 4, 3);
    ctx.strokeRect(1, -11, 4, 3);
    ctx.fillStyle = '#111';
    ctx.fillRect(-3.5, -10, 1.5, 1.5);
    ctx.fillRect(2.5, -10, 1.5, 1.5);
    ctx.fillStyle = '#1e2430';
    ctx.fillRect(-12, -2, 4, 8);
    ctx.fillRect(8, -2, 4, 8);
    ctx.restore();
  }

  function drawTimer() {
    const y = H - 5;
    const pct = Math.max(0, state.time / state.maxTime);
    ctx.fillStyle = '#2a2c30';
    ctx.fillRect(4, y - 5, W - 8, 5);
    ctx.fillStyle = pct < 0.25 ? '#c0392b' : '#d4a017';
    ctx.fillRect(4, y - 5, (W - 8) * pct, 5);
  }

  function drawCross() {
    ctx.clearRect(0, 0, W, H);

    for (let r = 0; r < ROWS; r++) {
      if (r === ROW.GARAGE) drawGarage();
      else if (r === ROW.BANK) drawSafeBand(r, 'EAST RIVER PIER');
      else if (r >= ROW.RIVER_START && r <= ROW.RIVER_END) drawRiver(r);
      else if (r === ROW.MEDIAN) drawSafeBand(r, 'BROADWAY MEDIAN');
      else if (r >= ROW.ROAD_START && r <= ROW.ROAD_END) drawRoad(r);
      else if (r === ROW.START) drawSafeBand(r, 'CASINO EXIT  •  START');
    }

    for (const lane of state.lanes) {
      const y = lane.row * TILE;
      for (const e of lane.entities) {
        if (lane.row >= ROW.RIVER_START && lane.row <= ROW.RIVER_END) {
          drawFerry(e.x, y, e.w, e.kind, lane.dir);
        } else if (e.kind === 'taxi') drawTaxi(e.x, y, e.w, lane.dir);
        else if (e.kind === 'bus') drawBus(e.x, y, e.w, lane.dir);
        else if (e.kind === 'truck') drawTruck(e.x, y, e.w, lane.dir);
        else if (e.kind === 'bike') drawBike(e.x, y, e.w, lane.dir);
      }
    }

    if (state.mode !== 'gameover' && !(state.mode === 'dead' && state.flash > 0 && Math.floor(state.flash * 20) % 2 === 0)) {
      if (!(state.mode === 'win')) {
        const f = state.frog;
        const alpha = state.invuln > 0 && Math.floor(state.invuln * 16) % 2 === 0 ? 0.4 : 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        drawBanker(f.col * TILE + TILE / 2, f.row * TILE + TILE / 2 + 1, 1, false);
        ctx.restore();
      }
    }

    for (const p of state.particles) {
      ctx.globalAlpha = Math.max(0, p.life * 2);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 3, 3);
    }
    ctx.globalAlpha = 1;

    if (state.mode === 'play' || state.mode === 'pause' || state.mode === 'dead') drawTimer();

    if (state.flash > 0) {
      ctx.fillStyle = `rgba(192,57,43,${state.flash * 0.35})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(20,22,26,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e8dcc0';
      ctx.font = '700 22px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }
  }

  function project(worldX, worldZ, camZ, curve, hill) {
    const relZ = Math.max(1, worldZ - camZ);
    const scale = 260 / (260 + relZ);
    const curveOff = curve * (1 - scale) * 120;
    const x = W / 2 + worldX * 210 * scale + curveOff;
    const y = H * 0.40 + hill * scale + (1 - scale) * 280;
    return { x, y, scale, relZ };
  }

  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, Math.min(255, ((n >> 16) & 255) + amt));
    const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
    const b = Math.max(0, Math.min(255, (n & 255) + amt));
    return `rgb(${r},${g},${b})`;
  }

  function drawLowPolyCar(x, y, scale, kind, opts = {}) {
    const player = !!opts.player;
    const yaw = opts.yaw || 0;
    const pitch = opts.pitch || 0;
    const roll = opts.roll || 0;
    const smashed = !!opts.smashed;
    const w = (kind === 'bus' ? 64 : kind === 'van' ? 56 : 50) * scale;
    const h = (kind === 'bus' ? 40 : 30) * scale;
    const colors = {
      taxi: '#e6b800',
      sedan: '#5a6578',
      bus: '#ecece8',
      sports: '#a01828',
      van: '#3d5a4c',
      player: '#1e2a38'
    };
    const body = smashed ? shade(colors[kind] || '#555', -30) : (colors[kind] || '#555');

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(roll + yaw * 0.35);
    ctx.transform(1, pitch * 0.15, 0, 1 - Math.abs(pitch) * 0.2, 0, 0);

    // Ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, h * 0.42, w * 0.48, h * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Low-poly body: bottom trapezoid + cabin prism
    const lean = yaw * 10 * scale;
    // Side facet (darker)
    ctx.fillStyle = shade(body, -28);
    ctx.beginPath();
    ctx.moveTo(-w * 0.48 + lean, h * 0.15);
    ctx.lineTo(-w * 0.42 + lean, -h * 0.05);
    ctx.lineTo(-w * 0.1 + lean, -h * 0.08);
    ctx.lineTo(-w * 0.12, h * 0.28);
    ctx.closePath();
    ctx.fill();

    // Main body top face
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.moveTo(-w * 0.46, h * 0.22);
    ctx.lineTo(-w * 0.40, -h * 0.02);
    ctx.lineTo(w * 0.42, -h * 0.05);
    ctx.lineTo(w * 0.48, h * 0.18);
    ctx.lineTo(w * 0.38, h * 0.32);
    ctx.lineTo(-w * 0.36, h * 0.34);
    ctx.closePath();
    ctx.fill();

    // Cabin / roof
    const roofH = kind === 'bus' ? h * 0.55 : h * 0.38;
    ctx.fillStyle = shade(body, 18);
    ctx.beginPath();
    ctx.moveTo(-w * 0.28 + lean * 0.3, -h * 0.02);
    ctx.lineTo(-w * 0.18 + lean * 0.3, -roofH);
    ctx.lineTo(w * 0.22 + lean * 0.3, -roofH);
    ctx.lineTo(w * 0.34, -h * 0.02);
    ctx.closePath();
    ctx.fill();

    // Windshield facet
    ctx.fillStyle = player ? '#7ec8e3' : '#5a7a8a';
    ctx.beginPath();
    ctx.moveTo(-w * 0.16, -h * 0.02);
    ctx.lineTo(-w * 0.08, -roofH * 0.85);
    ctx.lineTo(w * 0.12, -roofH * 0.85);
    ctx.lineTo(w * 0.22, -h * 0.02);
    ctx.closePath();
    ctx.fill();

    // Hood highlight
    ctx.fillStyle = shade(body, 30);
    ctx.beginPath();
    ctx.moveTo(w * 0.05, h * 0.02);
    ctx.lineTo(w * 0.38, 0);
    ctx.lineTo(w * 0.42, h * 0.14);
    ctx.lineTo(w * 0.08, h * 0.16);
    ctx.closePath();
    ctx.fill();

    // Wheels
    ctx.fillStyle = '#111';
    ctx.fillRect(-w * 0.32, h * 0.22, w * 0.16, h * 0.16);
    ctx.fillRect(w * 0.14, h * 0.2, w * 0.16, h * 0.16);
    ctx.fillStyle = '#333';
    ctx.fillRect(-w * 0.29, h * 0.26, w * 0.1, h * 0.08);
    ctx.fillRect(w * 0.17, h * 0.24, w * 0.1, h * 0.08);

    if (kind === 'taxi') {
      ctx.fillStyle = '#fff6d0';
      ctx.fillRect(-w * 0.08, -roofH - 3 * scale, w * 0.16, 4 * scale);
    }
    if (kind === 'bus') {
      ctx.fillStyle = '#0039a6';
      ctx.fillRect(-w * 0.42, h * 0.02, w * 0.84, h * 0.1);
    }
    if (player) {
      ctx.strokeStyle = '#efc84a';
      ctx.lineWidth = Math.max(1.5, 2.2 * scale);
      ctx.strokeRect(-w * 0.44, -roofH * 0.2, w * 0.88, h * 0.5);
    }

    // Headlights / taillights
    ctx.fillStyle = '#fff3a8';
    ctx.fillRect(w * 0.4, h * 0.02, w * 0.06, h * 0.08);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(-w * 0.46, h * 0.04, w * 0.05, h * 0.07);

    if (smashed) {
      ctx.strokeStyle = 'rgba(0,0,0,0.45)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-w * 0.2, -h * 0.1);
      ctx.lineTo(w * 0.1, h * 0.15);
      ctx.moveTo(w * 0.15, -h * 0.2);
      ctx.lineTo(-w * 0.05, h * 0.2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawBuilding(b, d) {
    const edge = b.side < 0 ? -1.55 - b.w * 0.3 : 1.55 + b.w * 0.3;
    const p = project(edge, b.z, d.z, d.curve, d.hills);
    if (p.relZ < 30 || p.relZ > 1100 || p.scale < 0.05) return;
    const bw = (40 + b.w * 70) * p.scale;
    const bh = b.h * p.scale * 0.55;
    const x = p.x - (b.side < 0 ? bw : 0);
    const y = p.y - bh;

    // Side facet for low-poly depth
    ctx.fillStyle = shade(b.color, -35);
    ctx.beginPath();
    if (b.side < 0) {
      ctx.moveTo(x + bw, y);
      ctx.lineTo(x + bw + 12 * p.scale, y + 8 * p.scale);
      ctx.lineTo(x + bw + 12 * p.scale, y + bh);
      ctx.lineTo(x + bw, y + bh);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x - 12 * p.scale, y + 8 * p.scale);
      ctx.lineTo(x - 12 * p.scale, y + bh);
      ctx.lineTo(x, y + bh);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = b.color;
    ctx.fillRect(x, y, bw, bh);

    // Storefront band
    ctx.fillStyle = shade(b.color, -20);
    ctx.fillRect(x, y + bh - 18 * p.scale, bw, 18 * p.scale);
    ctx.fillStyle = 'rgba(40,50,60,0.65)';
    ctx.fillRect(x + 4 * p.scale, y + bh - 16 * p.scale, bw - 8 * p.scale, 12 * p.scale);

    // Window grid
    const cols = b.windows;
    const rows = Math.max(2, Math.floor(bh / (14 * p.scale)));
    for (let r = 0; r < rows - 1; r++) {
      for (let c = 0; c < cols; c++) {
        const lit = ((Math.floor(b.z * 0.01) + r + c) % 3) !== 0;
        ctx.fillStyle = lit ? 'rgba(230,200,120,0.35)' : 'rgba(20,25,35,0.45)';
        const wx = x + 5 * p.scale + c * ((bw - 10 * p.scale) / cols);
        const wy = y + 6 * p.scale + r * 12 * p.scale;
        ctx.fillRect(wx, wy, Math.max(2, 6 * p.scale), Math.max(2, 5 * p.scale));
      }
    }
  }

  function drawStreetProp(pr, d) {
    if (pr.kind === 'crosswalk') {
      const pL = project(-0.85, pr.z, d.z, d.curve, d.hills);
      const pR = project(0.85, pr.z, d.z, d.curve, d.hills);
      if (pL.relZ < 40 || pL.relZ > 700) return;
      ctx.fillStyle = 'rgba(230,220,200,0.55)';
      const stripes = 6;
      for (let i = 0; i < stripes; i++) {
        const t0 = i / stripes;
        const t1 = (i + 0.45) / stripes;
        const x0 = pL.x + (pR.x - pL.x) * t0;
        const x1 = pL.x + (pR.x - pL.x) * t1;
        ctx.fillRect(x0, pL.y - 3 * pL.scale, Math.max(2, x1 - x0), Math.max(2, 8 * pL.scale));
      }
      return;
    }
    const xWorld = pr.side * 1.15;
    const p = project(xWorld, pr.z, d.z, d.curve, d.hills);
    if (p.relZ < 40 || p.relZ > 900) return;
    if (pr.kind === 'light') {
      ctx.fillStyle = '#3a3a42';
      ctx.fillRect(p.x - 2 * p.scale, p.y - 70 * p.scale, 4 * p.scale, 70 * p.scale);
      ctx.fillStyle = '#efc84a';
      ctx.beginPath();
      ctx.arc(p.x, p.y - 72 * p.scale, 5 * p.scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(239,200,74,0.12)';
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - 70 * p.scale);
      ctx.lineTo(p.x - 28 * p.scale, p.y);
      ctx.lineTo(p.x + 28 * p.scale, p.y);
      ctx.closePath();
      ctx.fill();
    } else if (pr.kind === 'hydrant') {
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(p.x - 4 * p.scale, p.y - 14 * p.scale, 8 * p.scale, 14 * p.scale);
      ctx.fillRect(p.x - 7 * p.scale, p.y - 10 * p.scale, 14 * p.scale, 4 * p.scale);
    }
  }

  function drawDriveParticles() {
    for (const p of state.particles) {
      const a = Math.max(0, p.life / (p.maxLife || 0.8));
      if (p.type === 'shard') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot || 0);
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        const s = p.size || 6;
        if (p.sides === 4) {
          ctx.moveTo(-s * 0.5, -s * 0.4);
          ctx.lineTo(s * 0.5, -s * 0.3);
          ctx.lineTo(s * 0.35, s * 0.5);
          ctx.lineTo(-s * 0.4, s * 0.35);
        } else {
          ctx.moveTo(0, -s * 0.6);
          ctx.lineTo(s * 0.55, s * 0.45);
          ctx.lineTo(-s * 0.55, s * 0.4);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (p.type === 'spark') {
        ctx.globalAlpha = a;
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 0.02, p.y - p.vy * 0.02);
        ctx.stroke();
      } else if (p.type === 'smoke') {
        ctx.globalAlpha = a * 0.35;
        ctx.fillStyle = '#6a6a72';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size || 10, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawDrive() {
    const d = state.drive;
    ctx.clearRect(0, 0, W, H);

    const shakeX = d.camShake ? (Math.random() - 0.5) * d.camShake : 0;
    const shakeY = d.camShake ? (Math.random() - 0.5) * d.camShake * 0.7 : 0;
    ctx.save();
    ctx.translate(shakeX, shakeY);
    ctx.rotate(d.roll * 0.08);

    // Dusk city sky
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.48);
    sky.addColorStop(0, '#1a2230');
    sky.addColorStop(0.45, '#3a4558');
    sky.addColorStop(1, '#6a7382');
    ctx.fillStyle = sky;
    ctx.fillRect(-20, -20, W + 40, H * 0.52);

    // Distant skyline band
    ctx.fillStyle = '#2a3340';
    for (let i = 0; i < 18; i++) {
      const bx = ((i * 51 + d.z * 0.04) % (W + 60)) - 30;
      const bh = 24 + ((i * 17) % 50);
      ctx.fillRect(bx, H * 0.38 - bh + d.hills * 0.1, 28, bh);
    }

    // Road + sidewalks (far → near)
    const segs = 36;
    for (let i = segs; i >= 0; i--) {
      const z0 = d.z + i * 22;
      const z1 = d.z + (i + 1) * 22;
      const c0 = d.curve * (i / segs);
      const c1 = d.curve * ((i + 1) / segs);
      const curb = 1.05;
      const walk = 1.55;
      const pL = project(-curb, z0, d.z, c0, d.hills);
      const pR = project(curb, z0, d.z, c0, d.hills);
      const qL = project(-curb, z1, d.z, c1, d.hills);
      const qR = project(curb, z1, d.z, c1, d.hills);
      const wL = project(-walk, z0, d.z, c0, d.hills);
      const wR = project(walk, z0, d.z, c0, d.hills);
      const vL = project(-walk, z1, d.z, c1, d.hills);
      const vR = project(walk, z1, d.z, c1, d.hills);

      // Outer sidewalks / building pads
      ctx.fillStyle = i % 2 === 0 ? '#8a857c' : '#7c776e';
      ctx.beginPath();
      ctx.moveTo(0, wL.y);
      ctx.lineTo(wL.x, wL.y);
      ctx.lineTo(vL.x, vL.y);
      ctx.lineTo(0, vL.y);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(W, wR.y);
      ctx.lineTo(wR.x, wR.y);
      ctx.lineTo(vR.x, vR.y);
      ctx.lineTo(W, vR.y);
      ctx.fill();

      // Curb strip
      ctx.fillStyle = '#c4a035';
      ctx.beginPath();
      ctx.moveTo(wL.x, wL.y);
      ctx.lineTo(pL.x, pL.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.lineTo(vL.x, vL.y);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(wR.x, wR.y);
      ctx.lineTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.lineTo(vR.x, vR.y);
      ctx.closePath();
      ctx.fill();

      // Asphalt
      ctx.fillStyle = i % 2 === 0 ? '#323236' : '#2a2a2e';
      ctx.beginPath();
      ctx.moveTo(pL.x, pL.y);
      ctx.lineTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.closePath();
      ctx.fill();

      // Double yellow center
      if (i % 2 === 0) {
        const m0x = (pL.x + pR.x) / 2;
        const m1x = (qL.x + qR.x) / 2;
        ctx.strokeStyle = 'rgba(212,160,23,0.75)';
        ctx.lineWidth = Math.max(1, 2 * pL.scale);
        ctx.beginPath();
        ctx.moveTo(m0x - 3 * pL.scale, pL.y);
        ctx.lineTo(m1x - 3 * pL.scale, qL.y);
        ctx.moveTo(m0x + 3 * pL.scale, pL.y);
        ctx.lineTo(m1x + 3 * pL.scale, qL.y);
        ctx.stroke();
      }

      // Lane dashes
      if (i % 3 === 0) {
        ctx.strokeStyle = 'rgba(220,210,190,0.4)';
        ctx.lineWidth = Math.max(1, 2 * pL.scale);
        for (const lane of [-0.35, 0.35]) {
          const a = project(lane, z0, d.z, c0, d.hills);
          const b = project(lane, z1, d.z, c1, d.hills);
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    // Buildings (far → near)
    const builds = [...d.buildings].sort((a, b) => b.z - a.z);
    for (const b of builds) drawBuilding(b, d);

    // Props
    const props = [...d.props].sort((a, b) => b.z - a.z);
    for (const pr of props) drawStreetProp(pr, d);

    // Traffic
    const cars = [...d.traffic].sort((a, b) => b.z - a.z);
    for (const car of cars) {
      const p = project(car.x, car.z, d.z, d.curve, d.hills);
      if (p.relZ < 18 || p.relZ > 1000 || p.scale < 0.07) continue;
      drawLowPolyCar(p.x, p.y, Math.min(1.5, p.scale * 1.9), car.kind, {
        yaw: car.yaw || 0,
        smashed: car.smashed
      });
    }

    // Player car
    const bob = Math.sin(d.wheelSpin * 2) * (d.speed / 500);
    const px = W / 2 + d.playerX * 155;
    const py = H - 82 + bob + d.pitch * 20;
    const blink = d.invuln > 0 && Math.floor(d.invuln * 14) % 2 === 0;
    if (!blink) {
      drawLowPolyCar(px, py, 1.25, 'player', {
        player: true,
        yaw: d.yaw,
        pitch: d.pitch,
        roll: d.roll + (d.crashT > 0 ? Math.sin(d.crashT * 40) * 0.25 : 0)
      });
    }

    drawDriveParticles();

    ctx.restore();

    // HUD
    ctx.fillStyle = 'rgba(20,22,28,0.8)';
    ctx.fillRect(0, 0, W, 36);
    ctx.fillStyle = '#e8dcc0';
    ctx.font = '700 12px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${state.destination.name.toUpperCase()}`, 10, 22);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#d8d2c0';
    ctx.fillText(`${Math.round(d.speed)} MPH`, W - 10, 22);

    const sp = d.speed / d.maxSpeed;
    ctx.fillStyle = '#2a2c30';
    ctx.fillRect(10, H - 14, W - 20, 6);
    ctx.fillStyle = sp > 0.85 ? '#c0392b' : '#d4a017';
    ctx.fillRect(10, H - 14, (W - 20) * sp, 6);

    // Crash punch vignette
    if (d.crashFlash > 0) {
      ctx.fillStyle = `rgba(192,57,43,${d.crashFlash * 0.5})`;
      ctx.fillRect(0, 0, W, H);
      const g = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, W * 0.7);
      g.addColorStop(0, 'rgba(255,200,80,0.15)');
      g.addColorStop(1, `rgba(0,0,0,${d.crashFlash * 0.55})`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(20,22,26,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e8dcc0';
      ctx.font = '700 22px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }
  }

  function draw() {
    if (state.phase === 'drive' && state.drive) drawDrive();
    else drawCross();
  }

  function frame(ts) {
    if (!state.lastTs) state.lastTs = ts;
    let dt = (ts - state.lastTs) / 1000;
    state.lastTs = ts;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  const keyMap = {
    ArrowUp: 'up', w: 'up', W: 'up',
    ArrowDown: 'down', s: 'down', S: 'down',
    ArrowLeft: 'left', a: 'left', A: 'left',
    ArrowRight: 'right', d: 'right', D: 'right'
  };
  const dirDelta = {
    up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0]
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
      if (state.mode === 'play' || state.mode === 'drive') togglePause();
      else if (state.mode === 'pause') togglePause();
      return;
    }
    const dir = keyMap[e.key];
    if (!dir) return;
    e.preventDefault();
    state.keys[dir] = true;

    if (state.mode === 'title' || state.mode === 'gameover' || state.mode === 'win' || state.mode === 'arrived') {
      startBtn.click();
      return;
    }
    if (state.phase === 'cross') {
      const [dx, dy] = dirDelta[dir];
      tryMove(dx, dy);
    }
  });
  window.addEventListener('keyup', (e) => {
    const dir = keyMap[e.key];
    if (dir) state.keys[dir] = false;
  });

  document.querySelectorAll('[data-dir]').forEach(btn => {
    const down = (e) => {
      e.preventDefault();
      const dir = btn.dataset.dir;
      state.keys[dir] = true;
      if (state.phase === 'cross') {
        const [dx, dy] = dirDelta[dir];
        tryMove(dx, dy);
      }
    };
    const up = () => { state.keys[btn.dataset.dir] = false; };
    btn.addEventListener('pointerdown', down);
    btn.addEventListener('pointerup', up);
    btn.addEventListener('pointerleave', up);
  });

  let touchStart = null;
  canvas.addEventListener('pointerdown', (e) => {
    touchStart = { x: e.clientX, y: e.clientY };
    canvas.setPointerCapture(e.pointerId);
    if (state.phase === 'drive') {
      const rect = canvas.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width;
      state.keys.left = nx < 0.4;
      state.keys.right = nx > 0.6;
      state.keys.up = true;
    }
  });
  canvas.addEventListener('pointermove', (e) => {
    if (state.phase !== 'drive' || !touchStart) return;
    const rect = canvas.getBoundingClientRect();
    const nx = (e.clientX - rect.left) / rect.width;
    state.keys.left = nx < 0.4;
    state.keys.right = nx > 0.6;
    state.keys.up = true;
  });
  canvas.addEventListener('pointerup', (e) => {
    if (state.phase === 'drive') {
      state.keys.left = state.keys.right = state.keys.up = state.keys.down = false;
      touchStart = null;
      return;
    }
    if (!touchStart) return;
    const dx = e.clientX - touchStart.x;
    const dy = e.clientY - touchStart.y;
    touchStart = null;
    if (Math.hypot(dx, dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
    else tryMove(0, dy > 0 ? 1 : -1);
  });

  function togglePause() {
    if (state.mode === 'play' || state.mode === 'drive') {
      state._resumeMode = state.mode;
      state.mode = 'pause';
      pauseBtn.textContent = 'Resume';
      beep(320, 0.06);
    } else if (state.mode === 'pause') {
      state.mode = state._resumeMode || (state.phase === 'drive' ? 'drive' : 'play');
      pauseBtn.textContent = 'Pause';
      beep(480, 0.06);
    }
  }

  pauseBtn.addEventListener('click', togglePause);
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    muteBtn.setAttribute('aria-pressed', String(state.muted));
    muteBtn.textContent = state.muted ? 'Muted' : 'Sound';
  });

  startBtn.addEventListener('click', () => {
    ensureAudio();
    if (state.mode === 'win') {
      beginDrive();
      return;
    }
    if (state.mode === 'arrived') {
      if (state.destination.href) {
        window.location.href = state.destination.href;
        return;
      }
      state.level += 1;
      state.mode = 'play';
      startCrossingLevel(state.level);
      overlay.hidden = true;
      pauseBtn.disabled = false;
      pauseBtn.textContent = 'Pause';
      return;
    }
    startGame();
  });

  function fitCanvas() {
    const wrap = document.getElementById('canvasWrap');
    const aw = wrap.clientWidth - 8;
    const ah = wrap.clientHeight - 8;
    const scale = Math.min(aw / W, ah / H);
    canvas.style.width = Math.floor(W * scale) + 'px';
    canvas.style.height = Math.floor(H * scale) + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  state.lanes = buildLanes(1);
  setPhaseUI();
  updateHUD();
  if (state.high > 0) {
    overlayText.textContent =
      `Leave the tables, cross Midtown to your car, then drive to the next stop. Best: ${state.high}`;
  }
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
