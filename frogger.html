<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Return to Your Car</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=zodiak@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #0d1512; --color-surface: #13211b; --color-surface-2: #173027;
      --color-border: #2c473c; --color-text: #f5edd8; --color-text-muted: #bdb39b;
      --color-text-faint: #897f6d; --color-primary: #d0a23a;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 2px 4px rgba(0,0,0,.28); --shadow-md: 0 12px 30px rgba(0,0,0,.34);
      --font-display: 'Zodiak', Georgia, serif;
      --font-body: 'General Sans', 'Inter', sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
      background:
        radial-gradient(ellipse 90% 50% at 50% -10%, rgba(208,162,58,.12), transparent 45%),
        radial-gradient(circle at 80% 20%, rgba(90,140,180,.06), transparent 30%),
        linear-gradient(180deg, #0d1512, #07100d 60%);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    button { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .app {
      max-width: 720px;
      height: 100dvh;
      margin: 0 auto;
      padding: var(--space-2);
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: var(--space-2);
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus {
      left: var(--space-4); top: var(--space-4);
      background: var(--color-surface); padding: var(--space-3);
      z-index: 20; border-radius: var(--radius-md);
    }
    .panel {
      background: linear-gradient(180deg, rgba(23,48,39,.92), rgba(15,27,23,.96));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .panel-inner {
      padding: var(--space-3);
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .brand h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: .02em;
      color: #f7ead0;
      line-height: 1.1;
    }
    .brand p {
      margin: 0;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .stats {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .stat {
      min-width: 64px;
      padding: 6px 10px;
      border-radius: 3px;
      background: linear-gradient(180deg, rgba(20,53,40,.78), rgba(12,26,21,.92));
      border: 1px solid rgba(238,194,97,.18);
      text-align: center;
    }
    .stat .label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--color-text-faint);
    }
    .stat .value {
      display: block;
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.2;
    }
    .canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #1a1c20;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 0 3px rgba(70,74,82,.4);
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: rgba(7,16,13,.72);
      backdrop-filter: blur(4px);
      z-index: 2;
      transition: opacity var(--transition);
    }
    .overlay[hidden] { display: none; }
    .overlay-card {
      width: min(100%, 340px);
      text-align: center;
      padding: var(--space-6) var(--space-5);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(23,48,39,.96), rgba(12,26,21,.98));
      border: 1px solid rgba(238,194,97,.28);
      box-shadow: var(--shadow-md), 0 0 40px rgba(208,162,58,.08);
    }
    .overlay-card h2 {
      margin: 0 0 var(--space-2);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: #f7ead0;
    }
    .overlay-card p {
      margin: 0 0 var(--space-5);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }
    .controls {
      display: grid;
      gap: var(--space-2);
      flex-shrink: 0;
      padding: var(--space-2);
      background: linear-gradient(180deg, rgba(20,53,40,.78), rgba(12,26,21,.92));
      border: 1px solid rgba(238,194,97,.18);
      border-radius: 4px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 4px 14px rgba(0,0,0,.22);
    }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      justify-content: center;
    }
    .controls .btn {
      min-height: 52px;
      min-width: 72px;
      padding: var(--space-2) var(--space-4);
      border-radius: 3px;
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #f7ead0;
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
      border: 1px solid rgba(255,238,198,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.18), 0 2px 5px rgba(0,0,0,.24);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .controls .btn.primary {
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03)), linear-gradient(180deg, #d44a45, #8f2420);
      color: #fff6e3;
      border-color: rgba(255,210,200,.28);
    }
    .controls .btn.subtle {
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
    }
    .controls .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(239,187,73,.42);
    }
    .controls .btn:active { transform: translateY(0); }
    .controls .btn.dir {
      width: 56px;
      min-width: 56px;
      height: 52px;
      padding: 0;
      font-size: 1.25rem;
      line-height: 1;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(2, 52px);
      gap: var(--space-2);
      justify-content: center;
    }
    .dpad .up { grid-column: 2; grid-row: 1; }
    .dpad .left { grid-column: 1; grid-row: 2; }
    .dpad .down { grid-column: 2; grid-row: 2; }
    .dpad .right { grid-column: 3; grid-row: 2; }
    .dpad.drive-mode .up,
    .dpad.drive-mode .down { opacity: 0.35; pointer-events: none; }
    .hint {
      margin: 0;
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      letter-spacing: .04em;
    }
    .lives-pips {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 2px;
    }
    .lives-pips span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(208,162,58,.25);
      border: 1px solid rgba(208,162,58,.35);
    }
    .lives-pips span.on {
      background: var(--color-primary);
      box-shadow: 0 0 6px rgba(208,162,58,.45);
    }
    @media (max-width: 520px) {
      .app { padding: var(--space-1); gap: var(--space-1); }
      .panel-inner { padding: var(--space-2); }
      .brand h1 { font-size: var(--text-base); }
      .stat { min-width: 56px; padding: 4px 8px; }
      .controls .btn { min-height: 48px; }
      .controls .btn.dir { width: 52px; min-width: 52px; height: 48px; }
      .dpad {
        grid-template-columns: repeat(3, 52px);
        grid-template-rows: repeat(2, 48px);
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="app">
    <main id="main" class="panel">
      <div class="panel-inner">
        <div class="topbar">
          <div class="brand">
            <h1 id="brandTitle">Return to Your Car</h1>
            <p id="brandSub">Cross the city · get to the garage</p>
          </div>
          <div class="stats" aria-live="polite">
            <div class="stat">
              <span class="label">Score</span>
              <span class="value" id="scoreVal">0</span>
            </div>
            <div class="stat">
              <span class="label" id="meterLabel">Level</span>
              <span class="value" id="levelVal">1</span>
            </div>
            <div class="stat">
              <span class="label" id="livesLabel">Lives</span>
              <span class="value" id="livesVal">3</span>
              <div class="lives-pips" id="livesPips" aria-hidden="true"></div>
            </div>
          </div>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="game" width="480" height="600" aria-label="Return to your car"></canvas>
          <div class="overlay" id="overlay">
            <div class="overlay-card">
              <h2 id="overlayTitle">Return to your car</h2>
              <p id="overlayText">Leave the tables, cross Midtown, and reach your parked car. Then drive to the next stop. Arrow keys, WASD, or swipe.</p>
              <div class="control-row">
                <button class="btn primary" id="startBtn" type="button">Leave the Tables</button>
              </div>
            </div>
          </div>
        </div>

        <div class="controls" aria-label="Game controls">
          <div class="control-row">
            <button class="btn subtle" id="pauseBtn" type="button" disabled>Pause</button>
            <button class="btn subtle" id="muteBtn" type="button" aria-pressed="false">Sound</button>
            <a class="btn subtle" href="burger.html">Grill</a>
            <a class="btn subtle" href="index.html">Tables</a>
          </div>
          <div class="dpad" id="dpad" aria-label="Direction pad">
            <button class="btn dir up" type="button" data-dir="up" aria-label="Move up">▲</button>
            <button class="btn dir left" type="button" data-dir="left" aria-label="Move left">◀</button>
            <button class="btn dir down" type="button" data-dir="down" aria-label="Move down">▼</button>
            <button class="btn dir right" type="button" data-dir="right" aria-label="Move right">▶</button>
          </div>
          <p class="hint" id="hintText">Arrows / WASD · swipe · cross Midtown to your car</p>
        </div>
      </div>
    </main>
  </div>

  <script>
(() => {
  const COLS = 12;
  const ROWS = 14;
  const TILE = 40;
  const W = COLS * TILE;
  const H = ROWS * TILE;

  const DESTINATIONS = [
    { id: 'tables', name: 'The Tables', href: 'index.html', blurb: 'Back to the casino floor.' },
    { id: 'grill', name: 'Night Shift Grill', href: 'burger.html', blurb: 'Late-night burgers on the line.' },
    { id: 'soho', name: 'SoHo Lounge', href: 'index.html', blurb: 'A quieter room uptown.' },
    { id: 'pier', name: 'East River Club', href: 'index.html', blurb: 'Private tables by the water.' }
  ];

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const scoreVal = document.getElementById('scoreVal');
  const levelVal = document.getElementById('levelVal');
  const livesVal = document.getElementById('livesVal');
  const livesPips = document.getElementById('livesPips');
  const brandTitle = document.getElementById('brandTitle');
  const brandSub = document.getElementById('brandSub');
  const meterLabel = document.getElementById('meterLabel');
  const livesLabel = document.getElementById('livesLabel');
  const hintText = document.getElementById('hintText');
  const dpad = document.getElementById('dpad');

  // Midtown crossing (full board)
  const ROW = {
    GARAGE: 0,
    BANK: 1,
    RIVER_START: 2,
    RIVER_END: 6,
    MEDIAN: 7,
    ROAD_START: 8,
    ROAD_END: 12,
    START: 13
  };

  // Grill leave: short ghetto block — buildings, car, 4 lanes, grill exit
  const GRILL = {
    BUILD_TOP_END: 2,
    GOAL: 3,
    ROAD_START: 4,
    ROAD_END: 7,
    START: 8,
    BUILD_BOT_START: 9,
    CAR_COL: 5
  };

  const params = new URLSearchParams(location.search);
  const SCENARIO = params.get('from') === 'grill' ? 'grill' : 'midtown';

  // Your car sits in one bay; other bays are pillars / strangers' cars
  const CAR_COL = 5;
  const PARK_SLOTS = [1, 3, 5, 7, 9];

  const JANKY_KINDS = ['beater', 'hooptie', 'van', 'lowrider', 'junker', 'rice'];

  const state = {
    scenario: SCENARIO,
    phase: 'cross', // cross | drive
    mode: 'title', // title | play | pause | dead | win | gameover | drive | arrived
    score: 0,
    high: Number(localStorage.getItem(SCENARIO === 'grill' ? 'grillLeaveHigh' : 'returnToCarHigh') || 0),
    level: 1,
    lives: 3,
    frog: { col: 5.5, row: SCENARIO === 'grill' ? GRILL.START : ROW.START, onFerry: null },
    lanes: [],
    time: 45,
    maxTime: 45,
    hopCooldown: 0,
    invuln: 0,
    flash: 0,
    particles: [],
    muted: false,
    lastTs: 0,
    reachedRows: new Set([SCENARIO === 'grill' ? GRILL.START : ROW.START]),
    destination: DESTINATIONS[0],
    drive: null,
    keys: { left: false, right: false, up: false, down: false }
  };

  function isGrill() { return state.scenario === 'grill'; }
  function startRow() { return isGrill() ? GRILL.START : ROW.START; }
  function goalRow() { return isGrill() ? GRILL.GOAL : ROW.GARAGE; }
  function highKey() { return isGrill() ? 'grillLeaveHigh' : 'returnToCarHigh'; }

  let audioCtx = null;
  function ensureAudio() {
    if (state.muted) return null;
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep(freq, dur, type = 'square', vol = 0.04) {
    const ac = ensureAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g);
    g.connect(ac.destination);
    const t = ac.currentTime;
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur);
  }

  function pickDestination(level) {
    // After leaving the grill, don't route straight back to burgers
    if (isGrill()) {
      const exits = DESTINATIONS.filter(d => d.id !== 'grill');
      return exits[(level - 1) % exits.length];
    }
    return DESTINATIONS[(level - 1) % DESTINATIONS.length];
  }

  function setPhaseUI() {
    if (state.phase === 'drive') {
      brandTitle.textContent = 'Night Drive';
      brandSub.textContent = `Chase cam · ${state.destination.name}`;
      meterLabel.textContent = 'Mi';
      livesLabel.textContent = 'HP';
      hintText.textContent = 'Steer · gas · smash sends them flying · watch HP & cash';
      dpad.classList.add('drive-mode');
    } else if (isGrill()) {
      brandTitle.textContent = 'Leave the Grill';
      brandSub.textContent = 'Bad block · four lanes · get to your car';
      meterLabel.textContent = 'Level';
      livesLabel.textContent = 'Lives';
      hintText.textContent = 'Arrows / WASD · dash across · hoopty is across the street';
      dpad.classList.remove('drive-mode');
    } else {
      brandTitle.textContent = 'Return to Your Car';
      brandSub.textContent = 'Cross the city · get to the garage';
      meterLabel.textContent = 'Level';
      livesLabel.textContent = 'Lives';
      hintText.textContent = 'Arrows / WASD · swipe · cross Midtown to your car';
      dpad.classList.remove('drive-mode');
    }
  }

  function makeJankyCar(dir, level) {
    const kind = JANKY_KINDS[Math.floor(Math.random() * JANKY_KINDS.length)];
    const lenMap = { beater: 1.15, hooptie: 1.05, van: 1.7, lowrider: 1.25, junker: 1.35, rice: 0.95 };
    const colors = ['#6b4a2a', '#4a5540', '#5a2e3a', '#3a3a42', '#7a5a20', '#2e4a3a', '#5a4030', '#4a3048', '#707060'];
    const w = (lenMap[kind] || 1.1) * TILE * (0.85 + Math.random() * 0.45);
    const speed = (2.8 + Math.random() * 2.8 + level * 0.35) * (Math.random() < 0.15 ? 1.6 : 1);
    return {
      x: dir > 0 ? -w - 10 - Math.random() * 40 : W + 10 + Math.random() * 40,
      w,
      kind,
      color: colors[Math.floor(Math.random() * colors.length)],
      accent: Math.random() < 0.4 ? '#c45c26' : '#2a2a2a',
      lean: (Math.random() - 0.5) * 0.12,
      missingBumper: Math.random() < 0.35,
      primer: Math.random() < 0.45,
      bustedLight: Math.random() < 0.3,
      speed,
      bob: Math.random() * Math.PI * 2
    };
  }

  function buildGhettoLanes(level) {
    const dirs = [-1, 1, -1, 1];
    const lanes = [];
    for (let i = 0; i < 4; i++) {
      const row = GRILL.ROAD_START + i;
      const dir = dirs[i];
      lanes.push({
        row,
        dir,
        ghetto: true,
        entities: [],
        spawnTimer: 0.2 + Math.random() * 0.9,
        baseSpeed: 1 // unused; per-car speed
      });
      // One scare car already in the lane so it isn't empty at start
      if (Math.random() < 0.7) {
        const car = makeJankyCar(dir, level);
        car.x = Math.random() * W;
        lanes[i].entities.push(car);
      }
    }
    return lanes;
  }

  function buildLanes(level) {
    if (isGrill()) return buildGhettoLanes(level);
    const speed = 1 + (level - 1) * 0.18;
    const lanes = [];
    const riverSpecs = [
      { row: 2, dir: 1, speed: 1.1 * speed, gap: 220, len: 2.4, kind: 'ferry' },
      { row: 3, dir: -1, speed: 1.35 * speed, gap: 200, len: 1.8, kind: 'barge' },
      { row: 4, dir: 1, speed: 0.95 * speed, gap: 240, len: 2.8, kind: 'ferry' },
      { row: 5, dir: -1, speed: 1.5 * speed, gap: 180, len: 1.6, kind: 'kayak' },
      { row: 6, dir: 1, speed: 1.2 * speed, gap: 210, len: 2.2, kind: 'barge' }
    ];
    const roadSpecs = [
      { row: 8, dir: -1, speed: 1.6 * speed, gap: 170, len: 1.1, kind: 'taxi' },
      { row: 9, dir: 1, speed: 1.2 * speed, gap: 200, len: 1.8, kind: 'bus' },
      { row: 10, dir: -1, speed: 2.0 * speed, gap: 150, len: 0.9, kind: 'bike' },
      { row: 11, dir: 1, speed: 1.4 * speed, gap: 185, len: 1.2, kind: 'taxi' },
      { row: 12, dir: -1, speed: 1.1 * speed, gap: 220, len: 2.0, kind: 'truck' }
    ];
    for (const spec of [...riverSpecs, ...roadSpecs]) {
      const entities = [];
      const lenPx = spec.len * TILE;
      const count = Math.ceil((W + spec.gap) / spec.gap) + 1;
      for (let i = 0; i < count; i++) {
        entities.push({
          x: i * spec.gap + (spec.dir > 0 ? -lenPx : W),
          w: lenPx,
          kind: spec.kind
        });
      }
      lanes.push({ ...spec, entities, lenPx });
    }
    return lanes;
  }

  function resetFrog() {
    state.frog = { col: 5.5, row: startRow(), onFerry: null };
    state.time = state.maxTime;
    state.hopCooldown = 0;
    state.invuln = 0.6;
    state.reachedRows = new Set([startRow()]);
  }

  function startCrossingLevel(level) {
    state.phase = 'cross';
    state.level = level;
    state.destination = isGrill()
      ? DESTINATIONS.find(d => d.id === 'grill') || DESTINATIONS[1]
      : pickDestination(level);
    state.maxTime = isGrill()
      ? Math.max(18, 32 - (level - 1) * 2)
      : Math.max(28, 45 - (level - 1) * 2);
    state.lanes = buildLanes(level);
    resetFrog();
    setPhaseUI();
    updateHUD();
  }

  function startGame() {
    state.score = 0;
    state.lives = 3;
    state.mode = 'play';
    startCrossingLevel(1);
    overlay.hidden = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';
    beep(440, 0.08);
    beep(660, 0.1);
  }

  // Shared drive world scale — physics + render stay in the same units
  const DW = {
    ROAD: 1.0,       // asphalt half-width (lane X)
    CURB: 1.14,      // concrete curb outer
    WALK: 1.62,      // sidewalk outer
    BUILD: 1.78,     // building face on lot line
    LANE: 0.42,      // lane center offsets
    MPH_Z: 11,       // world-Z units per mph per second
    CAR_LEN: 28,     // collision length in Z
    CAR_HALF_W: 0.2
  };

  function beginDrive() {
    state.phase = 'drive';
    state.mode = 'drive';
    state.invuln = 0;
    state.flash = 0;
    state.particles = [];
    state.destination = pickDestination(state.level);
    // Trip length in world-Z (~city blocks)
    const trip = 3200 + state.level * 400;
    state.drive = {
      z: 0,
      goal: trip,
      // speed is MPH — cohesive with HUD and traffic
      speed: 28,
      maxSpeed: 72 + state.level * 4,
      accel: 0,
      playerX: 0,
      velX: 0,
      steer: 0,
      yaw: 0,
      yawVel: 0,
      pitch: 0,
      roll: 0,
      susp: 0,
      suspVel: 0,
      curve: 0,
      targetCurve: 0,
      curveTimer: 1.5,
      hills: 0,
      traffic: [],
      props: [],
      buildings: [],
      nextPropZ: 40,
      nextBuildZ: 20,
      spawnTimer: 0.35,
      invuln: 1.4,
      rpmPulse: 0,
      crashFlash: 0,
      camShake: 0,
      crashT: 0,
      skid: 0,
      wheelSpin: 0,
      camX: 0,
      camY: 42,
      camBack: 118,
      surface: 'asphalt',
      rumble: 0,
      hp: 100,
      maxHp: 100
    };
    seedCityBlocks(state.drive, 0, 1600);
    // Seed a few cars already in frame so the street feels alive
    for (let i = 0; i < 4; i++) spawnTraffic(state.drive, 180 + i * 160);
    setPhaseUI();
    overlay.hidden = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';
    updateHUD();
    beep(392, 0.08);
    beep(523, 0.1);
    beep(784, 0.14);
  }

  function seedCityBlocks(d, fromZ, toZ) {
    // Crappy midtown on a regular lot grid — buildings sit on the sidewalk lot line
    const facades = ['#4a3f38', '#3d4248', '#5a5048', '#2f353c', '#5c4a3a', '#3a4038', '#6a5a4a'];
    const lot = 56;
    for (let z = Math.ceil(fromZ / lot) * lot; z < toZ; z += lot) {
      const depth = 0.7 + (Math.abs(Math.sin(z * 0.02)) * 0.45);
      for (const side of [-1, 1]) {
        d.buildings.push({
          z: z + (side < 0 ? 0 : lot * 0.35),
          side,
          h: 100 + (Math.abs(Math.cos(z * 0.011 + side)) * 160),
          w: depth,
          color: facades[Math.abs(Math.floor(z / lot) + side) % facades.length],
          windows: 2 + (Math.abs(Math.floor(z / 30)) % 3),
          lean: Math.sin(z * 0.01) * 0.025,
          boarded: ((z / lot) | 0) % 5 === 0,
          graffiti: ((z / lot) | 0) % 3 !== 0
        });
      }
      // Street furniture locked to curb line
      if (((z / lot) | 0) % 2 === 0) {
        d.props.push({ z: z + 10, side: -1, kind: 'light' });
        d.props.push({ z: z + 10, side: 1, kind: 'light' });
      }
      if (((z / lot) | 0) % 3 === 0) {
        d.props.push({ z: z + 28, side: Math.sin(z) > 0 ? -1 : 1, kind: 'dumpster' });
      }
      if (((z / lot) | 0) % 4 === 0) {
        d.props.push({ z: z + 40, side: Math.cos(z) > 0 ? 1 : -1, kind: 'hydrant' });
      }
      if (((z / lot) | 0) % 5 === 0) {
        d.props.push({ z: z + lot * 0.5, side: 0, kind: 'crosswalk' });
      }
      if (((z / lot) | 0) % 2 === 1) {
        d.props.push({ z: z + 22, side: 0, kind: 'pothole', x: Math.sin(z * 0.2) * DW.LANE });
      }
    }
    d.nextBuildZ = toZ;
    d.nextPropZ = toZ;
  }

  function updateHUD() {
    scoreVal.textContent = state.phase === 'drive' ? `$${state.score}` : String(state.score);
    if (state.phase === 'drive' && state.drive) {
      const left = Math.max(0, state.drive.goal - state.drive.z);
      levelVal.textContent = (left / (DW.MPH_Z * 55)).toFixed(1);
      livesVal.textContent = String(Math.max(0, Math.ceil(state.drive.hp)));
      livesPips.innerHTML = '';
      const pips = 5;
      const filled = Math.ceil((state.drive.hp / state.drive.maxHp) * pips);
      for (let i = 0; i < pips; i++) {
        const s = document.createElement('span');
        if (i < filled) s.classList.add('on');
        livesPips.appendChild(s);
      }
    } else {
      livesVal.textContent = String(state.lives);
      levelVal.textContent = String(state.level);
      livesPips.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        if (i < state.lives) s.classList.add('on');
        livesPips.appendChild(s);
      }
    }
  }

  function showOverlay(title, text, btnLabel) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btnLabel;
    overlay.hidden = false;
  }

  function loseLife(reason) {
    if (state.mode !== 'play' && state.mode !== 'drive') return;
    if (state.phase === 'cross' && state.invuln > 0) return;
    if (state.phase === 'drive' && state.drive && state.drive.invuln > 0) return;

    state.lives -= 1;
    state.flash = 0.35;
    if (state.phase === 'cross') {
      spawnSplash(state.frog.col * TILE, state.frog.row * TILE + TILE / 2);
    } else if (state.drive) {
      // crash FX already spawned by triggerDriveCrash
      state.drive.crashFlash = 0.55;
      state.drive.invuln = 1.6;
    }
    beep(90, 0.12, 'sawtooth', 0.06);
    beep(60, 0.22, 'square', 0.05);
    updateHUD();

    if (state.lives <= 0) {
      state.mode = 'gameover';
      if (state.score > state.high) {
        state.high = state.score;
        localStorage.setItem(highKey(), String(state.high));
      }
      showOverlay(
        state.phase === 'drive' ? 'Wrecked' : (isGrill() ? 'Never left the block' : 'Never made it to the car'),
        `${reason} Final score ${state.score}. Best ${state.high}.`,
        'Try Again'
      );
      pauseBtn.disabled = true;
      return;
    }

    if (state.phase === 'cross') {
      state.mode = 'dead';
      setTimeout(() => {
        if (state.mode === 'dead') {
          resetFrog();
          state.mode = 'play';
        }
      }, 700);
    } else if (state.phase === 'drive' && state.drive && state.lives > 0) {
      // Survived the wreck — limp on with patched HP
      state.drive.hp = Math.max(35, Math.floor(state.drive.maxHp * 0.45));
      state.drive.invuln = 2.2;
      state.drive.speed = Math.min(state.drive.speed, 22);
      updateHUD();
    }
  }

  function reachCar() {
    const bonus = 120 + Math.floor(state.time * 2) + state.level * 20;
    state.score += bonus;
    updateHUD();
    state.mode = 'win';
    beep(523, 0.08);
    beep(659, 0.1);
    beep(784, 0.16);
    // Grill leave and midtown both continue into a night drive
    state.destination = pickDestination(state.level);
    showOverlay(
      isGrill() ? 'Keys in the hoopty' : 'Keys in the ignition',
      isGrill()
        ? `You crossed the block. Score ${state.score}. Next: drive to ${state.destination.name}.`
        : `You made it to your car. Score ${state.score}. Next: drive to ${state.destination.name}.`,
      'Hit the Gas'
    );
    pauseBtn.disabled = true;
  }

  function arriveDestination() {
    state.score += 250 + state.level * 40;
    updateHUD();
    state.mode = 'arrived';
    if (state.score > state.high) {
      state.high = state.score;
      localStorage.setItem(highKey(), String(state.high));
    }
    beep(523, 0.08);
    beep(784, 0.12);
    beep(1046, 0.18);
    showOverlay(
      `Arrived · ${state.destination.name}`,
      `${state.destination.blurb} Score ${state.score}. Keep the night going, or park it here.`,
      'Enter'
    );
    pauseBtn.disabled = true;
  }

  function tryMove(dx, dy) {
    if (state.phase !== 'cross' || state.mode !== 'play' || state.hopCooldown > 0) return;
    const f = state.frog;
    const nc = f.col + dx;
    const nr = f.row + dy;
    if (nc < 0 || nc > COLS - 1 || nr < 0 || nr > ROWS - 1) return;

    if (isGrill()) {
      // Can't walk into building rows
      if (nr < GRILL.GOAL || nr > GRILL.START) return;
      if (nr === GRILL.GOAL) {
        if (Math.abs(nc - GRILL.CAR_COL) < 0.75) {
          f.col = GRILL.CAR_COL;
          f.row = nr;
          f.onFerry = null;
          reachCar();
          return;
        }
        // Standing on the far curb is fine; only the car tile ends it
      }
    } else if (nr === ROW.GARAGE) {
      const slot = PARK_SLOTS.find(c => Math.abs(nc - c) < 0.6);
      if (slot === CAR_COL) {
        f.col = CAR_COL;
        f.row = nr;
        f.onFerry = null;
        reachCar();
        return;
      }
      loseLife(slot != null ? 'Wrong car — alarms everywhere.' : 'Slammed into a garage pillar.');
      return;
    }

    f.col = Math.max(0, Math.min(COLS - 1, nc));
    f.row = nr;
    f.onFerry = null;
    state.hopCooldown = 0.12;
    beep(280 + (ROWS - nr) * 18, 0.05, 'triangle', 0.03);

    if (!state.reachedRows.has(nr) && nr < startRow()) {
      state.reachedRows.add(nr);
      state.score += 10;
      updateHUD();
    }
  }

  function spawnSplash(x, y) {
    for (let i = 0; i < 10; i++) {
      state.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 80,
        vy: (Math.random() - 0.5) * 80 - 20,
        life: 0.4 + Math.random() * 0.3,
        color: Math.random() > 0.5 ? '#efbb49' : '#71d189'
      });
    }
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function updateGhettoLanes(dt, ambush) {
    const speedMul = ambush ? 1 : 0.35;
    for (const lane of state.lanes) {
      if (!lane.ghetto) continue;
      for (const e of lane.entities) {
        const spd = (e.speed || 3) * 40 * dt * speedMul;
        e.x += lane.dir * spd;
        e.bob = (e.bob || 0) + dt * 10;
      }
      lane.entities = lane.entities.filter(e =>
        lane.dir > 0 ? e.x < W + 60 : e.x + e.w > -60
      );

      if (!ambush) continue;
      lane.spawnTimer -= dt;
      if (lane.spawnTimer <= 0) {
        // Sudden spawn — sometimes nothing, sometimes a pack
        const roll = Math.random();
        if (roll > 0.22) {
          const n = roll > 0.92 ? 2 : 1;
          for (let k = 0; k < n; k++) {
            const car = makeJankyCar(lane.dir, state.level);
            if (k > 0) car.x += lane.dir * -(car.w + 18 + Math.random() * 30);
            // Don't stack on an existing car near the spawn edge
            const edge = lane.dir > 0 ? -80 : W + 20;
            const blocked = lane.entities.some(e => Math.abs(e.x - edge) < 70);
            if (!blocked) lane.entities.push(car);
          }
        }
        lane.spawnTimer = 0.15 + Math.random() * (1.1 - Math.min(0.5, state.level * 0.08));
      }
    }
  }

  // --- Crossing update ---
  function updateCross(dt) {
    if (state.mode !== 'play') {
      if (state.mode === 'title' || state.mode === 'pause' || state.mode === 'gameover' || state.mode === 'win' || state.mode === 'arrived') {
        if (isGrill()) {
          updateGhettoLanes(dt, false);
        } else {
          for (const lane of state.lanes) {
            for (const e of lane.entities) {
              e.x += lane.dir * lane.speed * 40 * dt * 0.35;
              if (lane.dir > 0 && e.x > W + 20) e.x -= lane.gap * Math.ceil((W + lane.gap) / lane.gap);
              if (lane.dir < 0 && e.x + e.w < -20) e.x += lane.gap * Math.ceil((W + lane.gap) / lane.gap);
            }
          }
        }
      }
      updateParticles(dt);
      return;
    }

    state.time -= dt;
    if (state.hopCooldown > 0) state.hopCooldown -= dt;
    if (state.invuln > 0) state.invuln -= dt;
    if (state.flash > 0) state.flash -= dt;
    if (state.time <= 0) {
      loseLife(isGrill() ? 'Shift over — you froze up on the curb.' : 'The garage closed — time ran out.');
      return;
    }

    const f = state.frog;
    const frogPad = 6;
    const fx = f.col * TILE + frogPad;
    const fy = f.row * TILE + frogPad;
    const fw = TILE - frogPad * 2;
    const fh = TILE - frogPad * 2;

    if (isGrill()) {
      updateGhettoLanes(dt, true);
      for (const lane of state.lanes) {
        if (f.row !== lane.row) continue;
        for (const e of lane.entities) {
          const ey = lane.row * TILE + 4;
          const eh = TILE - 8;
          if (rectsOverlap(fx, fy, fw, fh, e.x, ey, e.w, eh)) {
            const hits = [
              'Didn\'t even see it coming.',
              'Nailed by a hoopty.',
              'That van came out of nowhere.',
              'Janky brakes. Yours, not theirs.',
              'Street don\'t care you smell like grease.'
            ];
            loseLife(hits[Math.floor(Math.random() * hits.length)]);
            return;
          }
        }
      }
      updateParticles(dt);
      return;
    }

    let riding = null;
    for (const lane of state.lanes) {
      for (const e of lane.entities) {
        e.x += lane.dir * lane.speed * 40 * dt;
        if (lane.dir > 0 && e.x > W + 40) e.x = -e.w - (lane.gap - e.w) * Math.random() * 0.2;
        if (lane.dir < 0 && e.x + e.w < -40) e.x = W + (lane.gap - e.w) * Math.random() * 0.2;
      }

      if (f.row === lane.row) {
        for (const e of lane.entities) {
          const ey = lane.row * TILE + 4;
          const eh = TILE - 8;
          if (rectsOverlap(fx, fy, fw, fh, e.x, ey, e.w, eh)) {
            if (lane.row >= ROW.RIVER_START && lane.row <= ROW.RIVER_END) {
              riding = { lane, e };
            } else if (lane.row >= ROW.ROAD_START && lane.row <= ROW.ROAD_END) {
              loseLife(e.kind === 'bus' ? 'Hit by an MTA bus.' : e.kind === 'truck' ? 'Flattened by a truck.' : 'Yellow cab. Classic.');
              return;
            }
          }
        }
      }
    }

    if (f.row >= ROW.RIVER_START && f.row <= ROW.RIVER_END) {
      if (!riding) {
        loseLife('You fell in the East River.');
        return;
      }
      f.col += (riding.lane.dir * riding.lane.speed * 40 * dt) / TILE;
      f.onFerry = riding;
      if (f.col < -0.2 || f.col > COLS - 0.8) {
        loseLife('Swept past the pier.');
        return;
      }
    }

    updateParticles(dt);
  }

  // --- Drive update (weighty MPH physics + shared world scale) ---
  function spawnTraffic(d, aheadZ) {
    const lane = [-DW.LANE, 0, DW.LANE][Math.floor(Math.random() * 3)];
    const kinds = ['taxi', 'sedan', 'bus', 'sports', 'van'];
    const kind = kinds[Math.floor(Math.random() * kinds.length)];
    // Mostly slightly slower than cruise so packs feel catchable in the same MPH world
    const base = kind === 'bus' ? 30 : kind === 'taxi' ? 42 : kind === 'sports' ? 48 : 38;
    d.traffic.push({
      z: d.z + (aheadZ != null ? aheadZ : 420 + Math.random() * 640),
      x: lane + (Math.random() - 0.5) * 0.04,
      kind,
      speed: Math.max(22, base + (Math.random() - 0.35) * 12),
      halfW: kind === 'bus' ? 0.28 : DW.CAR_HALF_W,
      len: kind === 'bus' ? 40 : DW.CAR_LEN,
      yaw: 0,
      yawVel: 0,
      velX: 0,
      flyY: 0,
      flyVel: 0,
      smashed: false
    });
  }

  function spawnCrashFX(screenX, screenY, impactDir, intensity) {
    const n = Math.floor(18 + intensity * 22);
    const shardColors = ['#1a2430', '#efc84a', '#c0392b', '#7ec8e3', '#4a5568', '#e8dcc0', '#f5c400'];
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 220 * intensity;
      state.particles.push({
        type: 'shard',
        x: screenX, y: screenY,
        vx: Math.cos(ang) * sp + impactDir * 60,
        vy: Math.sin(ang) * sp - 40 - Math.random() * 120,
        rot: Math.random() * Math.PI,
        rotV: (Math.random() - 0.5) * 14,
        life: 0.55 + Math.random() * 0.7,
        maxLife: 1.1,
        size: 4 + Math.random() * 10 * intensity,
        color: shardColors[Math.floor(Math.random() * shardColors.length)],
        sides: 3 + Math.floor(Math.random() * 2)
      });
    }
    for (let i = 0; i < 14 + intensity * 10; i++) {
      state.particles.push({
        type: 'spark',
        x: screenX, y: screenY,
        vx: (Math.random() - 0.5) * 340 + impactDir * 80,
        vy: -80 - Math.random() * 220,
        life: 0.2 + Math.random() * 0.35,
        maxLife: 0.5,
        color: Math.random() > 0.4 ? '#ffe08a' : '#ff6b3d'
      });
    }
    for (let i = 0; i < 8; i++) {
      state.particles.push({
        type: 'smoke',
        x: screenX + (Math.random() - 0.5) * 20,
        y: screenY,
        vx: (Math.random() - 0.5) * 40,
        vy: -20 - Math.random() * 50,
        life: 0.6 + Math.random() * 0.8,
        maxLife: 1.2,
        size: 10 + Math.random() * 24
      });
    }
  }

  function triggerDriveCrash(reason, impactX, other, opts = {}) {
    const d = state.drive;
    if (!d || d.invuln > 0 || state.mode !== 'drive') return;

    const ground = projectWorld(d.playerX, 0, d.z + 14, d);
    const intensity = Math.min(1.5, 0.4 + d.speed / 70);
    const hit = impactX || (Math.random() - 0.5) || 0.3;
    const dir = Math.sign(hit) || (Math.random() < 0.5 ? -1 : 1);
    spawnCrashFX(ground.x, ground.y - 16 * ground.scale, dir, intensity);

    // Soft smash: launch the other car, chip HP + cash. Hard wreck only when requested / HP dies.
    const hard = !!opts.hard;

    if (other) {
      other.smashed = true;
      other.velX = dir * (2.8 + intensity * 3.2) + (Math.random() - 0.5) * 0.8;
      other.yawVel = dir * (6 + intensity * 8) + (Math.random() - 0.5) * 3;
      other.yaw = dir * 0.6;
      other.flyVel = 9 + intensity * 12;
      other.flyY = 2;
      other.speed = Math.max(8, d.speed * 0.55 + 10 + Math.random() * 20);
      other.z += 6;
    }

    // Player: nudge, brief slowdown — not a full wipeout
    d.yawVel += -dir * (1.2 + intensity * 1.4);
    d.velX += -dir * (0.45 + intensity * 0.35);
    d.speed = Math.max(14, d.speed * (hard ? 0.22 : 0.72 + Math.random() * 0.1));
    d.suspVel -= (hard ? 18 : 7) * intensity;
    d.camShake = (hard ? 12 : 5) + intensity * (hard ? 14 : 6);
    d.crashT = hard ? 0.9 : 0.35;
    d.crashFlash = hard ? 0.65 : 0.28;
    d.skid = hard ? 1.1 : 0.45;
    d.roll = -dir * (hard ? 0.4 : 0.12);
    d.invuln = hard ? 1.4 : 0.85;

    const dmg = hard ? 35 + Math.floor(Math.random() * 25) : 8 + Math.floor(Math.random() * 10);
    const fine = hard ? 80 + Math.floor(Math.random() * 120) : 25 + Math.floor(Math.random() * 55);
    d.hp = Math.max(0, d.hp - dmg);
    state.score = Math.max(0, state.score - fine);
    beep(110, 0.08, 'sawtooth', 0.05);
    beep(70, 0.12, 'square', 0.04);
    updateHUD();

    if (hard || d.hp <= 0) {
      if (d.hp <= 0) d.hp = 0;
      loseLife(d.hp <= 0 ? `${reason} Car's done — out of HP.` : reason);
    }
  }

  function updateDrive(dt) {
    const d = state.drive;
    if (!d) return;

    if (d.camShake > 0) d.camShake = Math.max(0, d.camShake - 36 * dt);
    if (d.crashT > 0) d.crashT = Math.max(0, d.crashT - dt);
    if (d.skid > 0) d.skid = Math.max(0, d.skid - dt);
    if (d.rumble > 0) d.rumble = Math.max(0, d.rumble - dt);

    if (state.mode === 'pause' || state.mode === 'gameover' || state.mode === 'arrived') {
      d.rpmPulse += dt;
      updateParticles(dt);
      return;
    }
    if (state.mode !== 'drive') {
      updateParticles(dt);
      return;
    }

    if (d.invuln > 0) d.invuln -= dt;
    if (d.crashFlash > 0) d.crashFlash -= dt;
    if (state.flash > 0) state.flash -= dt;

    const gas = state.keys.up ? 1 : 0;
    const brake = state.keys.down ? 1 : 0;
    const speedNorm = d.speed / d.maxSpeed;

    // Engine force falls off toward top speed; aero drag + rolling resistance
    const engine = gas * 48 * (1 - speedNorm * 0.82);
    const brakes = brake * 70;
    const drag = 0.018 * d.speed * d.speed * 0.01 + 6.5 + (d.surface === 'curb' ? 14 : 0);
    d.accel = engine - brakes - drag * 0.15;
    d.speed = Math.max(0, Math.min(d.maxSpeed, d.speed + d.accel * dt));
    // Idle creep so you don't stall dead in traffic unless hard-braking
    if (!brake && d.speed < 12) d.speed += 18 * dt;

    // Surface under the tires
    const ax = Math.abs(d.playerX);
    if (ax > DW.CURB) d.surface = 'barrier';
    else if (ax > DW.ROAD * 0.92) d.surface = 'curb';
    else d.surface = 'asphalt';
    const gripMax = d.surface === 'asphalt' ? 11 : d.surface === 'curb' ? 4.2 : 1.5;

    // Steering: input → wheel angle (less lock at speed) → lateral tire force
    let steerInput = 0;
    if (state.keys.left) steerInput -= 1;
    if (state.keys.right) steerInput += 1;
    d.steer += (steerInput - d.steer) * Math.min(1, 9 * dt);
    const steerAuth = 0.55 + 0.45 * (1 - speedNorm); // high-speed understeer
    const desiredLat = d.steer * steerAuth * (0.85 + d.speed * 0.012);

    // Road curvature pushes you wide (v²/r feel)
    const curveForce = d.curve * (d.speed * d.speed) * 0.000035;
    let latAccel = (desiredLat - d.velX) * 10 - curveForce;
    latAccel = Math.max(-gripMax, Math.min(gripMax, latAccel));
    d.velX += latAccel * dt;
    // Tire scrub damping — stronger on asphalt
    d.velX *= Math.exp(-(gripMax * 0.55) * dt);
    d.playerX += d.velX * dt;

    // Slip / yaw / body roll from real lateral accel
    const slip = d.velX - desiredLat * 0.5;
    d.skid = Math.max(d.skid, Math.abs(slip) > 0.55 ? 0.35 : 0);
    d.yawVel += (-d.steer * 1.1 * steerAuth + slip * 1.3 - d.yaw * 5) * dt;
    d.yawVel *= Math.exp(-6 * dt);
    d.yaw = Math.max(-0.5, Math.min(0.5, d.yaw + d.yawVel * dt));
    const targetRoll = -latAccel * 0.018 - d.steer * 0.06;
    d.roll += (targetRoll - d.roll) * Math.min(1, 7 * dt);
    const targetPitch = (d.accel > 8 ? -0.07 : d.accel < -20 ? 0.11 : 0) + d.susp * 0.02;
    d.pitch += (targetPitch - d.pitch) * Math.min(1, 6 * dt);

    // Suspension spring-damper
    d.suspVel += (-d.susp * 70 - d.suspVel * 9) * dt;
    d.susp += d.suspVel * dt;

    // Concrete curb / jersey barrier response
    if (d.surface === 'curb') {
      d.speed = Math.max(0, d.speed - 28 * dt);
      d.rumble = Math.max(d.rumble, 0.2);
      d.suspVel -= 40 * dt * (1 + Math.random());
      d.camShake = Math.max(d.camShake, 2.5);
    }
    if (ax > DW.ROAD * 0.92) {
      const over = ax - DW.ROAD * 0.92;
      d.velX -= Math.sign(d.playerX) * over * 8 * dt;
    }
    if (ax > DW.CURB + 0.02) {
      // Hit the jersey barrier — elastic bounce then scrape
      d.playerX = Math.sign(d.playerX) * DW.CURB;
      d.velX *= -0.35;
      d.speed = Math.max(6, d.speed * 0.72);
      d.suspVel -= 12;
      d.camShake = Math.max(d.camShake, 8);
      d.skid = 1;
      if (d.speed > 45 && Math.random() < dt * 2.2) {
        triggerDriveCrash('Jersey barrier. Concrete always wins.', d.playerX, null, { hard: true });
        if (state.mode !== 'drive') return;
      }
    }
    d.playerX = Math.max(-DW.CURB - 0.02, Math.min(DW.CURB + 0.02, d.playerX));

    // Long sweeping city bends — hold a heading for a while, ease slowly
    d.curveTimer -= dt;
    if (d.curveTimer <= 0) {
      // Mostly straight blocks; rare gentle bend
      d.targetCurve = Math.random() > 0.78
        ? (Math.random() - 0.5) * 0.55
        : (Math.random() - 0.5) * 0.12;
      d.curveTimer = 6 + Math.random() * 8;
    }
    d.curve += (d.targetCurve - d.curve) * Math.min(1, 0.22 * dt);
    d.hills = Math.sin(d.z * 0.0009) * 8 + Math.sin(d.z * 0.0022) * 3;

    // Pothole bumps when you roll over them
    for (const pr of d.props) {
      if (pr.kind !== 'pothole') continue;
      const dz = pr.z - (d.z + 14);
      if (dz > -8 && dz < 8 && Math.abs((pr.x || 0) - d.playerX) < 0.28) {
        d.suspVel -= 22 + d.speed * 0.15;
        d.rumble = 0.35;
        d.camShake = Math.max(d.camShake, 3 + d.speed * 0.04);
      }
    }

    // Integrate world position from MPH
    d.z += d.speed * DW.MPH_Z * dt;
    d.wheelSpin += d.speed * dt * 0.35;
    d.rpmPulse += dt * (0.7 + d.speed / 50);

    // Chase cam: spring-follow for weight, lift slightly with speed
    d.camX += (d.playerX - d.camX) * Math.min(1, 2.6 * dt);
    const camTargetY = 40 + d.speed * 0.06 + Math.abs(d.velX) * 2.2 - d.susp * 0.4;
    d.camY += (camTargetY - d.camY) * Math.min(1, 3 * dt);
    d.camBack = 112 + d.speed * 0.15;

    if (d.z + 1300 > d.nextBuildZ) {
      seedCityBlocks(d, d.nextBuildZ, d.nextBuildZ + 1000);
    }
    d.buildings = d.buildings.filter(b => b.z > d.z - 100);
    d.props = d.props.filter(p => p.z > d.z - 80);

    // Traffic in absolute world MPH (same integrator as player)
    d.spawnTimer -= dt;
    if (d.spawnTimer <= 0 && d.traffic.length < 9) {
      spawnTraffic(d);
      d.spawnTimer = Math.max(0.55, 1.2 - state.level * 0.07);
    }
    for (const car of d.traffic) {
      if (car.smashed) {
        car.z += car.speed * DW.MPH_Z * 0.55 * dt;
        car.x += car.velX * dt;
        car.velX *= Math.exp(-1.1 * dt);
        car.yawVel = (car.yawVel || 0) * Math.exp(-0.8 * dt);
        car.yaw += (car.yawVel || car.velX * 2) * dt;
        car.flyVel = (car.flyVel || 0) - 22 * dt;
        car.flyY = Math.max(0, (car.flyY || 0) + car.flyVel * dt);
        if (car.flyY === 0 && car.flyVel < 0) {
          car.flyVel *= -0.35;
          if (Math.abs(car.flyVel) < 2) car.flyVel = 0;
        }
        car.speed *= Math.exp(-0.4 * dt);
      } else {
        car.z += car.speed * DW.MPH_Z * dt;
        const lane = Math.round(car.x / DW.LANE) * DW.LANE;
        car.x += (lane - car.x) * Math.min(1, 1.2 * dt);
      }
    }
    d.traffic = d.traffic.filter(c => c.z > d.z - 80 && c.z < d.z + 1800);

    // AABB-ish collision — smash sends them flying; rarely a hard wreck
    for (const car of d.traffic) {
      if (car.smashed) continue;
      const dz = car.z - (d.z + 10);
      const hitLen = (car.len + DW.CAR_LEN) * 0.35;
      if (dz > 0 && dz < hitLen) {
        if (Math.abs(car.x - d.playerX) < car.halfW + DW.CAR_HALF_W) {
          const impactX = d.playerX - car.x;
          const closing = d.speed - car.speed;
          if (closing > 6 || Math.abs(impactX) < car.halfW) {
            const hard = closing > 38 && Math.random() < 0.12;
            triggerDriveCrash(
              car.kind === 'bus' ? 'Clipped a bus.' : car.kind === 'taxi' ? 'Cab got launched.' : 'Sent them flying.',
              impactX,
              car,
              { hard }
            );
            if (state.mode !== 'drive') return;
          }
        }
      }
    }

    if (d.z >= d.goal) {
      arriveDestination();
      return;
    }

    if (d.speed > 40) state.score += Math.floor(d.speed * dt * 0.2);
    updateHUD();

    if (Math.floor(d.rpmPulse * 5) !== Math.floor((d.rpmPulse - dt) * 5) && d.speed > 20) {
      beep(70 + d.speed * 1.1, 0.025, 'sawtooth', 0.01);
    }
    if (d.skid > 0.2 && Math.floor(d.rpmPulse * 9) !== Math.floor((d.rpmPulse - dt) * 9)) {
      beep(160 + Math.abs(d.velX) * 50, 0.02, 'triangle', 0.014);
    }

    if ((Math.abs(slip) > 0.5 || d.skid > 0.15 || d.surface === 'curb') && Math.random() < dt * 12) {
      const tire = projectWorld(d.playerX + (Math.random() > 0.5 ? 0.1 : -0.1), 0, d.z + 10, d);
      state.particles.push({
        type: 'smoke',
        x: tire.x + (Math.random() - 0.5) * 8,
        y: tire.y,
        vx: -d.velX * 10 + (Math.random() - 0.5) * 16,
        vy: -8 - Math.random() * 16,
        life: 0.3 + Math.random() * 0.25,
        maxLife: 0.55,
        size: 5 + Math.random() * 9
      });
    }

    updateParticles(dt);
  }

  function updateParticles(dt) {
    for (const p of state.particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.type === 'shard') {
        p.vy += 380 * dt;
        p.vx *= Math.pow(0.4, dt);
        p.rot += (p.rotV || 0) * dt;
      } else if (p.type === 'spark') {
        p.vy += 420 * dt;
        p.vx *= Math.pow(0.25, dt);
      } else if (p.type === 'smoke') {
        p.vy -= 10 * dt;
        p.size = (p.size || 10) + 28 * dt;
        p.vx *= Math.pow(0.5, dt);
      } else {
        p.vy += 120 * dt;
      }
      p.life -= dt;
    }
    state.particles = state.particles.filter(p => p.life > 0);
  }

  function update(dt) {
    if (state.phase === 'drive') updateDrive(dt);
    else updateCross(dt);
  }

  // --- Drawing ---
  const C = {
    garageBg: '#3d3f42',
    pillar: '#6a6d72',
    // Concrete sidewalk
    safe: '#9b968c',
    safeHi: '#b0aaa0',
    safeLo: '#868178',
    // East River — cold slate with olive undertone
    water: '#3f5c66',
    waterDeep: '#334a52',
    waterFoam: 'rgba(210,220,218,0.28)',
    waterShade: 'rgba(20,35,40,0.22)',
    // NYC asphalt
    road: '#2f2f32',
    roadAlt: '#28282b',
    dash: '#d8d2c0',
    yellowLine: '#d4a017',
    curb: '#c4a035'
  };

  function drawSafeBand(row, label) {
    const y = row * TILE;
    ctx.fillStyle = C.safe;
    ctx.fillRect(0, y, W, TILE);
    // Concrete slab seams
    ctx.fillStyle = C.safeLo;
    for (let x = 0; x < W; x += 40) {
      ctx.fillRect(x, y, 1, TILE);
    }
    ctx.fillRect(0, y + TILE / 2, W, 1);
    // Speckle
    ctx.fillStyle = 'rgba(60,55,50,0.12)';
    for (let x = 4; x < W; x += 11) {
      ctx.fillRect(x, y + 6 + (x % 7), 2, 2);
      ctx.fillRect(x + 5, y + 22 + (x % 5), 2, 2);
    }
    // Painted yellow curb edge
    ctx.fillStyle = C.curb;
    ctx.fillRect(0, y, W, 2);
    ctx.fillRect(0, y + TILE - 2, W, 2);
    if (label) {
      ctx.fillStyle = 'rgba(40,38,34,0.55)';
      ctx.font = '700 9px "General Sans", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(label, 8, y + 15);
    }
  }

  function drawRoad(row) {
    const y = row * TILE;
    ctx.fillStyle = (row % 2 === 0) ? C.road : C.roadAlt;
    ctx.fillRect(0, y, W, TILE);
    // Faded white lane dashes
    ctx.fillStyle = C.dash;
    const mid = y + TILE / 2 - 1;
    for (let x = 4; x < W; x += 28) ctx.fillRect(x, mid, 14, 2);
    // Worn yellow edge stripe
    ctx.fillStyle = C.yellowLine;
    ctx.fillRect(0, y + 1, W, 1);
    ctx.fillRect(0, y + TILE - 2, W, 1);
  }

  function drawRiver(row) {
    const y = row * TILE;
    const t = performance.now() / 1000;
    // Depth gradient — colder / darker toward the far bank feel
    const g = ctx.createLinearGradient(0, y, 0, y + TILE);
    if (row % 2 === 0) {
      g.addColorStop(0, '#4a6870');
      g.addColorStop(0.45, '#3f5c66');
      g.addColorStop(1, '#355058');
    } else {
      g.addColorStop(0, '#3a545c');
      g.addColorStop(0.5, '#334a52');
      g.addColorStop(1, '#2c424a');
    }
    ctx.fillStyle = g;
    ctx.fillRect(0, y, W, TILE);

    // Soft vertical shading so the river reads as a continuous body
    ctx.fillStyle = C.waterShade;
    ctx.fillRect(0, y + TILE - 5, W, 5);

    // Rolling wave bands (smooth sine, not arcade blocks)
    ctx.lineWidth = 1.25;
    for (let band = 0; band < 4; band++) {
      const baseY = y + 7 + band * 8;
      const phase = t * (1.1 + band * 0.15) + row * 0.7 + band * 1.3;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 4) {
        const yy = baseY + Math.sin(x * 0.045 + phase) * 2.2
          + Math.sin(x * 0.11 + phase * 1.7) * 0.9;
        if (x === 0) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.strokeStyle = band % 2 === 0
        ? 'rgba(190,210,205,0.22)'
        : 'rgba(30,50,55,0.18)';
      ctx.stroke();
    }

    // Bright foam crests that drift with the current
    ctx.fillStyle = C.waterFoam;
    for (let i = 0; i < 7; i++) {
      const wx = ((t * 28 + i * 67 + row * 40) % (W + 40)) - 20;
      const wy = y + 10 + (i % 3) * 10 + Math.sin(t * 2 + i) * 2;
      ctx.globalAlpha = 0.35 + (i % 3) * 0.1;
      ctx.beginPath();
      ctx.ellipse(wx, wy, 7 + (i % 3), 1.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Faint olive / harbor sheen
    ctx.fillStyle = 'rgba(100,130,90,0.07)';
    ctx.fillRect(0, y + 12 + Math.sin(t + row) * 2, W, 5);
  }

  function drawParkedCar(cx, cy, color, yours) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.fillRect(-14, -8, 28, 16);
    ctx.fillStyle = yours ? '#7ec8e3' : '#4a6a7a';
    ctx.fillRect(-10, -6, 8, 6);
    ctx.fillRect(2, -6, 8, 6);
    ctx.fillStyle = '#111';
    ctx.fillRect(-12, 6, 7, 3);
    ctx.fillRect(5, 6, 7, 3);
    if (yours) {
      ctx.strokeStyle = '#efc84a';
      ctx.lineWidth = 2;
      ctx.strokeRect(-16, -10, 32, 20);
      ctx.fillStyle = '#efc84a';
      ctx.font = '700 7px "General Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('YOURS', 0, -12);
    }
    ctx.restore();
  }

  function drawGarage() {
    const y = 0;
    // Fluorescent concrete deck
    ctx.fillStyle = C.garageBg;
    ctx.fillRect(0, y, W, TILE);
    ctx.fillStyle = 'rgba(255,245,200,0.06)';
    ctx.fillRect(0, y, W, 6);

    for (let c = 0; c < COLS; c++) {
      if (PARK_SLOTS.includes(c)) continue;
      ctx.fillStyle = C.pillar;
      ctx.fillRect(c * TILE + 8, y + 2, TILE - 16, TILE - 4);
      ctx.fillStyle = '#55585e';
      ctx.fillRect(c * TILE + 12, y + 6, TILE - 24, 8);
    }

    PARK_SLOTS.forEach((c) => {
      const x = c * TILE;
      ctx.fillStyle = '#2a2c30';
      ctx.fillRect(x + 2, y + 4, TILE - 4, TILE - 6);
      // Stall paint
      ctx.strokeStyle = 'rgba(230,220,180,0.45)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 4, y + 6, TILE - 8, TILE - 10);

      if (c === CAR_COL) {
        drawParkedCar(x + TILE / 2, y + TILE / 2 + 2, '#1c2430', true);
      } else {
        const colors = ['#6b2e2e', '#2e4570', '#3d5a3a', '#5a4e2e', '#4a4a4e'];
        drawParkedCar(x + TILE / 2, y + TILE / 2 + 2, colors[c % colors.length], false);
      }
    });

    ctx.fillStyle = 'rgba(230,220,180,0.75)';
    ctx.font = '700 9px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('GARAGE  •  YOUR CAR', 6, y + TILE - 4);
  }

  function withFacing(x, y, w, h, dir, drawFn) {
    ctx.save();
    if (dir < 0) {
      ctx.translate(x + w, y);
      ctx.scale(-1, 1);
      drawFn(0, 0, w, h);
    } else {
      ctx.translate(x, y);
      drawFn(0, 0, w, h);
    }
    ctx.restore();
  }

  function drawTaxi(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      // Medallion taxi yellow
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(lx, ly + 6, lw, lh - 6);
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(lx + lw * 0.28, ly + 2, lw * 0.42, lh * 0.5);
      ctx.fillStyle = '#5a8fa8';
      ctx.fillRect(lx + lw * 0.32, ly + 4, lw * 0.16, lh * 0.32);
      ctx.fillRect(lx + lw * 0.52, ly + 4, lw * 0.14, lh * 0.32);
      ctx.fillStyle = '#f5f0d8';
      ctx.fillRect(lx + lw * 0.42, ly, lw * 0.16, 4);
      ctx.fillStyle = '#f0e6a0';
      ctx.fillRect(lx + lw - 4, ly + lh - 10, 3, 4);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(lx + 6, ly + lh - 3, 8, 4);
      ctx.fillRect(lx + lw - 14, ly + lh - 3, 8, 4);
      // TAXI door mark
      ctx.fillStyle = 'rgba(30,30,30,0.35)';
      ctx.fillRect(lx + lw * 0.15, ly + lh * 0.55, lw * 0.2, 3);
    });
  }

  function drawBus(x, y, w, dir) {
    const h = TILE - 10;
    const yy = y + 5;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      ctx.fillStyle = '#f2f2f0';
      ctx.fillRect(lx, ly + 4, lw, lh - 4);
      ctx.fillStyle = '#0039a6';
      ctx.fillRect(lx, ly + lh * 0.42, lw, 7);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(lx, ly + lh - 8, lw, 8);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + lw - 22, ly + 2, 20, 10);
      ctx.fillStyle = '#5eb0d4';
      ctx.fillRect(lx + lw - 12, ly + 14, 9, lh * 0.28);
      ctx.fillStyle = '#7ec8e3';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(lx + 6 + i * ((lw - 30) / 4), ly + 8, 10, lh * 0.28);
      }
      ctx.fillStyle = '#fff6a8';
      ctx.fillRect(lx + lw - 5, ly + lh - 14, 3, 4);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 10, ly + lh - 4, 10, 5);
      ctx.fillRect(lx + lw - 22, ly + lh - 4, 10, 5);
    });
    const front = dir > 0 ? x + w - 12 : x + 12;
    ctx.fillStyle = '#f0c400';
    ctx.font = '700 7px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('M14', front, yy + 10);
  }

  function drawTruck(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      const cabW = lw * 0.32;
      const bedW = lw - cabW;
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(lx, ly + 4, bedW, lh - 4);
      ctx.fillStyle = '#c45c26';
      ctx.fillRect(lx + bedW, ly, cabW, lh);
      ctx.fillStyle = '#7ec8e3';
      ctx.fillRect(lx + bedW + 4, ly + 4, cabW - 8, lh * 0.38);
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 8, ly + lh - 3, 9, 4);
      ctx.fillRect(lx + lw - 14, ly + lh - 3, 9, 4);
    });
  }

  function drawBike(x, y, w, dir) {
    const h = TILE - 12;
    const yy = y + 6;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      const rearX = lx + 8;
      const frontX = lx + lw - 8;
      const hubY = ly + lh - 7;
      const r = 6;

      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(lx + lw / 2, ly + lh - 1, lw * 0.38, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wheels
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(rearX, hubY, r, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#6a6a6a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(rearX, hubY, r - 2.5, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, r - 2.5, 0, Math.PI * 2);
      ctx.stroke();
      // Hubs
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(rearX, hubY, 1.5, 0, Math.PI * 2);
      ctx.arc(frontX, hubY, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Frame — Citi Bike blue / messenger black mix
      const seatX = lx + lw * 0.38;
      const seatY = ly + lh * 0.28;
      const pedalX = lx + lw * 0.42;
      const pedalY = hubY - 1;
      ctx.strokeStyle = '#0b5cab';
      ctx.lineWidth = 2.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      // Rear triangle
      ctx.moveTo(rearX, hubY);
      ctx.lineTo(seatX, seatY);
      ctx.lineTo(pedalX, pedalY);
      ctx.closePath();
      ctx.stroke();
      // Down tube + top tube to head
      const headX = lx + lw * 0.72;
      const headY = ly + lh * 0.32;
      ctx.beginPath();
      ctx.moveTo(seatX, seatY);
      ctx.lineTo(headX, headY);
      ctx.lineTo(frontX, hubY);
      ctx.moveTo(pedalX, pedalY);
      ctx.lineTo(headX, headY);
      ctx.stroke();

      // Handlebars
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 1, headY);
      ctx.lineTo(headX + 5, headY - 4);
      ctx.lineTo(headX + 9, headY - 3);
      ctx.stroke();

      // Seat
      ctx.fillStyle = '#222';
      ctx.fillRect(seatX - 5, seatY - 2, 8, 3);

      // Pedal crank
      const crank = Math.sin(performance.now() / 90) * 4;
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pedalX, pedalY);
      ctx.lineTo(pedalX + 3, pedalY + crank);
      ctx.stroke();

      // Messenger rider
      const hipX = seatX + 1;
      const hipY = seatY - 1;
      // Legs pedaling
      ctx.strokeStyle = '#2a3544';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(pedalX + 2, pedalY + crank);
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(pedalX - 2, pedalY - crank * 0.6);
      ctx.stroke();
      // Torso lean
      ctx.strokeStyle = '#1a3a6a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(hipX, hipY);
      ctx.lineTo(headX - 2, headY - 2);
      ctx.stroke();
      // Arms to bars
      ctx.strokeStyle = '#e6b89a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 4, headY + 2);
      ctx.lineTo(headX + 4, headY - 2);
      ctx.stroke();
      // Head + helmet
      ctx.fillStyle = '#e6b89a';
      ctx.beginPath();
      ctx.arc(headX - 1, headY - 7, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f0c400';
      ctx.beginPath();
      ctx.arc(headX - 1, headY - 8, 3.8, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(headX - 5, headY - 8, 8, 2);

      // Messenger bag
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(hipX - 6, hipY - 6, 5, 7);
    });
  }

  function drawFerry(x, y, w, kind, dir) {
    const h = TILE - 14;
    const yy = y + 7;
    withFacing(x, yy, w, h, dir, (lx, ly, lw, lh) => {
      if (kind === 'kayak') {
        ctx.fillStyle = '#c45c26';
        ctx.fillRect(lx, ly + 6, lw, lh - 8);
        ctx.fillStyle = '#e8c4a8';
        ctx.fillRect(lx + lw * 0.4, ly + 4, 8, 8);
        return;
      }
      if (kind === 'barge') {
        // Rust / working barge
        ctx.fillStyle = '#5c5348';
        ctx.fillRect(lx, ly + 4, lw, lh - 4);
        ctx.fillStyle = '#7a6a55';
        for (let i = 0; i < 3; i++) ctx.fillRect(lx + 6 + i * (lw / 3), ly + 8, lw / 4, 6);
        ctx.fillStyle = '#8a4030';
        ctx.fillRect(lx + 4, ly + 2, 12, 4);
        return;
      }
      // NYC Ferry — white hull, orange accent
      ctx.fillStyle = '#e8e6e0';
      ctx.fillRect(lx, ly + 8, lw, lh - 8);
      ctx.fillStyle = '#2c5a7a';
      ctx.fillRect(lx + 6, ly, lw - 18, lh * 0.55);
      ctx.fillStyle = '#6a9ab0';
      for (let i = 0; i < 3; i++) ctx.fillRect(lx + 10 + i * 14, ly + 4, 10, lh * 0.28);
      ctx.fillStyle = '#e85d04';
      ctx.fillRect(lx + lw - 14, ly + 2, 10, 5);
    });
  }

  function drawBanker(cx, cy, scale = 1, resting = false) {

    ctx.scale(scale, scale);
    const bob = resting ? 0 : Math.sin(performance.now() / 160) * 1;

    ctx.fillRect(2, 6, 5, 9);
    ctx.fillStyle = '#0d0d10';
    ctx.fillRect(-8, 13, 6, 3);
    ctx.fillRect(2, 13, 6, 3);
    ctx.fillStyle = '#1e2430';
    ctx.fillRect(-9, -4, 18, 12);
    ctx.fillStyle = '#f5f0e6';
    ctx.fillRect(-3, -4, 6, 10);
    ctx.fillStyle = '#b01030';
    ctx.fillRect(-1, -3, 2, 8);
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(-14, 0, 6, 8);
    ctx.fillStyle = '#efc84a';
    ctx.fillRect(-13, 2, 4, 1);
    ctx.fillStyle = '#e6b89a';
    ctx.fillRect(-6, -14, 12, 10);

    ctx.strokeStyle = '#222';

    ctx.strokeRect(1, -11, 4, 3);
