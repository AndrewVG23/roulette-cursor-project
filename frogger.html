  function drawCross() {
    ctx.clearRect(0, 0, W, H);

    const shaking = state.shake > 0;
    if (shaking) {
      const mag = state.shake * 7;
      ctx.save();
      ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
    }

    if (isGrill()) {
      drawGhettoCross();
    } else {
      for (let r = 0; r < ROWS; r++) {
        if (r === ROW.GARAGE) drawGarage();
        else if (r === ROW.BANK) drawSafeBand(r, 'EAST RIVER PIER');
        else if (r >= ROW.RIVER_START && r <= ROW.RIVER_END) drawRiver(r);
        else if (r === ROW.MEDIAN) drawSafeBand(r, 'BROADWAY MEDIAN');
        else if (r >= ROW.ROAD_START && r <= ROW.ROAD_END) drawRoad(r);
        else if (r === ROW.START) drawSafeBand(r, 'CASINO EXIT  •  START');
      }

      for (const lane of state.lanes) {
        const y = lane.row * TILE;
        for (const e of lane.entities) {
          if (lane.row >= ROW.RIVER_START && lane.row <= ROW.RIVER_END) {
            drawFerry(e.x, y, e.w, e.kind, lane.dir);
          } else if (e.kind === 'taxi') drawTaxi(e.x, y, e.w, lane.dir);
          else if (e.kind === 'bus') drawBus(e.x, y, e.w, lane.dir);
          else if (e.kind === 'truck') drawTruck(e.x, y, e.w, lane.dir);
          else if (e.kind === 'bike') drawBike(e.x, y, e.w, lane.dir);
        }
      }
    }

    if (state.mode !== 'gameover' && !(state.mode === 'dead' && state.flash > 0 && Math.floor(state.flash * 20) % 2 === 0)) {
      if (!(state.mode === 'win')) {
        const pose = frogDrawPose();
        const alpha = state.invuln > 0 && Math.floor(state.invuln * 16) % 2 === 0 ? 0.4 : 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        drawBanker(pose.x, pose.y, 1, false, { sx: pose.sx, sy: pose.sy, facing: state.facing });
        ctx.restore();
      }
    }

    for (const p of state.particles) {
      ctx.globalAlpha = Math.max(0, p.life * 2);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 3, 3);
    }
    ctx.globalAlpha = 1;

    for (const ft of state.floatText) {
      ctx.globalAlpha = Math.min(1, ft.life * 2);
      ctx.fillStyle = ft.color;
      ctx.font = '700 11px "General Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;

    if (state.mode === 'play' || state.mode === 'pause' || state.mode === 'dead') drawTimer();

    if (state.flash > 0) {
      ctx.fillStyle = `rgba(192,57,43,${state.flash * 0.35})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (shaking) ctx.restore();

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(20,22,26,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e8dcc0';
      ctx.font = '700 22px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }
  }

  // Chase-cam projection — Frenet frame along the map path so curves match the reference map
  function projectWorld(wx, wy, wz, d) {
    const camX = (d.camX != null ? d.camX : d.playerX);
    const camY = d.camY || 46;
    const camBack = d.camBack || 110;
    const zCam = d.z - camBack;
    const route = d.route;

    let rx, rz;
    if (route) {
      const wps = activeRouteWaypoints(d);
      const len = wps[wps.length - 1].z;
      const zCamRoute = wrapRouteZ(zCam, len);
      const zPtRoute = wrapRouteZ(wz, len);
      const camFrame = sampleRouteFrame(wps, route, zCamRoute);
      const ptFrame = sampleRouteFrame(wps, route, zPtRoute);
      let dz = routeAheadDist(zCamRoute, zPtRoute, len);
      if (dz > len * 0.5) dz -= len;
      const dx = (ptFrame.x + wx) - (camFrame.x + camX);
      const cos = Math.cos(camFrame.heading);
      const sin = Math.sin(camFrame.heading);
      const relForward = dz * cos + dx * sin;
      const relLateral = -dz * sin + dx * cos;
      rx = relLateral * 100;
      rz = relForward;
    } else {
      rx = (wx - camX) * 100;
      rz = wz - zCam;
    }

    let ry = wy - camY;

    const ahead = wz - d.z;
    if (ahead > 0) {
      const ht = Math.min(1, ahead / 680);
      const hillEase = ht * ht * (3 - 2 * ht);
      ry += (d.hills || 0) * hillEase * 0.28;
    }

    if (rz < 12) rz = 12;
    const fov = 300;
    const scale = fov / rz;
    const x = W / 2 + rx * scale;
    const y = H * 0.46 - ry * scale;
    return { x, y, scale, relZ: rz };
  }

  function facadeProximityFade(ground, d, opts = {}) {
    const minZ = opts.minZ != null ? opts.minZ : DW.FACADE_MIN_Z;
    const fadeZ = opts.fadeZ != null ? opts.fadeZ : DW.FACADE_FADE_Z;
    const minScale = opts.minScale != null ? opts.minScale : DW.FACADE_MIN_SCALE;
    if (ground.relZ < minZ || ground.scale < minScale) return 0;
    let a = ground.relZ >= fadeZ ? 1
      : (ground.relZ - minZ) / (fadeZ - minZ);
    const playerG = projectWorld(d.playerX, 0, d.z + 14, d);
    if (ground.relZ < playerG.relZ + 20) {
      a *= Math.max(0, (ground.relZ - minZ) / Math.max(14, playerG.relZ + 20 - minZ));
    }
    return Math.max(0, Math.min(1, a));
  }

  function capFacadeScreen(y, bh, ground, topFrac) {
    const frac = topFrac != null ? topFrac
      : (ground.relZ < 150 ? 0.30 : (ground.relZ < 260 ? 0.24 : 0.18));
    const topLimit = H * frac;
    if (y >= topLimit) return { y, bh };
    const trim = topLimit - y;
    return { y: topLimit, bh: Math.max(8, bh - trim) };
  }

  function facadeRoadOverlapFade(ground, x, bw) {
    if (ground.relZ > 220) return 1;
    const roadL = W * 0.26;
    const roadR = W * 0.74;
    const bxL = Math.min(x, x + bw);
    const bxR = Math.max(x, x + bw);
    const overlap = Math.max(0, Math.min(bxR, roadR) - Math.max(bxL, roadL));
    if (overlap <= 0) return 1;
    const overlapFrac = overlap / (roadR - roadL);
    const close = Math.max(0, 1 - (ground.relZ - 90) / 110);
    return Math.max(0, 1 - overlapFrac * (1.4 + close * 1.8));
  }

  // Blend two [r,g,b] colors — used for atmospheric haze with distance
  function hazeMix(c, f, t) {
    const k = Math.max(0, Math.min(1, t));
    return `rgb(${Math.round(c[0] + (f[0] - c[0]) * k)},${Math.round(c[1] + (f[1] - c[1]) * k)},${Math.round(c[2] + (f[2] - c[2]) * k)})`;
  }

  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, Math.min(255, ((n >> 16) & 255) + amt));
    const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
    const b = Math.max(0, Math.min(255, (n & 255) + amt));
    return `rgb(${r},${g},${b})`;
  }

  // Taillights + rear bumper details for the handful of modeled profiles.
  function carPaintGrad(color, x0, y0, x1, y1) {
    const g = ctx.createLinearGradient(x0, y0, x1, y1);
    g.addColorStop(0, shade(color, 22));
    g.addColorStop(0.42, color);
    g.addColorStop(1, shade(color, -32));
    return g;
  }

  function carGlassGrad(x0, y0, x1, y1) {
    const g = ctx.createLinearGradient(x0, y0, x1, y1);
    g.addColorStop(0, 'rgba(18,28,40,0.94)');
    g.addColorStop(0.3, 'rgba(48,68,88,0.78)');
    g.addColorStop(0.55, 'rgba(72,98,120,0.55)');
    g.addColorStop(0.75, 'rgba(38,52,68,0.82)');
    g.addColorStop(1, 'rgba(14,20,30,0.96)');
    return g;
  }

  function drawCarWheel(cx, cy, r, spin, crush) {
    const sq = 1 - crush * 0.35;
    const rx = r * 1.12 * sq;
    const ry = r * sq;
    ctx.fillStyle = '#0e0e12';
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2a3038';
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx * 0.78, ry * 0.72, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#505860';
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx * 0.38, ry * 0.34, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#6a7078';
    ctx.lineWidth = Math.max(0.8, r * 0.14);
    ctx.lineCap = 'round';
    for (let i = 0; i < 5; i++) {
      const a = spin + i * (Math.PI * 2 / 5);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * r * 0.12, cy + Math.sin(a) * r * 0.1);
      ctx.lineTo(cx + Math.cos(a) * r * 0.34, cy + Math.sin(a) * r * 0.3);
      ctx.stroke();
    }
  }

  function drawCarChromeStrip(x, y, w, h) {
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, 'rgba(200,210,220,0.55)');
    g.addColorStop(0.5, 'rgba(240,245,250,0.75)');
    g.addColorStop(1, 'rgba(160,170,180,0.45)');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
  }

  function drawCarKindDetails(kind, w, h, rearW, rearY, midY, midW, roofH, lean, s, body, opts) {
    const roofTop = midY - roofH;
    if (kind === 'sports') {
      ctx.fillStyle = shade(body, -35);
      ctx.beginPath();
      ctx.moveTo(-rearW * 0.75, rearY - h * 0.22);
      ctx.lineTo(0 + lean * 0.3, rearY - h * 0.34);
      ctx.lineTo(rearW * 0.75, rearY - h * 0.22);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(-rearW * 0.55, rearY + h * 0.08, rearW * 1.1, h * 0.045);
    } else if (kind === 'suv' || kind === 'van') {
      ctx.strokeStyle = 'rgba(180,190,200,0.45)';
      ctx.lineWidth = Math.max(1, 1.6 * s);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-midW * 0.8 + lean, roofTop - 2 * s);
      ctx.lineTo(-midW * 0.8 + lean, roofTop - 8 * s);
      ctx.moveTo(midW * 0.8 + lean, roofTop - 2 * s);
      ctx.lineTo(midW * 0.8 + lean, roofTop - 8 * s);
      ctx.stroke();
      if (kind === 'van') {
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-midW * 0.15 + lean, midY - h * 0.05);
        ctx.lineTo(-midW * 0.15 + lean, midY + h * 0.18);
        ctx.stroke();
      }
    } else if (kind === 'compact') {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath();
      ctx.ellipse(lean * 0.2, midY - h * 0.08, w * 0.35, h * 0.06, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (kind === 'bus') {
      ctx.fillStyle = '#0039a6';
      ctx.fillRect(-rearW * 0.92, rearY - h * 0.38, rearW * 1.84, h * 0.08);
      ctx.fillStyle = 'rgba(200,210,220,0.35)';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(-rearW * 0.82 + i * rearW * 0.38, rearY - h * 0.32, rearW * 0.28, h * 0.14);
      }
      ctx.fillStyle = '#f5f5f0';
      ctx.font = `700 ${Math.max(5, 7 * s)}px "General Sans", sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('M15', lean * 0.1, rearY - h * 0.05);
    } else if (kind === 'taxi') {
      ctx.fillStyle = '#1a1a20';
      for (let i = -1; i <= 1; i++) {
        ctx.fillRect(i * w * 0.18 + lean * 0.3 - w * 0.04, midY - h * 0.02, w * 0.08, h * 0.14);
      }
      ctx.fillStyle = '#fff6d0';
      ctx.fillRect(-w * 0.08, roofTop - 3 * s, w * 0.16, 4 * s);
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(-w * 0.09, roofTop - 2 * s, w * 0.04, 2 * s);
      ctx.fillRect(w * 0.05, roofTop - 2 * s, w * 0.04, 2 * s);
    } else if (kind === 'police') {
      const blink = Math.floor(performance.now() / 120) % 2;
      ctx.fillStyle = '#f5f5f0';
      ctx.fillRect(-w * 0.14, roofTop - 4 * s, w * 0.28, 6 * s);
      ctx.fillStyle = blink ? '#e74c3c' : '#3a7cff';
      ctx.fillRect(-w * 0.12, roofTop - 3 * s, w * 0.1, 4 * s);
      ctx.fillStyle = blink ? '#3a7cff' : '#e74c3c';
      ctx.fillRect(w * 0.02, roofTop - 3 * s, w * 0.1, 4 * s);
      ctx.fillStyle = `rgba(${blink ? '231,76,60' : '58,124,255'},0.35)`;
      ctx.fillRect(-w * 0.2, roofTop - 8 * s, w * 0.4, 12 * s);
      ctx.fillStyle = 'rgba(200,210,220,0.5)';
      ctx.fillRect(-midW * 0.55 + lean, midY + h * 0.04, midW * 0.35, h * 0.04);
    }
    if (opts.trim && kind !== 'bus' && kind !== 'taxi') {
      ctx.fillStyle = opts.trim;
      ctx.fillRect(-rearW * 0.88, rearY + h * 0.12, rearW * 1.76, h * 0.035);
    }
  }

  function drawCarRear(id, p) {
    const { rearW, rearY, h, w, lean, body, midW, midY } = p;
    const red = '#e74c3c';
    const redHi = '#ff6b5a';
    switch (id) {
      case 'f150':
        ctx.fillStyle = shade(body, -10);
        ctx.fillRect(-rearW * 0.86, rearY - h * 0.2, rearW * 1.72, h * 0.18);
        ctx.strokeStyle = '#8a9098';
        ctx.lineWidth = 1;
        ctx.strokeRect(-rearW * 0.86, rearY - h * 0.2, rearW * 1.72, h * 0.18);
        ctx.fillStyle = red;
        ctx.fillRect(-rearW * 0.88, rearY - h * 0.16, w * 0.11, h * 0.22);
        ctx.fillRect(rearW * 0.77, rearY - h * 0.16, w * 0.11, h * 0.22);
        ctx.fillStyle = '#b8c0c8';
        ctx.fillRect(-rearW * 0.68, rearY + h * 0.07, rearW * 1.36, h * 0.05);
        break;
      case 'rav4':
        ctx.fillStyle = red;
        ctx.fillRect(-rearW * 0.88, rearY - h * 0.12, w * 0.13, h * 0.16);
        ctx.fillRect(rearW * 0.75, rearY - h * 0.12, w * 0.13, h * 0.16);
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(-w * 0.08, rearY - h * 0.06, w * 0.16, h * 0.07);
        break;
      case 'camry':
        ctx.fillStyle = shade(body, -8);
        ctx.fillRect(-rearW * 0.62, rearY - h * 0.2, rearW * 1.24, h * 0.1);
        ctx.fillStyle = red;
        ctx.fillRect(-rearW * 0.78, rearY - h * 0.08, rearW * 1.56, h * 0.06);
        ctx.fillStyle = redHi;
        ctx.fillRect(-rearW * 0.72, rearY - h * 0.07, rearW * 0.22, h * 0.04);
        ctx.fillRect(rearW * 0.5, rearY - h * 0.07, rearW * 0.22, h * 0.04);
        break;
      case 'civic':
        ctx.fillStyle = red;
        ctx.beginPath();
        ctx.moveTo(-rearW * 0.82, rearY - h * 0.04);
        ctx.lineTo(-rearW * 0.62, rearY - h * 0.12);
        ctx.lineTo(-rearW * 0.48, rearY - h * 0.04);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(rearW * 0.82, rearY - h * 0.04);
        ctx.lineTo(rearW * 0.62, rearY - h * 0.12);
        ctx.lineTo(rearW * 0.48, rearY - h * 0.04);
        ctx.closePath();
        ctx.fill();
        break;
      case 'model_y':
        ctx.fillStyle = red;
        ctx.fillRect(-rearW * 0.84, rearY - h * 0.07, rearW * 1.68, h * 0.055);
        ctx.fillStyle = redHi;
        ctx.fillRect(-rearW * 0.8, rearY - h * 0.065, rearW * 1.6, h * 0.025);
        break;
      case 'taxi':
        ctx.fillStyle = red;
        ctx.fillRect(-rearW * 0.75, rearY - h * 0.07, rearW * 1.5, h * 0.06);
        break;
      case 'lambo':
        ctx.fillStyle = shade(body, -25);
        ctx.fillRect(-rearW * 0.8, rearY - h * 0.24, rearW * 1.6, h * 0.05);
        ctx.fillStyle = red;
        ctx.beginPath();
        ctx.moveTo(-rearW * 0.72, rearY - h * 0.1);
        ctx.lineTo(-rearW * 0.48, rearY - h * 0.16);
        ctx.lineTo(-rearW * 0.38, rearY - h * 0.06);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(rearW * 0.72, rearY - h * 0.1);
        ctx.lineTo(rearW * 0.48, rearY - h * 0.16);
        ctx.lineTo(rearW * 0.38, rearY - h * 0.06);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#1a1a20';
        ctx.fillRect(-w * 0.12, rearY + h * 0.04, w * 0.24, h * 0.06);
        break;
      case 'porsche911':
        ctx.fillStyle = shade(body, -22);
        ctx.fillRect(-rearW * 0.85, rearY - h * 0.26, rearW * 1.7, h * 0.05);
        ctx.fillStyle = red;
        ctx.beginPath();
        ctx.arc(-rearW * 0.55, rearY - h * 0.1, w * 0.07, 0, Math.PI * 2);
        ctx.arc(rearW * 0.55, rearY - h * 0.1, w * 0.07, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'ferrari':
        ctx.fillStyle = red;
        ctx.beginPath();
        ctx.arc(-rearW * 0.38, rearY - h * 0.1, w * 0.065, 0, Math.PI * 2);
        ctx.arc(rearW * 0.38, rearY - h * 0.1, w * 0.065, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1a20';
        ctx.fillRect(-w * 0.08, rearY + h * 0.06, w * 0.16, h * 0.05);
        break;
      case 'corvette':
        ctx.fillStyle = shade(body, -20);
        ctx.fillRect(-rearW * 0.7, rearY - h * 0.22, rearW * 1.4, h * 0.05);
        ctx.fillStyle = red;
        ctx.fillRect(-rearW * 0.55, rearY - h * 0.12, w * 0.1, h * 0.08);
        ctx.fillRect(-rearW * 0.2, rearY - h * 0.12, w * 0.1, h * 0.08);
        ctx.fillRect(rearW * 0.1, rearY - h * 0.12, w * 0.1, h * 0.08);
        ctx.fillRect(rearW * 0.45, rearY - h * 0.12, w * 0.1, h * 0.08);
        break;
      case 'mustang':
        ctx.fillStyle = shade(body, -22);
        ctx.fillRect(-rearW * 0.78, rearY - h * 0.24, rearW * 1.56, h * 0.05);
        ctx.fillStyle = red;
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(-rearW * 0.82, rearY - h * (0.14 - i * 0.035), w * 0.14, h * 0.025);
          ctx.fillRect(rearW * 0.68, rearY - h * (0.14 - i * 0.035), w * 0.14, h * 0.025);
        }
        break;
      default:
        ctx.fillStyle = red;
        ctx.fillRect(-rearW * 0.85, rearY - h * 0.05, w * 0.14, h * 0.1);
        ctx.fillRect(rearW * 0.7, rearY - h * 0.05, w * 0.14, h * 0.1);
    }
  }

  // Rear / 3rd-person car render — smooth gradients, glass, wheels, kind-specific trim.
  function drawLowPolyCar(x, y, scale, kind, opts = {}) {
    const player = !!opts.player;
    const yaw = opts.yaw || 0;
    const pitch = opts.pitch || 0;
    const roll = opts.roll || 0;
    const smashed = !!opts.smashed;
    const crush = Math.max(0, Math.min(1, opts.crush || (smashed ? 0.6 : 0)));
    const rear = opts.rear;
    const bodyScale = opts.bodyScale || 1;
    const roofMul = opts.roof || rear?.roof || 1;
    const wMul = rear?.wMul || 1;
    const hMul = rear?.hMul || 1;
    const wheelSpin = opts.wheelSpin || 0;
    const s = Math.max(0.12, scale) * bodyScale;
    const kindW = kind === 'bus' ? 78 : kind === 'van' || kind === 'suv' ? 68
      : kind === 'pickup' ? 64 : kind === 'compact' || kind === 'sports' ? 52 : 58;
    const kindH = kind === 'bus' ? 48 : kind === 'suv' || kind === 'van' ? 40
      : kind === 'sports' ? 28 : kind === 'compact' ? 30 : 34;
    const w = kindW * s * wMul * (1 - crush * 0.35);
    const h = kindH * s * hMul * (1 - crush * 0.45);
    const baseColor = opts.color
      || (player ? '#1a2430' : kind === 'taxi' ? '#d4a017' : kind === 'bus' ? '#e8e6e0' : '#4a5560');
    const body = smashed ? shade(baseColor, -40 - crush * 30) : baseColor;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(roll + yaw * (smashed ? 1 : 0.38));
    const squashX = 1 + crush * 0.35;
    const squashY = 1 - crush * 0.4;
    ctx.transform(squashX, pitch * 0.12 + crush * 0.15, crush * 0.2, squashY, 0, crush * 6 * s);

    // Soft ground shadow
    ctx.fillStyle = `rgba(0,0,0,${0.28 + crush * 0.22})`;
    ctx.beginPath();
    ctx.ellipse(crush * 8 * s, 3 * s, w * (0.56 + crush * 0.18), h * 0.14, crush * 0.35, 0, Math.PI * 2);
    ctx.fill();

    const lean = yaw * 12 * s;
    const rearY = -h * 0.05;
    const midY = -h * (0.5 + roofMul * 0.05);
    const noseY = -h * (kind === 'pickup' ? 0.85 : kind === 'sports' ? 1.12 : 1.05);
    const rearW = w * (0.5 - crush * 0.08);
    const midW = w * (0.38 - crush * 0.06);
    const noseW = w * (0.22 + (kind === 'sports' ? -0.06 : kind === 'compact' ? -0.02 : 0));
    const roofH = h * 0.35 * roofMul * (1 - crush * 0.5);
    const roofTop = midY - roofH;

    // Wheels — rear pair visible from chase cam
    const wheelR = h * (kind === 'bus' ? 0.16 : kind === 'sports' ? 0.13 : 0.15) * (1 - crush * 0.2);
    drawCarWheel(-rearW * 0.72, rearY + h * 0.16, wheelR, wheelSpin, crush);
    drawCarWheel(rearW * 0.72, rearY + h * 0.16, wheelR, wheelSpin + 0.4, crush);
    if (kind === 'bus') {
      drawCarWheel(-rearW * 0.72, rearY + h * 0.28, wheelR * 0.92, wheelSpin + 0.2, crush);
      drawCarWheel(rearW * 0.72, rearY + h * 0.28, wheelR * 0.92, wheelSpin + 0.6, crush);
    }

    // Lower body / rocker panels
    ctx.fillStyle = carPaintGrad(body, -rearW, rearY, rearW, rearY + h * 0.22);
    ctx.beginPath();
    ctx.moveTo(-rearW, rearY + h * 0.2);
    ctx.quadraticCurveTo(-midW * 0.5 + lean * 0.3, rearY + h * 0.24, -midW + lean, midY + h * 0.15);
    ctx.lineTo(midW + lean, midY + h * 0.15);
    ctx.quadraticCurveTo(midW * 0.5 + lean * 0.3, rearY + h * 0.24, rearW, rearY + h * 0.2);
    ctx.closePath();
    ctx.fill();

    // Main rear body — rounded shoulders
    ctx.fillStyle = carPaintGrad(body, 0, rearY - h * 0.2, 0, rearY + h * 0.2);
    ctx.beginPath();
    ctx.moveTo(-rearW, rearY + h * 0.18);
    ctx.quadraticCurveTo(-rearW * 0.98, rearY + h * 0.02, -rearW * 0.92, rearY - h * 0.15);
    ctx.quadraticCurveTo(-rearW * 0.55, rearY - h * 0.22, 0, rearY - h * 0.18);
    ctx.quadraticCurveTo(rearW * 0.55, rearY - h * 0.22, rearW * 0.92, rearY - h * 0.15);
    ctx.quadraticCurveTo(rearW * 0.98, rearY + h * 0.02, rearW, rearY + h * 0.18);
    ctx.closePath();
    ctx.fill();

    // Cabin / roof — smooth taper toward nose
    ctx.fillStyle = carPaintGrad(shade(body, 8), -rearW * 0.7, roofTop, rearW * 0.7, midY);
    ctx.beginPath();
    ctx.moveTo(-rearW * 0.72, rearY - h * 0.12);
    ctx.quadraticCurveTo(-midW * 0.88 + lean, midY - roofH * 0.4, -midW * 0.85 + lean, midY - roofH);
    ctx.lineTo(midW * 0.85 + lean, midY - roofH);
    ctx.quadraticCurveTo(midW * 0.88 + lean, midY - roofH * 0.4, rearW * 0.72, rearY - h * 0.12);
    ctx.closePath();
    ctx.fill();

    // Side facets — depth shading
    ctx.fillStyle = shade(body, -26);
    ctx.beginPath();
    ctx.moveTo(-rearW * 0.88, rearY - h * 0.1);
    ctx.lineTo(-midW + lean, midY);
    ctx.lineTo(-midW * 0.72 + lean, midY - roofH * 0.88);
    ctx.lineTo(-rearW * 0.68, rearY - h * 0.36);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = shade(body, -14);
    ctx.beginPath();
    ctx.moveTo(rearW * 0.88, rearY - h * 0.1);
    ctx.lineTo(midW + lean, midY);
    ctx.lineTo(midW * 0.72 + lean, midY - roofH * 0.88);
    ctx.lineTo(rearW * 0.68, rearY - h * 0.36);
    ctx.closePath();
    ctx.fill();

    // Paint highlight streak
    if (!smashed && crush < 0.2) {
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.beginPath();
      ctx.moveTo(-rearW * 0.35, rearY - h * 0.08);
      ctx.quadraticCurveTo(-midW * 0.2 + lean, midY - roofH * 0.5, midW * 0.15 + lean, midY - roofH * 0.85);
      ctx.lineTo(midW * 0.05 + lean, midY - roofH * 0.75);
      ctx.quadraticCurveTo(-midW * 0.3 + lean, midY - roofH * 0.35, -rearW * 0.45, rearY - h * 0.02);
      ctx.closePath();
      ctx.fill();
    }

    // Rear glass + cabin glass
    const glassTop = rearY - h * (kind === 'sports' ? 0.38 : 0.42) * (1 - crush * 0.25);
    ctx.fillStyle = smashed ? 'rgba(40,50,60,0.85)' : carGlassGrad(-rearW * 0.52, glassTop, rearW * 0.52, rearY - h * 0.12);
    ctx.beginPath();
    ctx.moveTo(-rearW * 0.52, rearY - h * 0.14);
    ctx.quadraticCurveTo(-rearW * 0.42, glassTop, 0, glassTop - h * 0.02);
    ctx.quadraticCurveTo(rearW * 0.42, glassTop, rearW * 0.52, rearY - h * 0.14);
    ctx.closePath();
    ctx.fill();
    if (!smashed) {
      ctx.fillStyle = 'rgba(180,210,240,0.18)';
      ctx.beginPath();
      ctx.moveTo(-rearW * 0.28, glassTop + h * 0.04);
      ctx.lineTo(-rearW * 0.08, glassTop + h * 0.12);
      ctx.lineTo(rearW * 0.05, glassTop + h * 0.06);
      ctx.closePath();
      ctx.fill();
      // Pillars
      ctx.fillStyle = shade(body, -18);
      ctx.fillRect(-rearW * 0.54, glassTop, w * 0.05, rearY - h * 0.12 - glassTop);
      ctx.fillRect(rearW * 0.49, glassTop, w * 0.05, rearY - h * 0.12 - glassTop);
    }

    // Hood / nose taper
    ctx.fillStyle = carPaintGrad(shade(body, 4), -midW, midY, midW, noseY);
    if (kind === 'pickup') {
      ctx.fillRect(-midW * 0.55 + lean, midY - h * 0.08, midW * 1.1, h * 0.35);
      ctx.fillStyle = carPaintGrad(shade(body, -8), -midW * 0.5 + lean, midY, midW, midY + h * 0.22);
      ctx.fillRect(-midW * 0.5 + lean, midY, midW, h * 0.22);
      drawCarChromeStrip(-midW * 0.48 + lean, midY + h * 0.19, midW * 0.96, h * 0.025);
    } else {
      ctx.beginPath();
      ctx.moveTo(-midW * 0.72 + lean, midY);
      ctx.quadraticCurveTo(-noseW * 0.5 + lean * 0.5, noseY + h * 0.08, -noseW + lean * 0.5, noseY);
      ctx.quadraticCurveTo(0 + lean * 0.3, noseY - h * 0.04, noseW + lean * 0.5, noseY);
      ctx.quadraticCurveTo(noseW * 0.5 + lean * 0.5, noseY + h * 0.08, midW * 0.72 + lean, midY);
      ctx.closePath();
      ctx.fill();
    }

    // Front clip / grille hint (visible from rear-three-quarter)
    ctx.fillStyle = '#0d0d10';
    ctx.beginPath();
    ctx.moveTo(-noseW * 0.85 + lean * 0.4, noseY + h * 0.02);
    ctx.quadraticCurveTo(0 + lean * 0.25, noseY + h * 0.08, noseW * 0.85 + lean * 0.4, noseY + h * 0.02);
    ctx.lineTo(noseW * 0.6 + lean * 0.4, noseY + h * 0.14);
    ctx.lineTo(-noseW * 0.6 + lean * 0.4, noseY + h * 0.14);
    ctx.closePath();
    ctx.fill();
    if (!smashed) {
      ctx.fillStyle = 'rgba(240,245,255,0.75)';
      ctx.fillRect(-noseW * 0.55 + lean * 0.4, noseY + h * 0.05, noseW * 0.22, h * 0.05);
      ctx.fillRect(noseW * 0.33 + lean * 0.4, noseY + h * 0.05, noseW * 0.22, h * 0.05);
    }

    // Rear bumper + exhaust
    ctx.fillStyle = '#1a1a20';
    ctx.fillRect(-rearW * 0.78, rearY + h * 0.06, w * 0.18, h * 0.2);
    if (crush < 0.55) {
      ctx.fillRect(rearW * 0.58, rearY + h * 0.06, w * 0.18, h * 0.2);
    }
    drawCarChromeStrip(-rearW * 0.82, rearY + h * 0.04, rearW * 1.64, h * 0.03);
    if (kind !== 'bus' && crush < 0.5) {
      ctx.fillStyle = '#2a2a30';
      ctx.fillRect(-rearW * 0.22, rearY + h * 0.14, w * 0.08, h * 0.04);
      ctx.fillRect(rearW * 0.14, rearY + h * 0.14, w * 0.08, h * 0.04);
    }

    // Taillights + model-specific rear
    if (rear?.id) {
      drawCarRear(rear.id, { rearW, rearY, h, w, lean, body, midW, midY, s });
    } else {
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(-rearW * 0.85, rearY - h * 0.05, w * 0.14, h * 0.1);
      ctx.fillRect(rearW * 0.7, rearY - h * 0.05, w * 0.14, h * 0.1);
      ctx.fillStyle = 'rgba(255,100,90,0.45)';
      ctx.fillRect(-rearW * 0.84, rearY - h * 0.045, w * 0.12, h * 0.04);
      ctx.fillRect(rearW * 0.71, rearY - h * 0.045, w * 0.12, h * 0.04);
    }

    drawCarKindDetails(kind, w, h, rearW, rearY, midY, midW, roofH, lean, s, body, opts);

    if (player) {
      ctx.fillStyle = 'rgba(90,140,170,0.35)';
      ctx.fillRect(-midW * 0.45 + lean, midY - h * 0.02, midW * 0.9, h * 0.06);
    }

    if (smashed || crush > 0.1) {
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 1.5 + crush;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-w * 0.25, -h * 0.35);
      ctx.lineTo(w * 0.1, h * 0.08);
      ctx.lineTo(-w * 0.05, -h * 0.15);
      ctx.moveTo(w * 0.22, -h * 0.55);
      ctx.lineTo(-w * 0.12, 0);
      ctx.lineTo(w * 0.08, -h * 0.25);
      ctx.stroke();
      ctx.fillStyle = 'rgba(30,30,35,0.55)';
      ctx.beginPath();
      ctx.moveTo(-w * 0.15, -h * 0.2);
      ctx.lineTo(0, -h * 0.05);
      ctx.lineTo(-w * 0.08, h * 0.1);
      ctx.closePath();
      ctx.fill();
      if (crush > 0.3 && crush < 0.95) {
        ctx.fillStyle = `rgba(255,120,40,${0.15 * (1 - crush)})`;
        ctx.fillRect(-rearW * 0.6, rearY - h * 0.2, rearW * 1.2, h * 0.25);
      }
    }

    ctx.restore();
  }

  function drawLakeStrip(z0, z1, d, fogT) {
    if (!routeEnvAt(d, z0).onLakefront && !routeEnvAt(d, z1).onLakefront) return;
    const wR = projectWorld(DW.WALK, 0, z0, d);
    const vR = projectWorld(DW.WALK, 0, z1, d);
    const pR = projectWorld(DW.ROAD, 0, z0, d);
    const qR = projectWorld(DW.ROAD, 0, z1, d);
    if (wR.relZ < 8) return;
    const LAKE = [26, 62, 98];
    const FOG = [126, 120, 108];
    const t = Math.pow(Math.max(0, Math.min(1, wR.relZ / 920)), 1.15) * 0.88;
    ctx.fillStyle = hazeMix(LAKE, FOG, t * fogT);
    ctx.beginPath();
    ctx.moveTo(wR.x, wR.y);
    ctx.lineTo(W + 50, wR.y + 2);
    ctx.lineTo(W + 50, vR.y + 2);
    ctx.lineTo(vR.x, vR.y);
    ctx.lineTo(qR.x, qR.y);
    ctx.lineTo(pR.x, pR.y);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = `rgba(160,210,255,${0.07 * (1 - t)})`;
    const waveY = wR.y - 4 * wR.scale - Math.sin(z0 * 0.08) * 2 * wR.scale;
    ctx.fillRect(wR.x, waveY, Math.max(20, (W - wR.x) * 0.4), 2 * wR.scale);
  }

  function drawLandmark(lm, d) {
    const side = lm.side != null ? lm.side : (lm.e > 1.5 ? 1 : -1);
    const lakeKinds = ['pier', 'beach', 'oakbeach'];
    const inset = lakeKinds.includes(lm.kind) ? 0.38 : (lm.kind === 'hancock' ? 0.22 : 0.12);
    const xWorld = side * (DW.BUILD + inset);
    const ground = projectWorld(xWorld, 0, lm.z, d);
    if (ground.relZ > 2400) return;
    const nearFade = facadeProximityFade(ground, d, { minZ: 82, fadeZ: 320, minScale: 0.04 });
    if (nearFade <= 0) return;
    const fade = Math.max(0, Math.min(1, (2400 - ground.relZ) / 620)) * nearFade;
    const near = Math.max(0, 1 - ground.relZ / 480);
    ctx.save();
    ctx.globalAlpha = fade;
    const topClip = H * (ground.relZ < 160 ? 0.29 : 0.24);
    ctx.beginPath();
    ctx.rect(-40, topClip, W + 80, H - topClip + 40);
    ctx.clip();
    const s = ground.scale;
    const gx = ground.x;
    const gy = ground.y;

    function lmTop(h) {
      return projectWorld(xWorld, h, lm.z, d);
    }
    function lmWinGrid(cx, y0, bw, bh, cols, rows, lit) {
      const padX = bw * 0.12;
      const padY = bh * 0.08;
      const cellW = (bw - padX * 2) / cols;
      const cellH = (bh - padY * 2) / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const wx = cx - bw * 0.5 + padX + c * cellW + cellW * 0.18;
          const wy = y0 + padY + r * cellH + cellH * 0.2;
          const ww = cellW * 0.55;
          const wh = cellH * 0.52;
          const on = lit && ((r * 7 + c * 3 + lm.z) % 5 !== 0);
          ctx.fillStyle = on ? 'rgba(255,228,160,0.55)' : 'rgba(40,50,65,0.85)';
          ctx.fillRect(wx, wy, ww, wh);
        }
      }
    }
    function lmGlow(cx, y0, bw, bh, color) {
      if (near < 0.08) return;
      ctx.save();
      ctx.globalAlpha = near * 0.22 * fade;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(cx, y0 + bh * 0.45, bw * 0.72, bh * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    function lmBase(bw) {
      ctx.fillStyle = '#2a2826';
      ctx.fillRect(gx - bw * 0.58, gy - 5 * s, bw * 1.16, 6 * s);
      ctx.fillStyle = 'rgba(255,210,120,0.12)';
      ctx.fillRect(gx - bw * 0.52, gy - 4 * s, bw * 1.04, 2 * s);
    }
    function lmRim(cx, y0, bw, bh) {
      if (near < 0.12) return;
      ctx.save();
      ctx.globalAlpha = near * 0.35 * fade;
      ctx.strokeStyle = 'rgba(220,235,255,0.28)';
      ctx.lineWidth = Math.max(1, 1.4 * s);
      ctx.strokeRect(cx - bw * 0.5, y0, bw, bh);
      ctx.restore();
    }
    function lmLakeReflect(cx, yBase, bw, bh) {
      if (!routeEnvAt(d, lm.z).onLakefront || near < 0.05) return;
      ctx.save();
      ctx.globalAlpha = near * 0.14 * fade;
      ctx.fillStyle = 'rgba(90,150,190,0.45)';
      ctx.fillRect(cx - bw * 0.45, yBase + 2 * s, bw * 0.9, Math.min(bh * 0.22, 28 * s));
      ctx.restore();
    }
    function lmCornCob(cx, y0, cobW, cobH) {
      ctx.fillStyle = '#e8e4dc';
      ctx.beginPath();
      ctx.ellipse(cx, y0 + cobH * 0.5, cobW * 0.5, cobH * 0.48, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#d0ccc4';
      for (let ring = 0; ring < 9; ring++) {
        const ry = y0 + cobH * 0.12 + ring * cobH * 0.085;
        ctx.beginPath();
        ctx.ellipse(cx, ry, cobW * 0.46, cobH * 0.045, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = 'rgba(255,228,160,0.35)';
      for (let b = 0; b < 14; b++) {
        if (b % 3 === 0) continue;
        const by = y0 + cobH * 0.1 + b * cobH * 0.058;
        ctx.fillRect(cx - cobW * 0.38, by, cobW * 0.12, cobH * 0.028);
        ctx.fillRect(cx + cobW * 0.26, by, cobW * 0.12, cobH * 0.028);
      }
      ctx.fillStyle = '#524840';
      ctx.fillRect(cx - cobW * 0.55, y0 + cobH * 0.82, cobW * 1.1, cobH * 0.18);
    }
    function lmBulbRow(x0, y0, span, count) {
      for (let i = 0; i < count; i++) {
        const bx = x0 + (count === 1 ? 0 : (i / (count - 1)) * span);
        const on = (i * 5 + Math.floor(lm.z * 0.1)) % 7 !== 0;
        ctx.fillStyle = on ? 'rgba(255,220,140,0.9)' : 'rgba(70,55,35,0.55)';
        ctx.beginPath();
        ctx.arc(bx, y0, Math.max(1.2, 1.8 * s), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    function lmBeaconRays(cx, cy, rad) {
      ctx.save();
      ctx.globalAlpha = fade * 0.4;
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * Math.PI * 2 + performance.now() * 0.0004;
        ctx.fillStyle = 'rgba(255,230,120,0.22)';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(ang) * rad, cy + Math.sin(ang) * rad * 0.35);
        ctx.lineTo(cx + Math.cos(ang + 0.12) * rad * 0.65, cy + Math.sin(ang + 0.12) * rad * 0.22);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
    function lmClockHands(cx, cy, rad) {
      ctx.strokeStyle = '#e8e4dc';
      ctx.lineWidth = Math.max(1, 0.9 * s);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx, cy - rad * 0.58);
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + rad * 0.42, cy + rad * 0.12);
      ctx.stroke();
    }
    function lmFlagPole(fx, fy, fh) {
      ctx.fillStyle = '#6a6058';
      ctx.fillRect(fx - s, fy - fh, 2 * s, fh);
      ctx.fillStyle = 'rgba(180,40,40,0.75)';
      ctx.fillRect(fx + s, fy - fh + 2 * s, 9 * s, 5 * s);
    }
    function lmAwningStripes(ax, ay, aw, ah) {
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = i % 2 ? 'rgba(190,35,35,0.55)' : 'rgba(240,240,240,0.45)';
        ctx.fillRect(ax + i * (aw / 6), ay, aw / 6 + 0.5, ah);
      }
    }
    function lmCornice(cx, y, bw, h) {
      ctx.fillStyle = 'rgba(200,190,180,0.22)';
      ctx.fillRect(cx - bw * 0.52, y, bw * 1.04, h);
      ctx.fillStyle = 'rgba(160,150,140,0.18)';
      for (let i = 0; i < 7; i++) {
        ctx.fillRect(cx - bw * 0.48 + i * bw * 0.14, y + h * 0.15, bw * 0.06, h * 0.7);
      }
    }
    function lmMullions(cx, y0, bw, bh, cols) {
      ctx.fillStyle = 'rgba(30,35,42,0.45)';
      for (let c = 1; c < cols; c++) {
        ctx.fillRect(cx - bw * 0.5 + (c / cols) * bw - s, y0, Math.max(1, s), bh);
      }
    }
    function lmAntenna(cx, y, h) {
      ctx.fillStyle = '#889098';
      ctx.fillRect(cx - s, y - h, 2 * s, h);
      ctx.fillStyle = (Math.floor(performance.now() / 500) % 2) ? 'rgba(255,80,60,0.8)' : 'rgba(255,180,80,0.5)';
      ctx.beginPath();
      ctx.arc(cx, y - h, 2 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    function lmPodiumLights(cx, y, span) {
      for (let i = 0; i < 4; i++) {
        const lx = cx - span * 0.5 + i * (span / 3);
        ctx.fillStyle = 'rgba(255,210,120,0.35)';
        ctx.fillRect(lx - 2 * s, y - 3 * s, 4 * s, 3 * s);
        ctx.fillStyle = 'rgba(255,228,160,0.12)';
        ctx.beginPath();
        ctx.moveTo(lx - 4 * s, y);
        ctx.lineTo(lx + 4 * s, y);
        ctx.lineTo(lx + 8 * s, y + 6 * s);
        ctx.lineTo(lx - 8 * s, y + 6 * s);
        ctx.closePath();
        ctx.fill();
      }
    }
    function lmFireEscape(cx, y0, h) {
      ctx.strokeStyle = 'rgba(90,95,100,0.55)';
      ctx.lineWidth = Math.max(1, s);
      for (let r = 0; r < 4; r++) {
        const ry = y0 + r * h * 0.22;
        ctx.strokeRect(cx - 5 * s, ry, 10 * s, h * 0.16);
        if (r < 3) {
          ctx.beginPath();
          ctx.moveTo(cx - 5 * s, ry + h * 0.16);
          ctx.lineTo(cx + 5 * s, ry + h * 0.22);
          ctx.stroke();
        }
      }
    }
    function lmGargoyle(fx, fy, flip) {
      ctx.fillStyle = '#2e2c28';
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + (flip ? -8 : 8) * s, fy - 6 * s);
      ctx.lineTo(fx + (flip ? -4 : 4) * s, fy + 4 * s);
      ctx.closePath();
      ctx.fill();
    }

    if (lm.kind === 'hancock') {
      const top = lmTop(460);
      const bw = 52 * s;
      const bh = gy - top.y;
      lmGlow(gx, top.y, bw * 1.4, bh, 'rgba(120,170,220,0.35)');
      lmBase(bw);
      const tW = bw * 0.42;
      const gap = bw * 0.16;
      const lX = gx - gap * 0.5 - tW;
      const rX = gx + gap * 0.5;
      ctx.fillStyle = '#222830';
      ctx.fillRect(lX, top.y + bh * 0.06, tW, bh * 0.94);
      ctx.fillRect(rX, top.y, tW, bh);
      ctx.fillStyle = '#323a44';
      for (let r = 0; r < 11; r++) {
        const bandY = top.y + r * bh * 0.085;
        ctx.fillRect(lX + 2 * s, bandY, tW - 4 * s, 3 * s);
        ctx.fillRect(rX + 2 * s, bandY, tW - 4 * s, 3 * s);
      }
      ctx.strokeStyle = 'rgba(180,200,220,0.35)';
      ctx.lineWidth = Math.max(1, 1.2 * s);
      ctx.beginPath();
      ctx.moveTo(lX + tW * 0.2, top.y + bh * 0.15);
      ctx.lineTo(rX + tW * 0.8, top.y + bh * 0.88);
      ctx.moveTo(lX + tW * 0.8, top.y + bh * 0.15);
      ctx.lineTo(rX + tW * 0.2, top.y + bh * 0.88);
      ctx.stroke();
      ctx.fillStyle = '#6a7078';
      ctx.fillRect(lX + tW * 0.28, top.y - 14 * s, tW * 0.44, 12 * s);
      ctx.fillRect(rX + tW * 0.28, top.y - 10 * s, tW * 0.44, 10 * s);
      ctx.fillStyle = 'rgba(255,80,60,0.75)';
      ctx.beginPath();
      ctx.arc(gx - gap * 0.25, top.y - 16 * s, 3 * s, 0, Math.PI * 2);
      ctx.arc(gx + gap * 0.25, top.y - 12 * s, 3 * s, 0, Math.PI * 2);
      ctx.fill();
      lmWinGrid(gx - gap * 0.5 - tW * 0.5, top.y + bh * 0.42, tW * 0.82, bh * 0.38, 3, 4, true);
      lmWinGrid(gx + gap * 0.5 + tW * 0.5, top.y + bh * 0.38, tW * 0.82, bh * 0.42, 3, 4, true);
      ctx.fillStyle = 'rgba(240,248,255,0.55)';
      ctx.fillRect(gx - bw * 0.55, top.y + bh * 0.68, bw * 1.1, 5 * s);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(gx - bw * 0.5, top.y + bh * 0.685, bw, 2 * s);
      ctx.fillStyle = 'rgba(100,140,180,0.35)';
      ctx.fillRect(gx - gap * 0.5 - 2 * s, top.y + bh * 0.52, gap + 4 * s, 4 * s);
      ctx.fillStyle = 'rgba(255,228,160,0.2)';
      ctx.fillRect(lX - 2 * s, top.y + bh * 0.08, 2 * s, bh * 0.84);
      ctx.fillRect(rX + tW, top.y + bh * 0.04, 2 * s, bh * 0.88);
      lmPodiumLights(gx, gy - 2 * s, bw * 1.1);
      lmRim(gx, top.y, bw * 1.2, bh);
    } else if (lm.kind === 'drake') {
      const top = lmTop(175);
      const bw = 98 * s;
      const bh = gy - top.y;
      lmGlow(gx, top.y, bw, bh, 'rgba(210,180,110,0.3)');
      lmBase(bw);
      ctx.fillStyle = '#3e3a36';
      ctx.fillRect(gx - bw * 0.5, top.y, bw, bh);
      ctx.fillStyle = '#524e48';
      ctx.fillRect(gx - bw * 0.44, top.y + bh * 0.1, bw * 0.88, bh * 0.24);
      ctx.fillStyle = '#2a2826';
      for (let c = 0; c < 9; c++) {
        ctx.fillRect(gx - bw * 0.4 + c * bw * 0.1, top.y + bh * 0.12, 5 * s, bh * 0.18);
      }
      ctx.fillStyle = 'rgba(220,190,110,0.45)';
      ctx.fillRect(gx - bw * 0.34, top.y + bh * 0.36, bw * 0.68, 10 * s);
      lmWinGrid(gx, top.y + bh * 0.48, bw * 0.78, bh * 0.42, 8, 3, true);
      ctx.fillStyle = '#6a6058';
      ctx.fillRect(gx - 2 * s, top.y - 18 * s, 4 * s, 16 * s);
      ctx.fillStyle = 'rgba(180,40,40,0.7)';
      ctx.fillRect(gx - 8 * s, top.y - 14 * s, 16 * s, 8 * s);
      ctx.strokeStyle = 'rgba(220,190,110,0.35)';
      ctx.lineWidth = Math.max(1, s);
      for (let b = 0; b < 5; b++) {
        const rx = gx - bw * 0.38 + b * bw * 0.18;
        ctx.beginPath();
        ctx.moveTo(rx, top.y + bh * 0.46);
        ctx.lineTo(rx, top.y + bh * 0.52);
        ctx.stroke();
      }
      for (let c = 0; c < 3; c++) {
        ctx.fillStyle = 'rgba(255,228,160,0.25)';
        ctx.fillRect(gx - bw * 0.32 + c * bw * 0.28, top.y + bh * 0.54, 8 * s, 6 * s);
      }
      ctx.fillStyle = '#524e48';
      ctx.beginPath();
      ctx.ellipse(gx, top.y + bh * 0.06, bw * 0.12, 8 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(220,190,110,0.3)';
      ctx.fillRect(gx - bw * 0.2, gy - 3 * s, bw * 0.4, 3 * s);
      lmCornice(gx, top.y + bh * 0.08, bw * 0.9, 6 * s);
    } else if (lm.kind === 'beach' || lm.kind === 'oakbeach') {
      const sandX = side > 0 ? xWorld + 0.28 : xWorld - 0.12;
      const sand = projectWorld(sandX, 0, lm.z, d);
      const sandH = (lm.kind === 'oakbeach' ? 18 : 24) * s;
      ctx.fillStyle = lm.kind === 'oakbeach' ? '#a89878' : '#968870';
      ctx.beginPath();
      ctx.moveTo(sand.x - 28 * s, sand.y);
      ctx.lineTo(side > 0 ? W + 40 : sand.x - 70 * s, sand.y);
      ctx.lineTo(side > 0 ? W + 40 : sand.x - 70 * s, sand.y - sandH);
      ctx.lineTo(sand.x - 8 * s, sand.y - sandH * 0.65);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,240,200,0.08)';
      ctx.fillRect(sand.x, sand.y - sandH * 0.55, (side > 0 ? W - sand.x + 30 : 50 * s), sandH * 0.35);
      if (side > 0) {
        ctx.fillStyle = '#1a8cb0';
        ctx.fillRect(sand.x - 10 * s, sand.y - 8 * s, W - sand.x + 30, 7 * s);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        for (let w = 0; w < 5; w++) {
          ctx.fillRect(sand.x + w * 18 * s, sand.y - 7 * s, 12 * s, 2 * s);
        }
      }
      for (let u = 0; u < 4; u++) {
        const ux = sand.x + u * 16 * s + 6 * s;
        ctx.strokeStyle = '#c83838';
        ctx.lineWidth = Math.max(1, s);
        ctx.beginPath();
        ctx.moveTo(ux, sand.y - 3 * s);
        ctx.lineTo(ux, sand.y - 14 * s);
        ctx.stroke();
        ctx.fillStyle = 'rgba(240,220,180,0.55)';
        ctx.beginPath();
        ctx.moveTo(ux - 7 * s, sand.y - 14 * s);
        ctx.lineTo(ux + 7 * s, sand.y - 14 * s);
        ctx.lineTo(ux + 5 * s, sand.y - 17 * s);
        ctx.lineTo(ux - 5 * s, sand.y - 17 * s);
        ctx.closePath();
        ctx.fill();
      }
      ctx.fillStyle = '#c85030';
      ctx.fillRect(sand.x + 8 * s, sand.y - 22 * s, 10 * s, 12 * s);
      ctx.fillStyle = '#fff';
      ctx.fillRect(sand.x + 10 * s, sand.y - 18 * s, 6 * s, 4 * s);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = Math.max(1, s);
      ctx.beginPath();
      ctx.moveTo(sand.x + 42 * s, sand.y - 10 * s);
      ctx.lineTo(sand.x + 42 * s, sand.y - 28 * s);
      ctx.moveTo(sand.x + 34 * s, sand.y - 19 * s);
      ctx.lineTo(sand.x + 50 * s, sand.y - 19 * s);
      ctx.stroke();
      for (let p = 0; p < 3; p++) {
        ctx.fillStyle = '#5a5048';
        ctx.fillRect(sand.x + 58 * s + p * 10 * s, sand.y - 6 * s, 3 * s, 8 * s);
      }
      ctx.fillStyle = 'rgba(80,70,60,0.35)';
      ctx.beginPath();
      ctx.moveTo(sand.x - 18 * s, sand.y - 2 * s);
      ctx.lineTo(sand.x + 24 * s, sand.y - 2 * s);
      ctx.lineTo(sand.x + 20 * s, sand.y - 5 * s);
      ctx.lineTo(sand.x - 14 * s, sand.y - 5 * s);
      ctx.closePath();
      ctx.fill();
      for (let t = 0; t < 3; t++) {
        ctx.fillStyle = ['rgba(200,80,60,0.4)', 'rgba(60,100,160,0.4)', 'rgba(220,200,80,0.35)'][t];
        ctx.fillRect(sand.x + 4 * s + t * 14 * s, sand.y - 8 * s, 10 * s, 5 * s);
      }
      ctx.fillStyle = 'rgba(240,248,255,0.15)';
      ctx.beginPath();
      ctx.moveTo(W - 20, sand.y - sandH * 0.8);
      ctx.lineTo(W - 8, sand.y - sandH * 0.55);
      ctx.lineTo(W - 28, sand.y - sandH * 0.5);
      ctx.closePath();
      ctx.fill();
    } else if (lm.kind === 'pier') {

        ctx.lineTo(gx + Math.cos(ang) * 9 * s, top.y + bh * 0.42 + Math.sin(ang) * 9 * s);
        ctx.stroke();
      }
      ctx.fillStyle = '#4a4038';
      for (let bt = 0; bt < 2; bt++) {

    } else if (lm.kind === 'aon') {

      ctx.lineWidth = Math.max(1, s);
      ctx.beginPath();
      ctx.moveTo(gx - bw * 0.5, top.y + bh * 0.15);
      ctx.lineTo(gx - bw * 0.42, top.y);
      ctx.moveTo(gx + bw * 0.5, top.y + bh * 0.15);
      ctx.lineTo(gx + bw * 0.42, top.y);
      ctx.stroke();
      ctx.fillStyle = '#889098';
      ctx.fillRect(gx - bw * 0.06, top.y - 28 * s, bw * 0.12, 8 * s);

      ctx.fillRect(gx - bw * 0.44, top.y + bh * 0.12, bw * 0.88, bh * 0.18);

      ctx.strokeStyle = '#e8e4dc';

      ctx.beginPath();

    } else if (lm.kind === 'marina') {

      ctx.fillStyle = 'rgba(255,228,160,0.25)';
      ctx.fillRect(gx - bw * 0.14, top.y + bh * 0.62, bw * 0.28, 8 * s);

    } else if (lm.kind === 'biograph') {
      const top = lmTop(128);
      const bw = 88 * s;
      const bh = gy - top.y;
      lmGlow(gx, top.y, bw, bh, 'rgba(255,200,120,0.2)');
      lmBase(bw);
      ctx.fillStyle = '#4a4038';
      ctx.fillRect(gx - bw * 0.5, top.y + bh * 0.22, bw, bh * 0.78);

      ctx.fillRect(gx - bw * 0.46, top.y + bh * 0.08, bw * 0.92, bh * 0.18);

      ctx.fillStyle = 'rgba(255,120,80,0.45)';
      ctx.fillRect(gx - bw * 0.42, top.y + bh * 0.1, 4 * s, bh * 0.14);
      ctx.fillRect(gx + bw * 0.38, top.y + bh * 0.1, 4 * s, bh * 0.14);
      for (let c = 0; c < 6; c++) {
        ctx.fillStyle = 'rgba(255,180,80,0.35)';
        ctx.fillRect(gx - bw * 0.4 + c * bw * 0.14, top.y + bh * 0.32, 6 * s, 10 * s);
      }
      ctx.fillStyle = '#2a2826';
      ctx.fillRect(gx - bw * 0.08, top.y + bh * 0.48, bw * 0.16, bh * 0.38);
      lmWinGrid(gx, top.y + bh * 0.28, bw * 0.7, bh * 0.55, 6, 3, true);
      ctx.fillStyle = '#3a3530';
      ctx.fillRect(gx - bw * 0.14, top.y + bh * 0.44, 10 * s, 12 * s);
      ctx.fillStyle = 'rgba(200,180,140,0.3)';
      ctx.fillRect(gx - bw * 0.46, top.y + bh * 0.36, 8 * s, 14 * s);
      ctx.fillRect(gx + bw * 0.38, top.y + bh * 0.36, 8 * s, 14 * s);
    } else if (lm.kind === 'zoo') {
      const top = lmTop(95);
      const bw = 110 * s;
      const bh = gy - top.y;
      lmGlow(gx, top.y, bw, bh, 'rgba(180,160,120,0.18)');
      ctx.fillStyle = '#6a6058';
      ctx.fillRect(gx - bw * 0.5, gy - 8 * s, bw, 8 * s);
      const archH = bh * 0.85;
      ctx.fillStyle = '#5a5048';
      ctx.fillRect(gx - bw * 0.48, top.y + archH * 0.15, bw * 0.14, archH * 0.85);
      ctx.fillRect(gx + bw * 0.34, top.y + archH * 0.15, bw * 0.14, archH * 0.85);
      ctx.beginPath();
      ctx.moveTo(gx - bw * 0.41, top.y + archH * 0.15);
      ctx.quadraticCurveTo(gx, top.y - archH * 0.08, gx + bw * 0.41, top.y + archH * 0.15);
      ctx.lineTo(gx + bw * 0.34, top.y + archH);
      ctx.lineTo(gx - bw * 0.34, top.y + archH);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#4a4540';
      ctx.fillRect(gx - bw * 0.12, top.y + archH * 0.42, bw * 0.24, archH * 0.58);
      ctx.fillStyle = '#8a8078';
      ctx.fillRect(gx - bw * 0.44, top.y + archH * 0.62, 8 * s, 10 * s);
      ctx.fillRect(gx + bw * 0.36, top.y + archH * 0.62, 8 * s, 10 * s);
      ctx.fillRect(gx - bw * 0.46, top.y + archH * 0.58, 12 * s, 5 * s);
      ctx.fillRect(gx + bw * 0.34, top.y + archH * 0.58, 12 * s, 5 * s);
      ctx.fillStyle = 'rgba(255,210,120,0.3)';
      ctx.beginPath();
      ctx.arc(gx, top.y + archH * 0.18, 6 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180,170,150,0.35)';
      ctx.lineWidth = Math.max(1, s);
      for (let f = 0; f < 9; f++) {
        const fx = gx - bw * 0.38 + f * bw * 0.095;
        ctx.beginPath();
        ctx.moveTo(fx, top.y + archH + 2 * s);
        ctx.lineTo(fx, top.y + archH - 5 * s);
        ctx.stroke();
      }
      ctx.fillStyle = '#3a4038';
      ctx.fillRect(gx - bw * 0.55, top.y + archH, bw * 1.1, bh - archH + 4 * s);
      for (let t = 0; t < 3; t++) {
        ctx.fillStyle = '#2a4030';
        ctx.beginPath();
        ctx.moveTo(gx - bw * 0.35 + t * bw * 0.28, top.y + archH + 6 * s);
        ctx.lineTo(gx - bw * 0.28 + t * bw * 0.28, top.y + archH - 8 * s);
        ctx.lineTo(gx - bw * 0.21 + t * bw * 0.28, top.y + archH + 6 * s);

        ctx.fill();
      }
      for (let tp = 0; tp < 2; tp++) {
        ctx.fillStyle = '#2a4030';
        ctx.beginPath();
        ctx.arc(gx - bw * 0.28 + tp * bw * 0.56, top.y + archH + 10 * s, 6 * s, 0, Math.PI * 2);

      }
      ctx.strokeStyle = 'rgba(140,130,120,0.4)';

      ctx.moveTo(gx - bw * 0.15, top.y + archH + 2 * s);
      ctx.lineTo(gx - bw * 0.05, top.y + archH + 14 * s);
      ctx.lineTo(gx + bw * 0.05, top.y + archH + 14 * s);
      ctx.lineTo(gx + bw * 0.15, top.y + archH + 2 * s);
      ctx.stroke();
    }

    const towerKinds = ['hancock', 'tribune', 'wtplace', 'ninems', 'onemag', 'parktower', 'palmolive', 'aon', 'london'];
    if (towerKinds.includes(lm.kind)) {
      const topH = lm.kind === 'hancock' ? 460 : lm.kind === 'aon' ? 520 : lm.kind === 'parktower' ? 360 : 280;
      const topPt = lmTop(topH);
      const tbh = gy - topPt.y;
      const tbw = (lm.kind === 'hancock' ? 52 : lm.kind === 'drake' ? 98 : 70) * s;
      lmLakeReflect(gx, gy, tbw, tbh);
