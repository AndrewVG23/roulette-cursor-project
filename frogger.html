    ctx.restore();
  }

  function drawBuilding(b, d) {
    // Buildings sit on the lot line just outside the sidewalk
    const edge = b.side * (DW.BUILD + b.w * 0.15);
    const ground = projectWorld(edge, 0, b.z, d);
    if (ground.relZ > 1400) return;
    const nearFade = facadeProximityFade(ground, d);
    if (nearFade <= 0) return;
    // Fade in from the haze instead of popping
    const fade = Math.max(0, Math.min(1, (1400 - ground.relZ) / 320)) * nearFade;
    ctx.save();
    ctx.globalAlpha = fade;
    const top = projectWorld(edge, b.h * 0.55, b.z, d);
    const bw = (50 + b.w * 80) * ground.scale;
    let bh = Math.max(8, ground.y - top.y);
    const lean = (b.lean || 0) * bh;
    let x = ground.x - (b.side < 0 ? bw : 0) + lean * 0.5;
    let y = ground.y - bh;
    ({ y, bh } = capFacadeScreen(y, bh, ground));
    const roadFade = facadeRoadOverlapFade(ground, x, bw);
    if (roadFade <= 0) { ctx.restore(); return; }
    ctx.globalAlpha = fade * roadFade;

    // Side depth facet
    ctx.fillStyle = shade(b.color, -40);
    ctx.beginPath();
    if (b.side < 0) {
      ctx.moveTo(x + bw, y);
      ctx.lineTo(x + bw + 14 * ground.scale, y + 10 * ground.scale);
      ctx.lineTo(x + bw + 14 * ground.scale, ground.y);
      ctx.lineTo(x + bw, ground.y);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x - 14 * ground.scale, y + 10 * ground.scale);
      ctx.lineTo(x - 14 * ground.scale, ground.y);
      ctx.lineTo(x, ground.y);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(x + lean, y);
    ctx.lineTo(x + bw + lean, y);
    ctx.lineTo(x + bw, ground.y);
    ctx.lineTo(x, ground.y);
    ctx.closePath();
    ctx.fill();

    // Dirty storefront
    ctx.fillStyle = shade(b.color, -25);
    ctx.fillRect(x, ground.y - 22 * ground.scale, bw, 22 * ground.scale);
    ctx.fillStyle = b.boarded ? '#2a241c' : (b.fancy ? 'rgba(45,55,65,0.85)' : 'rgba(30,40,50,0.7)');
    ctx.fillRect(x + 5 * ground.scale, ground.y - 18 * ground.scale, bw - 10 * ground.scale, 12 * ground.scale);
    if (b.fancy) {
      ctx.fillStyle = 'rgba(210,180,110,0.45)';
      ctx.fillRect(x + bw * 0.15, ground.y - 16 * ground.scale, bw * 0.7, 3 * ground.scale);
    }

    if (b.graffiti) {
      ctx.fillStyle = 'rgba(180,60,90,0.35)';
      ctx.fillRect(x + 8 * ground.scale, ground.y - 40 * ground.scale, bw * 0.35, 10 * ground.scale);
      ctx.fillStyle = 'rgba(60,120,160,0.3)';
      ctx.fillRect(x + bw * 0.45, ground.y - 36 * ground.scale, bw * 0.3, 8 * ground.scale);
    }

    // Windows — many dark / boarded
    const cols = b.windows;
    const rows = Math.max(2, Math.floor(bh / (16 * ground.scale)));
    for (let r = 0; r < rows - 1; r++) {
      for (let c = 0; c < cols; c++) {
        const key = Math.floor(b.z * 0.01) + r * 3 + c;
        let col;
        if (b.boarded && key % 4 === 0) col = '#2a2218';
        else if (key % 5 === 0) col = 'rgba(200,170,90,0.28)';
        else col = 'rgba(15,18,24,0.55)';
        ctx.fillStyle = col;
        const wx = x + 6 * ground.scale + c * ((bw - 12 * ground.scale) / cols) + lean * (1 - r / rows);
        const wy = y + 8 * ground.scale + r * 14 * ground.scale;
        ctx.fillRect(wx, wy, Math.max(2, 7 * ground.scale), Math.max(2, 6 * ground.scale));
      }
    }

    // Cheap fire escape ticks
    if (b.side > 0 && ground.scale > 0.12) {
      ctx.strokeStyle = 'rgba(80,80,90,0.55)';
      ctx.lineWidth = 1;
      for (let r = 1; r < rows - 1; r += 2) {
        const fy = y + r * 14 * ground.scale;
        ctx.strokeRect(x - 6 * ground.scale, fy, 8 * ground.scale, 10 * ground.scale);
      }
    }
    ctx.restore();
  }

  function drawRoadExit(ex, d) {
    if (ex.taken) return;
    const side = ex.side || 1;
    // Ramp gore — asphalt peeling off the right/left shoulder
    const zA = ex.startZ;
    const zB = ex.z;
    const zC = ex.endZ;
    const roadEdge = side * DW.ROAD;
    const rampOut = side * (DW.WALK + 0.35);

    const segs = [
      [zA, roadEdge * 0.85, roadEdge],
      [zB, roadEdge, rampOut],
      [zC, rampOut * 0.9, rampOut]
    ];
    for (let i = 0; i < segs.length - 1; i++) {
      const [z0, xIn0, xOut0] = segs[i];
      const [z1, xIn1, xOut1] = segs[i + 1];
      const a = projectWorld(xIn0, 0, z0, d);
      const b = projectWorld(xOut0, 0, z0, d);
      const c = projectWorld(xOut1, 0, z1, d);
      const e = projectWorld(xIn1, 0, z1, d);
      if (a.relZ < 40 || a.relZ > 1100) continue;
      ctx.fillStyle = i === 0 ? '#2a2a2e' : '#323238';
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.lineTo(c.x, c.y);
      ctx.lineTo(e.x, e.y);
      ctx.closePath();
      ctx.fill();
      // White edge line
      ctx.strokeStyle = 'rgba(220,210,190,0.55)';
      ctx.lineWidth = Math.max(1, 2 * a.scale);
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
    }

    // Painted EXIT arrow on asphalt
    const arrowZ = ex.z - 25;
    const ax = side * (DW.ROAD * 0.72);
    const tip = projectWorld(ax + side * 0.12, 0, arrowZ + 12, d);
    const left = projectWorld(ax - side * 0.08, 0, arrowZ - 8, d);
    const right = projectWorld(ax + side * 0.22, 0, arrowZ - 8, d);
    if (tip.relZ > 50 && tip.relZ < 900) {
      ctx.fillStyle = 'rgba(230,220,180,0.55)';
      ctx.beginPath();
      ctx.moveTo(tip.x, tip.y);
      ctx.lineTo(left.x, left.y);
      ctx.lineTo(right.x, right.y);
      ctx.closePath();
      ctx.fill();
    }

    // Green highway gantry sign
    const signZ = ex.z - 40;
    const postX = side * (DW.CURB + 0.05);
    const post = projectWorld(postX, 0, signZ, d);
    const postTop = projectWorld(postX, 55, signZ, d);
    if (post.relZ > 60 && post.relZ < 1000 && post.scale > 0.06) {
      const s = post.scale;
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, (1000 - post.relZ) / 240));
      ctx.fillStyle = '#3a3a40';
      ctx.fillRect(post.x - 2 * s, postTop.y, 4 * s, post.y - postTop.y);
      const bw = 72 * s;
      const bh = 28 * s;
      const bx = side > 0 ? post.x - bw + 4 * s : post.x - 4 * s;
      const by = postTop.y + 2 * s;
      ctx.fillStyle = '#1a5c36';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = 'rgba(240,240,240,0.7)';
      ctx.lineWidth = Math.max(1, 1.5 * s);
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = '#f5f5f0';
      ctx.font = `700 ${Math.max(8, 11 * s)}px "General Sans", sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('EXIT', bx + bw / 2, by + bh * 0.38);
      ctx.fillStyle = '#f0c400';
      ctx.font = `700 ${Math.max(9, 13 * s)}px "General Sans", sans-serif`;
      ctx.fillText(ex.name, bx + bw / 2, by + bh * 0.78);

      // Side panel arrow
      ctx.fillStyle = '#f5f5f0';
      const aw = 10 * s;
      const ah = 10 * s;
      const ax0 = side > 0 ? bx + bw - 14 * s : bx + 4 * s;
      ctx.beginPath();
      if (side > 0) {
        ctx.moveTo(ax0, by + bh / 2);
        ctx.lineTo(ax0 - aw, by + bh / 2 - ah / 2);
        ctx.lineTo(ax0 - aw, by + bh / 2 + ah / 2);
      } else {
        ctx.moveTo(ax0, by + bh / 2);
        ctx.lineTo(ax0 + aw, by + bh / 2 - ah / 2);
        ctx.lineTo(ax0 + aw, by + bh / 2 + ah / 2);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawClassicSignalHead(cx, cy, s, phase, fade, strobe) {
    const bw = 12 * s;
    const bh = 32 * s;
    const bx = cx - bw * 0.5;
    const by = cy - bh;
    ctx.fillStyle = '#1a1a1f';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = 'rgba(70,70,80,0.9)';
    ctx.lineWidth = Math.max(1, 0.8 * s);
    ctx.strokeRect(bx, by, bw, bh);
    const lampColors = { red: '#e74c3c', yellow: '#f1c40f', green: '#2ecc71' };
    const order = ['red', 'yellow', 'green'];
    const blink = strobe && Math.floor(performance.now() / 65) % 2 === 0;
    for (let i = 0; i < 3; i++) {
      const on = strobe ? blink || order[i] === phase : order[i] === phase;
      const ly = by + 6 * s + i * 10 * s;
      ctx.fillStyle = '#0e0e12';
      ctx.fillRect(bx + 2 * s, ly - 4.5 * s, bw - 4 * s, 9 * s);
      const col = strobe && blink ? lampColors[order[i]] : (on ? lampColors[order[i]] : '#281818');
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(cx, ly, 3.6 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2a2a30';
      ctx.fillRect(bx + 1 * s, ly - 5.5 * s, bw - 2 * s, 2.5 * s);
      if (on || (strobe && blink)) {
        ctx.fillStyle = `rgba(255,255,255,${(strobe ? 0.65 : 0.4) * fade})`;
        ctx.beginPath();
        ctx.arc(cx - 1.5 * s, ly - 1.5 * s, 1.3 * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = lampColors[order[i]];
        ctx.shadowBlur = strobe ? 22 * s : 14 * s;
        ctx.fillStyle = lampColors[order[i]];
        ctx.beginPath();
        ctx.arc(cx, ly, (strobe ? 2.6 : 2) * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  function drawCrosswalkAt(d, zLine, eCenter, halfSpan, map) {
    const stripes = 8;
    for (let i = 0; i < stripes; i++) {
      const t0 = i / stripes;
      const t1 = (i + 0.45) / stripes;
      const e0 = eCenter - halfSpan + t0 * halfSpan * 2;
      const e1 = eCenter - halfSpan + t1 * halfSpan * 2;
      const wx0 = (e0 - eCenter) * map.xPerBlock;
      const wx1 = (e1 - eCenter) * map.xPerBlock;
      const a = projectWorld(wx0, 0, zLine, d);
      const b = projectWorld(wx1, 0, zLine, d);
      if (a.relZ < 25 || a.relZ > 1000) continue;
      const cwA = Math.max(0, Math.min(1, (1000 - a.relZ) / 220));
      ctx.fillStyle = `rgba(235,230,215,${0.62 * cwA})`;
      ctx.fillRect(a.x, a.y - 5 * a.scale, Math.max(2, b.x - a.x), Math.max(2, 10 * a.scale));
    }
  }

  function drawIntersection(ix, d) {
    const map = d.route;
    const pCenter = projectWorld(0, 0, ix.z, d);
    if (pCenter.relZ < 25 || pCenter.relZ > 1150) return;
    const fade = Math.max(0, Math.min(1, (1150 - pCenter.relZ) / 300));
    ctx.save();
    ctx.globalAlpha = fade;
    const depth = 26;
    const zNear = ix.z - depth;
    const zFar = ix.z + depth;
    const ASP = 'rgb(34,34,38)';
    const ASP_LANE = 'rgba(200,195,180,0.22)';

    if (ix.cross === 'ew') {
      const steps = 12;
      for (let i = 0; i < steps; i++) {
        const t0 = i / steps, t1 = (i + 1) / steps;
        const e0 = ix.e - ix.crossSpan + t0 * ix.crossSpan * 2;
        const e1 = ix.e - ix.crossSpan + t1 * ix.crossSpan * 2;
        const wx0 = (e0 - ix.e) * map.xPerBlock;
        const wx1 = (e1 - ix.e) * map.xPerBlock;
        const p00 = projectWorld(wx0, 0, zNear, d);
        const p01 = projectWorld(wx1, 0, zNear, d);
        const p10 = projectWorld(wx0, 0, zFar, d);
        const p11 = projectWorld(wx1, 0, zFar, d);
        if (p00.relZ < 15) continue;
        ctx.fillStyle = ASP;
        ctx.beginPath();
        ctx.moveTo(p00.x, p00.y);
        ctx.lineTo(p01.x, p01.y);
        ctx.lineTo(p11.x, p11.y);
        ctx.lineTo(p10.x, p10.y);
        ctx.closePath();
        ctx.fill();
      }
      const midZ = (zNear + zFar) * 0.5;
      const mL = projectWorld(-ix.crossSpan * map.xPerBlock, 0, midZ, d);
      const mR = projectWorld(ix.crossSpan * map.xPerBlock, 0, midZ, d);
      if (mL.relZ > 30 && mL.relZ < 1100) {
        ctx.strokeStyle = ASP_LANE;
        ctx.lineWidth = Math.max(1, 1.5 * mL.scale);
        ctx.setLineDash([6 * mL.scale, 8 * mL.scale]);
        ctx.beginPath();
        ctx.moveTo(mL.x, mL.y);
        ctx.lineTo(mR.x, mR.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      drawCrosswalkAt(d, zNear + 5, ix.e, ix.crossSpan, map);
      drawCrosswalkAt(d, zFar - 5, ix.e, ix.crossSpan, map);
    } else {
      const crossWx = (ix.crossE - ix.e) * map.xPerBlock;
      const hw = DW.ROAD * 1.05;
      const steps = 10;
      for (let i = 0; i < steps; i++) {
        const tz0 = zNear + (i / steps) * (zFar - zNear);
        const tz1 = zNear + ((i + 1) / steps) * (zFar - zNear);
        const p00 = projectWorld(crossWx - hw, 0, tz0, d);
        const p01 = projectWorld(crossWx + hw, 0, tz0, d);
        const p10 = projectWorld(crossWx - hw, 0, tz1, d);
        const p11 = projectWorld(crossWx + hw, 0, tz1, d);
        if (p00.relZ < 15) continue;
        ctx.fillStyle = ASP;
        ctx.beginPath();
        ctx.moveTo(p00.x, p00.y);
        ctx.lineTo(p01.x, p01.y);
        ctx.lineTo(p11.x, p11.y);
        ctx.lineTo(p10.x, p10.y);
        ctx.closePath();
        ctx.fill();
      }
      for (let side of [-1, 1]) {
        const stripeZ = ix.z + side * (depth - 6);
        const a = projectWorld(crossWx - hw, 0, stripeZ, d);
        const b = projectWorld(crossWx + hw, 0, stripeZ, d);
        if (a.relZ < 25 || a.relZ > 1000) continue;
        const cwA = Math.max(0, Math.min(1, (1000 - a.relZ) / 220));
        ctx.fillStyle = `rgba(235,230,215,${0.62 * cwA})`;
        const stripes = 7;
        for (let i = 0; i < stripes; i++) {
          const t0 = i / stripes, t1 = (i + 0.42) / stripes;
          const x0 = a.x + (b.x - a.x) * t0;
          const x1 = a.x + (b.x - a.x) * t1;
          ctx.fillRect(x0, a.y - 5 * a.scale, Math.max(2, x1 - x0), Math.max(2, 10 * a.scale));
        }
      }
    }

    // Corner tick marks — intersection box
    ctx.strokeStyle = 'rgba(235,230,215,0.35)';
    ctx.lineWidth = Math.max(1, 1.2 * pCenter.scale);
    for (const sign of [-1, 1]) {
      const cL = projectWorld(sign * DW.ROAD * 0.88, 0, zNear + 2, d);
      const cR = projectWorld(sign * DW.ROAD * 0.88, 0, zFar - 2, d);
      if (cL.relZ > 30) {
        ctx.beginPath();
        ctx.moveTo(cL.x, cL.y);
        ctx.lineTo(cL.x + sign * 8 * cL.scale, cL.y);
        ctx.stroke();
      }
      if (cR.relZ > 30) {
        ctx.beginPath();
        ctx.moveTo(cR.x, cR.y);
        ctx.lineTo(cR.x + sign * 8 * cR.scale, cR.y);
        ctx.stroke();
      }
    }

    // Painted turn arrow when waiting to turn here
    const leg = currentDriveLeg(d);
    if (d.awaitTurn && leg && leg.ix === ix && ix.turnDir && ix.turnDir !== 'straight') {
      drawTurnArrow(ix, d, ix.turnDir, fade);
    }

    ctx.restore();
  }

  function drawTurnArrow(ix, d, dir, fade) {
    const arrowZ = ix.z - 22;
    const p = projectWorld(0, 0, arrowZ, d);
    if (p.relZ < 35 || p.relZ > 850) return;
    const s = p.scale;
    const green = d.atSignal && d.atSignal.phase === 'green' && !d.mustStop;
    ctx.save();
    ctx.globalAlpha = fade * (green ? 0.9 : 0.45);
    ctx.fillStyle = green ? 'rgba(130,220,130,0.75)' : 'rgba(210,200,170,0.55)';
    ctx.strokeStyle = green ? 'rgba(180,255,180,0.6)' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = Math.max(1, 1.5 * s);

    const tip = projectWorld(dir === 'left' ? -0.55 : 0.55, 0, arrowZ + 10, d);
    const tail = projectWorld(0, 0, arrowZ - 8, d);
    const wingA = projectWorld(dir === 'left' ? 0.15 : -0.15, 0, arrowZ + 2, d);
    const wingB = projectWorld(dir === 'left' ? -0.35 : 0.35, 0, arrowZ + 2, d);

    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(wingA.x, wingA.y);
    ctx.lineTo(tail.x, tail.y);
    ctx.lineTo(wingB.x, wingB.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = green ? '#b8f0b8' : '#e8e0c8';
    ctx.font = `700 ${Math.max(9, 11 * s)}px "General Sans", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(dir === 'left' ? '← TURN' : 'TURN →', tail.x, tail.y - 14 * s);
    ctx.restore();
  }

  function drawTrafficSignal(sig, d) {
    const phase = signalPhase(sig, performance.now() / 1000);
    const ix = sig.intersection;
    const stopZ = sig.z - 8;
    const poleZ = sig.z - 32;
    const p = projectWorld(0, 0, stopZ, d);
    if (p.relZ < 30 || p.relZ > 950) return;
    const fade = Math.max(0, Math.min(1, (950 - p.relZ) / 240));
    const s = p.scale;
    ctx.save();
    ctx.globalAlpha = fade;

    // Stop line — wide bar before the intersection box
    const pL = projectWorld(-DW.ROAD * 0.95, 0, stopZ, d);
    const pR = projectWorld(DW.ROAD * 0.95, 0, stopZ, d);
    ctx.fillStyle = `rgba(240,235,220,${0.72 * fade})`;
    const sy = (pL.y + pR.y) * 0.5;
    ctx.fillRect(Math.min(pL.x, pR.x), sy - 2 * s, Math.abs(pR.x - pL.x), Math.max(3, 4 * s));

    // —— Classic mast-arm signal (near right corner) ——
    const poleX = -DW.CURB - 0.14;
    const base = projectWorld(poleX, 0, poleZ, d);
    const top = projectWorld(poleX, 46, poleZ, d);
    const mastEnd = projectWorld(DW.ROAD * 0.45, 44, stopZ - 2, d);
    ctx.strokeStyle = '#3a3a42';
    ctx.lineWidth = Math.max(2, 3.2 * s);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(base.x, base.y);
    ctx.lineTo(top.x, top.y);
    ctx.stroke();
    ctx.lineWidth = Math.max(2, 2.8 * s);
    ctx.beginPath();
    ctx.moveTo(top.x, top.y);
    ctx.lineTo(mastEnd.x, mastEnd.y);
    ctx.stroke();
    ctx.fillStyle = '#3a3a42';
    ctx.beginPath();
    ctx.arc(top.x, top.y, 3 * s, 0, Math.PI * 2);
    ctx.fill();
    const hangY = mastEnd.y + 8 * s;
    const strobe = d.signalFlash > 0 && d.flashingSignalZ === sig.z;
    drawClassicSignalHead(mastEnd.x, hangY, s, phase, fade, strobe);

    // —— Far-left corner signal (classic 4-way intersection look) ——
    const farPoleX = DW.CURB + 0.55;
    const farBase = projectWorld(farPoleX, 0, sig.z + 18, d);
    const farTop = projectWorld(farPoleX, 38, sig.z + 18, d);
    if (farBase.relZ > 40 && farBase.relZ < 900) {
      const farFade = Math.max(0, Math.min(1, (900 - farBase.relZ) / 200));
      ctx.globalAlpha = fade * farFade * 0.85;
      ctx.lineWidth = Math.max(1, 2.4 * farBase.scale);
      ctx.beginPath();
      ctx.moveTo(farBase.x, farBase.y);
      ctx.lineTo(farTop.x, farTop.y);
      ctx.stroke();
      const farMast = projectWorld(-DW.ROAD * 0.3, 36, sig.z + 6, d);
      ctx.lineWidth = Math.max(1, 2 * farBase.scale);
      ctx.beginPath();
      ctx.moveTo(farTop.x, farTop.y);
      ctx.lineTo(farMast.x, farMast.y);
      ctx.stroke();
      const farPhase = signalPhase({ offset: (sig.offset || 0) + SIGNAL_CYCLE * 0.5 }, performance.now() / 1000);
      drawClassicSignalHead(farMast.x, farMast.y + 7 * farBase.scale, farBase.scale * 0.82, farPhase, fade * farFade, strobe);
    }

    ctx.restore();
  }

  function drawStreetProp(pr, d) {
    if (pr.kind === 'pothole') {
      const p = projectWorld(pr.x != null ? pr.x : 0, 0, pr.z, d);
      if (p.relZ < 50 || p.relZ > 700) return;
      ctx.fillStyle = 'rgba(10,10,12,0.55)';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 14 * p.scale, 6 * p.scale, 0, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    // Furniture lives on the concrete sidewalk strip
    const xWorld = pr.side * ((DW.ROAD + DW.WALK) * 0.5);
    const p = projectWorld(xWorld, 0, pr.z, d);
    if (p.relZ > 1100) return;
    const nearFade = facadeProximityFade(p, d, { minZ: 78, fadeZ: 230 });
    if (nearFade <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, (1100 - p.relZ) / 260)) * nearFade;
    if (pr.kind === 'light') {
      const top = projectWorld(xWorld, 55, pr.z, d);
      ctx.strokeStyle = '#2a2a30';
      ctx.lineWidth = Math.max(1, 3 * p.scale);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(top.x, top.y);
      ctx.stroke();
      ctx.fillStyle = '#c9a227';
      ctx.beginPath();
      ctx.arc(top.x, top.y, 5 * p.scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(200,160,60,0.1)';
      ctx.beginPath();
      ctx.moveTo(top.x, top.y);
      ctx.lineTo(p.x - 30 * p.scale, p.y);
      ctx.lineTo(p.x + 30 * p.scale, p.y);
      ctx.closePath();
      ctx.fill();
    } else if (pr.kind === 'hydrant') {
      ctx.fillStyle = '#a03028';
      ctx.fillRect(p.x - 5 * p.scale, p.y - 16 * p.scale, 10 * p.scale, 16 * p.scale);
      ctx.fillRect(p.x - 8 * p.scale, p.y - 12 * p.scale, 16 * p.scale, 5 * p.scale);
    } else if (pr.kind === 'dumpster') {
      ctx.fillStyle = '#3a5a3a';
      ctx.fillRect(p.x - 16 * p.scale, p.y - 22 * p.scale, 32 * p.scale, 22 * p.scale);
      ctx.fillStyle = '#2a3a2a';
      ctx.fillRect(p.x - 16 * p.scale, p.y - 26 * p.scale, 32 * p.scale, 6 * p.scale);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(p.x - 4 * p.scale, p.y - 20 * p.scale, 3 * p.scale, 16 * p.scale);
    } else if (pr.kind === 'tree') {
      ctx.fillStyle = '#4a3828';
      ctx.fillRect(p.x - 3 * p.scale, p.y - 14 * p.scale, 6 * p.scale, 14 * p.scale);
      ctx.fillStyle = '#2a5038';
      ctx.beginPath();
      ctx.arc(p.x, p.y - 20 * p.scale, 12 * p.scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#346040';
      ctx.beginPath();
      ctx.arc(p.x - 5 * p.scale, p.y - 16 * p.scale, 8 * p.scale, 0, Math.PI * 2);
      ctx.arc(p.x + 6 * p.scale, p.y - 18 * p.scale, 7 * p.scale, 0, Math.PI * 2);
      ctx.fill();
    } else if (pr.kind === 'bench') {
      ctx.fillStyle = '#3a3a40';
      ctx.fillRect(p.x - 14 * p.scale, p.y - 8 * p.scale, 28 * p.scale, 4 * p.scale);
      ctx.fillRect(p.x - 12 * p.scale, p.y - 4 * p.scale, 3 * p.scale, 4 * p.scale);
      ctx.fillRect(p.x + 9 * p.scale, p.y - 4 * p.scale, 3 * p.scale, 4 * p.scale);
    } else if (pr.kind === 'lake_wall') {
      ctx.fillStyle = '#6a6860';
      ctx.fillRect(p.x - 2 * p.scale, p.y - 12 * p.scale, 4 * p.scale, 12 * p.scale);
      ctx.fillStyle = '#888880';
      ctx.fillRect(p.x - 18 * p.scale, p.y - 10 * p.scale, 36 * p.scale, 3 * p.scale);
    } else if (pr.kind === 'boat') {
      ctx.fillStyle = '#e8e6e0';
      ctx.beginPath();
      ctx.moveTo(p.x - 10 * p.scale, p.y - 4 * p.scale);
      ctx.lineTo(p.x + 12 * p.scale, p.y - 6 * p.scale);
      ctx.lineTo(p.x + 8 * p.scale, p.y);
      ctx.lineTo(p.x - 8 * p.scale, p.y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#889098';
      ctx.fillRect(p.x - 1 * p.scale, p.y - 14 * p.scale, 2 * p.scale, 10 * p.scale);
    } else if (pr.kind === 'newsstand') {
      ctx.fillStyle = '#2a3038';
      ctx.fillRect(p.x - 10 * p.scale, p.y - 18 * p.scale, 20 * p.scale, 18 * p.scale);
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(p.x - 8 * p.scale, p.y - 16 * p.scale, 16 * p.scale, 6 * p.scale);
    } else if (pr.kind === 'bus_shelter') {
      ctx.fillStyle = '#3a3a42';
      ctx.fillRect(p.x - 18 * p.scale, p.y - 2 * p.scale, 4 * p.scale, 2 * p.scale);
      ctx.fillRect(p.x + 14 * p.scale, p.y - 2 * p.scale, 4 * p.scale, 2 * p.scale);
      ctx.fillStyle = 'rgba(80,120,140,0.45)';
      ctx.fillRect(p.x - 16 * p.scale, p.y - 28 * p.scale, 32 * p.scale, 26 * p.scale);
    }
    ctx.restore();
  }

  function drawDriveParticles() {
    for (const p of state.particles) {
      const a = Math.max(0, p.life / (p.maxLife || 0.8));
      if (p.type === 'shard') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot || 0);
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        const s = p.size || 6;
        if (p.sides === 4) {
          ctx.moveTo(-s * 0.5, -s * 0.4);
          ctx.lineTo(s * 0.5, -s * 0.3);
          ctx.lineTo(s * 0.35, s * 0.5);
          ctx.lineTo(-s * 0.4, s * 0.35);
        } else {
          ctx.moveTo(0, -s * 0.6);
          ctx.lineTo(s * 0.55, s * 0.45);
          ctx.lineTo(-s * 0.55, s * 0.4);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (p.type === 'spark') {
        ctx.globalAlpha = a;
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 0.02, p.y - p.vy * 0.02);
        ctx.stroke();
      } else if (p.type === 'smoke') {
        ctx.globalAlpha = a * 0.35;
        ctx.fillStyle = p.color || '#6a6a72';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size || 10, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'flash') {
        // Expanding explosion glare
        const r = (p.size || 90) * (1.3 - a * 0.9);
        const g = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, r);
        g.addColorStop(0, `rgba(255,235,180,${0.85 * a})`);
        g.addColorStop(0.35, `rgba(255,160,60,${0.5 * a})`);
        g.addColorStop(1, 'rgba(255,120,40,0)');
        ctx.globalAlpha = 1;
        ctx.fillStyle = g;
        ctx.fillRect(p.x - r, p.y - r, r * 2, r * 2);
      } else if (p.type === 'text') {
        ctx.globalAlpha = Math.min(1, a * 1.6);
        ctx.font = `800 ${p.size || 15}px "General Sans", sans-serif`;
        ctx.textAlign = 'center';
        ctx.lineWidth = 3;
        ctx.strokeStyle = 'rgba(10,10,14,0.8)';
        ctx.strokeText(p.text, p.x, p.y);
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawReferenceMap(d) {
    const route = d.route;
    if (!route || !route.samples) return;

    const mapW = 132, mapH = 132;
    const pad = 10;
    const mx = pad, my = H - mapH - pad - 8;
    const innerX = 8, innerY = 20;
    const innerW = mapW - 16, innerH = mapH - 28;
    const b = route.geoBounds;
    const nSpan = b.nMax - b.nMin;
    const eSpan = b.eMax - b.eMin;

    function geoToMap(n, e) {
      return {
        px: mx + innerX + ((e - b.eMin) / eSpan) * innerW,
        py: my + innerY + innerH - ((n - b.nMin) / nSpan) * innerH
      };
    }

    ctx.save();
    ctx.fillStyle = 'rgba(12,14,18,0.9)';
    ctx.strokeStyle = 'rgba(208,162,58,0.35)';
    ctx.lineWidth = 1;
    ctx.fillRect(mx, my, mapW, mapH);
    ctx.strokeRect(mx + 0.5, my + 0.5, mapW - 1, mapH - 1);

    // Lake Michigan (east / right side)
    const lakeX = mx + innerX + ((route.lakeEastOf - b.eMin) / eSpan) * innerW;
    ctx.fillStyle = 'rgba(45,85,120,0.55)';
    ctx.fillRect(lakeX, my + innerY, mx + innerX + innerW - lakeX, innerH);
    ctx.fillStyle = 'rgba(90,140,180,0.35)';
    ctx.font = '600 7px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('LAKE', lakeX + (mx + innerX + innerW - lakeX) * 0.5, my + innerY + innerH * 0.55);

    // Street grid
    ctx.strokeStyle = 'rgba(120,125,135,0.28)';
    ctx.lineWidth = 0.8;
    ctx.fillStyle = 'rgba(160,165,175,0.45)';
    ctx.font = '600 6px "General Sans", sans-serif';
    for (const st of route.streets || []) {
      if (st.kind === 'ns') {
        const p0 = geoToMap(b.nMin, st.e);
        const p1 = geoToMap(b.nMax, st.e);
        ctx.beginPath();
        ctx.moveTo(p0.px, p0.py);
        ctx.lineTo(p1.px, p1.py);
        ctx.stroke();
        ctx.textAlign = st.e >= 0 ? 'left' : 'right';
        ctx.fillText(st.label, st.e >= 0 ? p1.px + 2 : p1.px - 2, p1.py + 8);
      } else {
        const p0 = geoToMap(st.n, b.eMin);
        const p1 = geoToMap(st.n, b.eMax);
        ctx.beginPath();
        ctx.moveTo(p0.px, p0.py);
        ctx.lineTo(p1.px, p1.py);
        ctx.stroke();
        ctx.textAlign = 'left';
        ctx.fillText(st.label, p0.px + 2, p0.py - 2);
      }
    }

    // Landmarks — shape-coded dots, no text
    for (const lm of route.landmarks || []) {
      const pt = geoToMap(lm.n, lm.e);
      const lake = ['pier', 'beach', 'oakbeach'].includes(lm.kind);
      const tall = ['hancock', 'aon', 'tribune', 'wtplace', 'parktower', 'ninems'].includes(lm.kind);
      ctx.fillStyle = 'rgba(208,162,58,0.35)';
      ctx.beginPath();
      if (lake) {
        ctx.rect(pt.px - 4, pt.py - 3, 8, 6);
      } else if (tall) {
        ctx.moveTo(pt.px, pt.py - 5);
        ctx.lineTo(pt.px + 4, pt.py + 3);
        ctx.lineTo(pt.px - 4, pt.py + 3);
        ctx.closePath();
      } else {
        ctx.arc(pt.px, pt.py, 4, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.fillStyle = 'rgba(230,200,120,0.9)';
      ctx.beginPath();
      ctx.arc(pt.px, pt.py, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Complete loop route
    const wps = route.waypoints;
    ctx.strokeStyle = 'rgba(196,160,53,0.8)';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < wps.length; i++) {
      const pt = geoToMap(wps[i].n, wps[i].e);
      if (i === 0) ctx.moveTo(pt.px, pt.py);
      else ctx.lineTo(pt.px, pt.py);
    }
    ctx.stroke();

    // Traveled portion
    const routeZ = wrapRouteZ(d.z, route.length);
    const geo = interpRouteGeo(wps, routeZ, true);
    if (routeZ > 0) {
      ctx.strokeStyle = 'rgba(230,220,190,0.65)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < wps.length; i++) {
        if (wps[i].z > routeZ) break;
        const pt = geoToMap(wps[i].n, wps[i].e);
        if (i === 0) ctx.moveTo(pt.px, pt.py);
        else ctx.lineTo(pt.px, pt.py);
      }
      const curPt = geoToMap(geo.n, geo.e);
      ctx.lineTo(curPt.px, curPt.py);
      ctx.stroke();
    }

    // Intersection markers on minimap
    for (const ix of route.intersections || []) {
      const pt = geoToMap(ix.n, ix.e);
      ctx.strokeStyle = 'rgba(235,230,215,0.35)';
      ctx.lineWidth = 1;
      ctx.strokeRect(pt.px - 3, pt.py - 3, 6, 6);
    }

    // Traffic signals on minimap
    const sigTime = performance.now() / 1000;
    for (const sig of route.signals || []) {
      const pt = geoToMap(sig.n, sig.e);
      const ph = signalPhase(sig, sigTime);
      ctx.fillStyle = ph === 'red' ? '#e74c3c' : ph === 'yellow' ? '#f1c40f' : '#2ecc71';
      ctx.fillRect(pt.px - 2, pt.py - 2, 4, 4);
    }

    // Exit labels — casino & burger joint
    for (const ex of d.exits || route.exits || []) {
      if (ex.taken) continue;
      const exGeo = ex.n != null ? { n: ex.n, e: ex.e } : interpRouteGeo(wps, ex.z, true);
      const exPt = geoToMap(exGeo.n, exGeo.e);
      const isCasino = ex.id === 'casino';
      const label = ex.mapLabel || ex.name;
      const color = isCasino ? '#7dce7a' : '#e8a040';
      const lx = exPt.px + (isCasino ? 6 : -6);
      const ly = exPt.py - 5;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(exPt.px, exPt.py, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(12,14,18,0.82)';
      ctx.font = '600 7px "General Sans", sans-serif';
      const tw = ctx.measureText(label).width + 8;
      const bx = isCasino ? lx - 2 : lx - tw - 2;
      ctx.fillRect(bx, ly - 9, tw, 11);
      ctx.strokeStyle = color;
      ctx.lineWidth = 0.8;
      ctx.strokeRect(bx + 0.5, ly - 8.5, tw - 1, 10);
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.fillText(label, bx + 4, ly);
    }

    // Start
    const startPt = geoToMap(wps[0].n, wps[0].e);
    ctx.fillStyle = '#5a9e68';
    ctx.beginPath();
    ctx.arc(startPt.px, startPt.py, 3, 0, Math.PI * 2);
    ctx.fill();

    // Player
    const playerPt = geoToMap(geo.n, geo.e + d.playerX * 0.45);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(playerPt.px, playerPt.py, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f0ece0';
    ctx.beginPath();
    ctx.arc(playerPt.px, playerPt.py, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Title + area label
    ctx.fillStyle = 'rgba(208,162,58,0.9)';
    ctx.font = '600 9px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(route.name, mx + 8, my + 12);

    const pos = sampleRouteAt(route, d.z, d);
    if (pos.label) {
      ctx.fillStyle = 'rgba(232,220,192,0.7)';
      ctx.font = '600 8px "General Sans", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(pos.label, mx + mapW - 8, my + 12);
    } else if (d.atSignal && d.atSignal.dist > 0 && d.atSignal.dist < 60) {
      const ph = d.atSignal.phase.toUpperCase();
      ctx.fillStyle = d.atSignal.phase === 'red' ? '#e74c3c'
        : d.atSignal.phase === 'yellow' ? '#f1c40f' : '#2ecc71';
      ctx.font = '600 8px "General Sans", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(ph, mx + mapW - 8, my + 12);
    }

    // North arrow
    ctx.strokeStyle = 'rgba(208,162,58,0.5)';
    ctx.fillStyle = 'rgba(208,162,58,0.65)';
    ctx.lineWidth = 1;
    const ax = mx + mapW - 14, ay = my + innerY + 6;
    ctx.beginPath();
    ctx.moveTo(ax, ay + 10);
    ctx.lineTo(ax, ay);
    ctx.lineTo(ax - 3, ay + 4);
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax + 3, ay + 4);
    ctx.stroke();
    ctx.font = '600 7px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('N', ax, ay - 2);

    ctx.restore();
  }

  function drawChaserCar(d) {
    const cop = d.chaser;
    if (!cop) return;
    const p = projectWorld(cop.x, 0, cop.z, d);
    if (p.relZ < 10 || p.relZ > 1250 || p.scale < 0.05) return;
    const fade = Math.max(0, Math.min(1, (1250 - p.relZ) / 280));
    const blink = Math.floor(performance.now() / 120) % 2;
    const col = blink ? '231,76,60' : '58,124,255';
    ctx.save();
    ctx.globalAlpha = fade;
    // Strobe wash thrown onto the road around the light bar
    const gw = 70 * Math.min(1.4, p.scale);
    const cy = p.y - 18 * p.scale;
    const glow = ctx.createRadialGradient(p.x, cy, 2, p.x, cy, gw);
    glow.addColorStop(0, `rgba(${col},0.4)`);
    glow.addColorStop(1, `rgba(${col},0)`);
    ctx.fillStyle = glow;
    ctx.fillRect(p.x - gw, cy - gw, gw * 2, gw * 2);
    drawLowPolyCar(p.x, p.y + (cop.bob || 0) * p.scale, Math.min(1.35, p.scale * 0.55), 'police', {
      yaw: cop.yaw || 0,
      pitch: cop.pitch || 0,
      color: cop.color,
      bodyScale: cop.bodyScale || 1,
      roof: cop.roof || 1,
      wheelSpin: cop.wheelSpin || 0,
      trim: cop.trim
    });
    // Headlight glare when he's on your bumper
    if (cop.z < d.z + 14) {
      for (const hx of [-9, 9]) {
        const gx = p.x + hx * p.scale;
        const gy = p.y - 8 * p.scale;
        const hr = 26 * p.scale;
        const hg = ctx.createRadialGradient(gx, gy, 1, gx, gy, hr);
        hg.addColorStop(0, 'rgba(255,250,220,0.5)');
        hg.addColorStop(1, 'rgba(255,250,220,0)');
        ctx.fillStyle = hg;
        ctx.fillRect(gx - hr, gy - hr, hr * 2, hr * 2);
      }
    }
    ctx.restore();
  }

  function drawDrive() {
    const d = state.drive;
    ctx.clearRect(0, 0, W, H);

    // Smooth camera sway — layered slow sines instead of per-frame random jitter
    const st = performance.now() / 1000;
    const shakeAmt = (d.camShake || 0) * 0.55 + (d.rumble || 0) * 1.5;
    const shakeX = shakeAmt ? (Math.sin(st * 21) * 0.6 + Math.sin(st * 34 + 1.3) * 0.4) * shakeAmt * 0.45 : 0;
    const shakeY = shakeAmt ? (Math.sin(st * 26 + 0.7) * 0.6 + Math.sin(st * 41) * 0.4) * shakeAmt * 0.32 : 0;
    ctx.save();
    ctx.translate(shakeX, shakeY);
    ctx.rotate(d.roll * 0.05);

    // Smoggy dusk sky, brightest at the horizon
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.5);
    sky.addColorStop(0, '#232830');
    sky.addColorStop(0.5, '#4c525c');
    sky.addColorStop(0.85, '#6e6a62');
    sky.addColorStop(1, '#807a6e');
    ctx.fillStyle = sky;
    ctx.fillRect(-30, -30, W + 60, H * 0.55);

    // Hazy moon
    const moonGlow = ctx.createRadialGradient(W * 0.72, H * 0.13, 4, W * 0.72, H * 0.13, 60);
    moonGlow.addColorStop(0, 'rgba(235,230,210,0.5)');
    moonGlow.addColorStop(0.25, 'rgba(220,215,195,0.12)');
    moonGlow.addColorStop(1, 'rgba(220,215,195,0)');
    ctx.fillStyle = moonGlow;
    ctx.fillRect(W * 0.72 - 60, H * 0.13 - 60, 120, 120);

    // Location-aware Chicago skyline (LSD, Mag Mile, Clark, etc.)
    drawLocationSkyline(d);
    // Ground haze band swallowing the skyline bases
    const hazeBand = ctx.createLinearGradient(0, H * 0.3, 0, H * 0.46);
    hazeBand.addColorStop(0, 'rgba(126,120,108,0)');
    hazeBand.addColorStop(1, 'rgba(126,120,108,0.55)');
    ctx.fillStyle = hazeBand;
    ctx.fillRect(-30, H * 0.3, W + 60, H * 0.17);

    // Smooth ground base
    const nearGround = projectWorld(0, 0, d.z - 40, d);
    ctx.fillStyle = '#5a564e';
    ctx.fillRect(-30, nearGround.y - 4, W + 60, H);

    // Continuous road mesh — anchor to camera, never snap to a Z grid (that caused visible jumps)
    const camZ = d.z - (d.camBack || 110);
    const segLen = 14;
    const segs = 78;
    const zStart = camZ + 6;
    const fogFar = segs * segLen;
    const FOG = [126, 120, 108];
    const ASPHALT = [42, 42, 46];
    const WALKC = [138, 134, 128];
    const CURBC = [168, 164, 156];
    const dashPeriod = segLen * 3;
    for (let i = segs; i >= -3; i--) {
      const z0 = zStart + i * segLen;
      const z1 = z0 + segLen;
      const pL = projectWorld(-DW.ROAD, 0, z0, d);
      const pR = projectWorld(DW.ROAD, 0, z0, d);
      const qL = projectWorld(-DW.ROAD, 0, z1, d);
      const qR = projectWorld(DW.ROAD, 0, z1, d);
      if (pL.relZ < 8) continue;
      const wL = projectWorld(-DW.WALK, 0, z0, d);
      const wR = projectWorld(DW.WALK, 0, z0, d);
      const vL = projectWorld(-DW.WALK, 0, z1, d);
      const vR = projectWorld(DW.WALK, 0, z1, d);
      const fogT = Math.pow(Math.max(0, Math.min(1, pL.relZ / fogFar)), 1.35) * 0.82;
      const paintA = 1 - fogT;

      ctx.fillStyle = hazeMix(WALKC, FOG, fogT);
      ctx.beginPath();
      ctx.moveTo(-20, wL.y);
      ctx.lineTo(wL.x, wL.y);
      ctx.lineTo(vL.x, vL.y);
      ctx.lineTo(-20, vL.y);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(W + 20, wR.y);
      ctx.lineTo(wR.x, wR.y);
      ctx.lineTo(vR.x, vR.y);
      ctx.lineTo(W + 20, vR.y);
      ctx.fill();

      ctx.fillStyle = hazeMix(CURBC, FOG, fogT);
      ctx.beginPath();
      ctx.moveTo(wL.x, wL.y);
      ctx.lineTo(pL.x, pL.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.lineTo(vL.x, vL.y);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(wR.x, wR.y);
      ctx.lineTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.lineTo(vR.x, vR.y);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = hazeMix(ASPHALT, FOG, fogT);
      ctx.beginPath();
      ctx.moveTo(pL.x, pL.y);
      ctx.lineTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.closePath();
      ctx.fill();

      drawLakeStrip(z0, z1, d, fogT);

      ctx.strokeStyle = `rgba(210,200,170,${0.26 * paintA})`;
      ctx.lineWidth = Math.max(1, 1.4 * pL.scale);
      ctx.beginPath();
      ctx.moveTo(pL.x, pL.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.moveTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.stroke();

      const m0 = projectWorld(0, 0, z0, d);
      const m1 = projectWorld(0, 0, z1, d);
      ctx.strokeStyle = `rgba(196,160,53,${0.4 * paintA})`;
      ctx.lineWidth = Math.max(1, 1.8 * pL.scale);
      ctx.beginPath();
      ctx.moveTo(m0.x - 3 * pL.scale, m0.y);
      ctx.lineTo(m1.x - 3 * pL.scale, m1.y);
      ctx.moveTo(m0.x + 3 * pL.scale, m0.y);
      ctx.lineTo(m1.x + 3 * pL.scale, m1.y);
      ctx.stroke();

      // Dashed lane marks — fade at dash boundaries so stripes don't pop
      const dashPhase = (z0 % dashPeriod) / dashPeriod;
      const dashAlpha = dashPhase < 0.12 ? dashPhase / 0.12
        : dashPhase > 0.88 ? (1 - dashPhase) / 0.12
        : 1;
      if (Math.floor(z0 / dashPeriod) % 2 === 0) {
        ctx.strokeStyle = `rgba(200,195,180,${0.2 * paintA * dashAlpha})`;
        ctx.lineWidth = Math.max(1, 1.6 * pL.scale);
        for (const lane of [-DW.LANE, DW.LANE]) {
          const a = projectWorld(lane, 0, z0, d);
          const bpt = projectWorld(lane, 0, z1, d);
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(bpt.x, bpt.y);
          ctx.stroke();
        }
      }
    }

    // Intersections — cross streets + crosswalks at 90° turns
    const pathLen = d.route.length;
    const byRouteDist = (a, b) => routeSignedDist(d.z, b.z, pathLen) - routeSignedDist(d.z, a.z, pathLen);
    const ixs = [...(d.route.intersections || [])].sort(byRouteDist);
    for (const ix of ixs) drawIntersection(ix, d);

    // Classic mast-arm traffic signals
    const sigs = [...(d.signals || [])].sort(byRouteDist);
    for (const sig of sigs) drawTrafficSignal(sig, d);

    // City blocks (far → near), sit on sidewalk grade
    const builds = [...d.buildings].sort(byRouteDist);
    for (const b of builds) drawBuilding(b, d);

    const props = [...d.props].sort(byRouteDist);
    for (const pr of props) drawStreetProp(pr, d);

    // EXIT ramps + gantry signs
    const exits = [...(d.exits || [])].sort(byRouteDist);
    for (const ex of exits) drawRoadExit(ex, d);

    const lms = [...(d.landmarks || [])].sort(byRouteDist);
    for (const lm of lms) drawLandmark(lm, d);

    // Traffic on the road plane — absolute Z, not loop-wrapped
    const cars = [...d.traffic].sort((a, b) => b.z - a.z);
    for (const car of cars) {
      const fly = car.flyY || 0;
      const p = projectWorld(car.x, fly, car.z, d);
      if (p.relZ < 30 || p.relZ > 1250 || p.scale < 0.05) continue;
      const carFade = Math.max(0, Math.min(1, (1250 - p.relZ) / 280));
      ctx.save();
      ctx.globalAlpha = carFade;
      drawLowPolyCar(p.x, p.y + (car.bob || 0) * p.scale, Math.min(1.35, p.scale * 0.55), car.kind, {
        yaw: car.yaw || 0,
        roll: car.smashed ? (car.roll || 0) : 0,
        pitch: car.smashed ? Math.min(0.85, fly * 0.05) : (car.pitch || 0),
        smashed: car.smashed,
        crush: car.crush || 0,
        color: car.color,
        bodyScale: car.bodyScale || 1,
        roof: car.roof || 1,
        rear: car.rear,
        wheelSpin: car.wheelSpin || 0,
        trim: car.trim
      });
      // Taillight glow on live cars ahead
      if (!car.smashed && car.z > d.z + 40) {
        const gw = 18 * p.scale;
        for (const tx of [-11, 11]) {
          const gx = p.x + tx * p.scale;
          const gy = p.y - 10 * p.scale + (car.bob || 0) * p.scale;
          const glow = ctx.createRadialGradient(gx, gy, 1, gx, gy, gw);
          glow.addColorStop(0, `rgba(255,70,55,${0.28 * carFade})`);
          glow.addColorStop(0.45, `rgba(255,50,40,${0.12 * carFade})`);
          glow.addColorStop(1, 'rgba(255,60,50,0)');
          ctx.fillStyle = glow;
          ctx.fillRect(gx - gw, gy - gw, gw * 2, gw * 2);
        }
      }
      ctx.restore();
    }

    // Chase cruiser ahead of the player draws first (farther from camera)
    if (d.chaser && d.chaser.z >= d.z + 14) drawChaserCar(d);

    // Player car — on the road plane with suspension compression
    const bob = Math.sin(d.wheelSpin * 2) * (d.speed / 900) + (d.susp || 0) * 0.35;
    const carZ = d.z + 14;
    const ground = projectWorld(d.playerX, 0, carZ, d);
    const blink = d.invuln > 0 && Math.floor(d.invuln * 14) % 2 === 0;
    if (!blink) {
      drawLowPolyCar(ground.x, ground.y + bob, Math.min(1.4, ground.scale * 0.58), 'player', {
        player: true,
        yaw: d.yaw,
        pitch: d.pitch,
        roll: d.roll + (d.crashT > 0 ? Math.sin(d.crashT * 40) * 0.2 : 0),
        wheelSpin: d.wheelSpin || 0,
        color: '#1a2430',
        trim: '#0e1418'
      });
    }

    // Cruiser on your bumper draws over the player (closer to camera)
    if (d.chaser && d.chaser.z < d.z + 14) drawChaserCar(d);

    drawDriveParticles();

    ctx.restore();

    // HUD
    ctx.fillStyle = 'rgba(20,22,28,0.8)';
    ctx.fillRect(0, 0, W, 36);
    const upcoming = nextRoadExit(d);
    ctx.fillStyle = d.approachingExit ? '#7dce7a' : '#e8dcc0';
    ctx.font = '700 12px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    if (d.approachingExit) {
      ctx.fillText(`TAKE EXIT → ${d.approachingExit.name}`, 10, 22);
    } else if (d.awaitTurn && d.atSignal && d.atSignal.phase === 'green' && !d.mustStop) {
      ctx.fillStyle = '#7dce7a';
      ctx.fillText(d.awaitTurn === 'left' ? 'GREEN — STEER LEFT ←' : 'GREEN — STEER RIGHT →', 10, 22);
    } else if (d.mustStop && d.atSignal && state.keys.up) {
      ctx.fillStyle = '#ff8a7a';
      ctx.fillText('RED — GAS TO RUN IT (−$100)', 10, 22);
    } else if (d.mustStop && d.atSignal) {
      ctx.fillStyle = d.atSignal.phase === 'red' ? '#e74c3c' : '#f1c40f';
      ctx.fillText(`${d.atSignal.phase.toUpperCase()} LIGHT — STOP`, 10, 22);
    } else if (d.awaitTurn && d.atSignal && d.atSignal.dist > 0) {
      ctx.fillStyle = '#e8dcc0';
      ctx.fillText(`APPROACHING TURN — ${d.awaitTurn.toUpperCase()}`, 10, 22);
    } else if (d.atSignal && d.atSignal.dist > 0 && d.atSignal.dist < 55) {
      ctx.fillStyle = d.atSignal.phase === 'green' ? '#7dce7a' : '#e8dcc0';
      ctx.fillText(`SIGNAL ${d.atSignal.phase.toUpperCase()}  ${Math.round(d.atSignal.dist / (DW.MPH_Z * 40) * 10) / 10} mi`, 10, 22);
    } else if (upcoming) {
      const mi = ((upcoming.z - d.z) / (DW.MPH_Z * 55)).toFixed(1);
      ctx.fillText(`NEXT EXIT  ${upcoming.name}  ${mi} mi`, 10, 22);
    } else if (d.route) {
      const pathLen = d.route.length;
      const pct = Math.min(99, Math.round((wrapRouteZ(d.z, pathLen) / pathLen) * 100));
      ctx.fillStyle = '#e8dcc0';
      ctx.fillText(`LAP ${d.lap || 1}  ${pct}%`, 10, 22);
    } else {
      ctx.fillText('OPEN ROAD', 10, 22);
    }
    ctx.textAlign = 'right';
    ctx.fillStyle = '#d8d2c0';
    ctx.fillText(`${Math.round(d.speed)} MPH`, W - 10, 22);

    drawReferenceMap(d);

    if (d.turnFlash > 0) {
      ctx.fillStyle = `rgba(125,206,122,${d.turnFlash * 0.25})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Red/blue strobe wash while the cruiser is winding up or mid-lunge
    if (d.chaser && (d.chaser.ai === 'windup' || d.chaser.ai === 'ram')) {
      const strobe = Math.floor(performance.now() / 120) % 2;
      ctx.fillStyle = strobe ? 'rgba(231,76,60,0.07)' : 'rgba(58,124,255,0.07)';
      ctx.fillRect(0, 0, W, H);
    }

    if (d.signalFlash > 0) {
      const pulse = (Math.sin(performance.now() * 0.04) + 1) * 0.5;
      ctx.fillStyle = `rgba(231,76,60,${d.signalFlash * 0.35 * pulse})`;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = `rgba(255,240,200,${d.signalFlash * 0.12 * pulse})`;
      ctx.fillRect(0, 0, W, H * 0.35);
    }

    const sp = d.speed / d.maxSpeed;
    ctx.fillStyle = '#2a2c30';
    ctx.fillRect(10, H - 14, W - 20, 6);
    ctx.fillStyle = sp > 0.85 ? '#c0392b' : '#d4a017';
    ctx.fillRect(10, H - 14, (W - 20) * sp, 6);

    if (d.crashFlash > 0) {
      ctx.fillStyle = `rgba(192,57,43,${d.crashFlash * 0.5})`;
      ctx.fillRect(0, 0, W, H);
      const g = ctx.createRadialGradient(W / 2, H * 0.62, 30, W / 2, H / 2, W * 0.75);
      g.addColorStop(0, 'rgba(255,200,80,0.12)');
      g.addColorStop(1, `rgba(0,0,0,${d.crashFlash * 0.55})`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(20,22,26,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e8dcc0';
      ctx.font = '700 22px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }

    if (state.mode === 'replay' && state.replay.clip && state.replay.clip.length > 1) {
      const clip = state.replay.clip;
      const span = Math.max(0.001, clip[clip.length - 1].t - clip[0].t);
      const prog = Math.min(1, state.replay.elapsed / span);
      if (state.replay.exporting) {
        ctx.font = '600 11px "General Sans", sans-serif';
        ctx.fillStyle = 'rgba(232,220,192,0.85)';
        ctx.textAlign = 'left';
        ctx.fillText('Night Drive · instant replay', 10, H - 28);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#bdb39b';
        ctx.font = '600 12px "General Sans", sans-serif';
        ctx.fillText('Creating share clip…', W / 2, H - 22);
      } else {
        ctx.fillStyle = 'rgba(20,22,26,0.55)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#e8dcc0';
        ctx.font = '700 22px Zodiak, Georgia, serif';
        ctx.textAlign = 'center';
        ctx.fillText('Instant Replay', W / 2, H * 0.42);
        ctx.font = '600 12px "General Sans", sans-serif';
        ctx.fillStyle = '#bdb39b';
        ctx.fillText('Last 5 seconds · R or Skip to exit · Share to send', W / 2, H * 0.42 + 24);
        ctx.fillStyle = '#2a2c30';
        ctx.fillRect(W * 0.15, H * 0.42 + 36, W * 0.7, 5);
        ctx.fillStyle = '#d4a017';
        ctx.fillRect(W * 0.15, H * 0.42 + 36, W * 0.7 * prog, 5);
      }
    }
  }

  function draw() {
    if (state.phase === 'drive' && state.drive) drawDrive();
    else drawCross();
  }

  function frame(ts) {
    if (!state.lastTs) state.lastTs = ts;
    let dt = (ts - state.lastTs) / 1000;
    state.lastTs = ts;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    if (state.replay.exporting && state.replay.mp4Encoder) {
      state.replay.mp4Encoder.tick();
    }
    requestAnimationFrame(frame);
  }

  const keyMap = {
    ArrowUp: 'up', w: 'up', W: 'up',
    ArrowDown: 'down', s: 'down', S: 'down',
    ArrowLeft: 'left', a: 'left', A: 'left',
    ArrowRight: 'right', d: 'right', D: 'right'
  };
  const dirDelta = {
    up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0]
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
      e.preventDefault();
      toggleHelp();
      return;
    }
    if (e.key === 'Escape') {
      if (state.mode === 'replay') {
        if (state.replay.exporting) {
          state.replay.exportReject?.(new Error('Export cancelled'));
          return;
        }
        endInstantReplay();
        return;
      }
      if (!helpPanel.hidden) {
        setHelpOpen(false);
        return;
      }
      if (state.mode === 'play' || state.mode === 'drive' || state.mode === 'pause') togglePause();
      return;
    }
    if ((e.key === 'r' || e.key === 'R') && state.phase === 'drive') {
      e.preventDefault();
      startInstantReplay();
      return;
    }
    if (e.key === 'p' || e.key === 'P') {
      if (state.mode === 'play' || state.mode === 'drive' || state.mode === 'pause') togglePause();
      return;
    }
    const dir = keyMap[e.key];
    if (!dir) return;
    e.preventDefault();
    state.keys[dir] = true;

    if (state.mode === 'title' || state.mode === 'gameover' || state.mode === 'win' || state.mode === 'arrived') {
      startBtn.click();
      return;
    }
    if (state.phase === 'cross') {
      const [dx, dy] = dirDelta[dir];
      tryMove(dx, dy);
    }
  });
  window.addEventListener('keyup', (e) => {
    const dir = keyMap[e.key];
    if (dir) state.keys[dir] = false;
  });

  document.querySelectorAll('[data-dir]').forEach(btn => {
    const down = (e) => {
      e.preventDefault();
      const dir = btn.dataset.dir;
      state.keys[dir] = true;
      if (state.phase === 'cross') {
        const [dx, dy] = dirDelta[dir];
        tryMove(dx, dy);
      }
    };
    const up = () => { state.keys[btn.dataset.dir] = false; };
    btn.addEventListener('pointerdown', down);
    btn.addEventListener('pointerup', up);
    btn.addEventListener('pointerleave', up);
  });

  let touchStart = null;
  canvas.addEventListener('pointerdown', (e) => {
    touchStart = { x: e.clientX, y: e.clientY };
    canvas.setPointerCapture(e.pointerId);
    if (state.phase === 'drive') {
      const rect = canvas.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width;
      // Wide touch bands — left half / right half steers
      state.keys.left = nx < 0.48;
      state.keys.right = nx > 0.52;
      state.keys.up = true;
    }
  });
  canvas.addEventListener('pointermove', (e) => {
    if (state.phase !== 'drive' || !touchStart) return;
    const rect = canvas.getBoundingClientRect();
    const nx = (e.clientX - rect.left) / rect.width;
    state.keys.left = nx < 0.48;
    state.keys.right = nx > 0.52;
    state.keys.up = true;
  });
  canvas.addEventListener('pointerup', (e) => {
    if (state.phase === 'drive') {
      state.keys.left = state.keys.right = state.keys.up = state.keys.down = false;
      touchStart = null;
      return;
    }
    if (!touchStart) return;
    const dx = e.clientX - touchStart.x;
    const dy = e.clientY - touchStart.y;
    touchStart = null;
    if (Math.hypot(dx, dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
    else tryMove(0, dy > 0 ? 1 : -1);
  });

  function togglePause() {
    if (state.mode === 'replay' || state.replay.sharing || state.replay.exporting) return;
    if (state.mode === 'play' || state.mode === 'drive') {
      state._resumeMode = state.mode;
      state.mode = 'pause';
      pauseBtn.textContent = 'Resume';
      beep(320, 0.06);
    } else if (state.mode === 'pause') {
      state.mode = state._resumeMode || (state.phase === 'drive' ? 'drive' : 'play');
      pauseBtn.textContent = 'Pause';
      beep(480, 0.06);
    }
  }

  pauseBtn.addEventListener('click', togglePause);
  replayBtn.addEventListener('click', startInstantReplay);
  shareReplayBtn.addEventListener('click', () => shareDriveReplay(shareReplayBtn));
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    muteBtn.setAttribute('aria-pressed', String(state.muted));
    muteBtn.textContent = state.muted ? 'Muted' : 'Sound';
  });

  helpBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleHelp();
  });
  document.addEventListener('pointerdown', (e) => {
    if (helpPanel.hidden) return;
    if (helpPanel.contains(e.target) || helpBtn.contains(e.target)) return;
    setHelpOpen(false);
  });

  startBtn.addEventListener('click', () => {
    ensureAudio();
    if (state.mode === 'win') {
      beginDrive();
      return;
    }
    if (state.mode === 'arrived') {
      if (state.destination && state.destination.href) {
        window.location.href = state.destination.href;
        return;
      }
      state.level += 1;
      state.mode = 'play';
      startCrossingLevel(state.level);
      overlay.hidden = true;
      pauseBtn.disabled = false;
      pauseBtn.textContent = 'Pause';
      return;
    }
    startGame();
  });

  function fitCanvas() {
    canvas.style.width = '100%';
    canvas.style.height = '100%';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  state.lanes = buildLanes(1);
  setPhaseUI();
  overlay.hidden = true;
  startGame();
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
