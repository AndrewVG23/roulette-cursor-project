<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Return to Your Car</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=zodiak@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #0d1512; --color-surface: #13211b; --color-surface-2: #173027;
      --color-border: #2c473c; --color-text: #f5edd8; --color-text-muted: #bdb39b;
      --color-text-faint: #897f6d; --color-primary: #d0a23a;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 2px 4px rgba(0,0,0,.28); --shadow-md: 0 12px 30px rgba(0,0,0,.34);
      --font-display: 'Zodiak', Georgia, serif;
      --font-body: 'General Sans', 'Inter', sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
      background:
        radial-gradient(ellipse 90% 50% at 50% -10%, rgba(208,162,58,.12), transparent 45%),
        radial-gradient(circle at 80% 20%, rgba(90,140,180,.06), transparent 30%),
        linear-gradient(180deg, #0d1512, #07100d 60%);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    button { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .app {
      max-width: none;
      width: 100%;
      height: 100dvh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 0;
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus {
      left: var(--space-4); top: var(--space-4);
      background: var(--color-surface); padding: var(--space-3);
      z-index: 20; border-radius: var(--radius-md);
    }
    .panel {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .panel-inner {
      position: relative;
      padding: 0;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-3);
      padding: 8px 10px;
      background: linear-gradient(180deg, rgba(8,12,10,.72), transparent);
      border: none;
      pointer-events: none;
    }
    .topbar .stats { pointer-events: auto; }
    .brand { display: none; }
    .stats {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .stat {
      min-width: 64px;
      padding: 6px 10px;
      border-radius: 3px;
      background: linear-gradient(180deg, rgba(20,53,40,.78), rgba(12,26,21,.92));
      border: 1px solid rgba(238,194,97,.18);
      text-align: center;
    }
    .stat .label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--color-text-faint);
    }
    .stat .value {
      display: block;
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.2;
    }
    .canvas-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: block;
      border-radius: 0;
      overflow: hidden;
      background: #1a1c20;
      border: none;
      box-shadow: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      object-fit: fill;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: rgba(7,16,13,.72);
      backdrop-filter: blur(4px);
      z-index: 2;
      transition: opacity var(--transition);
    }
    .overlay[hidden] { display: none; }
    .overlay-card {
      width: min(100%, 340px);
      text-align: center;
      padding: var(--space-6) var(--space-5);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(23,48,39,.96), rgba(12,26,21,.98));
      border: 1px solid rgba(238,194,97,.28);
      box-shadow: var(--shadow-md), 0 0 40px rgba(208,162,58,.08);
    }
    .overlay-card h2 {
      margin: 0 0 var(--space-2);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: #f7ead0;
    }
    .overlay-card p {
      margin: 0 0 var(--space-5);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }
    .controls {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 3;
      display: grid;
      gap: var(--space-2);
      padding: 8px 10px calc(10px + env(safe-area-inset-bottom, 0px));
      padding-left: 56px;
      background: linear-gradient(0deg, rgba(8,12,10,.82), rgba(8,12,10,.35) 70%, transparent);
      border: none;
      border-radius: 0;
      box-shadow: none;
      pointer-events: none;
    }
    .controls .btn { pointer-events: auto; }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      justify-content: center;
    }
    .controls .btn {
      min-height: 52px;
      min-width: 72px;
      padding: var(--space-2) var(--space-4);
      border-radius: 3px;
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #f7ead0;
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
      border: 1px solid rgba(255,238,198,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.18), 0 2px 5px rgba(0,0,0,.24);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .controls .btn.primary {
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03)), linear-gradient(180deg, #d44a45, #8f2420);
      color: #fff6e3;
      border-color: rgba(255,210,200,.28);
    }
    .controls .btn.subtle {
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
    }
    .controls .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(239,187,73,.42);
    }
    .controls .btn:active { transform: translateY(0); }
    .controls .btn.is-shared {
      border-color: rgba(143,217,164,.45);
      color: #eafff0;
    }
    .controls .btn:disabled { opacity: 0.45; cursor: default; transform: none; }
    .help-btn {
      position: absolute;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: max(10px, env(safe-area-inset-bottom, 0px));
      z-index: 6;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1;
      color: #f7ead0;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
      border: 1px solid rgba(255,238,198,.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 3px 10px rgba(0,0,0,.35);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .help-btn[aria-expanded="true"] {
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03)), linear-gradient(180deg, #d44a45, #8f2420);
      border-color: rgba(255,210,200,.35);
    }
    .help-panel {
      position: absolute;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: calc(58px + env(safe-area-inset-bottom, 0px));
      z-index: 6;
      width: min(280px, calc(100vw - 20px));
      padding: 12px 14px 14px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(18,28,24,.96), rgba(10,16,14,.98));
      border: 1px solid rgba(238,194,97,.28);
      box-shadow: 0 12px 32px rgba(0,0,0,.45);
      display: grid;
      gap: 10px;
    }
    .help-panel[hidden] { display: none; }
    .help-panel .hint {
      margin: 0;
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      line-height: 1.4;
      text-align: left;
    }
    .help-panel .btn.dir {
      width: 52px;
      min-width: 52px;
      height: 48px;
      padding: 0;
      border-radius: 3px;
      font-size: 1.15rem;
      line-height: 1;
      font-weight: 700;
      color: #f7ead0;
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.03)), linear-gradient(180deg, #1f5d39, #143528);
      border: 1px solid rgba(255,238,198,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 5px rgba(0,0,0,.24);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(2, 48px);
      gap: var(--space-2);
      justify-content: center;
    }
    .dpad .up { grid-column: 2; grid-row: 1; }
    .dpad .left { grid-column: 1; grid-row: 2; }
    .dpad .down { grid-column: 2; grid-row: 2; }
    .dpad .right { grid-column: 3; grid-row: 2; }
    .dpad.drive-mode .up,
    .dpad.drive-mode .down { opacity: 0.35; pointer-events: none; }
    .lives-pips {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 2px;
    }
    .lives-pips span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(208,162,58,.25);
      border: 1px solid rgba(208,162,58,.35);
    }
    .lives-pips span.on {
      background: var(--color-primary);
      box-shadow: 0 0 6px rgba(208,162,58,.45);
    }
    @media (max-width: 520px) {
      .brand h1 { font-size: var(--text-base); }
      .brand p { display: none; }
      .stat { min-width: 56px; padding: 4px 8px; }
      .controls .btn { min-height: 48px; }
      .controls .btn.dir { width: 48px; min-width: 48px; height: 44px; }
      .dpad {
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(2, 44px);
      }
      .help-btn { width: 40px; height: 40px; font-size: 1.1rem; }
      .help-panel { bottom: calc(52px + env(safe-area-inset-bottom, 0px)); }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="app">
    <main id="main" class="panel">
      <div class="panel-inner">
        <div class="topbar">
          <div class="brand" hidden>
            <h1 id="brandTitle">Return to Your Car</h1>
            <p id="brandSub"></p>
          </div>
          <div class="stats" aria-live="polite">
            <div class="stat">
              <span class="label">Score</span>
              <span class="value" id="scoreVal">0</span>
            </div>
            <div class="stat">
              <span class="label" id="meterLabel">Level</span>
              <span class="value" id="levelVal">1</span>
            </div>
            <div class="stat">
              <span class="label" id="livesLabel">Lives</span>
              <span class="value" id="livesVal">3</span>
              <div class="lives-pips" id="livesPips" aria-hidden="true"></div>
            </div>
          </div>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="game" width="480" height="600" aria-label="Return to your car"></canvas>
          <div class="overlay" id="overlay" hidden>
            <div class="overlay-card">
              <h2 id="overlayTitle"></h2>
              <p id="overlayText"></p>
              <div class="control-row">
                <button class="btn primary" id="startBtn" type="button">Continue</button>
              </div>
            </div>
          </div>
        </div>

        <button class="help-btn" id="helpBtn" type="button" aria-label="Show controls" aria-expanded="false" aria-controls="helpPanel">?</button>
        <div class="help-panel" id="helpPanel" hidden role="dialog" aria-label="Controls">
          <p class="hint" id="hintText"></p>
          <div class="dpad" id="dpad" aria-label="Direction pad">
            <button class="btn dir up" type="button" data-dir="up" aria-label="Move up">▲</button>
            <button class="btn dir left" type="button" data-dir="left" aria-label="Move left">◀</button>
            <button class="btn dir down" type="button" data-dir="down" aria-label="Move down">▼</button>
            <button class="btn dir right" type="button" data-dir="right" aria-label="Move right">▶</button>
          </div>
        </div>

        <div class="controls" aria-label="Game controls">
          <div class="control-row">
            <button class="btn subtle" id="pauseBtn" type="button">Pause</button>
            <button class="btn subtle" id="replayBtn" type="button" hidden>Replay</button>
            <button class="btn subtle" id="shareReplayBtn" type="button" hidden>Share</button>
            <button class="btn subtle" id="muteBtn" type="button" aria-pressed="false">Sound</button>
            <a class="btn subtle" href="burger.html">Grill</a>
            <a class="btn subtle" href="index.html">Tables</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="importmap">

  // Distant skyline silhouettes — keyed to where you are on the Chicago loop
  const SKYLINE_PROFILES = {

  function skylineZoneForEnv(env) {
    if (env.onLakefront) {
      if (env.n >= 1450) return 'northside_lsd';
      if (env.n >= 1080) return 'goldcoast_lsd';
      if (env.n >= 960) return 'oak_st_lsd';
      if (env.n >= 860) return 'hancock_view';
      if (env.n >= 760) return 'streeterville_lsd';
      return 'river_north_lsd';
    }
    if (env.magMile) return 'mag_mile';
    if (env.goldCoast) return 'gold_coast';
    if (env.clarkGrid) {
      if (env.n >= 1380) return 'lincoln_park';
      if (env.n >= 950) return 'lakeview_clark';
      return 'old_town_clark';
    }
    if (Math.abs(env.heading) > 0.85) return 'cross_street';
    return 'default';
  }

  function drawSkylineBuilding(b, horizonY, sway, scrollN) {
    const par = b.parallax != null ? b.parallax : (b.distant ? 0.25 : 0.55);
    const nudge = scrollN * par * 0.004;
    const bx = b.x * W + sway * par - nudge;
    const bw = b.w * W;
    const bh = b.h * (H * 0.42);
    const by = horizonY - bh;
    const alpha = b.fade != null ? b.fade : 1;

    ctx.save();
    ctx.globalAlpha = alpha;

    if (b.taper) {
      const tiers = Array.isArray(b.taper) ? b.taper : [1, 0.82, 0.64];
      let yOff = 0;
      const tierH = bh / tiers.length;
      ctx.fillStyle = b.color;
      for (let i = 0; i < tiers.length; i++) {
        const tw = bw * tiers[i];
        ctx.fillRect(bx + (bw - tw) * 0.5, by + yOff, tw, tierH + 1);
        yOff += tierH;
      }
    } else if (b.twin) {
      const gap = (b.gap || 0.01) * W;
      const tw = (bw - gap) * 0.5;
      ctx.fillStyle = b.color;
      ctx.fillRect(bx, by, tw, bh);
      ctx.fillRect(bx + tw + gap, by, tw, bh);
      if (b.xbrace) {
        ctx.fillStyle = 'rgba(90,100,110,0.45)';
        for (let i = 0; i < 7; i++) {
          const ly = by + bh * 0.12 + i * bh * 0.11;
          ctx.fillRect(bx, ly, tw, Math.max(1.5, bh * 0.008));
          ctx.fillRect(bx + tw + gap, ly, tw, Math.max(1.5, bh * 0.008));
        }
      }
      if (b.antenna) {
        ctx.fillStyle = '#889098';
        ctx.fillRect(bx + tw * 0.42, by - bh * 0.04, Math.max(2, bw * 0.04), bh * 0.04);
        ctx.fillRect(bx + tw + gap + tw * 0.42, by - bh * 0.03, Math.max(2, bw * 0.04), bh * 0.03);
      }
    } else {
      ctx.fillStyle = b.color;
      ctx.fillRect(bx, by, bw, bh);
      if (b.gothic) {
        ctx.fillStyle = shade(b.color, 20);
        ctx.beginPath();
        ctx.moveTo(bx, by + bh * 0.2);
        ctx.lineTo(bx + bw * 0.5, by - bh * 0.06);
        ctx.lineTo(bx + bw, by + bh * 0.18);
        ctx.closePath();
        ctx.fill();
        for (let s = 0; s < 3; s++) {
          const sx = bx + bw * (0.2 + s * 0.3);
          ctx.fillRect(sx, by - bh * 0.02, bw * 0.06, bh * 0.08);
        }
      }
      if (b.clock) {
        ctx.fillStyle = '#2a3038';
        ctx.beginPath();
        ctx.arc(bx + bw * 0.22, by + bh * 0.24, bw * 0.09, 0, Math.PI * 2);
        ctx.arc(bx + bw * 0.78, by + bh * 0.24, bw * 0.09, 0, Math.PI * 2);
        ctx.fill();
      }
      if (b.hotel) {
        ctx.fillStyle = 'rgba(200,170,90,0.35)';
        ctx.fillRect(bx + bw * 0.1, by + bh * 0.35, bw * 0.8, bh * 0.08);
      }
      if (b.goldCap) {
        ctx.fillStyle = 'rgba(212,160,23,0.55)';
        ctx.fillRect(bx + bw * 0.15, by - bh * 0.02, bw * 0.7, bh * 0.04);
        ctx.fillStyle = 'rgba(255,220,120,0.35)';
        ctx.beginPath();
        ctx.arc(bx + bw * 0.5, by - bh * 0.01, bw * 0.12, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    if (b.lit) {
      ctx.fillStyle = `rgba(210,180,110,${0.2 + b.lit * 0.35})`;
      const cols = b.twin ? 2 : Math.max(2, Math.floor(bw / 14));
      const rows = Math.max(2, Math.floor(bh / 18));
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r * 3 + c + Math.floor(bx)) % 4 === 0) continue;
          ctx.fillRect(bx + 4 + c * ((bw - 8) / cols), by + 6 + r * (bh / rows), 3, 4);
        }
      }
    }

    ctx.restore();
  }

  function drawLocationSkyline(d) {
    const env = routeEnvAt(d, d.z);
    const zone = env.skylineZone || skylineZoneForEnv(env);
    const profile = SKYLINE_PROFILES[zone] || SKYLINE_PROFILES.default;
    const horizonY = H * 0.42 - (d.hills || 0) * 0.08;
    const skySway = -d.curve * 48 - (d.camX || 0) * 4.5;
    const scrollN = env.n - 620;

    if (profile.lakeOpen) {
      const lakeGrad = ctx.createLinearGradient(W * 0.52, horizonY - 100, W + 20, horizonY + 20);
      lakeGrad.addColorStop(0, 'rgba(126,120,108,0)');
      lakeGrad.addColorStop(0.35, 'rgba(55,90,125,0.14)');
      lakeGrad.addColorStop(1, 'rgba(35,70,105,0.28)');
      ctx.fillStyle = lakeGrad;
      ctx.fillRect(W * 0.42, horizonY - 110, W * 0.6, 140);
    }

    if (profile.canyon) {
      ctx.fillStyle = 'rgba(18,20,26,0.18)';
      ctx.fillRect(0, horizonY - 20, W, H * 0.08);
    }

    const sorted = [...profile.buildings].sort((a, b) => (a.distant ? 0 : 1) - (b.distant ? 0 : 1));
    for (const b of sorted) drawSkylineBuilding(b, horizonY, skySway, scrollN);
  }

  function signalPhase(sig, time) {
    const p = (time + (sig.offset || 0)) % SIGNAL_CYCLE;
    if (p < SIGNAL_GREEN) return 'green';
    if (p < SIGNAL_GREEN + SIGNAL_YELLOW) return 'yellow';
    return 'red';
  }

  function geoToGameXY(map, n, e) {
    return { x: e * map.xPerBlock, n, e };
  }

  function geoSegmentLength(map, a, b) {
    const dn = (b.n - a.n) * map.zPerNorth;
    const de = (b.e - a.e) * map.zPerEastBlock;
    return Math.hypot(dn, de);
  }

  function assignPathZ(map, geoPoints) {
    const raw = geoPoints.map(wp => ({ ...wp, ...geoToGameXY(map, wp.n, wp.e) }));
    raw[0].z = 0;
    for (let i = 1; i < raw.length; i++) {
      raw[i].z = raw[i - 1].z + geoSegmentLength(map, raw[i - 1], raw[i]);
    }
    return raw;
  }

  function activeRouteWaypoints(d) {
    if (!d || !d.route) return [];
    return d.route.waypoints;
  }

  function compileNightDriveRoute(map) {
    const waypoints = assignPathZ(map, map.loop);
    const length = waypoints[waypoints.length - 1].z;

    const samples = [];
    const step = 14;
    for (let z = 0; z <= length; z += step) {
      samples.push({ z, ...sampleRouteFrame(waypoints, map, z) });
    }
    const last = samples[samples.length - 1];
    if (!last || last.z < length) {
      samples.push({ z: length, ...sampleRouteFrame(waypoints, map, length) });
    }

    let minX = Infinity, maxX = -Infinity;
    for (const s of samples) {
      minX = Math.min(minX, s.x);
      maxX = Math.max(maxX, s.x);
    }

    const exits = (map.exits || []).map(def => ({
      ...def,
      z: nearestRouteZ(waypoints, def.n, def.e),
      mapLabel: def.mapLabel || def.name
    }));

    const intersections = compileIntersections(waypoints, map);
    const legs = compileLegs(waypoints, intersections);
    const signals = intersections.map((ix, i) => {
      const manual = (map.signals || []).find(s =>
        Math.abs(s.n - ix.n) < 30 && Math.abs(s.e - ix.e) < 0.35
      );
      return {
        n: ix.n,
        e: ix.e,
        z: ix.z,
        offset: manual ? manual.offset : (i * 1.65) % SIGNAL_CYCLE,
        label: manual ? manual.label : ix.label,
        intersection: ix
      };
    });

    return { ...map, waypoints, samples, length, minX, maxX, exits, signals, intersections, legs };
  }

  function compileIntersections(waypoints, map) {
    const list = [];
    for (let i = 1; i < waypoints.length - 1; i++) {
      const prev = waypoints[i - 1], cur = waypoints[i], next = waypoints[i + 1];
      const dn1 = cur.n - prev.n, de1 = cur.e - prev.e;
      const dn2 = next.n - cur.n, de2 = next.e - cur.e;
      const seg1Ns = Math.abs(de1) < 0.08 && Math.abs(dn1) > 0.08;
      const seg1Ew = Math.abs(dn1) < 0.08 && Math.abs(de1) > 0.08;
      const seg2Ns = Math.abs(de2) < 0.08 && Math.abs(dn2) > 0.08;
      const seg2Ew = Math.abs(dn2) < 0.08 && Math.abs(de2) > 0.08;
      if (!((seg1Ns && seg2Ew) || (seg1Ew && seg2Ns))) continue;
      const cross = seg2Ew ? 'ew' : 'ns';
      const frameBefore = sampleRouteFrame(waypoints, map, Math.max(0, cur.z - 28));
      const frameAfter = sampleRouteFrame(waypoints, map, Math.min(waypoints[waypoints.length - 1].z, cur.z + 28));
      let dh = frameAfter.heading - frameBefore.heading;
      while (dh > Math.PI) dh -= Math.PI * 2;
      while (dh < -Math.PI) dh += Math.PI * 2;
      const turnDir = dh > 0.12 ? 'left' : dh < -0.12 ? 'right' : 'straight';
      list.push({
        z: cur.z,
        n: cur.n,
        e: cur.e,
        cross,
        crossSpan: cross === 'ew' ? 2.85 : 2.0,
        crossE: cur.e,
        crossN: cur.n,
        label: cur.label,
        heading: frameBefore.heading,
        turnDir
      });
    }
    return list;
  }

  function compileLegs(waypoints, intersections) {
    return intersections.map((ix, i) => ({
      z0: i === 0 ? 0 : intersections[i - 1].z,
      z1: ix.z,
      turn: ix.turnDir,
      ix,
      done: false
    }));
  }

  function currentDriveLeg(d) {
    if (!d.legs || d.legIndex >= d.legs.length) return null;
    return d.legs[d.legIndex];
  }

  function interpRouteGeo(wps, z, linear) {
    const len = wps[wps.length - 1].z;
    z = wrapRouteZ(z, len);
    if (z <= wps[0].z) return { n: wps[0].n, e: wps[0].e };
    if (z >= wps[wps.length - 1].z) return { n: wps[wps.length - 1].n, e: wps[wps.length - 1].e };
    for (let i = 0; i < wps.length - 1; i++) {
      const a = wps[i], b = wps[i + 1];
      if (z >= a.z && z <= b.z) {
        const t = (z - a.z) / (b.z - a.z || 1);
        const k = linear ? t : t * t * (3 - 2 * t);
        return { n: a.n + (b.n - a.n) * k, e: a.e + (b.e - a.e) * k };
      }
    }
    return { n: wps[0].n, e: wps[0].e };
  }

  function interpRouteX(wps, z) {
    if (z <= wps[0].z) return wps[0].x;
    if (z >= wps[wps.length - 1].z) return wps[wps.length - 1].x;
    for (let i = 0; i < wps.length - 1; i++) {
      const a = wps[i], b = wps[i + 1];
      if (z >= a.z && z <= b.z) {
        const t = (z - a.z) / (b.z - a.z || 1);
        return a.x + (b.x - a.x) * t;
      }
    }
    return 0;
  }

  function sampleRouteFrame(wps, map, z) {
    const len = wps[wps.length - 1].z;
    z = wrapRouteZ(z, len);
    const eps = 14;
    const z0 = Math.max(0, z - eps);
    const z1 = Math.min(len, z + eps);
    const g = interpRouteGeo(wps, z, true);
    const g0 = interpRouteGeo(wps, z0, true);
    const g1 = interpRouteGeo(wps, z1, true);
    const x = g.e * map.xPerBlock;
    const x0 = g0.e * map.xPerBlock;
    const x1 = g1.e * map.xPerBlock;
    const dz = z1 - z0 || 1;
    const dx = x1 - x0;
    const heading = Math.atan2(dx, dz);
    const curve = dx / dz;
    return { x, n: g.n, e: g.e, heading, curve };
  }

  function nearestRouteZ(wps, n, e) {
    let bestZ = 0;
    let bestD = Infinity;
    for (let i = 0; i < wps.length - 1; i++) {
      const a = wps[i], b = wps[i + 1];
      const steps = Math.max(2, Math.ceil((b.z - a.z) / 60));
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const zn = a.n + (b.n - a.n) * t;
        const ze = a.e + (b.e - a.e) * t;
        const zz = a.z + (b.z - a.z) * t;
        const d = (zn - n) * (zn - n) + (ze - e) * (ze - e) * 4;
        if (d < bestD) { bestD = d; bestZ = zz; }
      }
    }
    return bestZ;
  }

  function routeLength(route, d) {
    const wps = d ? activeRouteWaypoints(d) : route.waypoints;
    return wps[wps.length - 1].z;
  }

  function wrapRouteZ(z, len) {
    if (!len || len <= 0) return z;
    return ((z % len) + len) % len;
  }

  function routeAheadDist(fromRouteZ, toRouteZ, len) {
    return ((toRouteZ - fromRouteZ) % len + len) % len;
  }

  // Signed forward distance from player to a route-fixed Z (negative = behind on loop)
  function routeSignedDist(playerAbsZ, targetRouteZ, len) {
    const p = wrapRouteZ(playerAbsZ, len);
    const forward = routeAheadDist(p, targetRouteZ, len);
    return forward > len * 0.5 ? forward - len : forward;
  }

  function routeInWindow(targetRouteZ, playerAbsZ, behind, ahead, len) {
    const d = routeSignedDist(playerAbsZ, targetRouteZ, len);
    return d >= -behind && d <= ahead;
  }

  function sampleRouteAt(route, z, d) {
    if (!route) return { x: 0, curve: 0, heading: 0, label: null };
    const wps = d ? activeRouteWaypoints(d) : route.waypoints;
    const len = route.length;
    z = wrapRouteZ(z, len);

    const frame = sampleRouteFrame(wps, route, z);
    let label = null;
    for (const wp of wps) {
      if (Math.abs(wp.z - z) < 220 && wp.label) label = wp.label;
    }
    return { ...frame, label };
  }

  function routeEnvAt(d, z) {
    const route = d.route;
    if (!route) return { onLakefront: false, goldCoast: false, magMile: false, e: 0, n: 700, lakeSide: 1, citySide: -1 };
    const wps = activeRouteWaypoints(d);
    const len = route.length;
    const zMod = ((z % len) + len) % len;
    const frame = sampleRouteFrame(wps, route, zMod);
    const lakeE = route.lakeEastOf ?? 2.55;
    const onLakefront = frame.e > lakeE - 0.5;
    const goldCoast = frame.e > -0.3 && frame.e < 1.2 && frame.n >= 1080 && frame.n <= 1280;
    const magMile = frame.e > -0.2 && frame.e < 0.6 && frame.n >= 780 && frame.n <= 1180;
    const clarkGrid = frame.e < -1.1;
    const env = { ...frame, onLakefront, goldCoast, magMile, clarkGrid, lakeSide: 1, citySide: -1 };
    env.skylineZone = skylineZoneForEnv(env);
    return env;
  }

  function seedChicagoLandmarks(d) {
    const route = d.route;
    if (!route || d.landmarksSeeded) return;
    d.landmarks = [];
    const wps = activeRouteWaypoints(d);
    for (const lm of route.landmarks || []) {
      d.landmarks.push({
        z: nearestRouteZ(wps, lm.n, lm.e),
        n: lm.n,
        e: lm.e,
        label: lm.label,
        kind: lm.kind || 'generic',
        side: lm.side != null ? lm.side : (lm.e > 1.5 ? 1 : -1)
      });
    }
    d.landmarksSeeded = true;
  }

  function maintainEnvAroundPlayer(d) {
    const len = d.route.length;
    if (!d.routeEnvSeeded) {
      while ((d.nextBuildZ || 0) < len) {
        const from = d.nextBuildZ || 0;
        seedCityBlocks(d, from, Math.min(len, from + 900));
        if ((d.nextBuildZ || 0) >= len) d.routeEnvSeeded = true;
      }
      // Streaming mode only — cull far content we haven't finished seeding yet
      const keepBehind = 140;
      const keepAhead = 1750;
      d.buildings = d.buildings.filter(b => routeInWindow(b.z, d.z, keepBehind, keepAhead, len));
      d.props = d.props.filter(p => routeInWindow(p.z, d.z, 100, keepAhead, len));
    }
    // Full loop pre-seeded: keep all facades — drawBuilding culls by distance at render time
  }

    d.exits.sort((a, b) => a.z - b.z);
    d.nextExitZ = route.length;
  }

  function ensureAudio() {
    if (state.muted) return null;

  function beep(freq, dur, type = 'square', vol = 0.04) {
    const ac = ensureAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g);
    g.connect(ac.destination);
    const t = ac.currentTime;
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur);
  }

  function buildLanes(level) {
    if (isGrill()) return buildGhettoLanes(level);

    const speed = 0.82 + (level - 1) * 0.15;
    const gapEase = Math.max(0, 28 - (level - 1) * 6);
    const lanes = [];
    const riverSpecs = [
      { row: 2, dir: 1, speed: 1.05 * speed, gap: 230 + gapEase, len: 2.5, kind: 'ferry' },
      { row: 3, dir: -1, speed: 1.25 * speed, gap: 210 + gapEase, len: 1.9, kind: 'barge' },
      { row: 4, dir: 1, speed: 0.9 * speed, gap: 250 + gapEase, len: 2.9, kind: 'ferry' },

      { row: 6, dir: 1, speed: 1.1 * speed, gap: 220 + gapEase, len: 2.3, kind: 'barge' }
    ];
    const roadSpecs = [

      { row: 9, dir: 1, speed: 1.1 * speed, gap: 215 + gapEase, len: 1.8, kind: 'bus' },

      { row: 12, dir: -1, speed: 1.0 * speed, gap: 235 + gapEase, len: 2.0, kind: 'truck' }
    ];
    for (const spec of [...riverSpecs, ...roadSpecs]) {
      const entities = [];
      const lenPx = spec.len * TILE;
      const count = Math.ceil((W + spec.gap) / spec.gap) + 1;

          w: lenPx,
          kind: spec.kind
        });
      }
      lanes.push({ ...spec, entities, lenPx });
    }
    return lanes;
  }

  function seedRoadExits(d, fromZ, toZ) {
    // Place GRILL / CASINO exits along the road — steer onto the ramp to take one
    let z = Math.max(fromZ, d.nextExitZ || 4200);
    while (z < toZ) {
      const def = ROAD_EXITS[d.exitIndex % ROAD_EXITS.length];
      d.exitIndex += 1;
      // Prefer right-side exits; occasional left
      const side = Math.random() > 0.22 ? 1 : -1;
      d.exits.push({

      z += 4800 + Math.random() * 3200;

    d.nextExitZ = z;

  function routeSeparation(routeZ_a, routeZ_b, len) {
    const sep = routeAheadDist(routeZ_a, routeZ_b, len);
    return Math.min(sep, len - sep);
  }

  function nearestLandmarkSep(d, routeZ, side) {
    const len = d.route ? d.route.length : 0;
    if (!len) return Infinity;
    let best = Infinity;
    for (const lm of d.landmarks || []) {
      const ls = lm.side != null ? lm.side : (lm.e > 1.5 ? 1 : -1);
      if (ls !== side) continue;
      best = Math.min(best, routeSeparation(routeZ, lm.z, len));
    }
    return best;
  }

  function landmarkClearance(d, routeZ, side, kind) {
    const len = d.route ? d.route.length : 0;
    for (const lm of d.landmarks || []) {
      const ls = lm.side != null ? lm.side : (lm.e > 1.5 ? 1 : -1);
      if (ls !== side) continue;
      const lake = ['pier', 'beach', 'oakbeach'].includes(lm.kind);
      const pad = lake ? 160 : (kind === 'building' ? 88 : 130);
      if (routeSeparation(routeZ, lm.z, len) < pad) return true;
    }
    return false;
  }

  function seedCityBlocks(d, fromZ, toZ) {
    // Chicago blocks — inland facades on LSD, lake side gets shoreline props
    const facades = ['#4a3f38', '#3d4248', '#5a5048', '#2f353c', '#5c4a3a', '#3a4038', '#6a5a4a'];
    const goldFacades = ['#524840', '#4a4540', '#3e3a36', '#5a5048', '#464038'];
    const zoneHeights = {
      hancock_view: [200, 320], mag_mile: [190, 300], streeterville_lsd: [140, 240],
      goldcoast_lsd: [120, 200], gold_coast: [130, 210], northside_lsd: [70, 120],
      lincoln_park: [55, 95], lakeview_clark: [65, 110], old_town_clark: [75, 125],
      oak_st_lsd: [150, 230], river_north_lsd: [90, 160], cross_street: [60, 100]
    };
    const lot = 56;
    const len = d.route.length;
    const endZ = Math.min(toZ, len);
    for (let routeZ = Math.ceil(fromZ / lot) * lot; routeZ < endZ; routeZ += lot) {
      const env = routeEnvAt(d, routeZ);
      const zi = (routeZ / lot) | 0;
      const depth = 0.7 + (Math.abs(Math.sin(routeZ * 0.02)) * 0.45);
      const sides = env.onLakefront ? [env.citySide] : [-1, 1];
      const zh = zoneHeights[env.skylineZone] || (env.onLakefront ? [90, 150] : env.clarkGrid ? [115, 165] : [105, 175]);
      for (const side of sides) {
        if (landmarkClearance(d, routeZ, side, 'building')) continue;
        const fancy = env.goldCoast || env.magMile || env.skylineZone === 'hancock_view';
        const hBase = zh[0];
        const hRange = zh[1] - zh[0];
        let h = hBase + (Math.abs(Math.cos(routeZ * 0.011 + side)) * hRange);
        const lmNear = nearestLandmarkSep(d, routeZ, side);
        if (lmNear < 200) h = Math.min(h, 70 + lmNear * 0.45);
        d.buildings.push({
          z: routeZ + (side < 0 ? 0 : lot * 0.35),
          side,
          h,
          w: depth + (fancy ? 0.3 : 0),
          color: (fancy ? goldFacades : facades)[Math.abs(zi + side) % (fancy ? goldFacades.length : facades.length)],
          windows: fancy ? 3 + (zi % 2) : 2 + (Math.abs(zi) % 3),
          lean: Math.sin(routeZ * 0.01) * (fancy ? 0.014 : 0.025),
          boarded: !fancy && zi % 5 === 0,
          graffiti: !fancy && zi % 3 !== 0,
          fancy: !!fancy
        });
      }
      if (env.onLakefront) {
        if (zi % 2 === 0) d.props.push({ z: routeZ + 8, side: env.lakeSide, kind: 'lake_wall' });
        if (zi % 3 === 0) d.props.push({ z: routeZ + 20, side: env.lakeSide, kind: 'tree' });
        if (zi % 5 === 0) d.props.push({ z: routeZ + 34, side: env.lakeSide, kind: 'bench' });
        if (zi % 8 === 0) d.props.push({ z: routeZ + 42, side: env.lakeSide, kind: 'boat' });
        d.props.push({ z: routeZ + 12, side: env.citySide, kind: 'light' });
        if (zi % 4 === 0) d.props.push({ z: routeZ + 26, side: env.citySide, kind: 'hydrant' });
      } else {
        if (zi % 2 === 0) {
          d.props.push({ z: routeZ + 10, side: -1, kind: 'light' });
          d.props.push({ z: routeZ + 10, side: 1, kind: 'light' });
        }
        if (env.magMile && zi % 3 === 0) d.props.push({ z: routeZ + 22, side: -1, kind: 'newsstand' });
        if (env.goldCoast && zi % 4 === 0) d.props.push({ z: routeZ + 30, side: 1, kind: 'tree' });
        if (zi % 3 === 0) d.props.push({ z: routeZ + 28, side: Math.sin(routeZ) > 0 ? -1 : 1, kind: 'dumpster' });
        if (zi % 4 === 0) d.props.push({ z: routeZ + 40, side: Math.cos(routeZ) > 0 ? 1 : -1, kind: 'hydrant' });
        if (zi % 5 === 0) d.props.push({ z: routeZ + 16, side: -1, kind: 'bus_shelter' });
      }
    }
    d.nextBuildZ = Math.min(toZ, len);
    d.nextPropZ = toZ;
  }

  function updateHUD() {
    scoreVal.textContent = state.phase === 'drive' ? `$${state.score}` : String(state.score);
    if (state.phase === 'drive' && state.drive) {
      const d = state.drive;
      const pathLen = d.route ? d.route.length : 1;
      const pct = Math.min(99, Math.round((wrapRouteZ(d.z, pathLen) / pathLen) * 100));
      levelVal.textContent = `Lap ${d.lap || 1} · ${pct}%`;
      livesVal.textContent = String(Math.max(0, Math.ceil(state.drive.hp)));
      livesPips.innerHTML = '';
      const pips = 5;
      const filled = Math.ceil((state.drive.hp / state.drive.maxHp) * pips);
      for (let i = 0; i < pips; i++) {
        const s = document.createElement('span');
        if (i < filled) s.classList.add('on');
        livesPips.appendChild(s);
      }
    } else {
      livesVal.textContent = String(state.lives);
      levelVal.textContent = String(state.level);
      livesPips.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        if (i < state.lives) s.classList.add('on');
        livesPips.appendChild(s);
      }
    }
    updateReplayButton();
    updateShareReplayButton();
  }

  function replaySnapDrive(d) {
    return {
      z: d.z,
      lap: d.lap,
      speed: d.speed,
      maxSpeed: d.maxSpeed,
      accel: d.accel,
      playerX: d.playerX,
      velX: d.velX,
      steer: d.steer,
      yaw: d.yaw,
      yawVel: d.yawVel,
      pitch: d.pitch,
      roll: d.roll,
      susp: d.susp,
      suspVel: d.suspVel,
      curve: d.curve,
      targetCurve: d.targetCurve,
      curveTimer: d.curveTimer,
      hills: d.hills,
      traffic: d.traffic.map(c => ({ ...c })),
      chaser: d.chaser ? { ...d.chaser } : null,
      chaserSpawnT: d.chaserSpawnT,
      invuln: d.invuln,
      bumpCd: d.bumpCd || 0,
      rpmPulse: d.rpmPulse,
      crashFlash: d.crashFlash,
      camShake: d.camShake,
      crashT: d.crashT,
      skid: d.skid,
      wheelSpin: d.wheelSpin,
      camX: d.camX,
      camY: d.camY,
      camBack: d.camBack,
      surface: d.surface,
      rumble: d.rumble,
      hp: d.hp,
      maxHp: d.maxHp,
      approachingExit: d.approachingExit ? { ...d.approachingExit } : null,
      atSignal: d.atSignal ? { ...d.atSignal } : null,
      signalFlash: d.signalFlash,
      turnFlash: d.turnFlash,
      slowMo: d.slowMo || 0,
      zoomPunch: d.zoomPunch || 0,
      awaitTurn: d.awaitTurn,
      mustStop: d.mustStop,
      signalFineCd: d.signalFineCd,
      flashingSignalZ: d.flashingSignalZ,
      legIndex: d.legIndex,
      legs: d.legs.map(l => ({ ...l }))
    };
  }

  function replayApplyDrive(d, snap) {
    Object.assign(d, snap);
    d.traffic = snap.traffic.map(c => ({ ...c }));
    d.chaser = snap.chaser ? { ...snap.chaser } : null;
    d.legs = snap.legs.map(l => ({ ...l }));
    d.approachingExit = snap.approachingExit ? { ...snap.approachingExit } : null;
    d.atSignal = snap.atSignal ? { ...snap.atSignal } : null;
  }

  function captureReplayMoment() {
    const d = state.drive;
    return {
      t: d.replayClock,
      score: state.score,
      particles: state.particles.map(p => ({ ...p })),
      drive: replaySnapDrive(d)
    };
  }

  function captureLiveCheckpoint() {
    return {
      score: state.score,
      particles: state.particles.map(p => ({ ...p })),
      drive: replaySnapDrive(state.drive),
      replayClock: state.drive.replayClock
    };
  }

  function restoreLiveCheckpoint(cp) {
    replayApplyDrive(state.drive, cp.drive);
    state.drive.replayClock = cp.replayClock;
    state.particles = cp.particles.map(p => ({ ...p }));
    state.score = cp.score;
    updateHUD();
  }

  function applyReplayFrame(frame) {
    replayApplyDrive(state.drive, frame.drive);
    state.particles = frame.particles.map(p => ({ ...p }));
    state.score = frame.score;
  }

  function updateReplayButton() {
    if (!replayBtn) return;
    replayBtn.hidden = state.phase !== 'drive';
    replayBtn.disabled = state.replay.sharing
      || state.replay.exporting
      || (!state.replay.playing && state.replay.buffer.length < 2);
    replayBtn.textContent = state.replay.playing && !state.replay.exporting ? 'Skip' : 'Replay';
  }

  function updateShareReplayButton() {
    if (!shareReplayBtn) return;
    shareReplayBtn.hidden = state.phase !== 'drive';
    const canShare = !!getShareableClip() && canShareReplayVideo();
    shareReplayBtn.disabled = state.replay.sharing || state.replay.exporting || !canShare;
    if (!shareReplayBtn.classList.contains('is-shared')) {
      shareReplayBtn.textContent = state.replay.sharing ? 'Sharing…' : 'Share';
    }
  }

  function canShareReplayVideo() {
    return !!(canvas && typeof VideoEncoder !== 'undefined');
  }

  async function createDriveMp4Encoder(sourceCanvas) {
    if (!canShareReplayVideo() || !sourceCanvas) return null;
    if ((sourceCanvas.width || 0) < 2 || (sourceCanvas.height || 0) < 2) return null;

    const { Output, Mp4OutputFormat, BufferTarget, CanvasSource } = await import('mediabunny');
    const output = new Output({
      format: new Mp4OutputFormat({ fastStart: 'in-memory' }),
      target: new BufferTarget()
    });
    const videoSource = new CanvasSource(sourceCanvas, {
      codec: 'avc',
      bitrate: 4_500_000
    });
    output.addVideoTrack(videoSource, { frameRate: 30 });
    await output.start();

    const frameDuration = 1 / 30;
    let framesAdded = 0;
    let running = true;
    let encoding = false;
    let pumpError = null;
    let idleWaiters = [];
    let lastCaptureAt = 0;
    const captureIntervalMs = 1000 / 30;

    const notifyIdle = () => {
      const waiters = idleWaiters;
      idleWaiters = [];
      waiters.forEach((resolve) => resolve());
    };

    return {
      tick() {
        if (!running || encoding || pumpError) return;
        const now = performance.now();
        if (now - lastCaptureAt < captureIntervalMs) return;
        lastCaptureAt = now;
        encoding = true;
        const timestamp = framesAdded * frameDuration;
        videoSource.add(timestamp, frameDuration).then(() => {
          framesAdded += 1;
          encoding = false;
          notifyIdle();
        }).catch((err) => {
          encoding = false;
          if (running) pumpError = err;
          notifyIdle();
        });
      },
      async stop() {
        running = false;
        if (encoding) {
          await new Promise((resolve) => { idleWaiters.push(resolve); });
        }
        if (pumpError) throw pumpError;
        if (framesAdded < 2) throw new Error('Recording was too short');
        await output.finalize();
        const buffer = output.target.buffer;
        if (!buffer || buffer.byteLength < 32) throw new Error('MP4 encoding failed');
        return new Blob([buffer], { type: 'video/mp4' });
      },
      abort() {
        running = false;
        try { output.cancel?.(); } catch { /* ignore */ }
        notifyIdle();
      }
    };
  }

  function getShareableClip() {
    if (state.replay.clip && state.replay.clip.length > 1) return state.replay.clip;
    if (state.replay.buffer && state.replay.buffer.length > 1) return state.replay.buffer;
    return null;
  }

  async function shareOrDownloadReplayVideo(file) {
    const title = 'Night drive replay';
    const text = `Last ${REPLAY_SECONDS} seconds · $${state.score}`;
    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title, text });
        return 'shared';
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return 'aborted';
    }

    const url = URL.createObjectURL(file);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = file.name;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    return 'downloaded';
  }

  async function exportReplayVideo(clip) {
    if (!clip || clip.length < 2) throw new Error('Nothing to share yet');
    if (!canShareReplayVideo()) throw new Error('MP4 recording is not supported in this browser');

    const encoder = await createDriveMp4Encoder(canvas);
    if (!encoder) throw new Error('MP4 recording is not supported in this browser');

    return new Promise((resolve, reject) => {
      let settled = false;
      const wasWatching = state.replay.playing && !state.replay.exporting;

      const finish = (err, blob) => {
        if (settled) return;
        settled = true;
        state.replay.mp4Encoder = null;
        state.replay.exporting = false;
        state.replay.exportWaiter = null;
        state.replay.exportReject = null;
        if (state.replay.playing) {
          if (state.replay.savedLive) restoreLiveCheckpoint(state.replay.savedLive);
          state.replay.playing = false;
          state.replay.clip = null;
          state.replay.savedLive = null;
          state.replay.frameIdx = 0;
          state.replay.elapsed = 0;
          state.mode = state._resumeMode || 'drive';
        }
        updateReplayButton();
        updateShareReplayButton();
        if (err) reject(err);
        else resolve(blob);
      };

      state.replay.exportReject = (err) => {
        encoder.abort();
        finish(err || new Error('Export cancelled'));
      };

      if (!wasWatching) state.replay.savedLive = captureLiveCheckpoint();
      state.replay.clip = clip.map(f => structuredClone(f));
      state.replay.frameIdx = 0;
      state.replay.elapsed = 0;
      state.replay.playing = true;
      state.replay.exporting = true;
      state.replay.mp4Encoder = encoder;
      state._resumeMode = state.mode === 'pause' ? 'drive' : state.mode;
      state.mode = 'replay';
      applyReplayFrame(state.replay.clip[0]);

      state.replay.exportWaiter = () => {
        encoder.stop().then((blob) => finish(null, blob)).catch((err) => finish(err));
      };

      updateReplayButton();
      updateShareReplayButton();
    });
  }

  async function shareDriveReplay(buttonEl) {
    if (state.phase !== 'drive' || !state.drive || state.replay.sharing || state.replay.exporting) return;
    const clipSource = getShareableClip();
    if (!clipSource) {
      beep(220, 0.08, 'triangle', 0.025);
      return;
    }
    if (!canShareReplayVideo()) {
      window.alert('MP4 replay sharing is not supported in this browser.');
      return;
    }

    state.replay.sharing = true;
    updateShareReplayButton();

    let shareResult = null;
    try {
      const clip = clipSource.map(f => structuredClone(f));
      const blob = await exportReplayVideo(clip);
      if (!(blob.type || '').includes('mp4')) {
        throw new Error('Share requires an MP4 recording');
      }
      const file = new File(
        [blob],
        'night-drive-replay.mp4',
        { type: 'video/mp4' }
      );
      shareResult = await shareOrDownloadReplayVideo(file);
    } catch (err) {
      if (err?.message !== 'Export cancelled') {
        console.error(err);
        window.alert(err?.message || 'Could not create a replay video.');
      }
    } finally {
      state.replay.sharing = false;
      updateShareReplayButton();
      if (buttonEl && shareResult && shareResult !== 'aborted') {
        buttonEl.classList.add('is-shared');
        buttonEl.textContent = shareResult === 'downloaded' ? 'Saved' : 'Shared';
        setTimeout(() => {
          buttonEl.classList.remove('is-shared');
          updateShareReplayButton();
        }, 1600);
      }
    }
  }

  function endInstantReplay() {
    if (state.replay.exporting) return;
    if (!state.replay.playing) return;
    if (state.replay.savedLive) restoreLiveCheckpoint(state.replay.savedLive);
    state.replay.playing = false;
    state.replay.clip = null;
    state.replay.savedLive = null;
    state.replay.frameIdx = 0;
    state.replay.elapsed = 0;
    state.mode = state._resumeMode || 'drive';
    beep(520, 0.06, 'square', 0.025);
    updateReplayButton();
    updateShareReplayButton();
  }

  function startInstantReplay() {
    if (state.phase !== 'drive' || !state.drive) return;
    if (state.replay.sharing || state.replay.exporting) return;
    if (state.replay.playing) {
      endInstantReplay();
      return;
    }
    if (state.replay.buffer.length < 2) {
      beep(220, 0.08, 'triangle', 0.025);
      return;
    }
    state.replay.savedLive = captureLiveCheckpoint();
    state.replay.clip = state.replay.buffer.map(f => structuredClone(f));
    state.replay.frameIdx = 0;
    state.replay.elapsed = 0;
    state.replay.playing = true;
    state._resumeMode = state.mode === 'pause' ? 'drive' : state.mode;
    state.mode = 'replay';
    applyReplayFrame(state.replay.clip[0]);
    beep(660, 0.05, 'square', 0.03);
    beep(880, 0.08, 'square', 0.025);
    updateReplayButton();
    updateShareReplayButton();
  }

  function updateInstantReplay(dt) {
    const rp = state.replay;
    if (!rp.playing || !rp.clip || !rp.clip.length) return;
    rp.elapsed += dt;
    const clip = rp.clip;
    const targetT = clip[0].t + rp.elapsed;
    while (rp.frameIdx < clip.length - 1 && clip[rp.frameIdx + 1].t <= targetT) {
      rp.frameIdx++;
    }
    applyReplayFrame(clip[rp.frameIdx]);
    updateHUD();
    if (targetT >= clip[clip.length - 1].t) {
      if (rp.exporting) rp.exportWaiter?.();
      else endInstantReplay();
    }
  }

  function recordReplayFrame() {
    if (state.phase !== 'drive' || state.mode !== 'drive' || !state.drive) return;
    const d = state.drive;
    state.replay.buffer.push(captureReplayMoment());
    const cutoff = d.replayClock - REPLAY_SECONDS;
    while (state.replay.buffer.length > 1 && state.replay.buffer[0].t < cutoff) {
      state.replay.buffer.shift();
    }
    updateReplayButton();
    updateShareReplayButton();
  }

  function showOverlay(title, text, btnLabel) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btnLabel;
    overlay.hidden = false;
  }

  function loseLife(reason) {
    if (state.mode !== 'play' && state.mode !== 'drive') return;
    if (state.phase === 'cross' && state.invuln > 0) return;
    if (state.phase === 'drive' && state.drive && state.drive.invuln > 0) return;

    state.lives -= 1;
    state.flash = 0.35;
    state.shake = 0.28;
    state.combo = 0;
    state.comboTimer = 0;
    state.hopAnim = null;
    state.hopQueued = null;
    if (state.phase === 'cross') {
      spawnSplash(state.frog.col * TILE + TILE / 2, state.frog.row * TILE + TILE / 2);
    } else if (state.drive) {
      // crash FX already spawned by triggerDriveCrash
      state.drive.crashFlash = 0.55;
      state.drive.invuln = 1.6;
    }
    beep(90, 0.12, 'sawtooth', 0.06);
    beep(60, 0.22, 'square', 0.05);
    updateHUD();

    if (state.lives <= 0) {
      state.mode = 'gameover';
      if (state.score > state.high) {
        state.high = state.score;
        localStorage.setItem(highKey(), String(state.high));
      }
      showOverlay(
        state.phase === 'drive' ? 'Wrecked' : (isGrill() ? 'Never left the block' : 'Never made it to the car'),
        `${reason} Final score ${state.score}. Best ${state.high}.`,
        'Try Again'
      );
      pauseBtn.disabled = true;
      return;
    }

    if (state.phase === 'cross') {
      state.mode = 'dead';
      setTimeout(() => {
        if (state.mode === 'dead') {
          resetFrog();
          state.mode = 'play';
        }
      }, 700);
    } else if (state.phase === 'drive' && state.drive && state.lives > 0) {
      // Survived the wreck — limp on with patched HP
      state.drive.hp = Math.max(35, Math.floor(state.drive.maxHp * 0.45));
      state.drive.invuln = 2.2;
      state.drive.speed = Math.min(state.drive.speed, 22);
      updateHUD();
    }
  }

  function reachCar() {
    const comboBonus = Math.max(0, state.combo) * 18;
    const bonus = 120 + Math.floor(state.time * 2.5) + state.level * 20 + comboBonus;
    state.score += bonus;
    const fx = state.frog.col * TILE + TILE / 2;
    const fy = state.frog.row * TILE + TILE / 2;
    spawnFloat(comboBonus > 0 ? `+${bonus}  ×${state.combo}` : `+${bonus}`, fx, fy - 8, '#efc84a');
    for (let i = 0; i < 22; i++) {
      const a = (Math.PI * 2 * i) / 22;
      state.particles.push({
        x: fx, y: fy,
        vx: Math.cos(a) * (40 + Math.random() * 70),
        vy: Math.sin(a) * (40 + Math.random() * 70) - 30,
        life: 0.45 + Math.random() * 0.35,
        color: Math.random() > 0.4 ? '#efc84a' : '#f5edd8'
      });
    }
    updateHUD();
    beep(523, 0.07);
    beep(659, 0.09);
    beep(784, 0.12);
    beep(1046, 0.16);
    beginDrive();
  }

  function takeExit(exit) {
    if (!exit || exit.taken || state.mode !== 'drive') return;
    exit.taken = true;
    const d = state.drive;
    if (d) {
      d.speed = Math.max(10, d.speed * 0.55);
      d.approachingExit = exit;
    }
    state.score += 180 + state.level * 30;
    state.destination = {
      id: exit.id,
      name: exit.name,
      href: exit.href,
      blurb: exit.blurb
    };
    updateHUD();
    if (state.score > state.high) {
      state.high = state.score;
      localStorage.setItem(highKey(), String(state.high));
    }
    beep(523, 0.08);
    beep(784, 0.12);
    beep(1046, 0.18);
    if (exit.href) window.location.href = exit.href;
  }

  function spawnHopDust(col, row) {
    const x = col * TILE + TILE / 2;
    const y = row * TILE + TILE - 6;
    for (let i = 0; i < 5; i++) {
      state.particles.push({
        x: x + (Math.random() - 0.5) * 10,
        y,
        vx: (Math.random() - 0.5) * 50,
        vy: -10 - Math.random() * 25,
        life: 0.2 + Math.random() * 0.18,
        color: 'rgba(200,190,160,0.7)'
      });
    }
  }

  function tryMove(dx, dy) {
    if (state.phase !== 'cross' || state.mode !== 'play') return;
    if (state.hopCooldown > 0) {
      state.hopQueued = { dx, dy };
      return;
    }
    const f = state.frog;
    const nc = f.col + dx;
    const nr = f.row + dy;
    if (nc < 0 || nc > COLS - 1 || nr < 0 || nr > ROWS - 1) return;

    if (isGrill()) {
      if (nr < GRILL.GOAL || nr > GRILL.START) return;
      if (nr === GRILL.GOAL) {
        if (Math.abs(nc - GRILL.CAR_COL) < 0.75) {
          state.facing = dy < 0 ? 'up' : dy > 0 ? 'down' : dx < 0 ? 'left' : 'right';
          state.hopAnim = {
            fromCol: f.col, fromRow: f.row, toCol: GRILL.CAR_COL, toRow: nr,
            t: 0, dur: 0.1
          };
          f.col = GRILL.CAR_COL;
          f.row = nr;
          f.onFerry = null;
          hopSfx(nr);
          reachCar();
          return;
        }
      }
    } else if (nr === ROW.GARAGE) {
      const slot = PARK_SLOTS.find(c => Math.abs(nc - c) < 0.6);
      if (slot === CAR_COL) {
        state.facing = 'up';
        state.hopAnim = {
          fromCol: f.col, fromRow: f.row, toCol: CAR_COL, toRow: nr,
          t: 0, dur: 0.1
        };
        f.col = CAR_COL;
        f.row = nr;
        f.onFerry = null;
        hopSfx(nr);
        reachCar();
        return;
      }
      loseLife(slot != null ? 'Wrong car — alarms everywhere.' : 'Slammed into a garage pillar.');
      return;
    }

    const fromCol = f.col;
    const fromRow = f.row;
    f.col = Math.max(0, Math.min(COLS - 1, nc));
    f.row = nr;
    f.onFerry = null;
    state.facing = dy < 0 ? 'up' : dy > 0 ? 'down' : dx < 0 ? 'left' : 'right';
    state.hopAnim = { fromCol, fromRow, toCol: f.col, toRow: f.row, t: 0, dur: 0.1 };
    state.hopCooldown = 0.075;
    hopSfx(nr);
    spawnHopDust(fromCol, fromRow);

    if (dy < 0) {
      state.combo = (state.comboTimer > 0 ? state.combo : 0) + 1;
      state.comboTimer = 1.35;
    } else if (dy > 0) {
      state.combo = 0;
      state.comboTimer = 0;
    } else if (state.comboTimer > 0) {
      state.comboTimer = Math.max(state.comboTimer, 0.9);
    }

    if (!state.reachedRows.has(nr) && nr < startRow()) {
      state.reachedRows.add(nr);
      const pts = 10 + Math.max(0, state.combo - 1) * 4;
      state.score += pts;
      const px = f.col * TILE + TILE / 2;
      const py = f.row * TILE + 8;
      if (state.combo >= 3) {
        spawnFloat(`${state.combo}×  +${pts}`, px, py, '#7ec8e3');
        beep(520 + state.combo * 40, 0.05, 'square', 0.02);
      } else {
        spawnFloat(`+${pts}`, px, py, '#efc84a');
      }
      updateHUD();
    }
  }

  function spawnSplash(x, y) {
    for (let i = 0; i < 14; i++) {
      state.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 100,
        vy: (Math.random() - 0.5) * 100 - 30,
        life: 0.4 + Math.random() * 0.35,
        color: Math.random() > 0.5 ? '#efbb49' : '#71d189'
      });
    }
  }

  function frogDrawPose() {
    const f = state.frog;
    const a = state.hopAnim;
    if (!a) {
      return { x: f.col * TILE + TILE / 2, y: f.row * TILE + TILE / 2 + 1, sx: 1, sy: 1 };
    }
    const t = Math.min(1, a.t / a.dur);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const col = a.fromCol + (a.toCol - a.fromCol) * ease;
    const row = a.fromRow + (a.toRow - a.fromRow) * ease;
    const arc = Math.sin(t * Math.PI) * 11;
    let sx = 1;
    let sy = 1;
    if (t < 0.25) {
      sx = 1.2 - t * 0.6;
      sy = 0.75 + t;
    } else if (t < 0.7) {
      sx = 0.82;
      sy = 1.22;
    } else {
      const land = (t - 0.7) / 0.3;
      sx = 0.82 + land * 0.35;
      sy = 1.22 - land * 0.4;
    }
    return {
      x: col * TILE + TILE / 2,
      y: row * TILE + TILE / 2 + 1 - arc,
      sx, sy
    };
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function updateGhettoLanes(dt, ambush) {
    const speedMul = ambush ? 1 : 0.35;
    for (const lane of state.lanes) {
      if (!lane.ghetto) continue;
      for (const e of lane.entities) {
        const spd = (e.speed || 3) * 40 * dt * speedMul;
        e.x += lane.dir * spd;
        e.bob = (e.bob || 0) + dt * 10;
      }
      lane.entities = lane.entities.filter(e =>
        lane.dir > 0 ? e.x < W + 60 : e.x + e.w > -60
      );

      if (!ambush) continue;
      lane.spawnTimer -= dt;
      if (lane.spawnTimer <= 0) {
        // Sudden spawn — sometimes nothing, sometimes a pack
        const roll = Math.random();
        if (roll > 0.32) {
          const n = roll > 0.94 ? 2 : 1;
          for (let k = 0; k < n; k++) {
            const car = makeJankyCar(lane.dir, state.level);
            if (k > 0) car.x += lane.dir * -(car.w + 18 + Math.random() * 30);
            // Don't stack on an existing car near the spawn edge
            const edge = lane.dir > 0 ? -80 : W + 20;
            const blocked = lane.entities.some(e => Math.abs(e.x - edge) < 70);
            if (!blocked) lane.entities.push(car);
          }
        }
        lane.spawnTimer = 0.35 + Math.random() * (1.35 - Math.min(0.45, state.level * 0.07));
      }
    }
  }

  // --- Crossing update ---
  function updateCross(dt) {
    if (state.shake > 0) state.shake = Math.max(0, state.shake - dt);
    if (state.hopAnim) {
      state.hopAnim.t += dt;
      if (state.hopAnim.t >= state.hopAnim.dur) state.hopAnim = null;
    }
    for (const ft of state.floatText) {
      ft.life -= dt;
      ft.y -= 36 * dt;
    }
    state.floatText = state.floatText.filter(ft => ft.life > 0);

    if (state.mode !== 'play') {
      if (state.mode === 'title' || state.mode === 'pause' || state.mode === 'gameover' || state.mode === 'win' || state.mode === 'arrived') {
        if (isGrill()) {
          updateGhettoLanes(dt, false);
        } else {
          for (const lane of state.lanes) {
            for (const e of lane.entities) {
              e.x += lane.dir * lane.speed * 40 * dt * 0.35;
              if (lane.dir > 0 && e.x > W + 20) e.x -= lane.gap * Math.ceil((W + lane.gap) / lane.gap);
              if (lane.dir < 0 && e.x + e.w < -20) e.x += lane.gap * Math.ceil((W + lane.gap) / lane.gap);
            }
          }
        }
      }
      updateParticles(dt);
      return;
    }

    state.time -= dt;
    if (state.hopCooldown > 0) state.hopCooldown -= dt;
    if (state.hopCooldown <= 0 && state.hopQueued) {
      const q = state.hopQueued;
      state.hopQueued = null;
      tryMove(q.dx, q.dy);
    }
    if (state.invuln > 0) state.invuln -= dt;
    if (state.flash > 0) state.flash -= dt;
    if (state.comboTimer > 0) {
      state.comboTimer -= dt;
      if (state.comboTimer <= 0) state.combo = 0;
    }
    if (state.nearMissCd > 0) state.nearMissCd -= dt;
    if (state.time <= 0) {
      loseLife(isGrill() ? 'Shift over — you froze up on the curb.' : 'The garage closed — time ran out.');
      return;
    }

    const f = state.frog;
    // Generous hurtbox — reads fair, still punishable
    const frogPad = 11;
    const fx = f.col * TILE + frogPad;
    const fy = f.row * TILE + frogPad;
    const fw = TILE - frogPad * 2;
    const fh = TILE - frogPad * 2;

    if (isGrill()) {
      updateGhettoLanes(dt, true);
      for (const lane of state.lanes) {
        if (f.row !== lane.row) continue;
        for (const e of lane.entities) {
          const ey = lane.row * TILE + 8;
          const eh = TILE - 16;
          const hx = e.x + 5;
          const hw = Math.max(10, e.w - 10);
          if (rectsOverlap(fx, fy, fw, fh, hx, ey, hw, eh)) {
            const hits = [
              'Didn\'t even see it coming.',
              'Nailed by a hoopty.',
              'That van came out of nowhere.',
              'Janky brakes. Yours, not theirs.',
              'Street don\'t care you smell like grease.'
            ];
            loseLife(hits[Math.floor(Math.random() * hits.length)]);
            return;
          }
          if (state.nearMissCd <= 0 && state.invuln <= 0
              && rectsOverlap(fx - 10, fy, fw + 20, fh, hx, ey, hw, eh)
              && !rectsOverlap(fx, fy, fw, fh, hx, ey, hw, eh)) {
            state.nearMissCd = 0.55;
            state.score += 5;
            spawnFloat('close!', f.col * TILE + TILE / 2, f.row * TILE, '#7ec8e3');
            beep(880, 0.04, 'triangle', 0.02);
            updateHUD();
          }
        }
      }
      updateParticles(dt);
      return;
    }

    let riding = null;
    for (const lane of state.lanes) {
      for (const e of lane.entities) {
        e.x += lane.dir * lane.speed * 40 * dt;
        if (lane.dir > 0 && e.x > W + 40) e.x = -e.w - (lane.gap - e.w) * Math.random() * 0.2;
        if (lane.dir < 0 && e.x + e.w < -40) e.x = W + (lane.gap - e.w) * Math.random() * 0.2;
      }

      if (f.row === lane.row) {
        for (const e of lane.entities) {
          const ey = lane.row * TILE + 8;
          const eh = TILE - 16;
          const padX = lane.row >= ROW.ROAD_START ? 6 : 2;
          const hx = e.x + padX;
          const hw = Math.max(12, e.w - padX * 2);
          if (rectsOverlap(fx, fy, fw, fh, hx, ey, hw, eh)) {
            if (lane.row >= ROW.RIVER_START && lane.row <= ROW.RIVER_END) {
              riding = { lane, e };
            } else if (lane.row >= ROW.ROAD_START && lane.row <= ROW.ROAD_END) {
              loseLife(e.kind === 'bus' ? 'Hit by an MTA bus.' : e.kind === 'truck' ? 'Flattened by a truck.' : e.kind === 'bike' ? 'Messengerd.' : 'Yellow cab. Classic.');
              return;
            }
          } else if (
            lane.row >= ROW.ROAD_START && lane.row <= ROW.ROAD_END
            && state.nearMissCd <= 0 && state.invuln <= 0
            && rectsOverlap(fx - 12, fy, fw + 24, fh, hx, ey, hw, eh)
          ) {
            state.nearMissCd = 0.5;
            state.score += 5 + Math.min(10, state.combo);
            spawnFloat('near miss!', f.col * TILE + TILE / 2, f.row * TILE, '#7ec8e3');
            beep(920, 0.035, 'triangle', 0.018);
            updateHUD();
          }
        }
      }
    }

    if (f.row >= ROW.RIVER_START && f.row <= ROW.RIVER_END) {
      if (!riding) {
        loseLife('You fell in the East River.');
        return;
      }
      f.col += (riding.lane.dir * riding.lane.speed * 40 * dt) / TILE;
      f.onFerry = riding;
      if (state.hopAnim) {
        state.hopAnim.fromCol += (riding.lane.dir * riding.lane.speed * 40 * dt) / TILE;
        state.hopAnim.toCol += (riding.lane.dir * riding.lane.speed * 40 * dt) / TILE;
      }
      if (f.col < -0.2 || f.col > COLS - 0.8) {
        loseLife('Swept past the pier.');
        return;
      }
    }

    updateParticles(dt);
  }

    if (Math.random() < COOL_CAR_SPAWN_CHANCE && COOL_CAR_FLEET.length) {
