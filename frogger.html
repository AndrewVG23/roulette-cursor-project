    ctx.fillStyle = '#2a2a2e';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(120,120,130,0.45)';
    ctx.lineWidth = 1;
    for (let gx = x + 3; gx < x + w; gx += 4) {
      ctx.beginPath();
      ctx.moveTo(gx, y);
      ctx.lineTo(gx, y + h);
      ctx.stroke();
    }
    for (let gy = y + 3; gy < y + h; gy += 4) {
      ctx.beginPath();
      ctx.moveTo(x, gy);
      ctx.lineTo(x + w, gy);
      ctx.stroke();
    }
  }

  function drawStoreSign(x, y, w, h, bg, fg, text) {
    ctx.fillStyle = bg;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.fillStyle = fg;
    ctx.font = `700 ${Math.max(7, Math.min(10, h - 2))}px "General Sans", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x + w / 2, y + h / 2 + 0.5);
    ctx.textBaseline = 'alphabetic';
  }

  function drawAbandonedStore(x, y, w, h, opts) {
    const { brick = 1, signBg, signFg, name, gated = true, neon = null } = opts;
    drawBrickWall(x, y, w, h, brick);
    // Cornice
    ctx.fillStyle = '#2a221c';
    ctx.fillRect(x, y, w, 4);
    // Signband
    drawStoreSign(x + 3, y + 6, w - 6, 11, signBg, signFg, name);
    if (neon) {
      ctx.fillStyle = neon;
      ctx.fillRect(x + 4, y + 6, w - 8, 2);
    }
    // Storefront
    const winY = y + 20;
    const winH = h - 24;
    if (gated) {
      drawSecurityGate(x + 4, winY, w - 8, winH);
      // Partial boards behind gate
      ctx.fillStyle = 'rgba(50,40,30,0.5)';
      ctx.fillRect(x + 8, winY + 4, (w - 16) / 2 - 2, winH - 8);
    } else {
      drawBoardedWindow(x + 4, winY, w - 8, winH);
    }
    // Door recess
    ctx.fillStyle = '#1a1612';
    ctx.fillRect(x + w * 0.4, winY + 2, w * 0.2, winH - 2);
    // CLOSED sticker
    ctx.fillStyle = 'rgba(180,40,40,0.75)';
    ctx.fillRect(x + w * 0.42, winY + winH * 0.35, w * 0.16, 7);
    ctx.fillStyle = '#f0e6d0';
    ctx.font = '700 6px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('CLOSED', x + w * 0.5, winY + winH * 0.35 + 5.5);
  }

  function drawJunkyGasStation(x, y, w, h) {
    // Lot asphalt under canopy
    ctx.fillStyle = '#2e2e30';
    ctx.fillRect(x, y, w, h);
    // Oil stains
    ctx.fillStyle = 'rgba(10,10,12,0.45)';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.3, y + h * 0.7, 14, 5, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + w * 0.65, y + h * 0.55, 10, 4, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Canopy
    ctx.fillStyle = '#6a2020';
    ctx.fillRect(x + 4, y + 2, w - 8, 14);
    ctx.fillStyle = '#8a3030';
    ctx.fillRect(x + 4, y + 2, w - 8, 4);
    // Faded brand
    ctx.fillStyle = 'rgba(240,220,160,0.7)';
    ctx.font = '700 9px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('QUIK-FILL', x + w / 2, y + 12);
    // Price board busted
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + w - 28, y + 4, 20, 10);
    ctx.fillStyle = '#c0392b';
    ctx.font = '700 7px "General Sans", sans-serif';
    ctx.fillText('$??', x + w - 18, y + 11);

    // Support poles
    ctx.fillStyle = '#4a4a4e';
    ctx.fillRect(x + 10, y + 16, 4, h - 18);
    ctx.fillRect(x + w - 14, y + 16, 4, h - 18);

    // Convenience hut (boarded)
    ctx.fillStyle = '#3a3834';
    ctx.fillRect(x + w * 0.55, y + 18, w * 0.38, h - 22);
    drawBoardedWindow(x + w * 0.55 + 4, y + 24, w * 0.38 - 8, 14);
    ctx.fillStyle = 'rgba(200,40,40,0.5)';
    ctx.font = '700 6px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('NO GAS', x + w * 0.58, y + h - 6);

    // Pumps — rusty, taped
    for (let i = 0; i < 2; i++) {
      const px = x + 16 + i * 28;
      const py = y + 22;
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(px, py, 14, 20);
      ctx.fillStyle = '#3a3028';
      ctx.fillRect(px + 2, py + 3, 10, 8);
      ctx.fillStyle = '#c9a227';
      ctx.fillRect(px + 3, py + 12, 8, 2);
      // Out of order tape
      ctx.strokeStyle = '#f0c400';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px - 1, py + 2);
      ctx.lineTo(px + 15, py + 18);
      ctx.stroke();
      // Hose on ground
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px + 14, py + 16);
      ctx.quadraticCurveTo(px + 22, py + 24, px + 10, py + 28);
      ctx.stroke();
    }

    // Stack of tires
    ctx.fillStyle = '#1a1a1a';
    for (let t = 0; t < 3; t++) {
      ctx.beginPath();
      ctx.ellipse(x + w * 0.48, y + h - 6 - t * 5, 8, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawTopBlock() {
    const y0 = 0;
    const h = (GRILL.BUILD_TOP_END + 1) * TILE;
    // Night sky peek
    ctx.fillStyle = '#1a1520';
    ctx.fillRect(0, y0, W, h);

    // Row of abandoned businesses + gas station
    drawAbandonedStore(0, y0 + 8, TILE * 2.2, h - 10, {
      brick: 1, signBg: '#3a1818', signFg: '#e8a060', name: 'ROYAL CHICKEN', gated: true
    });
    drawJunkyGasStation(TILE * 2.15, y0 + 4, TILE * 3.3, h - 6);
    drawAbandonedStore(TILE * 5.5, y0 + 8, TILE * 2.1, h - 10, {
      brick: 2, signBg: '#1a2a1a', signFg: '#6dce7a', name: 'CHECK CASH', neon: 'rgba(80,220,100,0.45)', gated: true
    });
    drawAbandonedStore(TILE * 7.7, y0 + 8, TILE * 2.0, h - 10, {
      brick: 3, signBg: '#2a2040', signFg: '#c9a0e8', name: 'VIDEO HUT', gated: false
    });
    drawAbandonedStore(TILE * 9.8, y0 + 8, TILE * 2.2, h - 10, {
      brick: 4, signBg: '#402818', signFg: '#f0d080', name: 'PAWN PLUS', gated: true
    });

    // Graffiti on brick between signs
    ctx.fillStyle = 'rgba(180,60,160,0.5)';
    ctx.font = '700 10px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('SKR', TILE * 5.15, y0 + h - 14);
    ctx.fillStyle = 'rgba(60,140,220,0.45)';
    ctx.fillText('88', TILE * 9.5, y0 + 28);
  }

  function drawBottomBlock() {
    const y0 = GRILL.BUILD_BOT_START * TILE;
    const h = (ROWS - GRILL.BUILD_BOT_START) * TILE;
    ctx.fillStyle = '#1e1a18';
    ctx.fillRect(0, y0, W, h);

    // Upper facade row of the strip (taller buildings)
    drawBrickWall(0, y0, W, Math.min(TILE * 2, h * 0.45), 5);
    // Windows on upper floors — mostly dark / busted
    for (let c = 0; c < COLS; c++) {
      const wx = c * TILE + 10;
      const wy = y0 + 8;
      if ((c * 3) % 5 === 0) {
        ctx.fillStyle = 'rgba(220,180,80,0.12)';
        ctx.fillRect(wx, wy, 12, 10);
      } else {
        drawBoardedWindow(wx, wy, 14, 12);
      }
    }

    const storeY = y0 + Math.min(TILE * 2, h * 0.42);
    const storeH = y0 + h - storeY - 2;

    drawAbandonedStore(0, storeY, TILE * 2.4, storeH, {
      brick: 6, signBg: '#401018', signFg: '#ff6a6a', name: 'DISCOUNT LIQUOR', neon: 'rgba(220,40,60,0.55)', gated: true
    });
    drawAbandonedStore(TILE * 2.5, storeY, TILE * 2.2, storeH, {
      brick: 7, signBg: '#203040', signFg: '#f0d060', name: 'WE BUY GOLD', gated: true
    });
    drawAbandonedStore(TILE * 4.8, storeY, TILE * 2.5, storeH, {
      brick: 8, signBg: '#203028', signFg: '#a0d0a8', name: 'FAMILY $', gated: false
    });
    drawAbandonedStore(TILE * 7.4, storeY, TILE * 2.3, storeH, {
      brick: 9, signBg: '#302820', signFg: '#e0c8a0', name: 'LAUNDRO-', gated: true
    });
    drawAbandonedStore(TILE * 9.8, storeY, TILE * 2.2, storeH, {
      brick: 10, signBg: '#1a2030', signFg: '#80b0e0', name: 'AUTO BODY', gated: true
    });

    // Hand-painted "OPEN 24 HRS" on liquor — flickering implication
    ctx.fillStyle = 'rgba(255,220,120,0.35)';
    ctx.font = '700 7px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('OPEN 24 HRS?', TILE * 1.2, storeY + storeH - 4);

    // Dumpster alley gap
    ctx.fillStyle = '#1a1814';
    ctx.fillRect(TILE * 7.2, storeY + 4, 8, storeH - 6);
    ctx.fillStyle = '#2a4a2a';
    ctx.fillRect(TILE * 7.15, storeY + storeH - 18, 14, 12);
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(TILE * 7.2, storeY + storeH - 16, 10, 4);
  }

  function drawGhettoCurb(row, label, props) {
    const y = row * TILE;
    ctx.fillStyle = '#6a655c';
    ctx.fillRect(0, y, W, TILE);
    // Concrete slabs
    ctx.fillStyle = '#5a554c';
    for (let x = 0; x < W; x += 40) ctx.fillRect(x, y, 1, TILE);
    ctx.fillRect(0, y + TILE / 2, W, 1);
    // Speckle
    ctx.fillStyle = 'rgba(40,35,30,0.15)';
    for (let i = 0; i < 18; i++) {
      ctx.fillRect((i * 53) % W, y + 4 + (i * 7) % (TILE - 8), 2, 2);
    }
    // Cracks
    ctx.strokeStyle = 'rgba(30,28,24,0.4)';
    ctx.beginPath();
    ctx.moveTo(40, y + 6);
    ctx.lineTo(70, y + 28);
    ctx.lineTo(100, y + 16);
    ctx.moveTo(300, y + 8);
    ctx.lineTo(360, y + 30);
    ctx.stroke();

    // Street furniture
    if (props === 'goal') {
      // Hydrant
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(24, y + 14, 8, 16);
      ctx.fillRect(20, y + 18, 16, 5);
      // Shopping cart carcass
      ctx.strokeStyle = '#6a6a6a';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(150, y + 16, 22, 14);
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(152, y + 18, 18, 8);
      // Trash bags
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(220, y + 26, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(232, y + 28, 6, 4, 0.2, 0, Math.PI * 2);
      ctx.fill();
      // Newspaper box
      ctx.fillStyle = '#1a3a6a';
      ctx.fillRect(400, y + 12, 14, 20);
      ctx.fillStyle = '#f0e6d0';
      ctx.fillRect(402, y + 14, 10, 8);
      // Milk crate
      ctx.fillStyle = '#2a5a8a';
      ctx.fillRect(90, y + 22, 12, 10);
    } else if (props === 'start') {
      // Payphone shell
      ctx.fillStyle = '#3a3a42';
      ctx.fillRect(50, y + 6, 16, 28);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(53, y + 12, 10, 12);
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(55, y + 26, 6, 3);
      // Trash can overflowing
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(180, y + 14, 14, 18);
      ctx.fillStyle = '#2a4a2a';
      ctx.fillRect(178, y + 10, 18, 8);
      // Cardboard sign
      ctx.fillStyle = '#c4a574';
      ctx.fillRect(280, y + 18, 36, 12);
      ctx.fillStyle = '#2a2010';
      ctx.font = '700 6px "General Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('WILL WORK', 298, y + 26);
      // Orange cone
      ctx.fillStyle = '#e85d04';
      ctx.beginPath();
      ctx.moveTo(360, y + 12);
      ctx.lineTo(354, y + 32);
      ctx.lineTo(366, y + 32);
      ctx.fill();
      // Bike frame locked to pole
      ctx.fillStyle = '#6a6a6a';
      ctx.fillRect(420, y + 8, 3, 26);
      ctx.strokeStyle = '#2a5a8a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(418, y + 28, 5, 0, Math.PI * 2);
      ctx.arc(430, y + 28, 5, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Yellow curb
    ctx.fillStyle = '#b8922a';
    ctx.fillRect(0, y, W, 2);
    ctx.fillRect(0, y + TILE - 2, W, 2);
    // Curb chips
    ctx.fillStyle = '#6a655c';
    ctx.fillRect(60, y, 8, 2);
    ctx.fillRect(200, y + TILE - 2, 12, 2);

    if (label) {
      ctx.fillStyle = 'rgba(230,220,190,0.55)';
      ctx.font = '700 9px "General Sans", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(label, 8, y + 12);
    }
  }

  function drawGhettoRoad(row) {
    const y = row * TILE;
    ctx.fillStyle = row % 2 === 0 ? '#2a2a2c' : '#242426';
    ctx.fillRect(0, y, W, TILE);
    // Cracks
    ctx.strokeStyle = 'rgba(10,10,10,0.45)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(30, y + 8);
    ctx.lineTo(70, y + 22);
    ctx.lineTo(110, y + 14);
    ctx.moveTo(280, y + 30);
    ctx.lineTo(340, y + 10);
    ctx.stroke();
    // Worn dashed line
    ctx.fillStyle = 'rgba(200,190,160,0.35)';
    const mid = y + TILE / 2 - 1;
    for (let x = 2; x < W; x += 30) ctx.fillRect(x, mid, 12, 2);
    // Pothole
    if (row === GRILL.ROAD_START + 1 || row === GRILL.ROAD_START + 3) {
      ctx.fillStyle = '#1a1a1c';
      ctx.beginPath();
      ctx.ellipse(120 + (row * 40) % 200, y + 22, 14, 6, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawHooptyGoal() {
    drawGhettoCurb(GRILL.GOAL, 'PARKING  •  YOUR CAR', 'goal');
    const x = GRILL.CAR_COL * TILE;
    const y = GRILL.GOAL * TILE;
    const pulse = 0.45 + 0.55 * Math.sin(performance.now() / 260);
    // Highlight stall
    ctx.strokeStyle = `rgba(212,160,23,${0.4 + pulse * 0.45})`;
    ctx.lineWidth = 2 + pulse;
    ctx.strokeRect(x + 3, y + 4, TILE - 6, TILE - 8);
    // Your beat-up car
    ctx.save();
    ctx.translate(x + TILE / 2, y + TILE / 2 + 2);
    ctx.rotate(-0.04);
    ctx.shadowColor = '#d4a017';
    ctx.shadowBlur = 5 + pulse * 12;
    ctx.fillStyle = '#3a4a38';
    ctx.fillRect(-16, -8, 32, 16);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(-10, -6, 8, 6);
    ctx.fillRect(2, -6, 8, 6);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-14, 6, 8, 3);
    ctx.fillRect(6, 6, 8, 3);
    // Rust patch
    ctx.fillStyle = '#8a4030';
    ctx.fillRect(8, 0, 6, 4);
    ctx.fillStyle = '#d4a017';
    ctx.font = '700 7px "General Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.75 + pulse * 0.25;
    ctx.fillText('YOURS', 0, -11);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawJankyCar(e, row, dir) {
    const y = row * TILE;
    const h = TILE - 12;
    const yy = y + 6 + Math.sin(e.bob || 0) * 0.8;
    withFacing(e.x, yy, e.w, h, dir, (lx, ly, lw, lh) => {
      ctx.save();
      ctx.translate(lw / 2, lh / 2);
      ctx.rotate(e.lean || 0);
      ctx.translate(-lw / 2, -lh / 2);

      const bodyH = e.kind === 'van' ? lh : e.kind === 'rice' ? lh * 0.75 : lh * 0.85;
      const bodyY = ly + (lh - bodyH);

      // Body
      ctx.fillStyle = e.color || '#555';
      ctx.fillRect(lx, bodyY + 4, lw, bodyH - 4);
      // Primer / rust blotches
      if (e.primer) {
        ctx.fillStyle = 'rgba(160,150,130,0.55)';
        ctx.fillRect(lx + lw * 0.2, bodyY + 6, lw * 0.18, bodyH * 0.35);
      }
      ctx.fillStyle = '#8a4030';
      ctx.fillRect(lx + lw * 0.55, bodyY + bodyH - 10, 8, 5);
      ctx.fillRect(lx + 4, bodyY + 10, 5, 4);

      // Cabin
      const cabW = e.kind === 'van' ? lw * 0.55 : lw * 0.4;
      ctx.fillStyle = e.accent || '#2a2a2a';
      ctx.fillRect(lx + lw - cabW - 2, bodyY, cabW, bodyH * 0.55);
      ctx.fillStyle = 'rgba(80,120,140,0.55)';
      ctx.fillRect(lx + lw - cabW + 2, bodyY + 3, cabW - 8, bodyH * 0.35);

      // Missing bumper gap
      if (!e.missingBumper) {
        ctx.fillStyle = '#222';
        ctx.fillRect(lx + lw - 3, bodyY + bodyH - 8, 3, 6);
      }

      // Crooked spoiler on rice
      if (e.kind === 'rice') {
        ctx.fillStyle = '#111';
        ctx.fillRect(lx + 2, bodyY - 2, lw * 0.35, 3);
      }
      // Lowrider hydraulics look
      if (e.kind === 'lowrider') {
        ctx.fillStyle = '#c9a227';
        ctx.fillRect(lx + 4, bodyY + bodyH - 6, lw - 8, 2);
      }

      // Wheels — uneven
      ctx.fillStyle = '#111';
      ctx.fillRect(lx + 5, ly + lh - 4, 9, 5);
      ctx.fillRect(lx + lw - 16, ly + lh - 3, 9, 4);

      // Headlight (some cars run one-eyed)
      ctx.fillStyle = e.bustedLight ? '#333' : '#f0e6a0';
      ctx.fillRect(lx + lw - 5, bodyY + bodyH - 14, 3, 4);

      ctx.restore();
    });
  }

  function drawGhettoCross() {
    drawTopBlock();
    drawHooptyGoal();
    for (let r = GRILL.ROAD_START; r <= GRILL.ROAD_END; r++) drawGhettoRoad(r);
    drawGhettoCurb(GRILL.START, 'GRILL EXIT  •  START', 'start');
    drawBottomBlock();

    // Flickery streetlight cones
    const flicker = 0.05 + Math.sin(performance.now() / 400) * 0.015;
    ctx.fillStyle = `rgba(220,180,80,${flicker})`;
    ctx.beginPath();
    ctx.moveTo(60, GRILL.START * TILE);
    ctx.lineTo(20, GRILL.GOAL * TILE);
    ctx.lineTo(100, GRILL.GOAL * TILE);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(400, GRILL.START * TILE);
    ctx.lineTo(360, GRILL.GOAL * TILE);
    ctx.lineTo(440, GRILL.GOAL * TILE);
    ctx.fill();

    // Gas-station canopy spill onto the far curb
    ctx.fillStyle = 'rgba(140,40,40,0.08)';
    ctx.fillRect(TILE * 2.15, GRILL.GOAL * TILE, TILE * 3.3, 6);

    for (const lane of state.lanes) {
      for (const e of lane.entities) {
        drawJankyCar(e, lane.row, lane.dir);
      }
    }
  }

  function drawCross() {
    ctx.clearRect(0, 0, W, H);

    const shaking = state.shake > 0;
    if (shaking) {
      const mag = state.shake * 7;
      ctx.save();
      ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
    }

    if (isGrill()) {
      drawGhettoCross();
    } else {
      for (let r = 0; r < ROWS; r++) {
        if (r === ROW.GARAGE) drawGarage();
        else if (r === ROW.BANK) drawSafeBand(r, 'EAST RIVER PIER');
        else if (r >= ROW.RIVER_START && r <= ROW.RIVER_END) drawRiver(r);
        else if (r === ROW.MEDIAN) drawSafeBand(r, 'BROADWAY MEDIAN');
        else if (r >= ROW.ROAD_START && r <= ROW.ROAD_END) drawRoad(r);
        else if (r === ROW.START) drawSafeBand(r, 'CASINO EXIT  •  START');
      }

      for (const lane of state.lanes) {
        const y = lane.row * TILE;
        for (const e of lane.entities) {
          if (lane.row >= ROW.RIVER_START && lane.row <= ROW.RIVER_END) {
            drawFerry(e.x, y, e.w, e.kind, lane.dir);
          } else if (e.kind === 'taxi') drawTaxi(e.x, y, e.w, lane.dir);
          else if (e.kind === 'bus') drawBus(e.x, y, e.w, lane.dir);
          else if (e.kind === 'truck') drawTruck(e.x, y, e.w, lane.dir);
          else if (e.kind === 'bike') drawBike(e.x, y, e.w, lane.dir);
        }
      }
    }

    if (state.mode !== 'gameover' && !(state.mode === 'dead' && state.flash > 0 && Math.floor(state.flash * 20) % 2 === 0)) {
      if (!(state.mode === 'win')) {
        const pose = frogDrawPose();
        const alpha = state.invuln > 0 && Math.floor(state.invuln * 16) % 2 === 0 ? 0.4 : 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        drawBanker(pose.x, pose.y, 1, false, { sx: pose.sx, sy: pose.sy, facing: state.facing });
        ctx.restore();
      }
    }

    for (const p of state.particles) {
      ctx.globalAlpha = Math.max(0, p.life * 2);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 3, 3);
    }
    ctx.globalAlpha = 1;

    for (const ft of state.floatText) {
      ctx.globalAlpha = Math.min(1, ft.life * 2);
      ctx.fillStyle = ft.color;
      ctx.font = '700 11px "General Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;

    if (state.mode === 'play' || state.mode === 'pause' || state.mode === 'dead') drawTimer();

    if (state.flash > 0) {
      ctx.fillStyle = `rgba(192,57,43,${state.flash * 0.35})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (shaking) ctx.restore();

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(20,22,26,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e8dcc0';
      ctx.font = '700 22px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }
  }

  // Chase-cam projection: camera behind & above the car, street is the ground plane (y=0)
  function projectWorld(wx, wy, wz, d) {
    const camX = (d.camX != null ? d.camX : d.playerX);
    const camY = d.camY || 46;
    const camZ = d.z - (d.camBack || 110);

    let rx = (wx - camX) * 100;
    let ry = wy - camY;
    let rz = wz - camZ;

    // Gentle road bend ahead — kept mild so the asphalt doesn't whip
    const ahead = wz - d.z;
    if (ahead > 0) {
      rx += d.curve * ahead * ahead * 0.014;
      // Smoothstep easing so hills roll in without a kink
      const ht = Math.min(1, ahead / 600);
      ry += (d.hills || 0) * (ht * ht * (3 - 2 * ht)) * 0.3;
    }

    if (rz < 12) rz = 12;
    const fov = 300;
    const scale = fov / rz;
    const x = W / 2 + rx * scale;
    // Horizon sits mid-frame; near ground drops toward the bottom
    const y = H * 0.46 - ry * scale;
    return { x, y, scale, relZ: rz };
  }

  // Blend two [r,g,b] colors — used for atmospheric haze with distance
  function hazeMix(c, f, t) {
    const k = Math.max(0, Math.min(1, t));
    return `rgb(${Math.round(c[0] + (f[0] - c[0]) * k)},${Math.round(c[1] + (f[1] - c[1]) * k)},${Math.round(c[2] + (f[2] - c[2]) * k)})`;
  }

  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, Math.min(255, ((n >> 16) & 255) + amt));
    const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
    const b = Math.max(0, Math.min(255, (n & 255) + amt));
    return `rgb(${r},${g},${b})`;
  }

  // Rear / 3rd-person low-poly car. (x,y) = ground contact under the chassis.
  function drawLowPolyCar(x, y, scale, kind, opts = {}) {
    const player = !!opts.player;
    const yaw = opts.yaw || 0;
    const pitch = opts.pitch || 0;
    const roll = opts.roll || 0;
    const smashed = !!opts.smashed;
    const crush = Math.max(0, Math.min(1, opts.crush || (smashed ? 0.6 : 0)));
    const bodyScale = opts.bodyScale || 1;
    const roofMul = opts.roof || 1;
    const s = Math.max(0.12, scale) * bodyScale;
    const kindW = kind === 'bus' ? 78 : kind === 'van' || kind === 'suv' ? 68
      : kind === 'pickup' ? 64 : kind === 'compact' || kind === 'sports' ? 52 : 58;
    const kindH = kind === 'bus' ? 48 : kind === 'suv' || kind === 'van' ? 40
      : kind === 'sports' ? 28 : kind === 'compact' ? 30 : 34;
    const w = kindW * s * (1 - crush * 0.35);
    const h = kindH * s * (1 - crush * 0.45);
    const baseColor = opts.color
      || (player ? '#1a2430' : kind === 'taxi' ? '#d4a017' : kind === 'bus' ? '#e8e6e0' : '#4a5560');
    const body = smashed ? shade(baseColor, -40 - crush * 30) : baseColor;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(roll + yaw * (smashed ? 1 : 0.4));
    const squashX = 1 + crush * 0.35;
    const squashY = 1 - crush * 0.4;
    ctx.transform(squashX, pitch * 0.12 + crush * 0.15, crush * 0.2, squashY, 0, crush * 6 * s);

    ctx.fillStyle = `rgba(0,0,0,${0.35 + crush * 0.2})`;
    ctx.beginPath();
    ctx.ellipse(crush * 8 * s, 2 * s, w * (0.52 + crush * 0.2), h * 0.16, crush * 0.4, 0, Math.PI * 2);
    ctx.fill();

    const lean = yaw * 12 * s;
    const rearY = -h * 0.05;
    const midY = -h * (0.5 + roofMul * 0.05);
    const noseY = -h * (kind === 'pickup' ? 0.85 : 1.05);
    const rearW = w * (0.5 - crush * 0.08);
    const midW = w * (0.38 - crush * 0.06);
    const noseW = w * (0.22 + (kind === 'sports' ? -0.04 : 0));
    const roofH = h * 0.35 * roofMul * (1 - crush * 0.5);

    ctx.fillStyle = shade(body, -40);
    ctx.beginPath();
    ctx.moveTo(-rearW, rearY + h * 0.2);
    ctx.lineTo(-midW + lean, midY + h * 0.15);
    ctx.lineTo(midW + lean, midY + h * 0.15);
    ctx.lineTo(rearW, rearY + h * 0.2);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = shade(body, -15);
    ctx.beginPath();
    ctx.moveTo(-rearW, rearY + h * 0.18);
    ctx.lineTo(-rearW * 0.92, rearY - h * 0.15);
    ctx.lineTo(rearW * 0.92, rearY - h * 0.15);
    ctx.lineTo(rearW, rearY + h * 0.18);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = shade(body, 12);
    ctx.beginPath();
    ctx.moveTo(-rearW * 0.7, rearY - h * 0.12);
    ctx.lineTo(-midW * 0.85 + lean, midY - roofH);
    ctx.lineTo(midW * 0.85 + lean, midY - roofH);
    ctx.lineTo(rearW * 0.7, rearY - h * 0.12);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = shade(body, -22);
    ctx.beginPath();
    ctx.moveTo(-rearW * 0.85, rearY - h * 0.1);
    ctx.lineTo(-midW + lean, midY);
    ctx.lineTo(-midW * 0.7 + lean, midY - roofH * 0.85);
    ctx.lineTo(-rearW * 0.65, rearY - h * 0.35);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(rearW * 0.85, rearY - h * 0.1);
    ctx.lineTo(midW + lean, midY);
    ctx.lineTo(midW * 0.7 + lean, midY - roofH * 0.85);
    ctx.lineTo(rearW * 0.65, rearY - h * 0.35);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = smashed ? 'rgba(40,50,60,0.85)' : (player ? '#5a8aa0' : '#3a4a55');
    ctx.beginPath();
    ctx.moveTo(-rearW * 0.55, rearY - h * 0.14);
    ctx.lineTo(-rearW * 0.4, rearY - h * 0.42 * (1 - crush * 0.3));
    ctx.lineTo(rearW * 0.4, rearY - h * 0.42 * (1 - crush * 0.3));
    ctx.lineTo(rearW * 0.55, rearY - h * 0.14);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = shade(body, 20);
    if (kind === 'pickup') {
      ctx.fillRect(-midW * 0.55 + lean, midY - h * 0.08, midW * 1.1, h * 0.35);
      ctx.fillStyle = shade(body, -10);
      ctx.fillRect(-midW * 0.5 + lean, midY, midW, h * 0.22);
    } else {
      ctx.beginPath();
      ctx.moveTo(-midW * 0.7 + lean, midY);
      ctx.lineTo(-noseW + lean * 0.5, noseY);
      ctx.lineTo(noseW + lean * 0.5, noseY);
      ctx.lineTo(midW * 0.7 + lean, midY);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = '#0d0d10';
    ctx.fillRect(-rearW * 0.75, rearY + h * 0.05, w * 0.18, h * 0.22);
    if (crush < 0.55) {
      ctx.fillRect(rearW * 0.55, rearY + h * 0.05, w * 0.18, h * 0.22);
    } else {
      ctx.save();
      ctx.translate(rearW * 1.1, rearY + h * 0.1);
      ctx.rotate(yaw * 3);
      ctx.fillRect(-w * 0.08, -h * 0.08, w * 0.16, h * 0.16);
      ctx.restore();
    }
    ctx.fillStyle = '#2a2a30';
    ctx.fillRect(-midW * 0.5 + lean, midY + h * 0.02, w * 0.12, h * 0.14);
    if (crush < 0.7) ctx.fillRect(midW * 0.35 + lean, midY + h * 0.02, w * 0.12, h * 0.14);

    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(-rearW * 0.85, rearY - h * 0.05, w * 0.14, h * 0.1);
    ctx.fillRect(rearW * 0.7, rearY - h * 0.05, w * 0.14, h * 0.1);

    if (kind === 'taxi') {
      ctx.fillStyle = '#fff6d0';
      ctx.fillRect(-w * 0.08, midY - roofH - 2 * s, w * 0.16, 4 * s);
    }
    if (kind === 'bus') {
      ctx.fillStyle = '#0039a6';
      ctx.fillRect(-rearW * 0.9, rearY + h * 0.02, rearW * 1.8, h * 0.1);
    }
    if (kind === 'police') {
      ctx.fillStyle = '#f5f5f0';
      ctx.fillRect(-w * 0.12, midY - roofH - 3 * s, w * 0.24, 5 * s);
      const blink = Math.floor(performance.now() / 120) % 2;
      ctx.fillStyle = blink ? '#e74c3c' : '#3a7cff';
      ctx.fillRect(-w * 0.1, midY - roofH - 2 * s, w * 0.08, 3 * s);
      ctx.fillStyle = blink ? '#3a7cff' : '#e74c3c';
      ctx.fillRect(w * 0.02, midY - roofH - 2 * s, w * 0.08, 3 * s);
    }
    if (player) {
      ctx.strokeStyle = '#efc84a';
      ctx.lineWidth = Math.max(1.5, 2 * s);
      ctx.strokeRect(-rearW * 0.9, rearY - h * 0.4, rearW * 1.8, h * 0.55);
    }

    if (smashed || crush > 0.1) {
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 1.5 + crush;
      ctx.beginPath();
      ctx.moveTo(-w * 0.25, -h * 0.35);
      ctx.lineTo(w * 0.1, h * 0.08);
      ctx.lineTo(-w * 0.05, -h * 0.15);
      ctx.moveTo(w * 0.22, -h * 0.55);
      ctx.lineTo(-w * 0.12, 0);
      ctx.lineTo(w * 0.08, -h * 0.25);
      ctx.stroke();
      ctx.fillStyle = 'rgba(30,30,35,0.55)';
      ctx.beginPath();
      ctx.moveTo(-w * 0.15, -h * 0.2);
      ctx.lineTo(0, -h * 0.05);
      ctx.lineTo(-w * 0.08, h * 0.1);
      ctx.closePath();
      ctx.fill();
      if (crush > 0.3 && crush < 0.95) {
        ctx.fillStyle = `rgba(255,120,40,${0.15 * (1 - crush)})`;
        ctx.fillRect(-rearW * 0.6, rearY - h * 0.2, rearW * 1.2, h * 0.25);
      }
    }

    ctx.restore();
  }

  function drawBuilding(b, d) {
    // Buildings sit on the lot line just outside the sidewalk
    const edge = b.side * (DW.BUILD + b.w * 0.15);
    const ground = projectWorld(edge, 0, b.z, d);
    if (ground.relZ < 40 || ground.relZ > 1400 || ground.scale < 0.04) return;
    // Fade in from the haze instead of popping
    const fade = Math.max(0, Math.min(1, (1400 - ground.relZ) / 320));
    ctx.save();
    ctx.globalAlpha = fade;
    const top = projectWorld(edge, b.h * 0.55, b.z, d);
    const bw = (50 + b.w * 80) * ground.scale;
    const bh = Math.max(8, ground.y - top.y);
    const lean = (b.lean || 0) * bh;
    const x = ground.x - (b.side < 0 ? bw : 0) + lean * 0.5;
    const y = ground.y - bh;

    // Side depth facet
    ctx.fillStyle = shade(b.color, -40);
    ctx.beginPath();
    if (b.side < 0) {
      ctx.moveTo(x + bw, y);
      ctx.lineTo(x + bw + 14 * ground.scale, y + 10 * ground.scale);
      ctx.lineTo(x + bw + 14 * ground.scale, ground.y);
      ctx.lineTo(x + bw, ground.y);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x - 14 * ground.scale, y + 10 * ground.scale);
      ctx.lineTo(x - 14 * ground.scale, ground.y);
      ctx.lineTo(x, ground.y);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(x + lean, y);
    ctx.lineTo(x + bw + lean, y);
    ctx.lineTo(x + bw, ground.y);
    ctx.lineTo(x, ground.y);
    ctx.closePath();
    ctx.fill();

    // Dirty storefront
    ctx.fillStyle = shade(b.color, -25);
    ctx.fillRect(x, ground.y - 22 * ground.scale, bw, 22 * ground.scale);
    ctx.fillStyle = b.boarded ? '#2a241c' : 'rgba(30,40,50,0.7)';
    ctx.fillRect(x + 5 * ground.scale, ground.y - 18 * ground.scale, bw - 10 * ground.scale, 12 * ground.scale);

    if (b.graffiti) {
      ctx.fillStyle = 'rgba(180,60,90,0.35)';
      ctx.fillRect(x + 8 * ground.scale, ground.y - 40 * ground.scale, bw * 0.35, 10 * ground.scale);
      ctx.fillStyle = 'rgba(60,120,160,0.3)';
      ctx.fillRect(x + bw * 0.45, ground.y - 36 * ground.scale, bw * 0.3, 8 * ground.scale);
    }

    // Windows — many dark / boarded
    const cols = b.windows;
    const rows = Math.max(2, Math.floor(bh / (16 * ground.scale)));
    for (let r = 0; r < rows - 1; r++) {
      for (let c = 0; c < cols; c++) {
        const key = Math.floor(b.z * 0.01) + r * 3 + c;
        let col;
        if (b.boarded && key % 4 === 0) col = '#2a2218';
        else if (key % 5 === 0) col = 'rgba(200,170,90,0.28)';
        else col = 'rgba(15,18,24,0.55)';
        ctx.fillStyle = col;
        const wx = x + 6 * ground.scale + c * ((bw - 12 * ground.scale) / cols) + lean * (1 - r / rows);
        const wy = y + 8 * ground.scale + r * 14 * ground.scale;
        ctx.fillRect(wx, wy, Math.max(2, 7 * ground.scale), Math.max(2, 6 * ground.scale));
      }
    }

    // Cheap fire escape ticks
    if (b.side > 0 && ground.scale > 0.12) {
      ctx.strokeStyle = 'rgba(80,80,90,0.55)';
      ctx.lineWidth = 1;
      for (let r = 1; r < rows - 1; r += 2) {
        const fy = y + r * 14 * ground.scale;
        ctx.strokeRect(x - 6 * ground.scale, fy, 8 * ground.scale, 10 * ground.scale);
      }
    }
    ctx.restore();
  }

  function drawRoadExit(ex, d) {
    if (ex.taken) return;
    const side = ex.side || 1;
    // Ramp gore — asphalt peeling off the right/left shoulder
    const zA = ex.startZ;
    const zB = ex.z;
    const zC = ex.endZ;
    const roadEdge = side * DW.ROAD;
    const rampOut = side * (DW.WALK + 0.35);

    const segs = [
      [zA, roadEdge * 0.85, roadEdge],
      [zB, roadEdge, rampOut],
      [zC, rampOut * 0.9, rampOut]
    ];
    for (let i = 0; i < segs.length - 1; i++) {
      const [z0, xIn0, xOut0] = segs[i];
      const [z1, xIn1, xOut1] = segs[i + 1];
      const a = projectWorld(xIn0, 0, z0, d);
      const b = projectWorld(xOut0, 0, z0, d);
      const c = projectWorld(xOut1, 0, z1, d);
      const e = projectWorld(xIn1, 0, z1, d);
      if (a.relZ < 40 || a.relZ > 1100) continue;
      ctx.fillStyle = i === 0 ? '#2a2a2e' : '#323238';
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.lineTo(c.x, c.y);
      ctx.lineTo(e.x, e.y);
      ctx.closePath();
      ctx.fill();
      // White edge line
      ctx.strokeStyle = 'rgba(220,210,190,0.55)';
      ctx.lineWidth = Math.max(1, 2 * a.scale);
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
    }

    // Painted EXIT arrow on asphalt
    const arrowZ = ex.z - 25;
    const ax = side * (DW.ROAD * 0.72);
    const tip = projectWorld(ax + side * 0.12, 0, arrowZ + 12, d);
    const left = projectWorld(ax - side * 0.08, 0, arrowZ - 8, d);
    const right = projectWorld(ax + side * 0.22, 0, arrowZ - 8, d);
    if (tip.relZ > 50 && tip.relZ < 900) {
      ctx.fillStyle = 'rgba(230,220,180,0.55)';
      ctx.beginPath();
      ctx.moveTo(tip.x, tip.y);
      ctx.lineTo(left.x, left.y);
      ctx.lineTo(right.x, right.y);
      ctx.closePath();
      ctx.fill();
    }

    // Green highway gantry sign
    const signZ = ex.z - 40;
    const postX = side * (DW.CURB + 0.05);
    const post = projectWorld(postX, 0, signZ, d);
    const postTop = projectWorld(postX, 55, signZ, d);
    if (post.relZ > 60 && post.relZ < 1000 && post.scale > 0.06) {
      const s = post.scale;
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, (1000 - post.relZ) / 240));
      ctx.fillStyle = '#3a3a40';
      ctx.fillRect(post.x - 2 * s, postTop.y, 4 * s, post.y - postTop.y);
      const bw = 72 * s;
      const bh = 28 * s;
      const bx = side > 0 ? post.x - bw + 4 * s : post.x - 4 * s;
      const by = postTop.y + 2 * s;
      ctx.fillStyle = '#1a5c36';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = 'rgba(240,240,240,0.7)';
      ctx.lineWidth = Math.max(1, 1.5 * s);
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = '#f5f5f0';
      ctx.font = `700 ${Math.max(8, 11 * s)}px "General Sans", sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('EXIT', bx + bw / 2, by + bh * 0.38);
      ctx.fillStyle = '#f0c400';
      ctx.font = `700 ${Math.max(9, 13 * s)}px "General Sans", sans-serif`;
      ctx.fillText(ex.name, bx + bw / 2, by + bh * 0.78);

      // Side panel arrow
      ctx.fillStyle = '#f5f5f0';
      const aw = 10 * s;
      const ah = 10 * s;
      const ax0 = side > 0 ? bx + bw - 14 * s : bx + 4 * s;
      ctx.beginPath();
      if (side > 0) {
        ctx.moveTo(ax0, by + bh / 2);
        ctx.lineTo(ax0 - aw, by + bh / 2 - ah / 2);
        ctx.lineTo(ax0 - aw, by + bh / 2 + ah / 2);
      } else {
        ctx.moveTo(ax0, by + bh / 2);
        ctx.lineTo(ax0 + aw, by + bh / 2 - ah / 2);
        ctx.lineTo(ax0 + aw, by + bh / 2 + ah / 2);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawStreetProp(pr, d) {
    if (pr.kind === 'crosswalk') {
      const pL = projectWorld(-DW.ROAD * 0.92, 0, pr.z, d);
      const pR = projectWorld(DW.ROAD * 0.92, 0, pr.z, d);
      if (pL.relZ < 50 || pL.relZ > 900) return;
      const cwA = Math.max(0, Math.min(1, (900 - pL.relZ) / 220));
      ctx.fillStyle = `rgba(210,200,180,${0.5 * cwA})`;
      const stripes = 7;
      for (let i = 0; i < stripes; i++) {
        const t0 = i / stripes;
        const t1 = (i + 0.4) / stripes;
        const x0 = pL.x + (pR.x - pL.x) * t0;
        const x1 = pL.x + (pR.x - pL.x) * t1;
        ctx.fillRect(x0, pL.y - 4 * pL.scale, Math.max(2, x1 - x0), Math.max(2, 10 * pL.scale));
      }
      return;
    }
    if (pr.kind === 'pothole') {
      const p = projectWorld(pr.x != null ? pr.x : 0, 0, pr.z, d);
      if (p.relZ < 50 || p.relZ > 700) return;
      ctx.fillStyle = 'rgba(10,10,12,0.55)';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 14 * p.scale, 6 * p.scale, 0, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    // Furniture lives on the concrete sidewalk strip
    const xWorld = pr.side * ((DW.ROAD + DW.WALK) * 0.5);
    const p = projectWorld(xWorld, 0, pr.z, d);
    if (p.relZ < 45 || p.relZ > 1100) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, (1100 - p.relZ) / 260));
    if (pr.kind === 'light') {
      const top = projectWorld(xWorld, 55, pr.z, d);
      ctx.strokeStyle = '#2a2a30';
      ctx.lineWidth = Math.max(1, 3 * p.scale);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(top.x, top.y);
      ctx.stroke();
      ctx.fillStyle = '#c9a227';
      ctx.beginPath();
      ctx.arc(top.x, top.y, 5 * p.scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(200,160,60,0.1)';
      ctx.beginPath();
      ctx.moveTo(top.x, top.y);
      ctx.lineTo(p.x - 30 * p.scale, p.y);
      ctx.lineTo(p.x + 30 * p.scale, p.y);
      ctx.closePath();
      ctx.fill();
    } else if (pr.kind === 'hydrant') {
      ctx.fillStyle = '#a03028';
      ctx.fillRect(p.x - 5 * p.scale, p.y - 16 * p.scale, 10 * p.scale, 16 * p.scale);
      ctx.fillRect(p.x - 8 * p.scale, p.y - 12 * p.scale, 16 * p.scale, 5 * p.scale);
    } else if (pr.kind === 'dumpster') {
      ctx.fillStyle = '#3a5a3a';
      ctx.fillRect(p.x - 16 * p.scale, p.y - 22 * p.scale, 32 * p.scale, 22 * p.scale);
      ctx.fillStyle = '#2a3a2a';
      ctx.fillRect(p.x - 16 * p.scale, p.y - 26 * p.scale, 32 * p.scale, 6 * p.scale);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(p.x - 4 * p.scale, p.y - 20 * p.scale, 3 * p.scale, 16 * p.scale);
    }
    ctx.restore();
  }

  function drawDriveParticles() {
    for (const p of state.particles) {
      const a = Math.max(0, p.life / (p.maxLife || 0.8));
      if (p.type === 'shard') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot || 0);
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        const s = p.size || 6;
        if (p.sides === 4) {
          ctx.moveTo(-s * 0.5, -s * 0.4);
          ctx.lineTo(s * 0.5, -s * 0.3);
          ctx.lineTo(s * 0.35, s * 0.5);
          ctx.lineTo(-s * 0.4, s * 0.35);
        } else {
          ctx.moveTo(0, -s * 0.6);
          ctx.lineTo(s * 0.55, s * 0.45);
          ctx.lineTo(-s * 0.55, s * 0.4);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (p.type === 'spark') {
        ctx.globalAlpha = a;
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 0.02, p.y - p.vy * 0.02);
        ctx.stroke();
      } else if (p.type === 'smoke') {
        ctx.globalAlpha = a * 0.35;
        ctx.fillStyle = '#6a6a72';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size || 10, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'text') {
        ctx.globalAlpha = Math.min(1, a * 1.6);
        ctx.font = `800 ${p.size || 15}px "General Sans", sans-serif`;
        ctx.textAlign = 'center';
        ctx.lineWidth = 3;
        ctx.strokeStyle = 'rgba(10,10,14,0.8)';
        ctx.strokeText(p.text, p.x, p.y);
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawDrive() {
    const d = state.drive;
    ctx.clearRect(0, 0, W, H);

    // Smooth camera sway — layered slow sines instead of per-frame random jitter
    const st = performance.now() / 1000;
    const shakeAmt = (d.camShake || 0) * 0.7 + (d.rumble || 0) * 2.2;
    const shakeX = shakeAmt ? (Math.sin(st * 21) * 0.6 + Math.sin(st * 34 + 1.3) * 0.4) * shakeAmt * 0.45 : 0;
    const shakeY = shakeAmt ? (Math.sin(st * 26 + 0.7) * 0.6 + Math.sin(st * 41) * 0.4) * shakeAmt * 0.32 : 0;
    ctx.save();
    ctx.translate(shakeX, shakeY);
    ctx.rotate(d.roll * 0.05);

    // Smoggy dusk sky, brightest at the horizon
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.5);
    sky.addColorStop(0, '#232830');
    sky.addColorStop(0.5, '#4c525c');
    sky.addColorStop(0.85, '#6e6a62');
    sky.addColorStop(1, '#807a6e');
    ctx.fillStyle = sky;
    ctx.fillRect(-30, -30, W + 60, H * 0.55);

    // Hazy moon
    const moonGlow = ctx.createRadialGradient(W * 0.72, H * 0.13, 4, W * 0.72, H * 0.13, 60);
    moonGlow.addColorStop(0, 'rgba(235,230,210,0.5)');
    moonGlow.addColorStop(0.25, 'rgba(220,215,195,0.12)');
    moonGlow.addColorStop(1, 'rgba(220,215,195,0)');
    ctx.fillStyle = moonGlow;
    ctx.fillRect(W * 0.72 - 60, H * 0.13 - 60, 120, 120);

    // Skyline — two parallax layers that lean into the curve
    const skySway = -d.curve * 60 - (d.camX || 0) * 6;
    ctx.fillStyle = '#3a3f47';
    for (let i = 0; i < 16; i++) {
      const bx = ((i * 61 + d.z * 0.012 + skySway * 0.4) % (W + 90) + W + 90) % (W + 90) - 45;
      const bh = 14 + ((i * 23) % 34);
      ctx.fillRect(bx, H * 0.42 - bh - (d.hills || 0) * 0.06, 26 + (i % 4) * 7, bh);
    }
    ctx.fillStyle = '#2e333a';
    for (let i = 0; i < 20; i++) {
      const bx = ((i * 47 + d.z * 0.03 + skySway) % (W + 70) + W + 70) % (W + 70) - 35;
      const bh = 20 + ((i * 19) % 55);
      const bw2 = 22 + (i % 3) * 6;
      const by = H * 0.42 - bh - (d.hills || 0) * 0.1;
      ctx.fillRect(bx, by, bw2, bh);
      // Sparse lit windows
      ctx.fillStyle = 'rgba(210,180,110,0.25)';
      for (let wI = (i * 7) % 3; wI < 5; wI += 2) {
        ctx.fillRect(bx + 4 + (wI % 3) * 7, by + 6 + Math.floor(wI / 3) * 12 + (i % 5) * 4, 3, 4);
      }
      ctx.fillStyle = '#2e333a';
    }
    // Ground haze band swallowing the skyline bases
    const hazeBand = ctx.createLinearGradient(0, H * 0.3, 0, H * 0.46);
    hazeBand.addColorStop(0, 'rgba(126,120,108,0)');
    hazeBand.addColorStop(1, 'rgba(126,120,108,0.55)');
    ctx.fillStyle = hazeBand;
    ctx.fillRect(-30, H * 0.3, W + 60, H * 0.17);

    // Smooth ground base
    const nearGround = projectWorld(0, 0, d.z - 40, d);
    ctx.fillStyle = '#5a564e';
    ctx.fillRect(-30, nearGround.y - 4, W + 60, H);

    // Smooth cohesive street with atmospheric perspective on every surface
    const segs = 62;
    const segLen = 22;
    const zBase = Math.floor(d.z / segLen) * segLen;
    const FOG = [126, 120, 108];
    const ASPHALT = [42, 42, 46];
    const WALKC = [138, 134, 128];
    const CURBC = [168, 164, 156];
    const fogFar = segs * segLen;
    for (let i = segs; i >= -5; i--) {
      const z0 = zBase + i * segLen;
      const z1 = z0 + segLen;
      const pL = projectWorld(-DW.ROAD, 0, z0, d);
      const pR = projectWorld(DW.ROAD, 0, z0, d);
      const qL = projectWorld(-DW.ROAD, 0, z1, d);
      const qR = projectWorld(DW.ROAD, 0, z1, d);
      const wL = projectWorld(-DW.WALK, 0, z0, d);
      const wR = projectWorld(DW.WALK, 0, z0, d);
      const vL = projectWorld(-DW.WALK, 0, z1, d);
      const vR = projectWorld(DW.WALK, 0, z1, d);
      // Haze factor — surfaces dissolve toward the fog color with distance
      const fogT = Math.pow(Math.max(0, Math.min(1, pL.relZ / fogFar)), 1.4) * 0.85;
      const paintA = 1 - fogT;

      // Continuous sidewalk
      ctx.fillStyle = hazeMix(WALKC, FOG, fogT);
      ctx.beginPath();
      ctx.moveTo(-20, wL.y);
      ctx.lineTo(wL.x, wL.y);
      ctx.lineTo(vL.x, vL.y);
      ctx.lineTo(-20, vL.y);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(W + 20, wR.y);
      ctx.lineTo(wR.x, wR.y);
      ctx.lineTo(vR.x, vR.y);
      ctx.lineTo(W + 20, vR.y);
      ctx.fill();

      // Thin continuous curb lip
      ctx.fillStyle = hazeMix(CURBC, FOG, fogT);
      ctx.beginPath();
      ctx.moveTo(wL.x, wL.y);
      ctx.lineTo(pL.x, pL.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.lineTo(vL.x, vL.y);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(wR.x, wR.y);
      ctx.lineTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.lineTo(vR.x, vR.y);
      ctx.closePath();
      ctx.fill();

      // Solid asphalt
      ctx.fillStyle = hazeMix(ASPHALT, FOG, fogT);
      ctx.beginPath();
      ctx.moveTo(pL.x, pL.y);
      ctx.lineTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.closePath();
      ctx.fill();

      // Soft shoulder paint, fading into the haze
      ctx.strokeStyle = `rgba(210,200,170,${0.28 * paintA})`;
      ctx.lineWidth = Math.max(1, 1.5 * pL.scale);
      ctx.beginPath();
      ctx.moveTo(pL.x, pL.y);
      ctx.lineTo(qL.x, qL.y);
      ctx.moveTo(pR.x, pR.y);
      ctx.lineTo(qR.x, qR.y);
      ctx.stroke();

      // Continuous double yellow
      const m0 = projectWorld(0, 0, z0, d);
      const m1 = projectWorld(0, 0, z1, d);
      ctx.strokeStyle = `rgba(196,160,53,${0.42 * paintA})`;
      ctx.lineWidth = Math.max(1, 2 * pL.scale);
      ctx.beginPath();
      ctx.moveTo(m0.x - 3 * pL.scale, m0.y);
      ctx.lineTo(m1.x - 3 * pL.scale, m1.y);
      ctx.moveTo(m0.x + 3 * pL.scale, m0.y);
      ctx.lineTo(m1.x + 3 * pL.scale, m1.y);
      ctx.stroke();

      // Soft dashed lane marks
      if (Math.floor(z0 / (segLen * 3)) % 2 === 0) {
        ctx.strokeStyle = `rgba(200,195,180,${0.22 * paintA})`;
        ctx.lineWidth = Math.max(1, 1.8 * pL.scale);
        for (const lane of [-DW.LANE, DW.LANE]) {
          const a = projectWorld(lane, 0, z0, d);
          const bpt = projectWorld(lane, 0, z1, d);
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(bpt.x, bpt.y);
          ctx.stroke();
        }
      }
    }

    // City blocks (far → near), sit on sidewalk grade
    const builds = [...d.buildings].sort((a, b) => b.z - a.z);
    for (const b of builds) drawBuilding(b, d);

    const props = [...d.props].sort((a, b) => b.z - a.z);
    for (const pr of props) drawStreetProp(pr, d);

    // EXIT ramps + gantry signs
    const exits = [...(d.exits || [])].sort((a, b) => b.z - a.z);
    for (const ex of exits) drawRoadExit(ex, d);

    // Traffic on the road plane — emerges from the haze instead of popping
    const cars = [...d.traffic].sort((a, b) => b.z - a.z);
    for (const car of cars) {
      const fly = car.flyY || 0;
      const p = projectWorld(car.x, fly, car.z, d);
      if (p.relZ < 30 || p.relZ > 1250 || p.scale < 0.05) continue;
      const carFade = Math.max(0, Math.min(1, (1250 - p.relZ) / 280));
      ctx.save();
      ctx.globalAlpha = carFade;
      drawLowPolyCar(p.x, p.y, Math.min(1.35, p.scale * 0.55), car.kind, {
        yaw: car.yaw || 0,
        roll: car.smashed ? (car.roll || 0) : 0,
        pitch: car.smashed ? Math.min(0.85, fly * 0.05) : 0,
        smashed: car.smashed,
        crush: car.crush || 0,
        color: car.color,
        bodyScale: car.bodyScale || 1,
        roof: car.roof || 1
      });
      // Taillight glow on live cars ahead
      if (!car.smashed && car.z > d.z + 40) {
        const gw = 22 * p.scale;
        const glow = ctx.createRadialGradient(p.x, p.y - 10 * p.scale, 1, p.x, p.y - 10 * p.scale, gw);
        glow.addColorStop(0, `rgba(255,60,50,${0.2 * carFade})`);
        glow.addColorStop(1, 'rgba(255,60,50,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(p.x - gw, p.y - 10 * p.scale - gw, gw * 2, gw * 2);
      }
      ctx.restore();
    }

    // Player car — on the road plane with suspension compression
    const bob = Math.sin(d.wheelSpin * 2) * (d.speed / 900) + (d.susp || 0) * 0.35;
    const carZ = d.z + 14;
    const ground = projectWorld(d.playerX, 0, carZ, d);
    const blink = d.invuln > 0 && Math.floor(d.invuln * 14) % 2 === 0;
    if (!blink) {
      drawLowPolyCar(ground.x, ground.y + bob, Math.min(1.4, ground.scale * 0.58), 'player', {
        player: true,
        yaw: d.yaw,
        pitch: d.pitch,
        roll: d.roll + (d.crashT > 0 ? Math.sin(d.crashT * 40) * 0.2 : 0)
      });
    }

    drawDriveParticles();

    ctx.restore();

    // HUD
    ctx.fillStyle = 'rgba(20,22,28,0.8)';
    ctx.fillRect(0, 0, W, 36);
    const upcoming = nextRoadExit(d);
    ctx.fillStyle = d.approachingExit ? '#7dce7a' : '#e8dcc0';
    ctx.font = '700 12px "General Sans", sans-serif';
    ctx.textAlign = 'left';
    if (d.approachingExit) {
      ctx.fillText(`TAKE EXIT → ${d.approachingExit.name}`, 10, 22);
    } else if (upcoming) {
      const mi = ((upcoming.z - d.z) / (DW.MPH_Z * 55)).toFixed(1);
      ctx.fillText(`NEXT EXIT  ${upcoming.name}  ${mi} mi`, 10, 22);
    } else {
      ctx.fillText('OPEN ROAD', 10, 22);
    }
    ctx.textAlign = 'right';
    ctx.fillStyle = '#d8d2c0';
    ctx.fillText(`${Math.round(d.speed)} MPH`, W - 10, 22);

    const sp = d.speed / d.maxSpeed;
    ctx.fillStyle = '#2a2c30';
    ctx.fillRect(10, H - 14, W - 20, 6);
    ctx.fillStyle = sp > 0.85 ? '#c0392b' : '#d4a017';
    ctx.fillRect(10, H - 14, (W - 20) * sp, 6);

    if (d.crashFlash > 0) {
      ctx.fillStyle = `rgba(192,57,43,${d.crashFlash * 0.5})`;
      ctx.fillRect(0, 0, W, H);
      const g = ctx.createRadialGradient(W / 2, H * 0.62, 30, W / 2, H / 2, W * 0.75);
      g.addColorStop(0, 'rgba(255,200,80,0.12)');
      g.addColorStop(1, `rgba(0,0,0,${d.crashFlash * 0.55})`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(20,22,26,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e8dcc0';
      ctx.font = '700 22px Zodiak, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }
  }

  function draw() {
    if (state.phase === 'drive' && state.drive) drawDrive();
    else drawCross();
  }

  function frame(ts) {
    if (!state.lastTs) state.lastTs = ts;
    let dt = (ts - state.lastTs) / 1000;
    state.lastTs = ts;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  const keyMap = {
    ArrowUp: 'up', w: 'up', W: 'up',
    ArrowDown: 'down', s: 'down', S: 'down',
    ArrowLeft: 'left', a: 'left', A: 'left',
    ArrowRight: 'right', d: 'right', D: 'right'
  };
  const dirDelta = {
    up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0]
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
      if (state.mode === 'play' || state.mode === 'drive') togglePause();
      else if (state.mode === 'pause') togglePause();
      return;
    }
    const dir = keyMap[e.key];
    if (!dir) return;
    e.preventDefault();
    state.keys[dir] = true;

    if (state.mode === 'title' || state.mode === 'gameover' || state.mode === 'win' || state.mode === 'arrived') {
      startBtn.click();
      return;
    }
    if (state.phase === 'cross') {
      const [dx, dy] = dirDelta[dir];
      tryMove(dx, dy);
    }
  });
  window.addEventListener('keyup', (e) => {
    const dir = keyMap[e.key];
    if (dir) state.keys[dir] = false;
  });

  document.querySelectorAll('[data-dir]').forEach(btn => {
    const down = (e) => {
      e.preventDefault();
      const dir = btn.dataset.dir;
      state.keys[dir] = true;
      if (state.phase === 'cross') {
        const [dx, dy] = dirDelta[dir];
        tryMove(dx, dy);
      }
    };
    const up = () => { state.keys[btn.dataset.dir] = false; };
    btn.addEventListener('pointerdown', down);
    btn.addEventListener('pointerup', up);
    btn.addEventListener('pointerleave', up);
  });

  let touchStart = null;
  canvas.addEventListener('pointerdown', (e) => {
    touchStart = { x: e.clientX, y: e.clientY };
    canvas.setPointerCapture(e.pointerId);
    if (state.phase === 'drive') {
      const rect = canvas.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width;
      // Wide touch bands — left half / right half steers
      state.keys.left = nx < 0.48;
      state.keys.right = nx > 0.52;
      state.keys.up = true;
    }
  });
  canvas.addEventListener('pointermove', (e) => {
    if (state.phase !== 'drive' || !touchStart) return;
    const rect = canvas.getBoundingClientRect();
    const nx = (e.clientX - rect.left) / rect.width;
    state.keys.left = nx < 0.48;
    state.keys.right = nx > 0.52;
    state.keys.up = true;
  });
  canvas.addEventListener('pointerup', (e) => {
    if (state.phase === 'drive') {
      state.keys.left = state.keys.right = state.keys.up = state.keys.down = false;
      touchStart = null;
      return;
    }
    if (!touchStart) return;
    const dx = e.clientX - touchStart.x;
    const dy = e.clientY - touchStart.y;
    touchStart = null;
    if (Math.hypot(dx, dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
    else tryMove(0, dy > 0 ? 1 : -1);
  });

  function togglePause() {
    if (state.mode === 'play' || state.mode === 'drive') {
      state._resumeMode = state.mode;
      state.mode = 'pause';
      pauseBtn.textContent = 'Resume';
      beep(320, 0.06);
    } else if (state.mode === 'pause') {
      state.mode = state._resumeMode || (state.phase === 'drive' ? 'drive' : 'play');
      pauseBtn.textContent = 'Pause';
      beep(480, 0.06);
    }
  }

  pauseBtn.addEventListener('click', togglePause);
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    muteBtn.setAttribute('aria-pressed', String(state.muted));
    muteBtn.textContent = state.muted ? 'Muted' : 'Sound';
  });

  startBtn.addEventListener('click', () => {
    ensureAudio();
    if (state.mode === 'win') {
      beginDrive();
      return;
    }
    if (state.mode === 'arrived') {
      if (state.destination && state.destination.href) {
        window.location.href = state.destination.href;
        return;
      }
      state.level += 1;
      state.mode = 'play';
      startCrossingLevel(state.level);
      overlay.hidden = true;
      pauseBtn.disabled = false;
      pauseBtn.textContent = 'Pause';
      return;
    }
    startGame();
  });

  function fitCanvas() {
    canvas.style.width = '100%';
    canvas.style.height = '100%';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  state.lanes = buildLanes(1);
  setPhaseUI();
  overlay.hidden = true;
  startGame();
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
