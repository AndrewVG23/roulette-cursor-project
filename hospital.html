<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>County General — ER</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="wallet.css">
  <script src="wallet.js"></script>
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem;
      --color-text: #eef8ff;
      --color-text-muted: #b8d4e8;
      --color-text-faint: #7aa8c4;
      --color-primary: #2a9fd6;
      --font-display: 'Fredoka', 'Nunito', system-ui, sans-serif;
      --font-body: 'Nunito', 'Fredoka', system-ui, sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      min-height: 100dvh;
      height: 100dvh;
      font-family: var(--font-body);
      color: var(--color-text);
      background:
        radial-gradient(ellipse 80% 45% at 50% -8%, rgba(42,159,214,.18), transparent 50%),
        linear-gradient(180deg, #0e2230 0%, #081820 55%, #061018 100%);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    button, a.btn { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; text-decoration: none; }
    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 3;
      display: flex;
      justify-content: flex-end;
      gap: var(--space-2);
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(8,24,32,.78), transparent);
      pointer-events: none;
    }
    .stat {
      min-width: 72px;
      padding: 7px 11px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.12), transparent 40%), linear-gradient(180deg, #163040, #0c1820);
      border: 2px solid rgba(184,212,232,.22);
      box-shadow: 0 4px 0 rgba(4,16,24,.45);
      text-align: center;
      pointer-events: auto;
    }
    .stat .label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--color-text-faint);
    }
    .stat .value {
      display: block;
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      line-height: 1.2;
    }
    .stat.wide { min-width: 130px; text-align: left; }
    .recovery-bar {
      margin-top: 4px;
      height: 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.14);
      overflow: hidden;
    }
    .recovery-fill {
      height: 100%;
      width: 20%;
      border-radius: 999px;
      background: linear-gradient(180deg, #6ee0a8, #2a9f6a);
      transition: width 180ms ease, background 180ms ease;
    }
    .recovery-fill.mid { background: linear-gradient(180deg, #f0c86a, #d09028); }
    .recovery-fill.low { background: linear-gradient(180deg, #ff7a8a, #c8102e); }
    .canvas-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: rgba(6,16,24,.72);
      backdrop-filter: blur(5px);
      z-index: 2;
    }
    .overlay[hidden] { display: none; }
    .overlay-card {
      width: min(100%, 360px);
      text-align: center;
      padding: var(--space-6) var(--space-5);
      border-radius: 22px;
      background: linear-gradient(180deg, #f0f8ff, #dceaf4);
      border: 3px solid #2a9fd6;
      box-shadow: 0 14px 34px rgba(4,16,24,.4), 0 0 0 6px rgba(42,159,214,.18);
      color: #102030;
    }
    .overlay-card h2 {
      margin: 0 0 var(--space-2);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: #1878a8;
    }
    .overlay-card p {
      margin: 0 0 var(--space-5);
      color: #3a5060;
      font-size: var(--text-sm);
      line-height: 1.45;
      font-weight: 700;
    }
    .overlay-card .btn {
      min-height: 48px;
      min-width: 120px;
      padding: 10px 22px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #f0f8ff;
      background: linear-gradient(180deg, #48b8e8, #1878a8);
      border: 2px solid rgba(16,80,120,.35);
      box-shadow: 0 4px 0 rgba(8,40,64,.4);
    }
    .controls {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 3;
      display: grid;
      gap: var(--space-2);
      padding: 10px 12px calc(12px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(0deg, rgba(8,20,28,.94), rgba(8,20,28,.55) 55%, transparent);
      border-top: 3px solid rgba(42,159,214,.35);
    }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }
    .btn {
      min-height: 48px;
      padding: 0 16px;
      border-radius: 12px;
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #eef8ff;
      background: linear-gradient(180deg, #244858, #142830);
      border: 2px solid rgba(184,212,232,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 3px 0 rgba(4,16,24,.45);
    }
    .btn.primary {
      background: linear-gradient(180deg, #48b8e8, #1878a8);
      border-color: rgba(160,220,255,.35);
    }
    .btn.subtle {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)), linear-gradient(180deg, #1a3848, #102028);
    }
    .treat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
    }
    .btn.treat {
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 0.72rem;
    }
    .btn.treat .key {
      font-size: 1.1rem;
      line-height: 1;
    }
    .help-btn {
      position: absolute;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: max(10px, env(safe-area-inset-bottom, 0px));
      z-index: 6;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: #eef8ff;
      background: linear-gradient(180deg, #244858, #142830);
      border: 2px solid rgba(184,212,232,.28);
    }
    .help-panel {
      position: absolute;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: calc(58px + env(safe-area-inset-bottom, 0px));
      z-index: 6;
      width: min(300px, calc(100vw - 20px));
      padding: 12px 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(16,36,48,.97), rgba(8,18,24,.98));
      border: 2px solid rgba(184,212,232,.22);
      display: grid;
      gap: 8px;
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      line-height: 1.45;
    }
    .help-panel[hidden] { display: none; }
    .help-panel strong { color: #eef8ff; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="stat wide">
        <span class="label">Recovery</span>
        <div class="recovery-bar" aria-hidden="true"><div class="recovery-fill" id="recoveryFill"></div></div>
        <span class="value" id="recoveryVal">20%</span>
      </div>
      <div class="stat">
        <span class="label">Round</span>
        <span class="value" id="roundVal">1</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="560" height="420" aria-label="Hospital recovery ward"></canvas>
      <div class="overlay" id="overlay" hidden>
        <div class="overlay-card">
          <h2 id="overlayTitle">County General</h2>
          <p id="overlayText"></p>
          <div class="control-row" style="justify-content:center;">
            <button class="btn primary" id="startBtn" type="button">Begin Treatment</button>
          </div>
        </div>
      </div>
    </div>

    <button class="help-btn" id="helpBtn" type="button" aria-label="Show controls" aria-expanded="false">?</button>
    <div class="help-panel" id="helpPanel" hidden>
      <div><strong>1 / 2 / 3</strong> — give Pill, Ice, or Bandage when it reaches the bed</div>
      <div>Match the treatment icon. Wrong dose hurts. Missed doses hurt worse.</div>
      <div>Fill recovery to 100% to get discharged back to the grill.</div>
    </div>

    <div class="controls">
      <div class="control-row">
        <button class="btn subtle" id="pauseBtn" type="button">Pause</button>
        <button class="btn subtle" id="muteBtn" type="button" aria-pressed="false">Sound</button>
        <a class="btn subtle" href="frogger.html?from=grill">Leave</a>
      </div>
      <div class="treat-grid" id="treatGrid" aria-label="Treatments"></div>
    </div>
  </div>

  <script>
(() => {
  const W = 560;
  const H = 420;
  const BED_X = 168;
  const LINE_Y = 248;
  const TREAT_W = 68;
  const MAX_RECOVERY = 100;
  const START_RECOVERY = 20;

  const TREATMENTS = [
    { id: 'pill', label: 'Pill', key: '1', color: '#4a90e8', accent: '#1a5090' },
    { id: 'ice', label: 'Ice', key: '2', color: '#7ad4f0', accent: '#2088a8' },
    { id: 'bandage', label: 'Bandage', key: '3', color: '#f0ece4', accent: '#c8b8a8' }
  ];

  const KEY_TO_TREAT = { '1': 'pill', '2': 'ice', '3': 'bandage' };

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const helpBtn = document.getElementById('helpBtn');
  const helpPanel = document.getElementById('helpPanel');
  const treatGrid = document.getElementById('treatGrid');
  const recoveryFill = document.getElementById('recoveryFill');
  const recoveryVal = document.getElementById('recoveryVal');
  const roundVal = document.getElementById('roundVal');

  let canvasDpr = 1;
  let admit = null;

  try {
    const raw = sessionStorage.getItem('hospital-admit');
    if (raw) {
      admit = JSON.parse(raw);
      sessionStorage.removeItem('hospital-admit');
    }
  } catch (e) {}

  const state = {
    mode: 'title',
    recovery: START_RECOVERY,
    round: 1,
    spawnTimer: 1.4,
    beltSpeed: 72,
    treatments: [],
    floatText: [],
    flash: 0,
    hurtFlash: 0,
    screenShake: 0,
    pulse: 0,
    muted: false,
    lastTs: 0,
    streak: 0
  };

  let audioCtx = null;
  function ensureAudio() {
    if (state.muted) return null;
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep(freq, dur, type = 'sine', vol = 0.04) {
    const ac = ensureAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g);
    g.connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + dur);
  }

  function pickTreatmentType() {
    return TREATMENTS[Math.floor(Math.random() * TREATMENTS.length)].id;
  }

  function spawnTreatment() {
    state.treatments.push({
      id: pickTreatmentType(),
      x: W + 20,
      wobble: Math.random() * Math.PI * 2
    });
  }

  function activeTreatment() {
    let best = null;
    let bestDist = Infinity;
    for (const t of state.treatments) {
      const cx = t.x + TREAT_W / 2;
      const dist = Math.abs(cx - BED_X);
      if (dist < 56 && dist < bestDist) {
        best = t;
        bestDist = dist;
      }
    }
    return best;
  }

  function giveTreatment(treatId) {
    if (state.mode !== 'play') return;
    const t = activeTreatment();
    if (!t) {
      state.recovery = Math.max(0, state.recovery - 4);
      state.hurtFlash = 0.35;
      state.screenShake = 0.25;
      beep(90, 0.12, 'sawtooth', 0.05);
      state.floatText.push({ x: BED_X, y: LINE_Y - 90, text: 'Nothing there!', life: 0.8, color: '#ff8a9a' });
      updateHUD();
      checkEnd();
      return;
    }
    if (t.id === treatId) {
      const bonus = 6 + Math.min(4, state.streak);
      state.recovery = Math.min(MAX_RECOVERY, state.recovery + bonus);
      state.streak++;
      state.pulse = 0.35;
      beep(520, 0.06);
      beep(660, 0.08);
      state.floatText.push({ x: BED_X, y: LINE_Y - 90, text: `+${bonus}`, life: 0.9, color: '#6ee0a8' });
      state.treatments = state.treatments.filter(x => x !== t);
    } else {
      state.recovery = Math.max(0, state.recovery - 8);
      state.streak = 0;
      state.hurtFlash = 0.45;
      state.screenShake = 0.4;
      beep(70, 0.18, 'sawtooth', 0.06);
      state.floatText.push({ x: BED_X, y: LINE_Y - 90, text: 'Wrong dose!', life: 0.9, color: '#ff8a9a' });
      state.treatments = state.treatments.filter(x => x !== t);
    }
    updateHUD();
    checkEnd();
  }

  function checkEnd() {
    if (state.recovery >= MAX_RECOVERY) {
      state.mode = 'win';
      showOverlay(
        'Discharged',
        admit
          ? `${admit.who} sent you here with ${Wallet.format(Wallet.read())} on the line. You're cleared for the grill.`
          : 'Vitals stable. Back to work.',
        'Back to Grill'
      );
      pauseBtn.disabled = true;
      beep(440, 0.08);
      beep(554, 0.1);
      beep(659, 0.12);
      beep(880, 0.16);
      return;
    }
    if (state.recovery <= 0) {
      state.mode = 'gameover';
      showOverlay(
        'Code Blue',
        'Recovery failed. The night shift waits for no one.',
        'Try Again'
      );
      pauseBtn.disabled = true;
      beep(110, 0.25, 'sawtooth', 0.06);
    }
  }

  function startGame() {
    state.recovery = START_RECOVERY;
    state.round = 1;
    state.spawnTimer = 1.2;
    state.beltSpeed = 72;
    state.treatments = [];
    state.floatText = [];
    state.flash = 0;
    state.hurtFlash = 0;
    state.screenShake = 0;
    state.streak = 0;
    state.mode = 'play';
    overlay.hidden = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';
    updateHUD();
    beep(330, 0.08);
    beep(440, 0.1);
  }

  function updateHUD() {
    recoveryVal.textContent = `${Math.round(state.recovery)}%`;
    roundVal.textContent = String(state.round);
    recoveryFill.style.width = state.recovery + '%';
    recoveryFill.classList.toggle('mid', state.recovery <= 60 && state.recovery > 30);
    recoveryFill.classList.toggle('low', state.recovery <= 30);
  }

  function showOverlay(title, text, btnLabel) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btnLabel;
    overlay.hidden = false;
  }

  function update(dt) {
    if (state.hurtFlash > 0) state.hurtFlash -= dt;
    if (state.screenShake > 0) state.screenShake = Math.max(0, state.screenShake - dt * 1.8);
    if (state.pulse > 0) state.pulse -= dt;

    for (const f of state.floatText) f.life -= dt;
    state.floatText = state.floatText.filter(f => f.life > 0);

    if (state.mode !== 'play') return;

    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      spawnTreatment();
      state.spawnTimer = Math.max(0.55, 1.35 - state.round * 0.08);
    }

    for (const t of state.treatments) {
      t.x -= state.beltSpeed * dt;
      t.wobble += dt * 6;
    }

    for (let i = state.treatments.length - 1; i >= 0; i--) {
      const t = state.treatments[i];
      if (t.x + TREAT_W < 0) {
        state.treatments.splice(i, 1);
        state.recovery = Math.max(0, state.recovery - 6);
        state.streak = 0;
        state.hurtFlash = 0.3;
        beep(120, 0.1, 'square', 0.04);
        state.floatText.push({ x: BED_X, y: LINE_Y - 70, text: 'Missed!', life: 0.8, color: '#ffb070' });
        updateHUD();
        checkEnd();
      }
    }

    if (state.recovery >= 35 + state.round * 18 && state.round < 4) {
      state.round++;
      state.beltSpeed += 10;
      updateHUD();
    }
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function drawRoom() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a3848');
    g.addColorStop(0.55, '#122830');
    g.addColorStop(1, '#0a1820');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#0e2028';
    roundRect(0, LINE_Y + 18, W, H - LINE_Y - 18, 0);
    ctx.fill();

    ctx.strokeStyle = 'rgba(184,212,232,.08)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, LINE_Y + 18);
      ctx.lineTo(x, H);
      ctx.stroke();
    }

    ctx.fillStyle = 'rgba(42,159,214,.12)';
    roundRect(0, LINE_Y - 8, W, 16, 8);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,.04)';
    ctx.font = '700 11px Nunito, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('COUNTY GENERAL — ER WARD', 16, 28);

    drawMonitor(420, 52);
    drawIV(92, LINE_Y - 120);
    drawBed(BED_X, LINE_Y);
    drawPatient(BED_X, LINE_Y - 8);

    const active = state.mode === 'play' ? activeTreatment() : null;
    if (active) {
      ctx.strokeStyle = 'rgba(110,224,168,.55)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      roundRect(active.x - 4, LINE_Y - 86, TREAT_W + 8, 78, 10);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function drawMonitor(x, y) {
    roundRect(x, y, 96, 58, 8);
    ctx.fillStyle = '#0a1820';
    ctx.fill();
    ctx.strokeStyle = '#3a6070';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = state.recovery > 30 ? '#6ee0a8' : '#ff7a8a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const beat = Math.sin(state.lastTs * 0.012) * 4;
    for (let i = 0; i < 72; i++) {
      const px = x + 12 + i;
      const py = y + 30 + Math.sin(i * 0.45 + state.lastTs * 0.008) * (6 + beat);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  function drawIV(x, y) {
    ctx.strokeStyle = '#b8d4e8';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, LINE_Y - 40);
    ctx.stroke();
    ctx.fillStyle = 'rgba(110,224,168,.35)';
    ctx.beginPath();
    ctx.arc(x, LINE_Y - 40, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#dceaf4';
    roundRect(x - 14, y - 8, 28, 36, 6);
    ctx.fill();
  }

  function drawBed(cx, baseY) {
    ctx.fillStyle = '#dceaf4';
    roundRect(cx - 72, baseY - 18, 144, 28, 8);
    ctx.fill();
    ctx.fillStyle = '#b8c8d8';
    roundRect(cx - 78, baseY + 4, 156, 18, 6);
    ctx.fill();
    ctx.fillStyle = '#eef8ff';
    roundRect(cx - 66, baseY - 52, 132, 36, 10);
    ctx.fill();
  }

  function drawPatient(cx, cy) {
    const bob = Math.sin(state.lastTs * 0.003) * 1.5;
    ctx.fillStyle = '#e8c8a0';
    ctx.beginPath();
    ctx.arc(cx, cy - 28 + bob, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2a9fd6';
    roundRect(cx - 22, cy - 12 + bob, 44, 34, 8);
    ctx.fill();
    if (state.hurtFlash > 0) {
      ctx.fillStyle = `rgba(255,80,100,${state.hurtFlash * 0.35})`;
      roundRect(cx - 24, cy - 34 + bob, 48, 58, 10);
      ctx.fill();
    }
    if (state.pulse > 0) {
      ctx.strokeStyle = `rgba(110,224,168,${state.pulse})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy - 10 + bob, 34, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawTreatment(t) {
    const spec = TREATMENTS.find(x => x.id === t.id);
    const y = LINE_Y - 72 + Math.sin(t.wobble) * 2;
    roundRect(t.x, y, TREAT_W, 56, 10);
    ctx.fillStyle = spec.color;
    ctx.fill();
    ctx.strokeStyle = spec.accent;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = spec.accent;
    ctx.font = '800 11px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(spec.label.toUpperCase(), t.x + TREAT_W / 2, y + 18);

    if (t.id === 'pill') {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(t.x + TREAT_W / 2, y + 36, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (t.id === 'ice') {
      ctx.fillStyle = 'rgba(255,255,255,.65)';
      roundRect(t.x + TREAT_W / 2 - 14, y + 28, 28, 18, 4);
      ctx.fill();
    } else {
      ctx.fillStyle = '#fff';
      roundRect(t.x + TREAT_W / 2 - 16, y + 30, 32, 12, 3);
      ctx.fill();
      ctx.fillStyle = '#e84040';
      roundRect(t.x + TREAT_W / 2 - 16, y + 30, 10, 12, 2);
      ctx.fill();
    }
  }

  function drawFloatText() {
    for (const f of state.floatText) {
      ctx.globalAlpha = Math.min(1, f.life);
      ctx.fillStyle = f.color;
      ctx.font = '800 18px Fredoka, Nunito, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y - (1 - f.life) * 24);
      ctx.globalAlpha = 1;
    }
  }

  function draw() {
    ctx.save();
    ctx.setTransform(canvasDpr, 0, 0, canvasDpr, 0, 0);
    if (state.screenShake > 0) {
      ctx.translate((Math.random() - 0.5) * state.screenShake * 8, (Math.random() - 0.5) * state.screenShake * 6);
    }

    drawRoom();

    const sorted = [...state.treatments].sort((a, b) => a.x - b.x);
    for (const t of sorted) drawTreatment(t);

    drawFloatText();

    if (state.mode === 'pause') {
      ctx.fillStyle = 'rgba(8,20,28,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#eef8ff';
      ctx.font = '700 24px Fredoka, Nunito, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, H / 2);
    }

    ctx.restore();
  }

  function frame(ts) {
    state.lastTs = ts;
    if (!state._lastFrame) state._lastFrame = ts;
    let dt = (ts - state._lastFrame) / 1000;
    state._lastFrame = ts;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function togglePause() {
    if (state.mode === 'play') {
      state.mode = 'pause';
      pauseBtn.textContent = 'Resume';
      beep(320, 0.06);
    } else if (state.mode === 'pause') {
      state.mode = 'play';
      pauseBtn.textContent = 'Pause';
      beep(480, 0.06);
    }
  }

  function toggleHelp() {
    const open = helpPanel.hidden;
    helpPanel.hidden = !open;
    helpBtn.setAttribute('aria-expanded', String(open));
  }

  function buildTreatButtons() {
    treatGrid.innerHTML = '';
    for (const t of TREATMENTS) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn treat';
      btn.innerHTML = `<span class="key">${t.key}</span><span>${t.label}</span>`;
      btn.style.borderColor = t.accent;
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        ensureAudio();
        giveTreatment(t.id);
      });
      treatGrid.appendChild(btn);
    }
  }

  startBtn.addEventListener('click', () => {
    ensureAudio();
    if (state.mode === 'win') {
      try { sessionStorage.setItem('passed-entry-grill', '1'); } catch (e) {}
      location.href = 'burger.html';
      return;
    }
    startGame();
  });

  pauseBtn.addEventListener('click', togglePause);
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    muteBtn.setAttribute('aria-pressed', String(state.muted));
    muteBtn.textContent = state.muted ? 'Muted' : 'Sound';
  });
  helpBtn.addEventListener('click', toggleHelp);

  window.addEventListener('keydown', (e) => {
    if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
      e.preventDefault();
      toggleHelp();
      return;
    }
    if (e.key === 'Escape') {
      if (!helpPanel.hidden) { helpPanel.hidden = true; return; }
      if (state.mode === 'play' || state.mode === 'pause') togglePause();
      return;
    }
    if (state.mode === 'title' || state.mode === 'gameover') {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        startBtn.click();
      }
      return;
    }
    const treatId = KEY_TO_TREAT[e.key];
    if (treatId) {
      e.preventDefault();
      ensureAudio();
      giveTreatment(treatId);
    }
  });

  function fitCanvas() {
    canvasDpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(W * canvasDpr);
    canvas.height = Math.round(H * canvasDpr);
    canvas.style.width = '100%';
    canvas.style.height = '100%';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();
  buildTreatButtons();

  const introWho = admit ? admit.who : 'The grill';
  const introScore = Wallet.format(Wallet.read());
  showOverlay(
    'County General',
    admit
      ? `${introWho} knocked you out with ${introScore} on the line. Administer the right treatments to get discharged.`
      : 'Match treatments at the bed. Fill recovery to return to work.',
    'Begin Treatment'
  );
  updateHUD();
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
